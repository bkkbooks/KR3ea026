body:
  text: 卷四厥病篇第二十四諸本無篇字馬雲篇內所論不止厥病然首節有厥頭痛厥心痛等病故名篇然此厥之為義乃氣逆而以此連彼之謂實與素問之厥論不同厥頭痛止太陰張云厥逆也邪逆於經上幹頭腦而為痛者曰厥頭痛也下仿此足陽明之脈上行於面其悍氣上衝頭者循眼系入絡腦足太陰支者注心中故以頭痛而兼面腫煩心者當取足之陽明太陰也頭脈痛止調足厥陰張云頭脈痛者痛在皮肉血脈之間也心悲善泣者氣逆在肝也故當先視頭脈之動而盛者刺去其血以泄其邪然後取足厥陰肝經而調補之以肝脈會於巔也貞貞頭重而痛止取足少陰甲乙貞貞作員員張云貞貞堅固貌其痛不移也頭上五行行五即前篇五十九俞之穴所以散諸陽之熱逆也先取手少陰心經瀉南方以去火也後取足少陰腎經補北方以壯水也簡案刺熱篇頭痛員員知貞貞字訛甲乙為是志注員員周轉也介按員員頭重而痛即頭痛而眩暈也蓋以腦為髓海其髓由腎系貫脊通於脊髓腎精足則入脊化髓上循入腦而為腦髓茲以腎精不足未能化髓上循於腦而為眩暈故宜取足少陰即虛則補之之義意善忘止取足太陰甲乙意作噫注九墟作意太陰作太陽張云脾藏意意傷則善忘陽邪在頭而無定所則按之不得故當先取頭面左右動脈以泄其邪後取足太陰經以補脾氣也莫雲從云頭面左右之動脈足陽明之脈也脈湧有熱止後取足少陽甲乙脈湧有熱作脈骨先熱張云耳之前後足少陽經也其脈湧而熱者當瀉出熱血仍取本經之穴真頭痛止死不治張云頭痛有二上文言厥頭痛者可治此言真頭痛者不可治蓋頭為諸陽之會四肢為諸陽之本若頭痛甚而遍盡於腦手足寒至節者以元陽敗竭陰邪直中髓海故最為凶兆六十難云手三陽之脈受風寒伏留而不去者則名厥頭痛入連在腦者名真頭痛若肉傷痛未已可則刺甲乙肉作內則作即刺下有之字馬雲可取針以側刺其頭痛之處志云有所擊墮惡血在於內若肉傷痛未已則可在此痛處而刺之不可遠取之俞也簡案則馬讀為側然甲乙作即則志注為是人痹為惡日作者甲乙日上有風字張云痹之甚者謂之大痹其證則風寒濕三氣雜至合成惡患令人頭痛不可刺也若日作者則猶有間止故刺之可令少愈終亦不能全已也簡案此謂大痹為患每逢風日必作者今世多頭風如是者可令少愈而不可令全愈經文必脫風字頭半寒痛止陽明甲乙無半字張云頭半寒痛者偏頭冷痛也手足少陽陽明之脈皆循耳上行頭角故當先取手經以取其標後取足經以去其本也厥心痛止取然谷甲乙髮針下有立已二字六十難云五臟氣相干名厥心痛楊注諸經絡皆屬於心若一經有病其脈逆行逆則乘心乘心則心痛故曰厥心痛是五臟氣衝逆致痛非心家自痛也張云控引也善瘈拘急如風也傴僂背曲不伸也足少陰之經由股內後廉貫脊屬腎其直者從腎上貫肝膈入肺中凡疼痛如從脊後觸其心而傴僂者以腎邪干心是為腎心痛也腎與膀胱為表裡故當先取足太陽之京骨崑崙如痛不已仍當取腎經之然谷介按從湧泉上行足內踝前起大骨下陷之中即然谷穴也凡取此穴主治實熱之症然則厥心痛者系是熱厥而非寒厥可知矣宜針三分留三呼灸三壯而不宜見血腹脹胸滿止太白甲乙腹上有暴泄二字張云足陽明之經由缺盆下膈屬胃絡脾其支者下循腹裡凡腹脹胸滿而為痛者以胃邪干心是為胃心痛也胃與脾為表裡故當取足太陰之大都太白二穴簡案外臺引小品云厥心痛腹脹滿不欲食食則不消心痛尤甚者胃心痛也出甲乙經第一卷中與本節及甲乙文少異脾心痛也止大溪甲乙然谷作後谷張云脾之支脈注於心中若脾不能運而逆氣攻心其痛必甚有如錐刺者是為脾心痛也但然谷大溪皆足少陰之穴取此治脾其義何居蓋濕因寒滯則相挾乘心須泄腎邪當刺此也志云然谷當作漏谷大溪當作天溪蓋上古之文不無魯魚之誤樓氏云脾心痛而取然谷大溪者故孫真人張潔古謂之忘經也簡案志考作漏谷天溪似是如死狀止太衝千金外臺作如死灰狀張云蒼蒼肝色也如死狀肝氣逆也終日不得太息肝系急氣道約而不利也是皆肝邪上逆所謂肝心痛也行間太衝皆足厥陰經穴故當取以治之臥若徒居止大淵甲乙間上有乃字樓氏云徒居謂間居間謂痛緩心痛臥與間居則痛緩動作則益甚者取肺其兼短氣者亦取肺經云心痛但短氣不足以息刺手太陰者是也真心痛手足青脈經千金外臺青作清熊本同趙府本張本作清張云真心痛者邪氣直犯心主也毒深陰甚故手足之清至節其死之速如此清音倩寒冷也中有盛聚不可取於腧千金盛作成張云中有盛聚謂有形之症或積或血停聚於中病在臟而不在經故不可取於腧穴當從內以調治之也志云盛聚者五臟之逆氣太盛聚於中而為心痛非循脈之上乘也蟲瘕及蛟蛔止乃出針也甲乙作腸中有蟲瘕有蛔蛟心腸作心腹憹作痛作發作二字涎作羡蛟蛔也作蛔蛟也脈經千金作心腹痛懊憹發作腫聚是蛟蛔也作蛔蛟也外臺引甲乙左無懊憹字張云此言蟲瘕在腸胃中亦為心腹痛也瘕結聚也蛟即蛔屬蛔蛔也不可取以小針謂其力小不能制也蟲瘕之證其痛則懊憹難忍或肚腹腫起而結聚於內或往來上下而行無定處或蟲動則痛靜則不痛而有時休止或腹熱喜渴而口涎出者是皆蛟蛔之為患也簡案蛔蛔蛔同音回説文腹中長蟲也口問篇云胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下巢源云蛔蟲者是九蟲內之一蟲也長一尺亦有長五六寸蛟張注未見所據當是蛟誤説文蛟龍之屬則非蛔屬蘵腹憹痛形中上者甲乙無此八字張云蘵滿也此重言證之如此其形自中自上而漸升者即當以蟲治之也蘵恲同音烹簡案蘵字典恲重文蘵玉篇普行切滿也龍龕手鑑心悶也形中上者一句疑有脫誤義不明晰耳中馬雲聽宮穴系手太陽小腸經耳前動脈馬雲耳門穴系手少陽三焦經於耵聹甲乙作干擲抵史云上都領切耳中垢也下乃頂切巢源云耳聤聹者耳里津液結聚所成人耳皆有之輕者不能為患若加以風熱乘之則結𩊅成丸核塞耳亦令耳暴聾張云或痛或無聞者皆不可刺之膿垢去而耳自愈矣耳聾止後取足馬雲當取手小指之次指爪甲上與肉交者即手少陽三焦經關衝穴也先取之後又取足少陽膽經之竅陰耳鳴止後取足馬雲當取手之中指爪甲上即手厥陰心包絡經中衝穴後取足厥陰肝經大敦穴足髀止不可刺甲乙合作闔張云髀足股也側側臥也樞合中髀樞中也即足少陽經之環跳穴宜治以員利針第六針也忌用大針病注下血馬雲此言下血者有當刺之穴也凡病注下血者以肝不能納血也當取肝經之曲泉以刺之風痹淫𣚊止死也甲乙淫濼作注一字恐作怒履水諸本作履冰當改馬雲已以同風痹者其邪氣淫溢消濼病難得愈張云病在陽命曰風病作陰命曰痹陰陽俱病命曰風痹淫濼者浸淫日深之謂足如履冰之寒又如入湯之熱下而股脛中而腹心上而頭目無所不病在表則汗出在裡則短氣不樂或為悲哀或為喜恐此陰陽俱病之候雖尚可支持然不能出三年也簡案素骨空論淫濼脛痠不能久立王注淫濼謂似痠疼而無力也考之原文張注似是詳見於素問識病本篇第二十五馬雲此與素問標本病傳論相同然凡病必先治其本若中滿與大小不利則不分標本而必先治之本經以本篇論標本後論病傳分為二篇素問合標本病傳論共為一篇詳義見於素問識當參考先病而後逆者治其本馬雲先病曰本後病曰標故凡先生初病而後病勢逆者必先治其初病之為本若先病勢逆而後生他病者則必以病勢逆之為本而先治之也必且調之素問必上有先熱而後生中滿者治其標一句先病而後中滿者素問病作熱志云中滿者腹中脹滿脾胃之所生也先病而後中滿者因病而致中滿也則當先治中滿之標病而後治其本病有客氣有同氣馬雲正以人之病氣有二病本不相同而乃彼此相傳者謂之客氣也有二病之氣本相同類而乃彼此相傳者謂之同氣也簡案素新校正云全元起本同作司近是間者止為獨行志云間者邪正實虛之相間故當並行其治甚者又當獨行其治先小便大便不利諸本小下無便字素問作先小大不利雜病篇第二十六沉沉然馬雲頭則昏沉而不能舉䀮䀮然馬雲䀮音荒目不明唇漯漯然甲乙作者肩中熱馬雲其唇則漯漯然而有涎出唾下之意張云腫起貌病而在面在胸及不能言者以胃脈行於頄頰挾口環唇循喉嚨下胸膈也厥氣走喉止大便不利志云此邪病足少陰之氣而為厥逆也足少陰腎脈循喉嚨挾舌本厥氣上逆於喉故不能言腎為生氣之原氣逆故手足清腎開竅於二陰故大便不利向向然止禾呈糸禾呈糸甲乙向向作膨膨禾呈糸禾呈糸作爂爂注云音最九墟作榮馬雲腹中向向然而氣喜走布且多有寒氣又禾呈糸禾呈糸然而有聲張云腹向向然寒氣滯於脾也又禾呈糸禾呈糸然水穀不分之聲也便溲難脾脈聚於陰器也簡案禾呈糸字典瀫同水名無他義唯龍龕手鑑云胡谷切水聲志作谷非嗌乾止取足少陰馬雲嗌咽乾燥口中甚熱其津液如膠之稠當取足少陰腎經之穴以補之水王則火衰也犢鼻甲乙云在膝下胻上俠解大筋中足陽明脈氣所發簡案骨空論䯒骨空在輔骨之上端王注云謂犢鼻穴也發而間之馬雲必發其針而又間刺之非止一次而已也釐志云音釐牛尾也案出説文刺膝無疑馬雲刺膝用之無疑也喉痹止取手陽明張云手足陽明之脈皆循喉嚨能言者輕但取之上不能言者重當瀉其下也瘧不渴止取手陽明甲乙云瘧不渴間日而作九卷曰取足陽明素問刺太陰渴而間日作九卷曰取手少陽素問刺足少陽志云瘧氣隨經絡沉以內薄間日而作者其氣舍深內薄於陰而不得出足陽明之脈屬胃絡脾應地氣之在下其道遠故間日而作地為陰故不渴手陽明之脈屬大腸絡肺應天氣之在上其道近故曰作天為陽故渴也齒痛止取手陽明甲乙齒下有動字張云手足陽明之脈皆入齒中然胃經多實熱故不畏寒飲者當瀉足陽明大腸經多虛寒故畏寒飲者當補手陽明也此與上文寒熱病篇臂陽明節義有所關當互求之志云足陽明主悍熱之氣故不惡寒飲手陽明主清秋之氣故惡寒飲聾而不痛止取手陽明張云足少陽之脈下耳後支耳中出耳前手陽明之別者入耳故當分痛與不痛而補瀉之志云陽明當作少陽衄而不止止出血甲乙下衃血上有大衄二字似是馬雲宛腕同鼻中出血曰衄血至敗惡凝聚其色赤黑者曰衃衃血成流則血去多而不止於衃血也當取足太陽膀胱經以刺之其膕中出血仍是膀胱經之委中穴也若止曰衃血則不成流而去之似少也當取手太陽小腸經穴以刺之其腕骨下即手少陰心經之通里穴正以心與小腸為表裡也腰痛止取足少陽刺腰痛論上寒上熱上並無痛字張云上寒上熱皆以上體言也寒刺陽經去陽分之陰邪熱刺厥陰去陰中之風熱也少陽脈行身之兩側故俯仰不利者當刺之中熱而喘止血絡張云熱在中上二焦也取足少陰者壯水以制火也膕中血絡即足太陽委中穴取之可以瀉火簡案刺腰痛論中熱而喘刺足少陰王注云湧泉大鐘悉主之喜怒止刺足少陽甲乙小作少足少陽作足少陰注云太素作少陽志云暴怒傷肝食氣入胃散精於心肝食飲下節肝心氣逆故不欲食也肝心氣逆則中氣不舒故言益小也當取足太陰以疏脾氣則食氣得以轉輸而音聲益彰矣肝主語而在志為怒怒而多言厥陰之逆氣太甚故當取足之少陽以疏厥陰之氣顑痛止出血甲乙顑作頷下同馬雲顑頷同手陽明當是商陽穴顑之盛脈是胃經頰車穴簡案張以顑為鬢前兩太陽未知何據項痛止刺手太陽也馬雲俯仰屬背與腰故曰足太陽而顧則屬肩與項故曰手太陽也小腹滿大止取足厥陰甲乙胃作胃淅淅作索索然張云淅淅寒肅貌肝經之脈抵小腹挾胃其支者從肝別貫膈故為病如此當取足厥陰經以刺之腹滿止取足少陰甲乙無亦字及喘息二字少陰作少陽張云腎開竅於二陰其經脈從腎上貫肝膈入肺中循喉嚨故其為病如此當取足少陰經以刺之喝喝喘急貌腹滿止取足太陰張云脾失其職則食不能化腹滿而鳴氣滯於中大便不調當取足太陰經以刺之心痛止取足少陰張云此腎邪上逆也心痛止足太陰甲乙嗇嗇作澀澀志云嗇嗇畏寒貌太陰為陰中之至陰陰寒故腹脹而嗇嗇然大便不化者土氣不化也此足太陰之氣厥而為心痛故當取本經以疏逆氣心痛止取手少陽張云足少陰之脈貫脊故痛引於背手少陽之脈布膻中故不得息宜刺此二經也心痛止刺足厥陰張云足厥陰之脈抵小腹結於陰器凡心痛而下引小腹者當刺之也心痛止刺手太陰志云肺主氣而司呼吸心系上連於肺心痛但短氣不足以息者但逆在肺而為心痛也當刺手太陰以通肺氣之逆沈亮辰云足太陰少陰厥陰而為心痛者臟氣上逆而為痛也肺乃心之蓋故但短氣不足以息此病在本臟而應於心也四臟皆然故無真心痛之死證心痛止得之立已趙府本張本次之作刺之吳本按已刺作按已次甲乙無此條馬雲其痛當背第九節以刺之乃督脈經筋縮穴之處也宜先按之按已而刺刺後按之其痛當立已如不已則上而八椎無穴下而十椎無穴又復求之其痛必立已矣張云上而手經下而足經求得其故而刺之則立已矣顑痛止立已甲乙顑作頷按人迎於經作按經刺人迎馬雲頷痛者當取足陽明胃經頰車穴以刺之此穴在耳下曲頰端動脈環繞一周故曰曲周也張云以其周繞曲頰故曰曲周見血立已如不已當按人迎於本經而淺刺之可立已也氣逆上止下胸動脈甲乙下胸作脅下馬雲上刺膺中陷者中即足陽明胃經膺窗穴也及下胸前之動脈當是任脈經之膻中穴也蓋在中謂之胸胸之旁為膺耳張云膺中陷者足陽明之屋翳也下胸動脈手太陰之中府也蓋在中曰胸胸之旁即謂之下耳簡案膻中無動脈中府不在下胸可疑腹痛止立已馬雲當刺足陽明胃經之天樞穴如不已又刺本經之氣衝也張云臍之左右動脈如足少陰之肓俞足陽明之天樞皆主腹痛簡案二穴未有言有動脈者可疑痿厥止病已止甲乙悗作悶馬雲凡痿病厥病而手足四肢攣束縛亂當刺四肢之穴以速解之張同朱永年云悗悶也為四末束悗者束縛其手足使滿悶而疾解之導其氣之通達也夫按之束之皆導引之法猶尺蠼之欲信而先屈也身半以上為陽身半以下為陰晝以前為陽晝以後為陰日二者使上下陰陽之氣表章而交通也不仁者榮血不行也卜日者陰數之周也簡案朱注為是簡往往親睹痿疾以布束縛四肢經久復故者尺蠼之喻殆妙噦以草止亦可已噦諸本作歲馬不知其誤文云疑作藏唯張志作噦張云噦厄逆也治之之法用草刺鼻則嚏嚏則氣達而噦可以此一法也或閉口鼻之氣使之無息乃迎其氣而引散之勿令上逆乃可立已此二法也又或以他事驚之則亦可已此治噦之三法也志云歲作噦噦厄逆也言其發聲如車鑾之聲而有輪序故名曰噦案詩小雅鑾聲噦噦毛傳噦噦徐行有節也志注蓋本於此然似牽強説文噦氣牾也簡案噦亦作啘十六難掌中熱而啘肘後方治卒啘不止以物刺鼻中各一分末少許皂莢內鼻中令嚏瘥又但閉氣仰引之是也樓氏云詳此經文三法正乃治吃逆之法按吃逆用紙捻刺鼻便嚏嚏則吃逆立止或閉口鼻氣使之無息亦立已或作冤盜賊大驚駭之亦已此豫所以取成許二家之論噦為吃逆為得經旨也又云有病傷寒將愈忽患吃逆豫與古人治吃逆之藥殆遍皆不愈計出無藥遂用皂角末吹入鼻中得嚏而吃逆止少時又吃又與皂角末嚏而止者凡數百次其嚏時出痰涕漸多自是吃逆漸疏至二三日而止此是合經刺鼻嚏之法故書之介按噦者厄忒也因其厄厄連聲故今人以厄逆名之朱丹溪謂氣由臍下直升而上出於口而作聲也徐春甫謂其氣由丹田而逆上出於咽喉如有系逆而然也周痹篇第二十七馬雲痹病之痛隨脈以上下則周身而為痹故名此篇當與素問痹論參看此痛在血脈之中邪張云邪耶同慉痛之時不及定治甲乙慉作蓄張云慉痛動而痛也間不及下針即不及定治之謂言移易之速也簡案馬融廣成頌疏越蘊慉注慉蓄通蘊慉猶積聚也蓋慉痛謂聚痛也言其間時痛瘥不及下針方其聚痛之時痛劇甚不及定治倏忽而痛止也此衆痹也非周痹也馬雲衆痹者病在一處則痛亦在一處隨發隨止隨止隨起特以左右之脈相同故左可應右右可應左耳非能周身而痛也周痹者在於血脈之中隨脈以上或隨脈以下非比衆痹之在於左右各當一處者之有定所也張云各在其處謂隨聚而發也不能周遍上下但或左或右更發更休患無定所故曰衆痹能上能下但隨血脈而周遍於身故曰周痹非若衆痹之左右移易也志云痹者風寒濕邪雜合於皮膚分肉之間邪在於皮膚血流溢於大絡者為衆痹在於分肉而厥逆於經脈者為周痹帝以上下左右血脈分肉概而問之然雖總屬於陰陽血氣而有皮膚肌肉之淺深經脈絡脈之繆處故伯有周痹衆痹之分焉簡案樓氏綱目云行痹即走注疼痛而其方載歷節諸方以本節文列於其後知樓氏以衆痹周痹為歷節風也以過之甲乙過作通注一作遏下同張云過者去之之謂志云過者使邪氣過在分肉皮膚以外出以脫之張云脫者拔絶之謂先刺以過之去其標也後刺以脫之拔其本也黃帝曰善此痛安生止命曰周痹樓氏移此一節於上文更發休也下云周痹當作衆痹夫周痹邪在分肉血脈今云邪獨居分肉之間而命曰周痹者是衆痹之誤為周痹也明矣神歸之則熱熱則痛解者所謂更止更居也痛解則厥厥則它痹發者所謂更發更起也自黃帝曰善此痛安生至此一百十四字元誤在後刺其下以脫之上今移於此且刪帝曰善余已得其意矣九字張云九字乃下文之誤復於此者今刪去之邪氣客於肌表漸入分肉之間則迫切津液而為汁沫沫得寒則聚而不散故排裂肉埋為痛痛則心注其處故神歸之神歸即氣歸也氣歸則熱熱則寒散而痛暫解然其逆氣仍在故痛雖解而厥未除則別有所聚故或自上而下或自下而上他痹發矣真氣不能周即氣閉不行也故曰痹者閉也志云帝曰善余已得其意矣此句宜衍當以下文接上節簡案馬得其意矣下注云缺岐伯曰非也周痹諸方見於聖濟總録二十卷中當參考其下之六經甲乙作上下之大經其瘈堅轉引而行之甲乙作其瘈緊者轉引而行之馬雲其行瘛且堅者乃轉引而行之張云其瘛堅轉者瘈急轉筋之謂當針引其氣而行之也簡案志注同馬乃與甲乙符矣今從之九者經巽之理馬雲九針為用最大故嘆九者乃至恆至順之理凡十二經之病不可不用者也張云意者病之情也事者治之法也九者針也巽者具也言其意其法在乎九針而經具其理凡十二經脈陰陽之病無不盡於是也志云經當巽順之理所以明十二經脈陰陽之病也簡案巽訓順見於易疏巽具也出説文口問第二十八闢左右馬雲闢闢同孟子云闢土地張云此下十二問既非風寒之外感又非情志之內傷論不在經所當口傳者也故曰口問欠馬雲欠音牽江左謂之呵欠張云欠者張口呵吸成伸闢展腰以陰陽相引而然也夫陽主晝陰主夜陽主升陰主降凡人之寤寐由於衛氣衛氣者晝行於陽則動而為寤夜行於陰則靜而為寐故人於欲臥未臥之際欠必先之者正以陽氣將入陰分陰積於下陽猶未靜故陽欲引而升陰欲引而降上下相引而欠出生也今人有神疲勞倦而為欠者即陽不勝陰之候陽氣盡止寤矣張云大惑論曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也吳玄綱曰覺與陽合寐與陰並覺多者魂強寐久者魄壯魂強者生之徒魄壯者死之徒是皆陰陽盛衰之義瀉足少陰補足太陽張云衛氣之行於陽者自足太陽始陰盛陽衰所以為欠故當瀉少陰之照海陰蹺所出也補太陽之申脈陽蹺所出也真邪相攻氣並相逆甲乙無氣並二字馬雲真氣即胃氣邪氣即寒氣補手太陰瀉足少陰張云手太陰肺經也足少陰腎經也寒氣自下而升逆則為噦故當補肺於上以壯其氣瀉腎於下以引其寒蓋寒從水化噦之標在胃噦之本在腎也汪云厄逆有實有虛有寒有熱病源病候種種不同此特言其一端耳若以噦作嘔吐則厄逆亦病中要症二經者豈漫無一字及之哉唏馬雲唏許幾切釋文言哀痛不泣曰唏張云唏欷同歔欷也釋義云悲泣氣咽而抽息也一云泣餘聲一云哀而不泣曰唏悲憂之氣生於陰慘故為陰盛陽虛之候補足太陽瀉足少陰馬雲當於足太陽膀胱經陽蹺脈氣所出者補之足少陰腎經陰蹺脈氣所出者瀉之振寒止補諸陽張云振寒者身怯寒而振栗也補諸陽者凡手足三陽之原合及陽蹺等穴皆可酌而用之噫張云噯氣也釋義曰飽食息也按此節與上文之噦皆以寒氣在胃而然但彼云故寒氣者以久寒在胃言其深也此云寒客於胃者如客之寄言其淺也故厥逆之氣從下上散則復出於胃而為噫簡案噫説文飽食息也而馬雲噫不平聲也此為五噫之噫者誤甚補足太陰止眉本也張云補足太陰陽明二經使脾胃氣溫則客寒自散而噫可徐眉本即足太陽經攢竹穴是亦補陽氣也嚏張云陽氣和平順利而滿溢於心必上達於肺故出於鼻而為嚏然人有感於風寒而為嚏者以寒邪束於皮毛則陽氣無從泄越故噴而上出是嚏從陽氣而發益又可知仲景曰欲嚏不能此人肚中寒正謂其陽虛也故人病陽虛等證者久無嚏而忽得之則陽氣漸回之佳兆也簡案嚏説文牾解氣也玉篇噴鼻也補足太陽止眉上也張云凡陽虛於下則不能上達而為嚏補足太陽之榮於眉本者其名攢竹一曰眉上亦即此穴蓋太陽與腎為表裡所以補陰中之陽也觀宣明五氣篇曰腎為欠為嚏其義正與此通嚲甲乙作軃馬雲音妥釋云下垂貌則是首身下垂而不能舉也觀本經下文有因其所在補分肉間則嚲必有定所且有分部彼以避為釋者案熊音了可反避也是乃以讀之為躲而遂釋之為避也義甚不通簡案嚲廣韻垂下貌軃正字通為嚲之訛巢源風嚲曳候云肢體弛緩不收攝也人以胃氣養於肌肉經絡也胃若衰損其氣不實經脈虛則筋肉懈惰故風邪搏於筋而使嚲曳也即本節之嚲也千金小兒門軃𤵺僻不能行步中風門作痑曳並同而張云俗語有戰嚲之説即古人之遺言意者嚲即戰之屬也但因寒而戰者謂之寒戰其有戰不因寒者由氣虛耳此因樓氏綱目顫振門治嚲曳之方而誤不可從也志云嚲者垂首斜傾懈惰之態古樂府云髻半嚲此説雖是而唯以垂首釋之不若馬説允當行陰用力志云陽明主潤宗筋陽明虛則宗筋縱是以筋脈懈惰則陽明之氣行於宗筋而用力於陰器矣行陰用力則陽明之氣不能復養於筋脈故為嚲目者宗脈之所聚也張云宗總也凡五臟六腑之精氣皆上注於目而為之精故目為宗脈之所聚馬雲此節可與素問解精微論參看目無所見矣張云世之因泣而喪目者蓋亦不少矣補天柱經俠頸甲乙挾頸下有挾頸者頭中分也七字據下文甲乙為是馬雲當補足太陽膀胱經之天柱穴此經乃挾於後之項頸者是也志云膀胱之津外濡空竅液道開而泣不立則液竭而濡空竅之精不能灌於目而目不明矣故命曰奪精謂奪其外濡空竅之精也當補膀胱經之天柱於挾頸間以資津液上灌蓋液隨氣行者也太息者止以伸出之張云太息者息長而大即嘆息也約猶束縛也憂愁思慮則氣抑不伸而心系急氣道約約則滿悶於中此嘆息之不容已也補手少陰止留之也張云手少陰心經也心主手厥陰經也足少陽膽經也助木火之臟則陽氣可舒抑鬱可解故皆宜留針補之涎下者止故涎下涎甲乙作羡下同張云足陽明之脈出於口胃中有熱則蟲動胃緩故廉泉開而涎下凡目之多淚鼻之多涕亦皆因熱而上液之道開也有謂肺熱甚則鼻涕出者義亦猶此補足少陰張云腎為胃關而脈繫於舌故當補之以壯水制火則液有所主而涎自止也耳中鳴者止故耳鳴張云手足三陽三陰之脈皆入耳中故耳亦宗脈之所聚也陽明為諸脈之海故胃中空則宗脈虛宗脈虛則陽氣不升而下溜下溜則上竭輕則為鳴甚則為聾矣然少陽太盛壅窒為鳴者亦有之但虛者漸而實者暴虛者多而實者少其辨在有邪無邪耳學者當推廣之汪云此論他書不載僅見於此按人夜臥之時五官皆不用事惟耳能聽豈非以宗脈所聚故能有所警覺也乎又人在母腹中僅一血胚聞雷霆火爆之聲則驚而跳此時五官未備而聞性已與外物相通故楞嚴二十五圓通獨重耳根孔子亦言六十而耳順則耳之異於諸官也明矣又云即下文上氣不足耳為之苦鳴之義補客主人止交者也張云客主人足少陽經穴為手足少陽足陽明之會手大指爪甲上者手太陰之少商穴為肺氣所出之井故皆當補之以助其陽氣齧舌者何氣使然馬張志並云缺岐伯曰脈氣輩至也甲乙輩作皆吳本注云輩疑誤馬輩至作使然張云輩者類也厥逆走上則血湧氣騰至生奇疾所至之處各有其部如少陰之脈行舌本少陽之脈循耳頰陽明之脈環唇口故或為腫脹或為怪癢各因其處隨而齧之不獨止於舌也志云腎臟之生氣厥逆走上與中焦所生之脈氣相輩而至則舌在齒之內而反向外矣唇在齒之外而反向內矣頰在齒之旁而反向中矣凡此十二邪者甲乙此下載大惑論善忘善飢二條以為十四邪豈皇甫氏以意添之耶奇邪張云不同常疾故曰奇邪若傾張云傾者沉重不能支也胃使為之變腸為之苦鳴諸本胃使作溲便當改但熊本作凌使亦誤張云水由氣化故中氣不足則溲便變常而或為黃赤或為短澀多有情欲勞倦過傷精氣而然昧者概認為火鮮不誤矣且中氣不足則濁氣居之故腸胃為之苦鳴也汪云按內經無遺精白濁之文但云出白溲白白淫溲便變也又云水液渾濁皆屬於熱為痿厥心悗張云痿足萎弱也厥四肢清冷也悗悶也下氣不足則升降不交故心氣不舒而為悗悶補足外踝下留之張云此崑崙穴也為足太陽所行之經凡於上中下氣虛之病皆可留針補之治之奈何張云此下復問治法者所以補上文之缺略也腎主為欠張云上文未言屬腎故此復明之肺主為噦張云上文言噦出於胃此言噦主於肺蓋寒氣上逆而為噦氣病於胃而主於肺也唏者止瀉足少陰甲乙與作盛張云陰與陽絶則陽不附陰補陽瀉陰則剛柔相濟乖者和矣振寒者止外踝下留之張云諸冶俱同上文刺足大趾間止足外踝下留之張本脫外字張云大趾間上二寸足厥陰之大沖也或曰足太陰之太白也此與上文稍異外踝下留之義如前師傅篇第二十九諸本傅作傳當改又無篇字弗著於方禮記中庸布在方策注方板也策簡也夫惟順而已矣張云順之為用最是醫家肯緊言不順則道不行志不順則功不成其有必不可順者亦未有不因順以相成也嗚呼能卷舒於順不順之間者非通變之士有未足以與道也入國問俗止問所便張云禮曰入國問禁而此云問俗者以五方風寒有殊崇尚有異聖人必因其所宜而為之治故不曰禁而曰俗也諱者忌也人情有好惡之偏詞色有嫌疑之避犯之者取憎取憎則不相合故入家當問諱禮者儀文也交接有體進止有度失之者取輕取輕則道不重故上堂當問禮便者相宜也有居處之宜否有動靜之宜否有陰陽之宜否有寒熱之宜否有情性之宜否有味氣之宜否臨病人而失其宜施治必相左矣故必問病人之所便是皆取順之道也簡案鄭注曲禮云禁謂政教俗謂常所行與所惡也便寒便熱張云凡熱在中則治便於寒寒在中則治便於熱是皆所以順病情也懸心張云胃火上炎心血被爍而懸懸不寧也臍以上皮熱止如糜樓氏綱目作臍以下似是張云臍以上者胃與小腸之分也故臍以上皮熱者腸中亦熱也出黃如糜者以胃中濕熱之氣傳於小腸所致也糜腐爛也上二節皆熱證便寒之類樓氏云胃居臍上故胃熱則臍以上熱腸居臍下故腸熱則臍以下熱如肝膽居脅肝膽熱則當脅亦熱肺居胸背肺熱則當胸背亦熱腎居腰腎熱則當腰亦熱可類推也臍以下止飧泄張云臍以下皮寒者以腸胃中寒也胃中寒則不能運化而為腹脹腸中寒則陰氣留滯不能泌別清濁而為腸鳴飧泄是皆寒證便熱之類胃中寒止小腹痛脹張云上文言腹中寒者泄而此言腸中熱者泄所以有熱泄寒泄之不同而熱泄謂之腸垢寒泄謂之騖溏也胃中熱則善消穀故疾飢腸中寒則陰氣聚結不行故小腹切痛而脹上二節皆當因其寒熱而隨所宜以調之者也馬疾飢之疾釋為速胃欲寒飲止治之何先張云胃中熱者欲寒飲腸中寒者欲熱飲緩急之治當有先後而喜惡之欲難於兩從且以貴人多任性此順之所以難而治之當有法也從縱同馬志本從作縱後漢郭玉論貴之有四難云自用意而不任臣一難也將身不謹二難也骨節不強不能使藥三難也好逸惡勞四難也乃與本節之言符矣春夏先治其標止後治其標馬雲春夏陽氣在外病亦在外故先治其後病之標而後治其先病之本秋冬陽氣在內病亦在內故先治其先病之本而後治其後病之標此治之者必有所先不得以順其志而可舍法以徇之也張云一曰春夏發生宜先養氣以治標秋冬收藏宜先固精以治本亦通便其相逆者奈何張云謂於不可順之中而復有不得不委曲以便其情者也悽愴張云寒甚淒涼之貌灼灼説文灼炙也滄滄張云滄寒也簡案此本於説文逸周書云天地之道有滄熱寒溫中適止不致邪僻也張云適當也寒熱適其中和則元氣得以執持邪僻無由而致是即用順之道也僻不正之謂本藏以身形止而後答乎張云本藏即前本經篇名捫摸也循摩也言王公之尊貴誰可得而摩摸將何所據而相答也馬志䐃作膕非非面部之閲也馬雲非比面部易閲巨肩陷咽喉見其外甲乙喉作候其作於馬張凡巨肩陷咽者肺之小大高下堅脆偏正可候矣大義見本藏篇余仿此䯏骨張作骷骨馬雲䯏音括心為臟腑之主而氣之升降其道在於缺盆即其𩩲骬之骨端曰䯏骨者有於以形於外則可以驗𩩲骬而知其心之堅脆小大高下偏正矣張云骷廣雅曰䯙髂也䯙髂即膝骨之名䯙骬蔽心之骨亦名鳩尾觀乎此而心之小大高下堅脆偏正可知矣簡案玉篇骨居骨端也張改骷未詳孰是脾者主為衛甲乙衛作胃注九虛太素作衛張云衛者臟腑之護衛也五癃津液別篇亦曰脾為之衛脾為倉廩之官職在轉輸故曰使之迎糧謂察其飲食及唇舌之善惡別脾之吉凶可知也廣骸甲乙注骸太素作䏖集韻䏖脊肉也張云骸骸骨也廣骸者言骨骼之大又脛骨曰骸音鞋簡案莊子遙逍遊百骸九竅又德充符直寓六骸疏手足首身鼻隧集韻隧與邃同深遠也目下裹大止臟安且良矣甲乙果作裹張云果裹同目下囊裹也橫剛強也在外掀露也約固密也臟居於中形見於外故舉身面之外狀而可以候內之六腑然或身或面又必上中下三停相等庶臟腑相安而得其善矣前本藏篇以五臟之皮脈肉爪骨而候六腑其義與此稍異所當互求簡案馬以四時氣篇三焦約注之非也五色篇曰面王以上者小腸也面王以下者膀胱也即知鼻柱中央即下焦之處也又知六腑之三焦正指下焦也麻衣相法云三停平等一生衣祿無虧注自發際至印堂為上停山根至準頭為中停人中至地閣為下停此面上之三停也頭腰足為身上三停也古云面上三停額鼻閣身上三停足頭腰乃知相家三停之説原於本節及骨度篇君子三折之義決氣篇第三十諸本無篇字馬雲決論一氣六名之義故名篇志云決分也決而和故名篇決氣謂氣之分判為六而和合為一也以為一氣耳樓氏云精氣津液而脈六者蓋精氣即衛氣津液血脈即營血之異名衛氣根於血營血根於氣故曰一氣也兩神相搏止是謂精馬雲易曰男女構精萬物化生蓋當男女相構之時兩神相合而成所生男女之形此精常先其身而生有其精斯有其形夫是之謂精也張云兩神陰陽也搏交也精天一之水也凡陰陽合而萬形成無不先從精始故曰常先身生是謂精即本神篇曰兩精相搏謂之神而此曰兩神相搏合而成形常先身生是謂精蓋彼言由精以化神此言由神以化精二者若乎不同正以明陰陽之互用者即其合一之道也上焦開發止是謂氣張云上焦胸中也開發通達也宣布散也氣者人身之大氣名為宗氣亦名真氣邪客篇曰宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉刺節真邪論曰真氣者所受於天與穀氣並而充身也營衛生會篇曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣故能熏膚充身澤毛若霧露之溫潤而溉養萬物者為氣也腠理止是謂津張云津者陽之液汗者津之泄也腠理者皮膚之隙溱溱滋澤貌谷入氣滿止是謂液張云淖澤濡潤也液者陰之津谷入於胃其氣滿而化液故淖澤而注於骨凡骨屬動舉屈伸則經脈流行而泄其澤故內而補益腦髓外而潤澤皮膚皆謂之液愚按津液本為同類然亦有陰陽之分蓋津者液之清者也液者津之濁者也津為汗而走腠理故屬陽液注骨而補腦髓故屬陰觀五癃津液別篇曰三焦出氣以溫肌肉充皮膚為其津其留而不行者為液其義正與此合中焦受氣止是謂血張云中焦者並胃中出上焦之下凡水穀之入必先歸胃故中焦受谷之氣取谷之味輸脾達臟由黃白而漸變為赤以奉生身者是謂之血壅遏營氣止是謂脈張云壅遏者堤防之謂猶道路之有封疆江河之有涯岸俾營氣無所回避而必行其中者是謂之脈然則脈者非氣非血而所以通於氣血者也志云壅培助遏也遮蔽也避違避也言經脈壅蔽榮氣行於脈中晝夜環轉無所違逆是謂脈潘氏續焰云壅遏猶言擁迫使入隧道而無別道可避也耳聾張云腎藏精耳者腎之竅故精脫則耳聾目不明志云目之精明五色者氣之華也故氣脫者目不明汗大泄張云汗陽津也汗大泄者津不脫故曰亡陽液脫者止耳數鳴張云液所以注骨益腦而澤皮膚者液脫則骨髓無以充故屈伸不利面腦消脛酸皮膚無以滋故色枯而夭液脫則陰虛故耳鳴也夭然不澤張云血之榮在色故血脫者色白如鹽夭然不澤謂枯澀無神也其脈空虛此其候也甲乙其上有脈脫者三字張云脈貴有神其脈空虛即六脫之候簡案本經脫脈脫者三字當補若不然則六脫之候不備焉六氣者止為大海也張云部主謂各部所主也如腎主精肺主氣脾主津液肝主血心主脈也貴賤善惡以衰旺邪正言如春夏則木火為貴秋冬則金水為貴而失時者為賤也六氣之得正者為善而太過不及者為惡也貴賤善惡主各有時故皆可為常主然六氣資於五谷五穀運化於胃是為水穀之海故胃氣為臟腑之本馬雲此六氣者成於五穀精微之氣而胃則納五穀而成之故胃又為六氣之大海耳腸胃篇第三十一諸本無篇字簡案內言腸胃長短大小紆曲屈伸之度故名篇疑與後絶谷篇為一篇後人分為二篇也長九分口廣二寸半張云長深也廣闊也會厭張云會厭在咽喉之上乃所以分水穀司呼吸而不容其相混者也憂恚無言云會厭者音聲之戶也咽門重十兩張云咽門即食喉也其名曰咽至長一尺六寸乃並胃脘而言四十二難楊注咽咽也言司以咽物也又謂之嗌言氣之流通厄要之處也咽為胃之系也本義十兩作十二兩簡案一尺六寸下難經有喉嚨重十二兩廣二寸長一尺二寸九節十六字恐本經脫之也楊注喉嚨空虛也言其中空虛可以通氣息焉即肺之系也呼吸之道路胃紆曲屈伸之張云紆曲曲折也大言周圍之數經言直過之數余準此平人絶谷篇曰其中之谷常留二斗水一斗五升而滿小腸止長三丈三尺難經甲乙作二尺馬雲小腸上口胃之下口小腸後附於脊從左環回周疊積其所注之物以入於回腸者外附於臍上回運計環十六曲大四寸徑口八分分之小半即半分也其長三丈三尺張云其下口注於回腸者外附近於臍上一寸當水分穴處是也八分分之小半言八分之外尚有如一分之少半也余仿此志云小半者七分半也簡案史項羽紀漢有天下大半韋昭注云凡數三分者二為太半一為小半四十二難楊注亦云三分有二為太半有一為小半由此推之分之少半者三釐三毫有奇寸小半者三分三釐三毫不盡寸之太半者六分六釐六毫不盡也則張注似是回腸當臍止長二丈一尺張云回腸大腸也葉積如葉之積亦疊積之義大腸上口即小腸下口當臍左旋而下積廣腸也四十二難楊注云大腸即回腸也以其回曲因以名之簡案志云徑一寸寸之少半者徑一寸五分也恐非廣腸傅脊止長二尺八寸馬雲廣腸者直腸也廣腸附脊以受回腸之物左環葉在脊之上下盤闢大八寸徑二寸寸之太半則是二寸七分也張云廣腸大腸下節也亦名直腸直腸居後繞脊而下故曰傅脊傅布也葉脊上下言疊於脊之上下而至尾骶也闢闢同以其最廣故云闢大八寸志云廣腸肛門內之直腸徑二寸寸之太半者徑二寸七分半也簡案傅脊馬釋附脊乃傅字之訛張注難通腸胃所入至所出張本所作初張云此總結上文自口而入自便而出之全數三十二曲合小腸大腸而言也四十二難楊注云據甲乙經言腸胃凡長六丈四寸四分所以與此不同難經云腸胃凡長五丈八尺四寸者甲乙經從口至回腸而數之故長此經從胃至腸而數之故短亦所以互相發明非有謬也丁曰前腸胃徑圍大小不同其言胃大一尺五寸徑五寸者即是圍徑一也小腸徑八分大二寸四分則是也今言二寸半即分之少半回腸徑一寸半即大四寸五分今言大四寸即少五分也廣腸徑一寸半即大七寸五分今言八寸即有剩五分也其升斗寸尺者先立其尺然後造其升斗稱兩皆以同身寸之為法以尺造鬥鬥面闊一尺底闊七寸高四寸俱厚三分可容十升凡以寸為指節者方一寸為兩十六兩為斤此制同身寸尺升斗之度為人之腸胃斤重長短之法也平人絶谷篇第三十二精微慓悍滑疾下焦下溉諸腸甲乙作下溉泄諸小腸張云精微慓悍滑疾言水穀之精氣也下溉諸腸言水穀之質粕也水六升三合合之太半王文潔注四十二難云分之少半蓋八分半也合之太半共六升三合六七勺也回腸大四寸徑一寸寸之少半徐靈胎經釋云以圍三徑一之法約之則大四寸者徑當一寸三分分之少半難經云一寸半疑誤廣腸止八分合之一徐靈胎云廣腸大腸以下至肛門受穢滓之處俗名䐈腸以其最廣故曰廣腸按廣腸止云受谷而不及水義最精細蓋水穀入於大腸之時已別泌精液入於膀胱惟糟粕傳入廣腸使從大便出故不云受水多少也此義諸家之所未及簡案王文潔評林雲九升三合八分合之一者蓋言九升三合八勺一抄也此説似不必然當考五丈八尺四寸張云乃止合腸胃之數非若前篇總計唇口咽門而言也九斗二升一合合之太半四十二難作八斗七升六合八分合之一徐靈胎云靈平人絶谷篇云九斗二升一合合之太半乃為合數而此數則與上文不符未知何故或傳寫之誤血脈和則諸本則作利當改神者水穀之精氣也志云六節藏象論曰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生故神者水穀之氣也日再後後二升半四十三難作日再至圊一行二升半七日而死者馬一龍農説云蓋此民之生以食為天而無穀氣七日死者其天絶也王芳候云病人不飲食七日不死者米穀留積故也蓋留積則為病矣簡案三斗五升兼水穀而為言則後亦兼大小溲而言也若唯谷二斗而大便一日五升則四日而盡矣知所謂絶谷者必兼水飲而在其中也漢食貨志云今一夫挾五口食人月一石半又後漢南蠻傳計人稟五升注云古升小故曰五升也則知人一日食五升也而七日得三斗五升則方合其數而水飲不預焉七日蓋以陰陽五行之數論之耳七日不食豈有死者乎海論篇第三十三四海書禹貢四海會同爾雅釋地九夷八狄七戎六蠻謂之四海胃者水穀之海止三里張云人受氣於水谷水穀入口藏於胃以養五臟氣故五臟六腑之氣味皆出於胃而胃為水穀之海也其胃氣運行之輸上者在氣街即氣衝穴下者至三里在膝下三寸動脈篇曰胃為五臟六腑之海太陰陽明論曰陽明者表也五臟六腑之海也痿論曰陽明者五臟六腑之海主潤宗筋衝脈者止上下廉張云此即血海也衝脈起於胞中其前行者並少陰之經俠臍上行至胸中而散其後行者上循背裡為經絡之海其上行者出於頏顙下行者出於足故其輸上在於足太陽之大杼下在於足陽明之巨虛上下廉順逆肥瘦篇曰夫衝脈者五臟六腑之海也膻中者止人迎張云膻中胸中也肺之所居諸氣者皆屬於肺是為真氣亦曰宗氣宗氣積於胸中出於喉嚨以貫心脈而行呼吸故膻中為之氣海柱骨項後天柱骨也恚憂無言論曰頏顙者分氣之所泄也故氣海運行之輸一在頏顙之後即柱骨之上下謂督脈之啞門大椎也一在頏顙之前謂足陽明之人迎也腦止風府張云凡骨之有髓惟腦為最巨故諸髓皆屬於腦而腦為髓之海蓋腦蓋骨也即督脈之囟會風府亦督脈穴此皆髓海之上下前後輸也志云蓋謂督脈之百會督脈應天道之環轉覆蓋故曰蓋氣海有餘者馬雲有餘者邪氣有餘而實也不足者正氣不足而虛也下文仿此悗息甲乙作悗急息志云膻中者宗氣之所居上出於喉以司呼吸故氣海有餘者氣滿胸中氣息悗亂氣上逆故面赤也不足以言張云聲由氣發氣不足則語言輕怯不能出聲脈要精微論曰言而微終日乃復言者此奪氣也血海有餘止不知其所病張云形以血充故血有餘則常想其身大怫怫鬱也重滯不舒之貌血不足則常想其身小狹隘狹也索然不廣之貌此皆血海不調之為病病在血者徐而不顯故茫然不覺其所病自過其度張云自有過人之度而無病也志云度骨度也簡案上古天真論曰天壽過其度志注非是耳鳴張云以髓虛者精必衰陰虛則耳鳴也髓為精類精衰則氣去而諸證以見矣審守其輸止必敗張云審守其輸謂審察其輸穴如上文也無犯其害無盛盛無虛虛也志云審其輸則知其四海之通於經而經俞之外通於氣也調其虛實則有餘不足自和矣害謂經氣之逆復則反逆為順也五亂篇第三十四諸本無篇字張云言一時血氣之錯亂非宿疾有因之謂氣本五行故曰五亂何謂相順甲乙順下有而治二字清氣在陰止大悗馬雲悗音悶清氣宜升當在於陽反在於陰濁氣宜降當在於陰而反在於陽營氣陰性精專固順宗氣以行於經隧之中衛氣陽性慓悍滑利宜行於分肉之間今晝未必行於陽經夜未必行於陰經其氣逆行乃清濁相干亂在胸中是之謂大悶也簡案悗又作鞔呂覽胃充則中大鞔是也接手甲乙接作按有道止身寶馬雲道者脈路也邪之來也必有其道則邪之去也亦必有其道審知其道而善去之斯謂養身之寶此四語雖為刺病而發凡醫工能熟玩之則治病必覓標本用藥必覓經絡真邪必審補瀉不妄乃為醫家切要之法也張云道言所由志云有道以來者謂相干之亂氣有道以來必有道以去故審知其道則能分理其陰陽清濁而為養身之寶心少陰心主之輸馬雲手少陰心經之輸穴神門手心主厥陰心包絡經之輸穴大陵志不言俞穴手太陰之滎馬雲手太陰肺經滎穴魚際足少陰輸馬雲足少陰腎經之輸穴太溪張云氣在肺而取腎者以少陰脈貫腎絡肺也取之足太陰止三里馬雲足太陰脾經之輸穴太白足陽明胃經之輸穴陷谷如刺之而邪氣不下當取之足陽明胃經之三里取之足柱止足太陽滎輸張云天柱大杼俱足太陽經穴不知不應也當復取其滎輸二穴通谷束骨也志云上古以和為知氣在於臂足止滎輸張云臂足之絡有血者必先去其血在手者取手在足者取足手陽明之滎輸二間三間也手少陽之滎輸液門中渚也足陽明之滎輸內庭陷谷也足少陽之滎輸俠溪臨泣也徐入徐出止相逆也張云凡行針補瀉皆貴和緩故當徐入徐出在導氣復元而已然補者導其正氣瀉者導其邪氣總在保其精氣耳故曰補瀉無形謂之同精言本篇之法非為有餘不足而設特以亂氣相逆但宜導治之如是耳此因常問補瀉故復及之以明其義也允乎哉爾雅釋詁允信也疏謂誠實不欺也脹論篇第三十五其脈大止陽為腑馬雲脈見於寸口其脈大者以邪氣有餘也其脈堅者以邪氣不散也其脈澀者以氣血澀滯也故為脹然脈大而堅者為陽脈其脹在六腑脈澀而堅者為陰脈其脹在五臟也張云大都洪大之脈陰氣必衰堅強之脈胃氣必損故大堅以澀則病當為脹一曰脈病在陰則脹在臟脈病在陽則脹在腑亦通三者皆存焉甲乙三作二是志云此病在氣而及於臟腑血脈之有形故三者皆存焉郭胸脅甲乙郭作廓張云排擠於臟腑之外以胸脅為郭而居於皮膚之中是即脹之所舍匣匱之藏禁器説文匣匱也又匣匱也載侗六書故今通以臟之大者為匱次為匣小為櫝簡案禁器蓋禁祕之器願聞其故馬雲此處必闕乃岐伯言張志同臟腑之郭也甲乙郭上有城字張云胸腹者所以保障五內故為臟腑之郭宮城馬雲按黃帝時本紀記其民不習偽官不懷私市不預價城郭不閉則此時有宮城矣張云膻中胸中也肺覆於上膈膜障於下為清虛周密之宮心主之所居也故曰宮城胃之五竅者閭里門戶也張云閭巷門也里鄰里也周禮五家為比五比為閭蓋二十五家為閭也風俗通曰五家為軌十軌為里蓋五十家為里也胃之五竅為閭里門戶者非言胃有五竅正以上自胃脘下至小腸大腸皆屬於胃故曰閭里門戶如咽門賁門幽門闌門魄門皆胃氣之所行也故總屬胃之五竅廉泉玉英馬雲即玉堂俱任脈經穴營氣循脈止工在疾瀉甲乙並脈作並血脈循分作循分肉三里上有取字注云靈樞作營氣循脈為脈脹衛氣並脈循分肉為膚脹一下一本作分下同樓氏以此三十九字移下文黃帝曰善何以解惑之上云原誤在病各有形之下黃帝曰願聞之上有三里而瀉之上當有脫簡甲乙云凡五臟六腑之脹皆取三里三里者脹之要穴也張云清者為營營在脈中其氣精專未即致脹濁者為衛衛行脈外其氣慓疾滑利而行於分肉之間故必出衛氣之逆而後病及於營則為脈脹是以凡病脹者皆發於衛氣也衛氣逆而並於脈復循分肉之間故為膚脹三里足陽明經穴陽明為五臟六腑之海而主肌肉故脹在肌膚者當以針瀉之一下三下謂一次再次三次也蓋邪有遠近故瀉有難易耳肺脹金匱要略云上氣喘而躁者屬肺脹又云肺脹咳而上氣煩躁而喘脈浮者心下有水氣簡案本節肺脹蓋謂腫脹中屬肺者與金匱所論不同央央然張云困苦貌濯濯張云腸鳴水聲也馬雲按邪氣臟腑病形篇有大腸者諸證與此同氣癃張云膀胱氣閉小水不通也輕輕然甲乙作殼殼然久塞其空馬雲虛則補之其穴空皆正氣充塞志云塞其空者外無使經脈膚腠疏空內使臟腑之神氣充足自無厥逆之患矣此良工治未病也張氏醫通云按諸脹統言無問虛實工在疾瀉次云補虛瀉實神歸其室二説相左其義何居原夫諸脹之因良由衛氣僭逆故宜疾瀉以下其氣氣下則脹消矣衛為水穀之悍氣常行脈外不能入於脈今以僭逆過甚乃並居營分而入於脈則為脈脹衛氣並脈循分肉間則為膚脹故昭揭於臟腑諸脹之前且言凡此諸脹其道在一故其治總不越針三里以疾瀉之也明知逆順者知胃逆之甚與不甚也針數不失者隨近遠之一下三下也然後厥氣在下甲乙後作而乃合為脹甲乙合作舍合之於真三合而得張云不得其真所以生惑脹雖由於衛氣然有合於血脈之中者在經脈也有合於臟者在陰分也有合於腑者在陽分也三合既明得其真矣志云元真之氣通會於腠理與營衛合併而充行於形身者也故營衛二氣合之於真元三合而得其厥逆之因矣簡案即上文三者皆存焉之義不下者張云脹不退也陷於肉肓而中氣穴者也張云上文云一下三下者言針當必陷於肉肓亦必中於氣穴然後可以取效也張注痹論肓膜云肓者凡腔腹肉理之間上下空隙之處皆謂之肓不獨以胸膈為言姚氏云按金匱玉函曰腠者是三焦通會元真之處理者是皮膚臟腑之文理也夫臟腑之文理乃臟腑募原之肉理而肉理之中有脈系衛氣陷於肓膜而入於脈絡故當取之氣穴王芳侯云按素問有氣府論氣穴論總屬手足三陰三陽之經脈而分府與穴者謂腑者藏也壓遏血氣之藏於內也穴者窟也氣從此而出入者也必更其道張云三而不下必未得其所也故當更穴再刺之必審其𣍨張云唇瘍曰𣍨蓋脹之微甚必見於唇故當審之於此以察其虛實然𣍨字未妥必脈字誤也簡案𣍨又作診即診同難經本義劉仁木序𣍨𣍨深淺是也五癃津液別篇第三十六馬雲別彼劣切內論五液而病為水脹則必為癃故名篇張云五液者陰精之總稱也本篇以溺汗泣唾水故名曰五宣明五氣篇曰五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是為五液決氣篇曰精氣津液血脈其辨有六又道家曰涕唾精津汗血液其名則七皆無非五液之屬耳志云水穀所生之津液各走其道別而為五如五道癃閉則為水脹五別者為汗為溺為唾為淚為髓五癃者液不滲於腦而下流陰陽氣道不通四海閉塞三焦不瀉而津液不化水穀留於下焦不得滲於膀胱則水溢而為水脹因以名篇上章論氣脹之因此章論水脹之因得其因則知所以治矣簡案本篇末云此津液五別之順逆也甲乙載本篇文亦云津液五別此云五癃未詳所取義疑文字差訛為溺與氣馬雲天寒則腠理閉內之氣與濕俱不行其水下留於膀胱則為前溺與後氣耳各走其道張云五常四海各因經以受水穀之氣味故津液隨化而各走其道其流而不行者甲乙流作留張云周流於血脈之間而不散行於外注於臟腑益於精髓而為之液志云流者淖澤注於骨補益腦髓灌精而濡空竅者也聚沫則痛張云或為寒邪所感則液凝留於肌肉之間故汁沫聚而為痛簡案與周痹同義為溺其氣張云腠理閉密則氣不外泄故氣化為水水必就下故留於膀胱然水則氣也水聚則氣生氣化則水注故為溺與氣志云氣者膀胱為州都之官津液藏焉氣化而出者為溺藏於膀胱者化生太陽之氣簡案氣未詳何氣馬為失氣近是見前五臟六腑止腎為之主外張云此二節言津液之為涕泣也心總五臟六腑為精神之主故耳目肺肝脾腎皆聽命於心是以耳之聽目之視無不由乎心也肺朝百脈而主治節故為心之相肝主謀慮決斷故為心之將脾主肌肉而護養臟腑故為心之衛腎主骨而成立其形體故為心之主外也故五臟六腑止泣出矣甲乙與肺作急肺似是泣作涎張云心為臟腑之主故五臟之系皆入於心心之總系復上貫於肺通於喉而息由以出故心悲則系急而肺葉舉液即隨之而上溢然心系與肺本不常舉故有乍上乍下當其氣舉而上則為咳為泣也凡人之泣甚而繼以嗽者正以氣並於上而奔遏於肺耳按口問篇曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感液道通故涕泣出焉中熱止故唾出張云此津液之為唾也蟲為濕熱所化常居腸中胃熱則消穀中空蟲行就食故或上或下動作於腸胃之間充郭者縱滿之謂腸郭則胃緩胃緩則氣逆上行涎隨而溢故多唾也按宣明五氣篇曰腎為唾而出曰胃為唾是胃之與腎皆主為唾蓋土鬱之唾在胃水泛之唾在腎也和合而為膏者膏諸本作高但趙府本吳本同此馬雲當作膏張直改作膏注云此津液之為精髓也膏脂膏也簡案志以高字釋之義不通陰陽不和止脛痠甲乙虛故作虛則腰背作腰脊張云陰陽不和則精氣俱病氣病則不攝精病則不守精氣不相統攝故液溢於下而流泄於陰竅精髓皆減輸泄過度則真陰日虛故為腰痛脛痠等病此勞瘵之所由作也陰陽氣道止為水脹下瀉諸本作不瀉此字誤當改張云此津液之為水脹也三焦為決瀆之官膀胱為津液之腑氣不化則水不行所以三焦不能瀉膀胱不能滲而腫脹也知病所由故治此皆當以氣化為主試觀水潦為災使非太陽照臨則陰凝終不能散泥濘終不能幹能知此義則知陰陽氣化之道矣此津液五別之逆順也張云陰陽和則五液皆精而充實於內陰陽不和則五精皆泄而流溢於外此其所謂逆順也五閲五使第三十七馬雲內有五閲以觀五氣及五氣為五臟之使故名説文云閲察也刺有五官止五臟之使也張云刺法當知臟氣知臟氣當於五官五閲而察之五官如下文鼻者肺之官也閲外候也使所使也副配合也五臟藏於中五官見於外內外相應故為五臟之閲令可為常止必當治里張云可為常者常行之法五臟之脈察於氣口五臟之色察於明堂明堂者鼻也色應其時乃其常也然色見於外而病在內是為經氣入臟故當治里闕庭必張止壽中百歲馬雲闕者眉間也庭者顏也即首面也出五色篇必開而張乃立明堂以閲之明堂者鼻也其明堂廣大而為蕃為蔽者又見於外蓋頰側謂之蕃耳門謂之蔽耳四周之壁既方地角之基又高引垂向外五色又順平博廣大壽當中百歲也張云張布列也壁牆壁也基骨骼也引垂居外謂明顯開豁也此於五色之外而言其都位之隆厚也形色皆佳乃為壽徵故中百歲治不亂也中宜也堪也志云引垂居外者邊陸在外為中土之保障也見此者止可苦以針張云若此之人是為血氣充實形色堅固故刺之則病已而可苦以針也然則血氣內虛形色外弱者其不宜用針可知緻音致密也五官張云官者職守之謂所以司呼吸辨顏色納水穀別滋味聽聲音者也鼻張蔣氏啓微云人將死則鼻柱曲縮故孔則張大上向又云周禮疾醫以五色五氣視其死生量之以九竅之變其斯之謂乎眥青甲乙眥作目顴赤蔣氏啓微曰神將去矣顴與顏黑蔣氏啓微云土邪來干故色黑黃色現顴顏腎水將絶反乘心火也簡案蔣以黃帝之黃字接上句釋之誤五脈安出止如何馬雲五常之脈安所從出五臟之色安所從見其常色見者而又至於危皆帝之所疑也張云安出安見言脈色安然無恙也常色殆者謂色本如常而身亦危也此又何如其故五官不辨止況加疾哉將氏啓微云色脈俱安平人也有病則死蓋有故焉五官者目辨色鼻辨臭口辨谷舌辨味耳辨聲若不能辨臟氣不全也闕庭眉額之間清陽之位若不開張陽氣薄矣明堂鼻也鼻位中央而屬脾司呼吸而主肺若其部小脾肺氣衰也腎為先天之本其官在耳蔽為耳門蕃為頰側牆基為耳邊角為耳上角垂為耳垂珠皆腎家部分若卑低窄小角珠向外先天之氣素薄若是雖無病苦亦難以全生況加之疾乎望家讀此凡病人諸部狹小者雖平常殆莫輕治之簡案埤其牆牆下無基乃上文方壁高基之反垂角去外乃上文引垂居外之反當與上文馬張注參考腑臟之在中也止各如其度也張云腑臟居於腹中各有左右上下之次舍而面部所應之色亦如其度如五色篇所謂庭者首面闕者咽喉之類皆是也逆順肥瘦篇第三十八應如失而據未有堅然者也馬雲若有所失而據守難堅張云言隨應而解若無堅據之難破者也志云謂道之幽遠難尋堅確也楊氏曰失堅者即顏子所謂鑽之彌堅瞻之在前忽焉在後之意檢押張云規則也前楊雄傳蠢迪檢押注云檢押猶隱括也動言由檢押也平水馬雲萬物之平莫過於水故曰平水逆順之常也志云楊氏曰規矩方圓天地之象也逆順者地氣左遷天道右旋也不用工力者造化之自然也臨深決水止行之逆順也馬雲能循其法譬之臨深決水循掘決沖而水易竭經可通也何也正以人之氣有滑澀血有清濁行有逆順皆有自然之妙故耳張云水有通塞氣有滑澀血有清濁行有逆順決水通經皆因其勢而利導之耳宜通宜塞必順其宜是得自然之道也簡案掘窟通戟國策掘門注掘即窟古字通各有數乎馬雲各有刺針之數也年質壯大簡案年質壯大之謂廣肩腋止多益其數也志云廣肩腋者廣闊於四旁也項乃太陽之所主項肉薄而皮厚黑色者太陽之水氣盛也唇乃脾土之外候臨臨然者土氣厚大也黑者水之色血黑以濁者精水之重濁也氣澀以遲者肌肉厚而氣道滯也夫太過則能與不及則貪取貪於取與者不得中和之道過猶不及也張云臨臨下垂貌唇厚質濁之謂多益其數即久留也肉廉廉然止而疾之馬雲廉薄也疾速也張云薄唇輕言肉瘦氣少也若此者刺不宜過恐其脫損氣血故必淺入其針而速去之也志云廉廉瘦潔貌簡案廉廉然瘦臞而見骨骼廉稜也刺常人止無失常數也張云常人者不瘦不肥之人也視其白黑者白色多清宜同瘦人黑色多濁宜同肥人而調其數也其端正敦厚者是即常人之度當調以常數刺針深淺常數出經水篇刺壯士真骨止淺而疾之馬本監監作堅堅張云壯士之骨多堅剛故曰真骨監監堅固貌壯士之辨有二若堅肉緩節不好動而安重者必氣澀血濁此宜深刺久留同肥人之數也若徑急易發者必氣滑血清此宜淺刺疾去之同瘦人之數也志云監監者卓立而不倚也其人重濁則氣澀血濁其人輕徑則氣滑血清蓋元真者乃混然之氣已生之後而有輕重高下之分焉簡案徑字馬亦為輕之義似是嬰兒志云此言嬰兒未得天真充盛其肉脆而血少氣弱也襁褓乳養曰嬰簡案劉熙釋名云人始生曰嬰兒胸前曰嬰抱之嬰前乳養之故曰嬰一曰女曰嬰男曰孫血清氣濁止經可通也馬雲氣濁之濁當作滑注云血清氣濁者疾瀉之而邪氣遂竭猶之臨深淵以決放其水不用功力而水可竭也血濁氣澀者疾瀉之而經脈可通猶之循其所掘之處仍用力以並掘之而水可通也皆指瀉法而言而自然之妙寓其中矣張云血清氣滑者猶臨深決水泄之最易宜從緩治可也若疾瀉之必致真氣皆竭矣血濁氣澀者猶循掘決沖必藉人力但疾瀉之其經可通也簡案張注是手之三陰止走腹志云此言手足陰陽之脈上下外內逆順而行應地之經水也三陰三陽之走即二卷經脈之行不必細注簡案馬張引經脈篇詳釋之今從志義少陰之脈獨下行何也張云足之三陰從足走腹皆自下而上獨少陰之脈若有下行者乃衝脈也詳如下文出於頏顙張云其上行者輸在於大抒足太陽經也故出頏顙志云頏顙者鼻之內竅上通天氣簡案五音五味篇云衝脈任脈皆起於胞中上循脊裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口頏顙即在咽喉此其義也灌諸精甲乙精作陰注少陰之大絡馬雲腎經之大絡曰大鐘並少陰之經滲三陰張云自少陰以滲及肝脾二經是為三陰此其所以下行也出跗屬下張云跗屬足掌屬也滲諸絡而溫肌肉動輸篇作注諸絡以溫足脛上三節與動輸篇大同簡案馬雲出於跗上屬於下之湧泉誤矣跗屬亦見骨度篇故別絡結止厥則寒矣張云衝脈為十二經之海故能溫肌肉溫足脛皆衝脈之氣也若衝脈之絡因邪而結則跗上之經不動而為厥為寒者亦衝脈之所致也以言導之止逆順之行也張云何以明者恐人因厥而疑畏也故先導以言次切其脈其有素所必動而今則非者如衝陽太溪太衝等脈當動不動乃可知其不動者為逆動者為順而其厥逆微甚可以明矣血絡論第三十九奇邪張云即繆刺論所論奇病也在絡不在經行無常苦故曰奇邪血絡志云血絡者外之絡脈孫脈見於皮膚之間血氣有所留積則失其外內出入之機血少黑甲乙少作出是蒼蒼者甲乙者上有然字是煩悅諸本悅作悗此本誤當改脫氣則僕張云氣雖盛而血則虛者若瀉其氣則陰陽俱脫故為仆倒久則為腫志云其不新飲者身中有水久而為腫蓋言血乃水穀之津液所化若不新飲而出為汗者乃身中之水也簡案此答上文半為汁者之問也腫乃水腫之謂氣先行故腫簡案此答上文髮針而腫者之問也腫乃針痕腫起之謂與上節異義刺之血出多色不變甲乙無血出多色四字簡案此答上文而色不變而煩悗者之問也乃血出多三字衍文故煩悶張本悶作悗陰陽俱有餘張云經絡之病俱有餘相之奈何馬雲相視也血脈者止各如其度甲乙無者字則而作刺而馬雲此言視血絡之法也則側同必側其針以迎而瀉之志云盛堅橫以赤者血盛於脈中也上下無常處者血氣之流行也小者如針留血之在孫絡也大者如筋留血之在經隧也數者血脈出入之度數張云若失其數而反其法則為僕為脫為虛為腫等證各如刺度以相應也肉著馬雲著著同張云肉著者吸著於針也針入而熱肉必附之故緊澀難轉而堅不可拔也陰陽清濁篇第四十諸本無篇字馬雲陰陽者陰經陽經也陰經受清氣陽經受濁氣故名篇夫一人者止其合為一耳張云察之一人亦有亂氣況天下乎故推於一人即可以知天下然則人己血氣本不一而不一之理則一也受谷者濁受氣者清馬雲凡人身之氣始時受穀氣者六腑也其腑為濁繼而穀氣化為精微之氣從上而出則受此精微之氣者五臟也其臟為清張云人身之氣有二曰清氣曰濁氣濁氣者穀氣也故曰受谷者濁清氣者天氣也故曰受氣者清二者總稱真氣刺節真邪篇曰真氣者所受於天與穀氣並而充身也五味篇曰天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣是指入者為天氣出者為穀氣清者注陰止命曰亂氣甲乙作清而濁者下行於胃是張云喉主天氣故天之清氣自喉而注陰陰者止藏也咽主地氣故谷之濁氣自咽而注陽陽者六腑也濁之清者自內而出故上行清之濁者自外而入故下行一上一下氣必交併二者相合而一有不正則亂氣出乎其中矣汪云本經俱言陽清陰濁此言陰清陽濁者蓋以臟陰而腑陽臟清而腑濁也濁者有清清者有濁甲乙二者當作中氣之大別止內精於海張云大別言大概之分別也上文以天氣穀氣分清濁而此言清中之濁濁中之清其所行復有不同也清者上升故注於肺濁者下降故走於胃然而濁中有清故胃之清氣上出於口以通呼吸津液清中有濁故肺之濁氣下注於經以為血脈營衛而其積氣之所乃在氣海間也上氣海在膻中下氣海在丹田何太陽濁甚乎諸本無太字甲乙濁作獨手太陽止獨受其濁張云手太陽小腸也小腸居胃之下承受胃中水穀清濁未分穢汙所出雖諸陽皆濁而此其濁之濁者也故曰獨受陽之濁手太陰肺也肺者五臟六腑之蓋也為清氣之所注雖諸陰皆清而此其清之清者也故曰獨受陰之清其清者上走空竅此即上文胃之清氣上出於口肺之濁氣下注於經之義足太陰脾也胃司受納水穀而脾受其氣以為運化所以獨受其濁而為清中之濁也志云空竅者皮毛之汗空也手太陰主周身之氣走手空竅以司呼吸開闔應天之道也小腸受盛糟粕濟泌別汁化而為赤下行於十二經脈應地之道也脾為倉廩之官主輸運胃腑水穀之精汁故諸陰皆清而足太陰獨受其濁清者其氣滑止調之也張云此又以針下之氣言清濁陰陽也清者氣滑針利於速濁者氣澀針利於遲陰者在裡故宜深而留之陽者在表故宜淺而疾之其或清中有濁濁中有清乃為清濁相干當察其孰微孰甚而酌其數以調之也志云以數調之與逆順篇之無失常數同義簡案逆順肥瘦篇曰血濁氣澀者深而留之血清氣滑者淺而疾之與本節之義不同馬張以表裡解之似牽強焉豈本節陰陽字互誤耶陰陽系日月篇第四十一諸本無篇字馬雲日者即曆書之十日也月者即曆書之一月也天與人之陰陽和合而足經應月手經應日故名篇腰以上為天止故在上者為陽張云日為陽精故日主火月為陰精故月生於水日為陽陽數五五者中數之奇也二五為十故旬有十日而紀日者所以作十干也月為陰陰數六六者中數之偶也二六一十二故歲有十二月而紀月者所以作十二支也共合於人則腰以上為天腰以下為地手在腰之上故屬陽而左右共十指所以應十日也足在腰之下故屬陰而左右共十二經所以應十二月也寅者正月之生陽也止故曰厥陰張云此言十二支為陰足亦為陰故足經以應十二月也然一歲之中又以上半年為陽故合於足之六陽下半年為陰故合於足之六陰人之兩足亦有陰陽之分則左為陽右為陰以上下半年之陰陽而合於人之兩足則正二三為陽中之陽陽之進也故正月謂之生陽陽先於左而後於右故正月主左足之少陽二月主左足之太陽三月主左足之陽明四五六為陽中之陰陽漸退陰漸生也故四月主右足之陽明五月主右足之太陽六月主右足之少陽然則一歲之陽會於上半年之辰巳二月是為兩陽合於前故曰陽明陽明者言陽盛之極也七八九為陰中之陰陰之進也故七月謂之生陰陰先於右而後於左故七月主右足之少陰八月主右足之太陰九月主右足之厥陰十月十一月十二月為陰中之陽陰漸退陽漸生也故十月主左足之厥陰十一月主左足之太陰十二月主左足之少陰然則一歲之陰會於一半年之戌亥兩月是為兩陰交盡故曰厥陰厥者盡也案原見王冰陰陽離合注陰極於是也此總計一歲陰陽之盛衰故正與六合二與五合三與四合而陽明合於前也七與十二合八與十一合九與十合而厥陰合於後也非如六氣厥陰主風木陽明主燥金者之謂志云脈解篇曰正月太陽寅寅太陽也厥陰者辰也陽明者午也少陽者申也少陰者戌也太陰者子也而本篇又以寅末主少陽卯午主太陽辰巳主陽明申醜主少陰酉子主太陰戌亥主厥陰經脈別論以肝木主春心火主夏脾土主長夏肺金主秋腎水主冬木火土金水此後天之五行也甲主左手之少陽止壬生左手之太陰張云此言十干為陽手亦為陽故手經以應十日也十日之中主前者水火土為陽居後者金水為陰陽以應陽經陰以應陰經亦如足之與月也故甲主左手之少陽乙主左手之太陽丙主左手之陽明己主右手之少陽戊主右手之太陽丁主右手之陽明十干之火在於丙丁此兩火併合故為陽明也自己以後則庚辛壬癸俱金水為陰故庚主右手之少陰辛主右手之太陰癸主左手之少陰壬主左手主太陰第足言厥陰而手不言者蓋足以歲言歲氣有六手以旬言旬惟五行而已且手厥陰者心包絡也其臟附心故不言耳故足之陽者止腰以下者為陰張云此即兩儀四象之道陰中無太陽陽中無太陰故足為陰而陰中之陽惟少陽耳陰中之陰惟太陰也手為陽陽中之陰惟少陰耳陽中之陽則太陽耳故以腰之上下分陰陽而手配十干足配十二支而三陰三陽各有所屬焉可見腰以上者陽中亦有陰腰以下者陰中亦有陽也其於五臟也止腎為陰中之太陰張云五臟以心肺為陽故居膈上而屬手經肝脾腎為陰故居膈下而屬足經然陰陽之中又有陰陽之分亦如上節手足之義故金匱真言論曰陽中之陽心也陽中之陰肺也陰中之陰腎也陰中之陽肝也陰中之至陰脾也義與此同正月二月止無刺左足之陰張云人氣所在不可以刺恐傷其王氣也按本篇但言人氣在足之刺忌而不言手者蓋言足之十二支則手之十干可類推矣故甲乙丙在左手之少陽太陽陽明己戊丁在右手之少陽太陽陽明庚辛在右手之少陰太陰癸壬在左手之少陰太陰皆不可以刺也此天地之陰陽也止此之謂也張云天地之陰陽言變化之多也夫干支手足者分上下也左右少太者辨盛衰也今甲為天下之首故當主左手之少陽非四時五行之次厥陰風水之列也且夫陰陽之道有名無形可以十可以百可以千可以萬左右逢源無非其道故不可以執一論之馬雲按數之可十四句又見素問陰陽離合論五運行大論朱濟公有名無形者以無形而合有形也病傳篇第四十二馬雲篇內大氣入臟先發於何臟何日傳何臟即素問病傳論之所謂病傳也故以病傳名篇然素問以論標本病傳為一篇本經以病本論標本以病傳論病之所傳分為二篇導引行氣簡案巢源有蝦蟆行氣喬摩甲乙作按摩馬雲喬蹺同飲藥之一者可獨守耶甲乙無之字簡案據甲乙藥下句義尤明顯諸方者止萬物畢者也張云謂當因人所宜以施治是衆人各有其方也人得其一則萬變之道可畢矣移精變氣論曰治之極於一即此謂也礚移之過馬雲大抵內經謂病為有過其如且醒諸本且作日此字誤當改下同甲乙作旦亦通彼而服之馬雲果能佩而服之則神自生而與道俱成可著於竹帛不可傳於子孫馬雲可著於竹帛傳之天下後世蓋上達必由心悟可以待其人而後行也雖子孫亦不可傳之猶梓匠輪輿能使人規矩不能使人巧故父不得以私諸子也張云昭乎如醒道之明也窘乎如瞑察之難也著之竹帛則澤及於人傳之子孫則道私於己故不可也瘏乎諸本作喑乎此字誤當改折毛髮理志云毛髮折而腠理開開則邪從毛髮入入則抵深而入於腠理是以正氣橫傾血脈傳溜甲乙溜作留志云傳流於血脈而入臟則傷神大氣入臟腹痛下淫馬雲大邪入臟而腹痛下傳誠有易死難生者張云大氣大邪之氣也凡邪之中人喑乎其無聲不可得而聞也漠乎其無形不可得而見也至其絶則為折毛髮理正氣橫傾等證故有死無生也病先發於心止夏日中張云病發於心而得於肺火乘金也三日而金復乘木故傳之肝也五日而木復乘土故傳之脾也再三日而邪氣不退其甚則死冬月夜半水王之極也夏月日中火王之極也心火畏水故冬則死於夜半陽邪亢極故夏則死於日中蓋衰極亦死盛極亦死有所偏勝則有所偏絶也五行之氣無不皆然下文之義皆仿此馬雲素問標本病傳論言病本篇言臟其實病即臟之病也病先發於肺止夏日出張云自肺而肝自肝而脾皆傳所勝也自脾而胃表裡相傳也肺邪王於申酉故冬則死於日入金氣絶於寅卯故夏則死於日出楊元如雲按止言冬夏而不言春秋者四時之氣總屬寒暑之往來夜半日中陰陽之分於子午也日出日入陰陽之離於卯酉也病傳之一三五日者乃天之奇數蓋五臟生於地之五行而本於天干之所化簡案病傳日數未詳本於何義楊説難通病先發於肝止夏早食張云此肝木傳土而土邪復傳水臟也水受傷者金勝則危故冬畏日入肝發病者木衰則劇故夏畏早食時也馬雲冬之日入在申以金旺木衰故冬死於日入夏之早食在卯以木旺亦不能扶故夏死於早食也病先發於脾止夏晏食張云此土邪乘水而表裡俱相傳也人定在亥而土病於冬者畏之寒水反能侮土也晏食在巳而脾病於夏者畏之以戊己王鄉而合邪為患也楊元如雲膂膀胱者膀胱附於脊背之膂筋也是以三日而之膂膀胱則背膂筋痛見標本病傳篇小便閉人定在寅水旺而土絶也夏之晏食在亥水泛而土敗也馬雲冬之人定在亥以土不勝水故冬死於人定夏之晏食在寅以木來剋土故夏死於晏食也簡案晏玉篇晚也淮南天文訓日至於桑野是謂晏食蓋以理推之人定在亥晏食在戌見標本病傳高注病先發於胃止夏日昳張云此土邪傳水而水復傳火故自膀胱以及於心也標本病傳論曰冬夜半後醜也夏日昳未也皆土王之時故胃病逢之氣極則敗志云昳音笛日昃也病先發於腎止夏早晡早馬張志作晏他本並作早簡案據標本病傳論作晏為是張云此水病乘火則表裡皆相傳也大晨辰刻也為水之庫晏晡戌時也土能伐水故病發於腎者不能出乎此也馬雲冬之大明在寅末夏之晏晡以向昏土能剋水故冬死於大晨而夏死於晏晡也病先發於膀胱止夏下晡張云此亦水火二臟自表而里之相傳也冬之雞鳴在醜陰之極也夏之下晡在未水所長也膀胱為水府故其盛極衰極皆能死志云冬雞鳴夏下晡即上節大晨晏晡之時也按五臟相傳而有膀胱胃腑者胃居中央為水穀之海乃五臟之生原太陽為諸陽主氣也簡案甲乙合本篇及標本病傳論成篇當參考諸病以次相傳止乃可刺也志云玉機真藏論曰五臟相通移皆有次五臟有病則各傳其所勝病之且死心先傳行至其所不勝病乃死故如是者乃逆傳其所勝皆有死期不可刺也如間一臟者乃心傳之肝肺傳之脾子行乘母也間二臟者心傳之脾肺傳之腎乃母行乘子子母之氣互相資生者也間三臟者心傳之腎肺傳之心從所不勝來者為微邪也按五臟間傳止有間三而無間四所謂間四臟者以臟傳之腑而腑復傳之於他臟蓋腑亦可以名臟也馬雲難經五十三難七傳者死間臟者生與此篇大義同淫邪發夢篇第四十三諸本無篇字馬雲內有淫邪泮衍使人臥不得安而發夢故名篇淫邪泮衍張云言奇邪為夢變幻無窮也簡案泮散也詩邯風逮冰未泮正邪從外襲內止喜夢反淫千金作及淫張云正邪者非正風之謂凡陰陽勞逸之感於外聲色嗜欲之動於內但有干於身心者皆謂之正邪亦無非從外襲內者也惟其變態恍惚未有定舍故內淫於臟則於營衛魂魄無所不亂因令人隨所感而為夢下甚則夢隨盛飢則夢取甲乙下甚作下盛盛飢作甚飢馬雲甚當作盛盛當作甚肺氣盛止飛揚張云肺在志為憂故夢恐懼哭泣肺主氣故夢飛揚身體重不舉甲乙重下有手足二字兩解不屬張云腰為腎之府故若腰脊不相連屬凡此十二盛者馬雲凡此十二盛者在腑則有餘於外在臟則有餘於內凡有夢至時即知其邪之在何臟腑遂用針以瀉之其邪可立已矣蓋腑夢瀉腑臟夢瀉臟也厥氣客於心志云夫邪之所湊其正必虛上章論邪氣之有餘此論正氣之不足厥氣者虛氣厥逆於臟腑之間客者薄於臟腑之外也壞屋風雨張云脾屬土其主濕也夢遊行張云膀胱為足之太陽經屬三陽之表也馬雲以膀胱經遍行頭項背腰胻足也夢田野馬雲以大腸為傳導之官其曲折廣大似田野也志云田野者水穀之所生也大腸為傳導之官主受水穀之餘濟泌別汁止夢見田野者大腸之氣虛也聚邑沖衢甲乙沖衢作行街馬雲夢會聚之邑居或衝要之道衢以小腸為受盛之官其物之所聚似邑衢也簡案沖説文通道也與街同義氣衝一名氣街可證自刳張云膽主決斷其氣剛也刳音枯剖腹也窖苑中千金作池渠阱窊張云窖窖同志云窖音教地藏也簡案考工記困窖倉城注穿地曰窖音教窖説文陷也窊音烏爪切音窪凹也苑疑字誤拜起甲乙起作跪客於胞䐈則夢泄便甲乙泄便作溲便利張云胞溲脬也䐈大腸也在前則夢泄在後則夢便志云客於胞則夢泄前溺客於䐈腸則夢後便凡此十五不足者道臟本正脈本十五作有數馬雲凡此十五不足者在腑則不足於內在臟則不足於外凡有夢至時即知其邪之在何臟腑遂用針以補之其邪可立已矣蓋腑夢補臟臟夢補腑也簡案此篇論夢與素問脈要精微論方盛衰論及列子穆王篇少異當參考順氣一日分為四時篇第四十四夫百病止得臟而有名馬雲夫百病必始於外感內傷故燥濕寒暑風雨者外感也陰陽喜怒飲食居處者內傷也邪氣相合於臟而病形成得其分臟而病名別張云氣合而有形脈證可據也得臟而有名表裡可察也旦慧晝安夕加夜甚春秋繁露云病者至夜而病愈甚出同類相動篇春生夏長止故甚也張云春之生陽氣升也夏之長陽氣盛也秋之收陽氣降也冬之藏陽氣伏也是氣之常皆以陽氣為言也天地之交四時之序惟陰陽升降而盡之矣自子之後太陽從左而升升則為陽自午之後太陽從右而降降則為陰大而一歲小而一日無不皆然故一日亦分四時也朝時太陽在寅卯自下而上在人應之陽氣正升故病氣衰而旦慧日中太陽在巳午自東而中在人應之陽氣正盛故能勝邪而晝安夕時太陽在申酉由中而昃在人應之陽氣始衰故邪氣漸盛而暮加重夜半太陽在戌亥自上而降在人應之陽氣伏藏邪氣正盛故夜則甚蓋邪氣之輕重由於正氣之盛衰正氣者陽氣也升則從陽從陽則生降則從陰從陰則死天人之氣一而已矣其時有反者何也止逆者為粗獨主甚病諸本作獨主其病此本誤當改馬雲帝疑病有旦晝或加或甚而夕夜或慧或安者故伯言此乃臟氣獨主其病而不應一日分為四時之氣也如脾病不能勝旦之木肺病不能勝晝之火肝病不能勝夕之金心病不能勝夜之水故為加為甚也若人之臟氣能勝時之氣如肺氣能勝旦之木腎氣能勝晝之火心氣能勝夕之金脾氣能勝夜之水故至晝慧旦安也治之者能順其時如脾病不能勝旦之木則補脾而瀉肝肺病不能勝晝之火則補肺而瀉心肝病不能勝夕之金則補肝而瀉肺心病不能勝夜之水則補心而瀉腎斯病可與期也彼粗工者則逆之而已惡足以知此五臟有五變止以應五時志云五臟有五變者有五時五行五音五色之變異五變有五輸者一臟之中有春刺滎夏刺輸長夏刺經秋刺合冬刺井之五輸故五五有二十五輸以應五時也肝為牡臟張云肝屬木為陰中之少陽故曰牡臟心為牡臟張云心屬火為陽中之太陽故曰牡臟脾為牝臟張云脾屬土為陰中之至陰故曰牝臟肺為牝臟張云肺屬金為陽中之少陰故曰牝臟腎為牝臟張云腎屬水為陰中之太陰故曰牝臟按五臟配合五行而惟肝心為牡臟脾肺腎皆為牝臟蓋木火為陽土金水皆為陰也黃帝曰以主五輸奈何馬雲缺岐伯曰張志同臟主冬止秋刺合張云五臟主藏其氣應冬井之氣深亦應於冬故凡病之在臟者當取各經之井穴也五色蕃華其氣應春滎穴氣微亦應乎春故凡病見於色者當取各經之滎也五時長養其氣應夏輸穴氣盛亦應於夏故凡病之時作時止者當取各經之輸也五音繁盛氣應長夏經穴正盛亦應長夏故凡病在聲音者當取各經之經也五味成熟以養五臟其氣應秋合穴氣斂亦應於秋故凡經滿而血者病在胃及因飲食內傷者當取各種之合也按本篇五時之刺以應五輸者冬刺井春刺滎夏刺輸長夏刺經秋刺合者以井應冬滎應春輸應夏經應長夏合應秋也如本輸四時氣水熱穴等論所載皆同不可易者考之六十五難曰井者東方春合者北方冬也七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合皆與本經不合必難經之誤也當以本經為正不可不辨以經合之張云上文止言五臟五輸以應五時而不及六腑之原者蓋原合於經不復應時如長夏之刺經則原在其中應其數矣是即六腑之六輸也按本輸篇所載六腑之原在九針十二原篇即謂之腧故六十六難曰以腧為原也後世針灸諸書宗之皆言陽經之腧即為原故治腧即所以治原陰經之腧並於原故治原即所以治輸今此節云以經合之以應其數然則經原腧三穴相鄰經亦可以代原矣經滿而血者病在胃甲乙注經作絡胃作胸志云肺與陽明主秋金之令飲入於胃上輸於肺食氣於胃淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於肺而通於四臟是入胃之飲食由肺氣通調輸布而生此榮衛血脈故經滿而血者病在胃飲食不節者肺氣不能轉輸而得病也按靈素經中凡論五臟必兼論胃腑以胃為五臟之生原也肺與陽明並主秋令此章以腑合臟而臟合於四時五行味主秋則秋令所主之臟腑皆隱於中矣簡案以陽明配秋蓋出於運氣疑非經旨此節馬張不釋姑仍志注是謂五病也諸本病作變此依張本誤當改外揣篇第四十五馬雲內有司內揣外故名篇説文云揣量也六書統云凡稱量忖度皆曰揣授其調張云調法度也言頗得其詳也夫九針者止可乎張云始於一終於九者盡天地之大數也針數應之故小則無內大則無外深則無下高則無上其於天道人事四時之變無所不合故散之則雜如毫毛約之則渾束為一一者欲得其要也夫治國者止為一乎張云至大至小至淺至深無不有道存焉故治國者有道治針亦有道必知乎道乃可萬變而為一矣動搖則應知張云有動則有應有應則可知惟其至明故能盡得其情合而察之切而驗之見而得之馬雲合陰陽而察之切陰陽而驗之見陰陽而得之張云合而察之參合陰陽而詳察也切而驗之從其切要而辨證也故可見可得如清水明鏡之無所失也五音不彰止影之似形張云五音五色見於外因藏氣而彰明也五臟之氣藏於內因形聲而發露也外之不彰不明者知內之波蕩也即如鼓非桴也得桴而後鳴響非聲也得聲而後應影非形也得形而後見是皆內外相襲而然襲因也馬雲五臟在人身者如水波蕩然紊亂無紀故遠者止弗敢使泄也張云揣推測也司主也遠者主外近者主內察其遠能知其近察其內能知其外病變雖多莫能蔽吾之明矣內外遠近無所不知以其明之至也陰陽之道盡於此矣天地雖大又安能出於是哉馬雲人身之音與色是之謂遠可以言外也而即外可以揣五臟之在內者人身之五臟是之謂近可以言內也而即內可以揣音與色之在外者此乃陰陽之極天地之祕蓋不可以輕泄之乎刺節真邪論及素問靈蘭祕典論皆藏此室簡案司伺通漢灌夫傳外後亦已使侯司五變篇第四十六諸本無篇字馬雲末節有五變之紀故名篇百疾之始期也廣韻云期限也避者得無殆張云殆危也天非求人而人自犯之所以有少病病多者亦在乎人之慎與不慎耳斧斤釋名云斧甫也甫始也凡將器始用斧伐木己乃制之也斤釿同釋名云所以平滅斧迹也木之陰陽志云陰陽者木之枝幹皮肉也簡案周禮考工記凡斬轂之道必矩其陰陽陽也者稹理而堅陰也者疏理而柔夫木之蚤花止況於人乎張云此言木之凋殘各有所因以方人之疾病亦無不有所致之也萎音威蔫枯也蔫音煙物不鮮而色敗也潰音會壞爛也漉音鹿水濕貌杌音兀木之無枝者也馬雲濕腐為漉故常為病也張云木有堅脆所以傷有輕重人有堅脆所以病有微甚故雖同時遇風而有受有不受此病之所以異也風厥漉汗甲乙作風灑灑汗出馬雲素問陰陽別論評熱病論皆有風厥素問瘧論及本經逆順篇皆言無刺漉漉之汗則風厥者其汗必漉漉然也朱長春云此言皮不致密肉理粗疏致風邪厥逆於肉而為漉漉之汗蓋津液充於皮腠之間皮潰理疏則津泄而為汗矣膕肉不堅止此言其渾然者甲乙膕作䐃肉理粗疏四字作肉不堅膚粗五字疏下有也字此言以下六字無無分理者諸本理下更有理字馬雲理者之理當作衍張因刪之此本仍張本馬雲腓腸之上膝後曲處為膕乃委中穴所在也其肉不堅而無分理者其理必粗粗理而皮不堅緻則一身之腠理必疏所以善病風厥也此乃言其肉之渾然者則皮必密理不疏尚何病風之有簡案甲乙作䐃為是以䐃肉候通身之肌肉見本藏等論諸家以膕釋之非也渾然即無分理之謂馬反為理不疏之義志亦為渾然汗出並誤五臟皆柔弱者止肌肉弱者也甲乙必下無有字沖作衡注云太素逆留作留積又甲乙臗皮充肌作膚皮充脹志云消疸者疸熱而消渴消瘦也邪氣臟腑篇曰五臟之脈微小為消疸蓋五臟主藏精者也五臟皆柔弱則津液竭而善病消疸矣夫形體者五臟之外合也薄皮膚而肌肉弱則五臟皆柔弱矣夫柔弱者必有剛強謂形質弱而性氣剛也故此人皮膚薄而目堅固以深者其氣有長沖直揚之勢其心剛剛則多怒怒則氣上逆而血積於胸中馬雲素問生氣通天論曰大怒則形氣絶而血菀於上氣逆留則充塞於肌肉血蓄積則脈道不行血氣留積轉而為熱熱則消肌膚故為消疸此言其人暴剛而肌肉弱者也蓋肌肉弱則五臟皆柔暴剛則多怒而氣上逆矣張云目堅固而視直揚者其心必剛沖者目光突露之謂臗寬同簡案沖作衡似是論勇篇亦云勇士者目深以固長衡直揚是也前王莽傳肝衡厲色振揚武怒注眉上曰衡肝衡舉目揚眉也又蔡雍釋誨揚衡含笑臗字書體也又與臗同義難葉小骨弱肉者善病寒熱張云骨屬腎肉屬脾皆至陰之所在也陰不足則陽邪易以入之故善病寒熱顴骨者止故善病寒熱也甲乙殆作始志云夫腎主骨顴者腎之外侯也故顴骨為骨之本顴大則周身之骨皆大顴小則知其骨小也䐃者肉之指標也懦懦柔弱也臂薄者股肱之大肉不豐也地色者地閣之色殆不與天庭同色此土氣之卑汙也髓者骨之充也骨小則其髓不滿矣夫在外者皮膚為陽筋骨為陰骨小皮薄則陰陽兩虛矣陽虛則生寒陰虛則發熱故其人骨小皮薄者善病寒熱也張云懦儒糯軟三音簡案寒熱謂虛勞寒熱內經言寒熱者皆然粗理止各視其部甲乙無者各二字部上有三字張云肉不堅則風寒濕邪易以入也人之上下左右虛實自有不同故當各視其部病腸中積聚者止大聚乃起甲乙乃傷作乃作稍至作稍止馬雲惡者猶俗云不好也朱永年云此言善病腸中積聚者以腸胃之惡也夫皮膚薄而氣不充身澤毛肉不堅而津液不能淖澤如此則腸胃惡蓋津液血氣腸胃之所生也惡則邪氣留止而或積聚乃傷脾胃之間若再飲食之寒溫不節邪氣稍至即蓄積而大聚乃起夫腸乃肺之合而主皮主氣胃乃脾之合而主肉主津故皮膚薄而肉不堅則氣不充而津液不淖澤矣氣不充而液不澤則皮毛開而腠理疏疏則邪氣留止漸溜於腸澤之間而成積聚矣馬雲大義詳見百病始生篇簡案馬雲其肉不堅而反為淖澤淖澤者推之則移也此以淖澤為柔脆之義也張云淖澤者濕滯多也考內經中淖澤多見諸篇然未見為柔脆之義若依張説而為濕滯多則與皮膚薄而不澤相反故朱帶堅上不學而讀更添一不字而釋之義覺分曉先立其年止五變之紀也張云先立其年則五運六氣各有所主故知其時凡病遇生王則時之高也故可以起起言愈也如逢衰克則時之下也病當危殆矣六元正紀大論亦曰先立其年以明其氣雖非衰克陷下之時而年有所沖則氣有所通其病亦因而起此非上文之所謂起也如水火相沖火當畏水金木相沖木當畏金然火勝則水亦病木勝則金亦病故有以金形之人而反病於丁壬年者有以木形之人而反病於甲巳年者是謂因形生病五變之紀也簡案本節諸家並以運氣家之言而解之然運氣之説昉於唐以後乃不可以彼解此必別有義之所存俟考本藏篇第四十七諸本無篇字馬雲內推本臟腑吉凶善惡故名篇奉生而周於性命者也張云奉養也周給也人身以血氣為本精神為用合是四者以奉生而性命周全矣經脈者張云經脈者即營養之道營運也濡潤也營行脈中故主於裡而利筋骨溫分內張云肉有分理故云分肉衛行脈外故主表而司皮毛之開闔御精神故魂魄適寒溫張云御統御也適調燮也營覆陰陽張云覆包藏也精神專直張云專直如易系所謂其靜也專其動也直言其專一而正也無以相倚也張云倚偏也一曰當作異參天地測陰陽而運四時運諸本作連唯志作運張云副配也連通也化五節張云應五行之節序而為之變化也凡此二十五者各不同甲乙四下有變字各下更有各字心小則安止無守司也甲乙邪弗能傷注太素云外邪不能傷又易傷於邪注太素亦作外邪又楊上善云心臟言神有八變後四臟但言臟變不言神變者以神為魂魄意之主言其神變則四臟可知故略而不言也張云心小則怯故必多憂大則不固故邪易傷之高則滿於肺而竅多不利下則陽氣抑而神必不揚心脆者火必易動偏傾者不得其中此其所以各有病也志云肺者心之蓋故心高則滿於肺中在心主言在肺主聲滿則心肺之竅閉塞故悶而善忘難開以言也心脆則善病消疸熱中按邪氣臟腑篇五臟脈微小為消疸蓋五臟主藏精者也五臟脆弱則津弱微薄故皆成消疸肺小則少飲止胸偏痛也甲乙無喝字肩息作喘息居賁作逼賁易傷注一云易傷於熱喘息鼻衄張云喘喝氣喘聲急也肩息咳聳肩喘息而咳也居當作苦肺下則氣道不利故苦於賁迫而脅下痛也志云賁乃胃脘之賁門在胃之上口下則肺居賁間而胃脘迫肺血脈不通故脅下痛肺傷者肺痿也簡案張改居作苦以賁為奔之義非也當依甲乙作逼賁仍志注為賁門以前後文例推之肺小則下恐脫安字肝小則臟安止脅下痛也甲乙無髒字下脾腎並同苦作善切作加悗作急脅下痛也之痛上有偏字馬雲支別者上奔迫切脅下多悶張云上支賁切謂肝經上行之支脈賁壅迫切故脅為悗悶為息賁喘息也志云肝居胃之左故大則逼胃而胃脘上迫於咽也肝在膈之下故大則苦於膈中且脅下痛肝脈貫膈上注肺故高則上支賁切脅悗為息賁簡案支非支別之謂王冰注六元正紀支痛云支拄傍也脅字句此謂上支拄於賁門切迫於脅下而為息賁者肝高而上逼於肺也史有肺肝相附語亦恐近焉經筋篇及五十六難並以息賁為肺病此肝病及肺也脾小則臟安止善脹也甲乙善滿作瘈瘲張云湊塞也䏚脅下軟肉處也音秒季脅小肋也簡案湊訓塞未見所據説文聚也腎小則臟安止人之所苦常病也甲乙腎大則注云一本云耳聾或鳴汗出不可以俯仰注一云背急綴耳膿血出或生肉塞志云夫腰脊者身之大關節也故腰痛背膂痛腰尻痛皆不可以俯仰腎附於腰脊間故病諸痛也狐疝者偏有大小時時上下狐乃陰獸善變化而藏睪丸上下如狐之出入無時此腎臟之疝也張云五變者曰小大曰高下曰堅脆曰端正曰偏傾也人有五臟臟有五變是為二十五變人所苦於常病也赤色小理者止心偏傾也甲乙心下堅無下字是乃與下文心脆對志云小理者肌肉之文理細密粗理者肉理粗疏大肉䐃脂五臟之所生也故候肉理之粗細即知臟形之大小𩩲骬胸下蔽骨也簡案赤色二字該下文粗理者無𩩲骬者而言次節白色青色並同巨節反膺止肺偏傾也甲乙注反一作大甲乙疏作竦注一作欹馬雲疏當作竦張云胸前兩旁為膺胸突而向外者是為反膺肩高胸突其喉必縮是為陷喉合腋張脅者腋斂脅開也脅偏疏者脅骨欹斜而不密也廣胸反骹止肝端正甲乙兔作脆膺作脅並是張云脛骨近足之細處曰骹今詳此反骹兔骹以候肝似以脅下之骨為骹也反骹者脅骨高而張也兔骹者脅骨低合如兔也志云兔者胸脅交分之扁骨內膈前連於胸之鳩尾旁連於脅後連於脊之十一椎肝在膈之下故廣胸反骹者肝高合脅兔骹者肝下兔者骨之藏伏也肝脈下循於腹之章門上循於膺之期門在內者從肝別貫膈故膺腹好相得者肝端正簡案考字書骹無胸骨之義張志以意釋之然於原文極切今從之揚唇者張云脾氣通於口其榮在膂故脾之善惡體於唇而可知也高耳者張云腎氣通於耳故腎之善惡驗於耳而可知也持則安減則病也張云凡以上諸變使能因其偏而善為持守則可獲安若少有損減則不免於病矣猶不能減也甲乙減作感簡案王冰注真至要感邪而生病也云外有其氣而內惡之中外不喜因而遂病是謂感也邪之舍也止反覆言語也甲乙苦燋作善焦人平作人卒卒字接句下張云五臟六腑所以藏精神水穀者也一有不和邪乃居之故曰邪之舍也不可以為人平謂其心邪多昧便佞不可化也簡案平作卒為是肺合大腸止腠理毫毛其應張云肺本合皮而大腸亦應之心本合脈而小腸亦應之膽胃皆然故表裡之氣相同也惟是腎本合骨而此云三焦膀胱者腠理毫毛其應何也如五癃津液別篇曰三焦出氣以溫肌肉充皮毛此其所以應腠理毫毛也簡案甲乙云腎之應毫毛於義為錯此不考耳本輸篇曰三焦者中瀆之腑也水道出焉屬膀胱蓋三焦膀胱但是指下焦膀胱膀胱為太陽經主周身之表腎與膀胱合所以應腠理也馬雲左腎合膀胱右腎合三焦恐非也皮肉不相離者張云堅實之謂志云上文以臟合腑而腑應形此以臟合形而形合腑皆陰陽外內交互之妙用心應脈止小腸結張云心與小腸為表裡心應脈故小腸腑狀亦可因脈而知也然脈行皮肉之中何以知其厚薄但察其皮肉即可知也沖虛也諸陽經脈言脈之浮淺而外見者也紆屈盤曲不舒之謂脾應肉止上管約不利也甲乙無小褒纍作無小裹絫標緊多少里纍作多少褁絫馬雲亦裹作褁張云麼細薄也約不舒也少裹纍之義未詳高志齋謂揣其䐃肉而少有纍然結實者之謂簡案博雅麼微也里作裹義自明無約者簡案約紋也膽結也張云膽氣不舒之謂腎應骨止膀胱結也張云腎與膀胱為表裡而三焦亦合於腎故上文曰腎合三焦膀胱腠理毫毛其應所以三焦膀胱之狀可因腠理毫毛而知也倪氏云太陽之氣主皮毛三焦之氣通腠理是以視皮膚腠理之厚薄則內應於三焦膀胱矣又津液隨三焦之氣以溫肌肉充皮膚三焦者少陽之氣也本經云熏膚充身澤毛是謂氣是以皮毛皆應於三焦膀胱朱永年曰經云溪谷屬骨是肌肉之屬於骨也又曰脾生肉肉生肺肺生皮毛是骨肉皮毛交相資生者也故曰腎應骨密理厚皮者三焦膀胱厚視其外應止知所病矣張云外形既明內臟可察病亦因而可知矣所謂病者如上文二十五變之類皆是也
