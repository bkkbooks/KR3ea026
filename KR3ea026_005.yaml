body:
  text: 卷五禁服篇第四十八馬雲服事也詩大雅板篇有我言維服內論脈有關格宜用灸刺藥法故名篇志云篇名禁服者誡其佩服而禁其輕泄也又云首篇有禁服二字因以名篇簡案篇首云旦暮勒服之又云此先師之所禁志後說為是近者編絶久者簡垢張云六十篇古經數也今失其傳編絶簡垢即韋編三絶之謂垢塵汙也蓋古時無紙書於竹簡以熟皮編之故曰韋編簡案說文編次簡也史孔子世家讀易韋編三絶前儒林傳注編所以聯次簡也爾雅疏簡竹簡也古未有紙載文於簡謂之簡札褊淺史記禮書褊陋之說入焉而嗛注褊狹也自強於學若細子簡案強勉也勒也謂自勉強若細子然未能渾束為一也坐私傳之也簡案坐字未詳蓋謂於其坐私傳之也割臂歃血曲禮疏割牲左耳盛以珠盤又取血盛以玉敦用血為盟書書成乃歃血讀書說文盟者以血塗口旁曰歃血淮南齊俗訓胡人彈骨越人齧骨中國歃血所由各異其於信一也齊宿簡案宿與肅通禮祭統先期旬有一日宮宰宿夫人注宿讀為肅戒也正陽簡案正午也禮祭義殷人祭其陽注陽謂日中時也凡刺之理止血盡不殆矣馬雲凡刺之理六句見前經脈篇張云經脈為始必先明經絡也營其所行營行有終始也知其度量脈度有短長也內刺五臟外刺六腑分表裡出入也衛氣者陽氣也衛外而為固者也陽氣不固則衛氣失常而邪從衛入乃生疾病故為百病母瀉實則虛補虛則實故虛實乃止病在血者調之絡邪血去盡則不殆矣夫約方者止則神與弗俱張云約者要也約方約囊其道同也囊滿弗約則輸泄而傾方成弗約則不切於用蓋雜則不精也易曰精義入神以致用也不得其精焉能入神有方無約即無神也故曰神與弗俱所謂約者即前外揣篇渾束為一之義弗滿而約之張云滿言欲博約言欲精弗滿而約之謂亦有不由博學而可得其捷徑者否也故曰願為下村寸口主中止名曰平人張云太陰行氣於臟故寸口主中陽明行氣於腑故人迎主外人迎寸口一表一里也故往來相應欲其大小齊等若引繩之勻者是為和調之脈然人迎主陽故必於春夏微大寸口主陰故必於秋冬微大乃謂之平人也簡案馬志並以左右寸口為人迎氣口釋之失古義矣代則乍甚乍間張云此言人迎脈也乍甚乍間即下文乍痛乍止之謂志云乍痛乍止者病在血氣之交或在氣或在脈有交相更代之義故脈代也緊痛止名曰經刺按甲乙張馬忘作旦是張云緊則為痛痹故當取分肉代因血氣不調故當取血絡且飲調和之藥脈陷下不起者有寒滯故宜灸之若不因血氣之盛虛而病有留於經絡者則當隨經所在或飲藥或灸刺以取之也人迎四倍者止以驗其臟腑之病張云脈之偏盛至於四倍者乃為關格不治之證若一倍二倍三倍不過為病而但有輕重之分耳故當審其致病之本末察其寒熱臟腑而施之治也病在足厥陰止在手心主張云人迎寸口相為表裡故上文云人迎一倍病在足少陽此云寸口一倍病在足厥陰膽與肝為表裡也一倍而躁為人迎在手少陽寸口在手心主三焦包絡人表裡也凡後二倍三倍表裡皆然盛則脹滿止出糜少氣溺色變張云此言寸口脈也盛則外實中虛故為脹滿寒中食不化虛則真陰不足故為熱中出糜少氣溺色變糜謂泄瀉糜爛之物緊則先刺止以經取之甲乙徒作從馬志本取之下有名曰經刺四字張云緊則為寒故宜先刺後灸欲其經易通寒易去也脈陷下者以寒著於血而血結為滯故宜灸之也代則取血絡及不盛不虛義見上文馬雲徒灸之徒但也志云夫痛痹在於分腠之氣分腠者皮膚臟腑之肉理故病在陽者取之分肉病在陰者先刺而後灸之蓋灸者所以啓在內在下之氣也代則氣分之邪交於脈絡故先取血絡而後飲藥以調之可傳於大數馬雲大數大義具本經絡始篇張云營經脈也輸滎輸也大數大法也即經脈本輸終始禁服等篇之義大數曰止無勞也甲乙作大曰盛則從瀉小曰虛則從補緊則從灸刺之且飲藥陷下則從灸之亦曰作亦用大以弱作代一字簡案依甲乙改字義太明晰與上文相貫串馬雲以經取之則取陽經者不取陰經取陰經者不取陽經此之謂經治其飲藥灸刺三者亦可兼行也且其脈急者可加導引之功或脈大而弱者則當主於安靜雖有用力不至大勞也此乃大法之所在即約方之要者而外揣渾束為一之義盡矣張云經取之即所謂經治者或飲藥或灸刺皆可隨經所宜而治也脈急者邪盛也宜設法引去之脈大以弱者陰不足也宜安靜以養陰用力無勞也五色篇第四十九小子張云諸臣之中惟雷公獨少故自稱小子庭者顏也止壽必中百歲張云顏為額角即天庭也蕃蔽者屏蔽四旁即藩籬之義十步之外而骨骼明顯其方大豐隆可知故能壽終百歲蓋五色之決不獨於明堂也馬雲此節大義與前五閲五使篇第二節相同明堂骨高止惡得無辨乎張云肺心肝脾之候皆在鼻中六腑之候皆在四旁故一曰次於中央一曰挾其兩側下極居兩目之中心之部也心為君主故曰王宮惟五臟和平而安於胸中則其正色自致病色不見明堂必然清潤此五官之所以有辨也其不辨者張云不辨者色失常度而變易難辨也各出其邪部止不死矣諸本邪作色當改張云五色之見各有其部惟其部骨弱陷之處然後易於受邪而不免於病矣若其色部雖有變見但得彼此生王互相乘襲而無克賊之見者雖病甚不死志云乘襲者子襲母氣也如心部見黃肝部見赤肺部見黑腎部見青此子之氣色乘襲於母部雖病甚不死蓋從子以泄其母病也官五色奈何甲乙作五官具五色何也是外內皆在焉止其病益甚在外張云益甚言進方衰言退也外內皆在表裡俱當察也脈口者太陰臟脈也故曰在中而主五臟人迎者陽明腑脈也故曰在外而主六腑脈口滑小緊沉者陰分之邪盛也人迎太緊以浮者陽分之邪盛也故病皆益甚其脈口浮滑者止日進在外張云脈口為陰浮滑者以陽加陰故病日進人迎為陽沉滑者陽邪漸退故病日損損減也脈口人迎經分表裡故其沉滑浮滑而病日進者有在內在外之辨也脈之浮沉止其病易已張云人迎寸口之脈其浮沉大小相等者非偏於陰則偏於陽故病難已按禁服篇曰春夏人迎微大秋冬寸口微大如是者命曰平人則義有可知矣病在臟者在六陰也陰本當沉而大為有神有神者陰氣充也故易已若沉而細小則真陰衰而為逆矣病在腑者在六陽也陽病得陽脈者為順故浮而大者病易已若或浮小亦逆候也人迎盛堅者止傷於食甲乙二堅字並作緊張云人迎主表脈盛而堅者寒傷三陽也是為外感氣口主裡脈盛而堅者食傷三陰也是為內傷此古有之法也今則止用寸口診法不為不妙然本無以左右分內外之說自王叔和以來謬以左為人迎右為氣口其失表裡之義久矣其色粗止病方已甲乙以明下有者為間三字沉夭作沉堊李云粗者明爽之義沉夭者晦滯之義言色貴明爽若晦滯者為病甚也色上行者濁氣方升故病甚下行者濁氣色退故病已簡案甲乙粗以明者為間義自明五色有臟部止反者益甚志云臟部臟腑之分部也五臟次於中央為內部六腑挾其兩側為外部色從外部走內部者外因之病從外走內也其色從內走外者內因之病從內走外也蓋腑為陽而主外臟為陰而主內也故病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚也其脈滑大止可變而已馬雲既觀其色又觀其脈方為詳審其脈滑而帶大帶代帶長者皆陽脈也乃為病從外來其外證目有所妄見志有所妄惡乃陽氣之並於外也即當先治其陽後治其陰使之變焉而病已矣即此而推則其脈澀而帶小帶代帶短者皆陰脈也乃為病從內來其內證而目有所見志有所獨處乃陰氣之並於內也即當先治其陰後治其陽使之變焉而病亦已矣常候闕中止言其病甲乙作當候眉間張云闕中眉間也風病在陽皮毛受之故色薄而澤痹病在陰肉骨受之故色沖而濁沖深也至如厥逆病起四肢則病在下而色亦見於地地者面之下部也此其常候故可因其色以言其病李云地者相家所謂地閣即巨分巨屈之處也大氣入於臟止察色以言其時張云大氣大邪之氣也大邪之入者未有不由元氣大虛而後邪得襲之故致卒死如拇指者成塊成條聚而不散也此為最凶之色赤者固不佳而黑者為尤甚皆卒死之色也察色以言時謂五色有衰王部位有克賊色藏部位辨察明而時可知也李云大氣者大邪之氣也如水色見於火部火色見於金部之類此元氣大虛賊邪已至雖不病必卒然而死矣形如拇指最凶之色赤者出於顴顴者應在肩亦為肺部火色剋金病雖愈必卒死天庭處於最高黑者干之是腎絶矣雖不病必卒死也樓氏云赤色出兩顴即脈訣所謂暴病如妝不久居者是也馬雲拇指足大趾也簡案說文拇將指也易咸卦疏足大趾也庭者首面也甲乙庭作顏張云庭者顏也相家謂之天庭天庭最高色見於此者上應首面之疾闕上者咽喉也甲乙闕上作眉間以上張云闕在眉心闕上者眉心之上也其位亦高故應咽喉之疾闕中者肺也甲乙闕中作眉間以中張云闕中眉心也中部之最高者故應肺蔣示吉云即中正下極者心也張云下極者兩目之間相家謂之山根心居肺之下故下極應心蔣示吉云即印堂直下者肝也肝左者膽也馬雲肝之左即為膽則在鼻挾顴之間矣張云下極之下為鼻柱相家謂之年壽肝在心之下故直下應肝膽附於肝之短葉故肝左應膽而在年壽之左右也蔣示吉云膽在肝之短葉間屬木位東南面行令膽位在左故山根之左膽之部分下者脾也方上者胃也馬雲肝之下為脾方者鼻隧也面王者鼻心之端也鼻隧之上即迎香之上為胃張云年壽之下者相家謂之準頭是為面王亦曰明堂準頭屬土居面之中央故以應脾準頭兩旁為方上即迎香之上鼻隧是也相家謂之蘭臺廷尉脾與胃為表裡脾居中而胃居外故方上應胃蔣示吉云胃者脾之腑為陽陽居上故脾之方上胃之部分方始也始上於脾脾胃相為表裡言其相去不遠也簡案據上文五臟次於中央六腑挾其兩側蔣說恐非也中央者大腸也止臍也馬雲胃之外為大腸乃正顴之下大腸之外為腎則大腸為中央而胃與腎所以挾大腸也張云中央者面之中央謂迎香之外顴骨之下大腸之應也挾大腸者頰之上也四臟皆一惟腎有兩四臟居腹惟腎附脊故四臟次言中央而腎獨應於兩頰腎與臍對故當腎之下應臍面王以上者止子處也甲乙子上有字字下並同似是張云面王鼻準也小腸為腑應挾兩側故面王之上兩顴之內小腸之應也面王以下者人中也是為膀胱子處之應子處子宮也凡人人中平淺而無髭者多無子是正子處之應以上皆五臟六腑之應也李云婦人亦以人中深長者善産育蔣示吉云方書曰準頭黃者小便難師傅篇曰鼻孔在外膀胱漏泄下文曰男子色見於面王為少腹痛下為卵痛其圜直為莖痛若女子當為膀胱子處之病顴者肩也止膺乳也張云此下復言肢節之應也顴為骨之本而居中部之上故以應肩臂接乎肩故顴後以應臂手接乎臂故臂下者手也目內眥上者闕下兩旁也胸兩旁高處為膺膺乳者應胸前也蔣示吉云目內眥目之近山根處即精明穴足太陽經所起朱晦庵中庸注曰膺胸也胸乳間部分候於目內眥挾繩止膝臏也張云頰之外曰繩身之後為背故背應於挾繩之上牙車牙床也牙車以下主下郭故以應股中央兩牙車之中央也脛接於膝足接於脛以次而下也巨分者口旁大紋處也股里者股之內側也巨屈頰下曲骨也膝臏膝蓋骨也此蓋統指膝部而言蔣示吉云繩耳邊也耳邊如繩突起故曰繩馬氏曰頰外為繩義未當也凡部分明堂為內耳旁為外臟腑為內膺乳次之臂背為外挾近也故近耳邊直上之部分所以候背之病牙車即頰車穴在耳前陷中凡人身在上者肩背在下者股膝故背部之下頰車頰車之下所以候股巨分者巨之為言大也上下齒床大分處以候股里齒床司開合亦猶股里任屈伸也上下唇大為屈轉交接處是地倉穴以候膝臏唇為語言飲食之門戶亦猶膝臏為屈伸奔走之關節俱動而不休故應候各有部分止謂之良工甲乙澤夭作澤堊下夭字並同張云部分既定陰陽乃明陽勝者陰必衰當助其陰以和之陰勝者陽必衰當助其陽以和之陰陽之用無往不任知其盛衰萬舉萬當矣陽從左陰從右左右者陰陽之道路也故能別左右是謂大道男女異位者男子左為逆右為從女子右為逆左為從故曰陰陽陰陽既辦又必能察其潤澤枯夭以決善惡之幾庶足謂之良工也沉濁為內止為皮不仁甲乙浮澤作浮清李云色之浮濁晦滯者為里色之浮澤光明者為表凡五色之見於面者可因是而測其病矣痛甚即青黑之極也寒甚白之極也志云風乃天之陽邪故色見黃赤痛為陰痹故色見青黑色白為寒色黃而膏潤為癰膿赤甚者為留血痛在筋骨故甚則為拘攣寒傷皮膚故甚為皮不仁察其散摶以知遠近馬雲察其色之散而可以知病之近若摶聚則久矣摶團同積神於心止乃知新故馬雲積神氣於己心而病之為己往為今病者皆能知之故相視氣色不能至於精微者不知病之為是為非惟屬意專心而無所搖奪則凡病之為新為故者洞然也色明不粗止聚未成也李云粗者顯也言色之光明不顯但見沉滯枯夭病必甚也若雖不明澤而不至於沉夭者病必不甚也駒馬之小者未裝鞍轡散而不聚也譬色之散而無定者病亦散而無堅積聚也即有痛者不過因無形之氣耳腎乘心止皆如是張云水邪剋火腎乘心也腎邪乘心心先病於中而腎色則應於外如以下極而見黑色者是也不惟心腎諸臟皆然凡肝部見肺色肺部見心色腎部見脾色脾部見肝色及六腑之相剋者其色皆如是也男子色在於面王止㿉陰之屬也李云面王下應有上字面王上為小腸下為膀胱子處卵者睪丸也圜直指人中水溝穴也人中有邊圜而直者故人中色見主陰莖作痛在人中上半者曰高為莖根痛在人中下半者為莖頭痛凡此皆狐疝㿉陰之屬也㿉即㿗也馬雲圜圓同簡案馬志本首之解不明晰李則本於張注更加詳故從之女子在於面王止不潔甲乙子下有色字馬雲女子之色在面王當為膀胱經及妊子處之有病即胞絡宮也其氣色散者為痛而不至成聚若氣色摶聚不散則成聚而不止於痛然其聚之在內者或方或圓或左或右各如其外色之形耳若其色隨而下行至於尾骶則其病之在下者當有浸淫之物素問痿論謂之白淫潤澤如膏之狀者在也不然則為暴食間即出不潔之物耳何也其下行之勢內外一致也張云或暴因飲食即下見不潔蓋兼前後而言也骶當胝音底尻臀之間也李云面王下宜有下字面王上為人中主膀胱子處色散為痛無形之氣滯也色摶為聚有形之血凝也積之或方或圓或左或右各如其外見之形若其色從下行而至尾骶則為浸淫帶濁有潤如膏之物此症多因暴食不潔所致不潔猶言不節非汙穢之謂也或多食冷物或多食熱物一切非宜之物皆是也志云其色潤如膏狀者為暴食不潔之物蓋腑為陽而主外主納水穀傳導糟粕是以外受風寒或內傷飲食皆為病腑而色見於腑部也簡案不潔未知孰是李不節之解似不穩當左為左止所指者也志云色見於左則為病在左色見於右則為病在右其所見之色或聚或散皆斜而不端其摶聚之面色所謂如指者也張云凡色有斜而聚散不端者病之所在也故但察面色所指之處而病可知矣簡案指志為前節母指之義非也皆端滿有別鄉止在面王為不日別目諸本作別鄉當改甲乙馬志亦大作赤大甲乙不日作不月馬雲別者異也別鄉者即分部也所謂色者即青黑赤白黃之色皆端正盈滿各有分部假如心色主赤小腸亦赤其色如榆莢之大在面王之部則是小腸有病非止於一日也張云正色凡五皆宜端滿端謂無斜滿謂充足有別鄉言方位時日各有所主之正向也別鄉赤者又言正向之外而有斜色之見也赤如榆莢見於面王非其位也不當見而見者非其時也是為不日不日者失其常度之謂此單舉赤色為喻而五色之繆見者皆可類推矣李云端者正色也滿者充潤也別鄉猶言他鄉即別部位也如赤者心色應見於兩目之間是其本鄉今見於面王是別鄉矣不日者不日而愈也火色見於土位是其相生之鄉也志云大如榆莢者血分之聚色即如拇指之狀也不日者不終日而卒死也此言五臟之病色見於本部五臟之死色見於別鄉如心受外淫之邪而卒死者其色見於面王心受內因之病而卒死者其色出於顴皆非心臟之本部但在臟者其色端滿而不斜在腑者其色斜而不端此臟腑死生之有別也簡案本節諸注紛紜不一如此今依甲乙不日作不月連上文女子在於面王之章俱為女子之義則似義稍通其色上鋭止在左右如法張云凡邪隨色見各有所向而尖鋭之處即其乘虛所進之方故上鋭者以首面正氣之空虛而邪則乘之上向也下鋭亦然其在左在右皆同此法李同以五色命臟止腎合骨也甲乙作肝合筋青當筋心合脈赤當脈脾合肉黃當肉肺合皮白當皮腎合骨墨當骨張云此總結上文而言五色五臟之配合如青屬肝肝合筋凡色青筋病者即為肝邪而察其所見之部以參酌其病情諸臟之吉凶可仿如而類推矣論勇篇第五十諸本無篇字帝問何急張云急者先也春青風止各不同形甲乙青風作溫風是張云春之青風得木氣夏之陽風得火氣秋之涼風得金氣冬之寒風得水氣凡此四時之風各有所王有所王則有所制故其所病各不同形也黃色薄皮止不勝冬之虛風也張云黃者土之色黃色薄皮弱肉者脾氣不足也故不勝春木之虛風而為病白者金之色白色薄皮弱肉者肺氣不足也故不勝夏火之虛風而為病青者木之色青色薄皮弱肉者肝氣不足也故不勝秋金之虛風而為病赤者火之色赤色薄皮弱肉者心氣不足也故不勝冬水之虛風而為病志云皮膚腠理之間五臟元真之所通會是以薄皮弱肉則臟真之氣虛矣五臟之氣虛則不能勝四時之虛風虛風者虛鄉不正之邪風也黑色而皮厚止外內皆然乃病張云黑者水之色黑色而皮薄肉不堅及色時變而不一者腎氣不足也故不勝長夏土令之虛風而為病若黑色而皮厚肉堅者雖遇長夏之虛風亦不能病但既感於風又感於寒是為重感既傷於內又傷於外是為外內俱傷乃不免於病也然則黑色而皮肉堅者誠有異於他色之易病者矣志云外內皆然乃病謂外受天之寒邪內傷腎臟之水氣傷寒小青龍真武湯證即此義也夫人之忍痛止願聞其故張注一本無悸字變更一本作變化今諸本與一本同張云此問能忍痛與不能忍痛者非由勇怯而然也夫男士之氣剛而有不能忍痛者見難雖不恐而見痛則退矣怯士之氣餒而有能忍痛者聞難則恐而遇痛不動也又若勇而忍痛者也見難與痛皆不懼怯而不忍痛者見難與痛則目轉眩旋面盻驚顧甚至失言變色莫知死生此四者之異各有所由然也簡案盻音系說文恨觀貌於義難葉疑是眄訛眄音面袤視也班固敘傳虞卿以顧眄而捐相印又馬援據鞍顧眄即與張義符勇士者止毛起而面倉張云目者五臟六腑之精也目深以因臟氣之堅也長衡闊大也即從衡之意直揚視直而光露也三焦理橫凡剛急者肉必橫柔緩者肉必縱也其心端直者剛勇之氣也大以堅滿以旁者旁即旁開之謂過於人之常度也怒則氣盛而胸張眥裂而目揚者勇者之肝膽強肝氣上衝也毛起者肝血外溢也面蒼者肝色外見也此皆勇士之由然然則勇怯之異其由於肝膽者為多故肝曰將軍之官而取決於膽簡案長衡直揚五變篇衡作沖當考彼篇史刺客傳注燕丹子云田光曰夏扶血勇之人怒而面赤宋意脈勇之人怒而面青武陽骨勇之人怒而面白光所知荊軻神勇之人怒而色不變與本節之旨異怯士者止故不能久怒諸本三焦理縱作其焦理縱張云減當作緘封藏之謂目大不緘者神氣不堅也陰陽相失者血氣易亂也即轉盻驚顧之意其焦理縱者肉理不橫也𩩲𩨗短小者其心卑小而甘出人下也肝系緩者不急也膽不滿而縱者汁少形長也腸胃挺者曲折少也脅下空者肝氣不實也此其肝膽不充氣不能滿以故旋怒旋衰是皆怯士之由然簡案其焦理縱馬雲內之三焦紋理則縱今考焦理即腠理亦作焦理見歲露篇等而上文有三焦理橫之語蓋三焦理亦是腠理之謂張以肉理橫釋之似是酒者水穀之精止名曰酒悖也張云栗急也悍猛也酒之性熱氣悍故能脹胃浮肝上氣壯膽方其醉也則神為之惑性為之亂自比於勇而不知避及其氣散肝平乃知自悔是因酒之所使而作為悖逆故曰酒悖馬雲蓋酒為水穀之精熟谷之液此語又見營衛生會篇背腧篇第五十一諸本無篇字胸中大腧在杼骨之端馬張志胸作背是馬雲五臟之俞皆在於背故背中大腧在杼骨之端大腧者大杼穴也去中行督脈經大椎穴左右各開一寸半肺腧在三焦之間止乃其腧也馬雲焦當作憔後世作椎腧俞輸通用張云焦即椎之義指脊骨之節間也古謂之焦亦謂之憔後世作椎此自大腧至腎腧左右各相去脊中一寸五分故云挾脊相去三寸所也愚謂諸焦字義非專指骨節為言蓋謂臟氣自節間而出以行於肉理脈絡之分凡自上至下皆可言焦所以三焦之義本以上中下通體為言固可因此而知彼也按其處應中而痛解所以驗取穴之法也但按其腧穴之處必痛而且解即其所也解痠軟解散之謂志云先言大杼者乃項後大骨之端督脈循於脊骨之第一椎也問五臟而言三焦之膈俞者五臟之氣皆從內膈而出故曰七節之旁中有小心中膈者皆為傷中其病雖愈不過一歲必死簡案張焦字之解殆屬傅會張亦至晚年知其不允當詳見質疑録三焦有幾章介按唐氏謂三焦之根起於腎中腎系貫脊通髓名曰命門故曰三焦根於命門從命門而發出膜網是生脅下之兩大板油又生臍上之網油又曰臍下之氣上於肺而為呼吸並外達皮毛為衛氣夫唐氏之言如是則肺腧在三焦之間此語信而有徵也灸之則可止須其火滅也張云此言五臟之腧但可灸而不可刺也不惟針有補瀉而灸亦有補瀉凡欲以火補者勿吹其火致令疾速必待其從容自滅可也凡欲以火瀉者必疾吹其火欲其迅速即傳易其艾須其火之速滅可也此用火補瀉之法高武針灸聚英云按血氣形志篇載五臟俞刺而此云可灸不可灸故滄州翁謂素問非出於一時之言非成於一人之手焦當作椎又按華他傳彭城樊阿皆從他學凡醫咸言背及胸臟之間不可妄針針之不過四分而阿針背入一二寸巨闕胸臟乃五六寸而病皆瘳是知素問立言致謹之道而明醫縱橫變化不拘於常法而卒與法會矣衛氣篇第五十二諸本無篇字馬雲內所論不止衛氣止有其浮氣之不循經者為衛氣一句今以名篇者揭衛氣之為要耳五臟者止亭亭淳淳乎甲乙作其氣內循於五臟馬雲人有五臟精神魂魄賴之以藏人有六腑水穀等物賴之以化六腑為表其氣內連於五臟而外則絡於支節人有三焦宗氣積於上焦營氣出於中焦衛氣出於下焦下焦之氣升於中焦以達於上焦而生此衛氣衛氣陽性慓悍行於皮膚分肉之間乃浮而在外者也故曰其浮氣之不循經者為衛氣營衛生會篇云衛在脈外中焦之氣降於下焦而生此營氣營氣陰性精專隨宗氣以行於經隧之中故曰其精氣之行於經者為營氣營在脈中衛氣晝行於陽經夜行於陰經營氣由肺經以行於十二經陰陽相隨外內相貫如環無端運行不息亭亭乎何其理之高且虛也淳淳乎何其理之渾且微也張云亭釋名曰停也淳廣韻曰清也享亭淳淳乎言停集雖多而不亂也志云合天地之亭毒乃陰陽之化淳亭亭淳淳孰能窮之簡案前西域傳注水止曰亭莊子則陽篇疏淳淳流動貌志以老子亭毒及其民淳淳釋之恐非也知六腑之氣街者止無惑於天下甲乙六腑作六經無契字石作實王志亦作實張云街猶道也契合也紹繼也門戶出入之要地也六腑主表皆屬陽經知六腑往來之氣街者可以解其結聚凡脈絡之相合相繼自表自內皆得其要故曰契紹於門戶石猶實也標本本末也知本知末則雖天下之廣何所不知故可無惑於天下馬雲能知六腑之氣往來有街氣有往來之街見下文非足陽明胃經之氣街必能知所解所結所契所紹之門戶也契者合也紹者繼也志云知六腑之氣街則知血氣之結於脈內者解而通之脈內之血氣與脈外之氣血相合相繼而行則知出於氣街之門戶矣簡案甲乙為是解結紹契諸注未明晰足太陽之本止目也馬雲足太陽膀胱經之本在於足外跟以上五寸中即附陽穴附陽本在外踝上三寸今曰跟上五寸則踝下至跟有二寸而踝上又三寸則當是附陽穴也其標在於兩絡命門命門者目也即睛明穴睛明左右有二故曰兩絡按本經根結篇言太陽根於至陰結於命門命門者目也志云標者猶樹之梢秒絶而出於絡外之徑路也本者猶木之根干經脈之血氣從此而出也足少陽之本止耳也甲乙注千金云窗籠者耳前上下脈以手按之動者是也馬雲足少陽膽經之本在竅陰之間足第四指端去爪甲如韭葉標在窗籠之前窗籠者耳也即聽宮穴根結篇同足少陰之本止兩脈也千金無上字三寸作二寸馬雲足少陰腎經之本在內踝下上三寸中即交信穴其標在於背腎俞穴與舌下兩脈據根結篇當是廉泉穴也根結篇云少陰起於湧泉結於廉泉張云內踝下上三寸中踝下一寸照海也踝上二寸復溜交信也簡案據千金內踝下二寸考甲乙等無穴疑是下字衍三寸作二寸為是復溜交信並在內踝上二寸止隔一條筋踝上三寸亦無穴足厥陰之本止在背腧也馬雲足厥陰肝經之本在行間上五寸所疑是中封穴標在背之肝俞穴根結篇云厥陰根於大敦結於玉英足陽明之本止頰挾頏顙也甲乙頰上有上字無挾字注云九捲雲標在人迎頰上挾頏顙馬雲足陽明胃經之本在厲兌標在人迎頰挾頏顙也根結篇雲陽明根於厲兌結於顙大顙大者鉗耳也張云厲兌在足次趾端人迎在頰下挾結喉旁也志云頏顙者鼻之上竅以收洞涕者也足太陰之本止舌本也馬雲足太陰脾經之本在中封前上四寸之中疑是三陰交穴標在背之脾腧與舌本廉泉穴也根結篇云太陰根於隱白結於太倉張云中封足厥陰經穴前上四寸之中當是三陰交也背腧即脾腧舌本舌根也手太陽之本止一寸也甲乙注千金云命門在心上一寸千金原文一寸作三寸馬雲手太陽小腸經之本在手外踝之後疑養老穴標在命門之上一寸疑是督脈經命門上即十三椎懸樞張云命門之上一寸當是睛明穴上一寸蓋睛明為手足太陽之會也簡案馬以命門為十四椎非手少陽之本止外眥也馬雲手少陽三焦經之本在手小指之四指間上二寸當是腋門穴標在耳後之上角當是絲竹空張云耳後上角當是角孫穴下外眥當是絲竹空也手陽明之本止合鉗上也馬雲手陽明大腸經之本在肘骨中當是曲池穴上至別陽標在顏下合於鉗上疑是胃經頭維穴張云別陽義未詳手陽明上挾鼻孔故標在顏下顏額庭也鉗上即根結篇鉗耳之義謂脈由足陽明大迎之次夾耳之兩旁也手太陰之本止腋內動也馬雲手太陰肺經之本在寸口之中即太淵穴標在腋內動脈即中府穴張云腋內動脈天府穴也手少陰之本止背腧也馬雲手少陰心經之本在鋭骨之端即神門穴標在背之心俞穴手心主之本止下三寸也甲乙無二寸中三字馬雲手心主即手厥陰心包絡經之本在掌後兩筋之間即內關穴標在腋下三寸即天池穴簡案一下字恐剩文凡候此若止引而起之甲乙石作實馬雲石當作實張云此諸經之標本上下各有所候在下為本本虛則厥元陽下衰也下盛則熱邪熱在下也在上為標上虛則眩清陽不升也上盛則熱痛邪火上熾也石實也絶而止之謂實者可瀉當決結其根而止其病也引而起之謂虛者宜補當導助其氣而振其衰也請言氣街止脛氣有街馬雲首節帝言知六腑之氣街者能知解結契紹於門戶故以四街言之本經動輸篇有四俗即此是也街者路也張云此四街者乃胸腹頭脛之氣所聚所行之道路故謂之氣街上文言各經有標本此下言諸部有氣聚之所也故氣在頭者止踝上以下張云諸髓者皆屬於腦乃至高之氣所聚此頭之氣街也胸之兩旁為膺氣在胸之前者止之膺謂陽明少陰經分也胸之後者在背俞謂自十一椎膈膜之上足太陽經諸臟之俞皆為胸之氣街也腹之背俞謂自十一椎膈膜以下太陽經諸臟之腧皆是也其行於前者則衝脈並少陰之經行於腹與臍之左右動脈即肓俞天樞等穴皆為腹之氣街也止之於氣街謂足陽明經穴即氣衝也承山足太陽經穴以及踝之上下亦皆足之氣街也志云止盡也止之於腦者言頭氣之街絡脈盡於腦也簡案志注非取此者止豫之諸本在九作在久此本誤當改甲乙作久存之馬雲凡取此四街宜用以九針論第七之毫針必先按其處而為時既久其氣應手乃以針刺之志云毫針微細之針取氣之出於皮毛者也按之在久者候氣之至也所治者止難已也甲乙治作刺積下無痛字張云凡此者皆四街所治之病又若以新感之積知痛而可移者乃血氣所及無固結之形也故治之易已若其不痛及堅硬如石不動者其積結已深此非毫針能治矣志云曰暴曰新非久積也謂血氣之偕行而各有所阻也論痛篇第五十三諸本無篇字已然諸本作亦然美骨甲乙作善骨張云美骨者骨強之謂多熱者止難已張云多熱者病在陽分故易已多寒者病在陰分故難已故其瘦而薄胃者甲乙無故字胃字似是張云若肉瘦而胃薄者氣血本屬不足安能勝毒藥也天年篇第五十四諸本無篇字馬雲內以百歲為論故名篇以母為基以父為楯馬雲方其始生賴母以為之基坤道成物也賴父母為之楯陽氣以為捍衛也張云基址也楯材具也人之生也合父母之精而有其身父得乾之陽母得坤之陰陽一而施陰兩而承故以母為基以父為楯譬之稼穡者必得其地乃施以種種優地優肖由乎父種停地劣變成乎母地種皆得而陰陽失序者雖育無成也故三者相合而象變斯無窮矣夫地者基也種者楯也陰陽精氣者神也知乎此則知人生之所以然矣簡案楯說文闌檻也王逸云縱曰欄橫曰楯今階除木勾欄是也馬解為捍衛蓋本於此張以為材具未見所由失神者死得神者生也馬雲素問移精變氣論云得神者昌失神者亡簡案莊子云人之生也聚則為生散則為死五臟堅固止故能長久張云堅固者不易損和調者不易亂解利者可無留滯緻密者可免中傷營衛之行不失其常者經脈和也吸呼微徐氣以度行者三焦治也六腑化谷津液布揚則臟腑和平精神充暢故能長久而多壽也使道隧止百歲乃得終馬志本隧作隊馬雲隊隧同使道者水溝也俗云人中其隊道以長面之地部為基耳為蔽為牆乃高以方營衛之氣皆已通調而面之三里即三部也俗云三停皆已聳起其骨高其肉滿所以百歲乃得終也張云禮記百歲謂之期頤使道指七竅而言謂五臟所使之道路如肺氣通於鼻肝氣通於目脾氣通於口心氣通於舌腎氣通於耳是即五官之道路也玩深邃貌基牆指面部而言骨骼為基蕃蔽為牆見五色篇凡營衛部里及骨高肉滿若此者即致壽之道志云使道者血脈之道路本輸篇之所謂間使之道蓋心包絡之主血脈也隊行列也長者環轉之無端也此言血氣充足循序而流通也土基高以方者肌肉厚而充於四體也脈道流長肌肉高厚則營衛通調矣三部者形身之上中下三里者手足陽明之脈皆起發而平等也骨高者少陰之氣足也肉滿者陽明之氣盛也如此者壽之徵也簡案本篇三家異義然熟考經文馬注為允當好走好趨馬雲趨者較走更疾矣步者較趨更緩矣張云天地之氣陽主乎升升則向生陰主乎降降則向死故幼年之氣在下者亦自下而升也志云此言人之生長從陰而生自下而上故曰其氣在下好走好趨好步者春夏生動之氣也方盛衰論曰老從上少從下簡案說文走趨也又趨走也釋名曰疾趨曰走又疾行曰趨此乃走疾而趨徐馬注誤好步張云盛滿則不輕捷故好步矣四十歲止好坐甲乙頽作刷馬雲坐者較步似倦矣張云天地消長之道物極必變盛極必衰日中則昃月盈則虧人當四十陰氣已半故發頗斑白而平盛不搖好坐者衰之漸也五十歲止目始不明志云人之衰老從上而下自陽而陰故肝始衰而心心而脾脾而肺肺而腎好坐好臥者秋冬收藏之氣也六十歲止獨居而終矣甲乙苦作善馬志亦作善皮膚枯作皮膚始枯故四肢不舉魄離作魂魄離散四藏作臟乃萎枯終矣作終盡矣馬雲至五十歲以後則肝生心心生脾脾生肺肺生腎者每十歲而日衰故五十歲肝膽衰六十歲心氣衰七十歲脾氣衰八十歲肺氣衰九十歲腎氣衰百歲五臟俱衰善憂悲者以心主於憂也好臥者衛氣不精也魄離散以肺藏魄者失其故處也言善誤肺主言也腎氣焦者水竭則焦也張云魄離者形體衰敗也腎氣焦者真陰虧竭也此與上古天真論女盡七七男盡八八互相發明彼以七八言者言陰陽之限數此以十言者言人生之全數然則人之氣數固有定期而長短不齊者有出於稟受有因於人為故惟智者不以人欲害其天真以自然之道養自然之壽而善終其天年此聖智之所同也使道不長空外以張喘息暴疾馬雲水溝不長較之使道隊以長者異也其鼻孔向外而張鼻為肺竅肺氣泄矣師傅篇云鼻孔在外膀胱漏泄又肺主氣今肺氣不足故喘息而為暴疾也張云喘息者氣促暴疾者易傷皆非延壽之徵也簡案喘息暴疾謂喘息之氣卒暴疾速也其肉不石張云石堅也數中風寒止相引張云數中風寒表易犯也血氣虛中不足也脈不通經絡多滯也故致真邪易於相攻然正本拒邪正氣不足邪反隨之而入故曰相引故中壽而盡也張云凡此形體血氣既已異於上壽則其中壽而盡固有所由此先天之稟受然也夫人生器局既稟於有生之初則其一定之數似不可以人力強者第稟得其全而養能合道必將更壽稟失其全而養復違和能無更夭故知之者下可以希中中可以希上不知者上僅得其次次僅得其下矣所謂天定則能勝人人定亦能勝天也夫稟受者先天也修養者後天也先天責在父母後天責在吾心逆順篇第五十五諸本無篇字馬雲內論氣有逆順用針者當順治不可逆治故名篇氣之逆順者止五行也張云人與天地相參與日月相應其陰陽升降盛衰之氣當其位而和者為順不當其位而乖者為逆脈之盛衰者張云以有力無力言故可以候血氣之虛實刺之大約者張云三刺義具如下文又若明知病之可刺者以其實邪在經也如脈度篇所謂盛者瀉之虛者飲藥以補之是也與其未可刺者謂有所避忌也如終始篇所謂新內新勞已飽已飢大驚大恐者勿刺及八正神明論所謂天忌五禁篇所謂五禁之類皆是也與其已不可刺者言敗壞無及也如本神篇所謂五者已傷針不可以治之也凡此三者皆本節切近之義兵法曰馬雲逢逢之氣勢來迫而甚盛者也堂堂之陳陳方整而甚衆者也故無迎者當避其來鋭耳無擊者當擊其惰歸耳志云夫戰勇氣也一鼓作氣再而衰三而竭是以無迎逢逢之氣無擊堂堂之陳俟其氣衰轍亂然後擊之無有不克者矣簡案孫子云無邀整整之兵無擊堂堂之隈注堂堂廣大也逢逢鼓聲詩大雅鼉鼓逢逢是也刺法曰馬雲三句及下方其盛也四句又見素問瘧論熇音靠詩板篇多將熇熇朱注云熾盛也張云熇熇熱之甚也漉漉汗之多也渾渾虛實未辨也病與脈相逆形證陰陽不合也是皆未可刺者也上工止與脈相逆者也甲乙未盛作未成襲者也盛者也並無也字張云未生者治其幾也未盛者治其萌也已衰者知其有隙可乘也是皆可刺者也刺其方襲者不避來鋭也與其形之盛者見其外不知其內也病之與脈相逆者逆有微甚微逆者防有所傷未可刺也甚逆者陰陽相離形氣相失已不可刺也醫不達此而強刺之未有不僨事者矣故曰下工故曰方其盛也止大昌張云盛邪當瀉何懼毀傷正恐邪之所湊其氣必虛攻邪未去正氣先奪耳故曰方其盛也勿敢毀傷病既已衰可無刺矣不知邪氣似平病本方固乘勢拔之易為力也故曰刺其已衰事必大昌馬雲按此節與瘧論皆言邪氣甚盛發為甚寒甚熱之際不可輕刺正以病勢與脈氣相逆然則用藥者亦當先用藥於寒熱未至之先不分外感內傷之寒熱皆當如此若邪氣方盛而用藥則寒藥反助其寒熱藥反助其熱不能解病而適以增病矣醫者不可不知也上工治未病不治已病馬雲二句又見素問四氣調神論五味篇第五十六諸本無篇字胃者止以次傳下馬雲水穀皆入於胃五臟六腑皆稟氣於胃即營衛生會篇所謂人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣也其曰穀氣津液已行營衛大通乃化糟粕以次傳下即營衛生會篇所謂水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入於膀胱也張云玉版篇曰胃者水穀氣血之海也氣味之正者莫如水穀水穀入胃以養五臟故臟腑者皆稟氣於胃而胃為五臟六腑之本五臟嗜欲不同各有所喜故五味之走亦各有先然既有所先必有所後而生克佐使五臟皆有相涉矣至真要大論言五味各有先入義與此同人受氣於谷故穀氣入於營衛其糟粕之質降為便溺以次下傳而出於大腸膀胱之竅谷始入於胃止吸則入甲乙喉咽作喉嚨是馬雲摶音團周禮矢人凡相笴欲生而摶張云谷之精氣先出於胃即中焦也而後至上下兩焦以溉五臟之至也溉灌注也兩行言清者入營營行脈中濁者入衛衛行脈外故營主血而濡於內衛主氣而布於外以分營衛之道大氣宗氣也摶聚也循由也氣海即上氣海一名膻中居於膈上蓋人有三氣營氣出於中焦衛氣出於下焦宗積於上焦出於肺由喉嚨而為呼吸出入故曰氣海天地之精氣止氣少馬雲谷化之精氣呼則出之天地之精氣吸則入之其大數谷化之精氣出之者三分則天地之精氣入之者一分惟其出多入少半日不再用谷則谷化之精氣衰至一日則氣少故朝錯曰民生一日不再食則飢者正此意也任允謙云天食人以五氣地食人以五味谷入於胃化其精微有五氣五味故為天地之精氣五穀入於胃也其糟粕津液宗氣分為三隧故其大數常出三入一蓋所謂所入者谷而所出者乃化糟粕以次傳下其津液溉五臟而生營衛其宗氣積於胸中以司呼吸其所出者三分之隧道故谷不入半日則氣衰一日則氣少矣簡案張義與馬同今考經文任氏所解似得其旨子華子曰天之精氣大數常出三而入一其在人呼出也吸入也一之謂尊二之謂耦三之謂化精氣以三成與本節文稍同而義異粳米臟氣法時論作粳米張云粳俗作粳黃黍張云黍糯小米也可以釀酒北人呼為黃米又曰黍子此五穀之味合五行者各有所宜所言五色者諸本宜下更有五宜二字唯馬志本並無之言作謂所謂五色者一句接下節脾病者張云此下言臟病所宜之味也脾屬土甘入脾故宜用此甘物心病者張云心屬火苦入心故宜用此苦物腎病者甲乙無黃卷二字張云大豆黃卷大豆芽也腎屬水鹹入腎故宜用此咸物肝病者張云肝屬木酸入肝故宜用此酸物肺病者張云肺屬金辛入肺故宜用此辛物此上五節與五臟生成論之五合宣明五氣篇之五入者意同皆用本臟之味以治本臟之病也五禁張云辛味屬金能克肝木此下五節當與宣明五氣篇辛走氣氣病無多食辛等義參看鹹味屬水能克心火酸味屬木能克脾土甘味屬土能克腎水苦味屬火能克肺金肝色青張云此下言臟氣所宜之味也臟氣法時論曰肝苦急急食甘以緩之即此意也此下五節仍與臟氣法時論後文相同心色赤張云臟氣法時論曰心苦緩急食酸以收之脾色黃張云啓玄子云究斯宜食乃調利機關之義也腎為胃關脾與胃合故假咸桑軟以利其關關利而胃氣乃行胃行而脾氣方化故脾之宜味與他臟不同臟氣法時論曰脾苦濕急食苦以燥之肺色白張云臟氣法時論曰肺苦氣上逆急食苦以泄之腎色黑張云臟氣法時論曰腎苦燥急食辛以潤之開腠理致津液通氣也水脹篇第五十七諸本無篇字水始起也止此其候也馬雲病方起時目之下為窠俗云臥蠶其微有所腫如新臥起之狀大抵人之臥起者其目窠上必腫也頸脈即人迎穴也此脈動於頸而咳動於內在陰股則冷在足脛則腫在上腹則大以手按其腹則隨手而起如裹水狀此水病已成而可驗者也按素問陰陽別論云三陰結謂之水啓玄子云三陰者謂脾肺之脈俱寒結也脾肺寒結則氣化為水又按本經五癃津液篇有云五穀之精氣和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛痠陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹又按論疾診尺篇言風水膚脹視人之目窠上微腫如新臥起狀其頸脈動時咳按其手足窅而不起則當知隨手而起為有水無風窅而不起為有風有水也張云陽明之脈自人迎下循腹裡而水邪乘之故為頸脈動水之標在肺故為時咳陰股間寒足脛瘇腹乃太陰邪始於陰分也疒𢛓瘇同凡按水囊者必隨手而起故病水者亦若是以上皆水腫之候簡案平人氣象論曰頸脈動喘疾咳曰水目窠微腫如臥蠶起之狀曰水亦與本節及論疾診尺篇文同不謂之人迎而謂頸脈者非診之而始知其動之疾以其望而知頸脈之疾也膚脹者止此其候也甲乙𪔣𪔣作殼殼張云𪔣𪔣鼓聲也寒氣客於皮膚之間者陽氣不行病在氣分故有聲若鼓氣本無形故不堅氣無所不至故腹大身盡腫若因於水則有水處腫無水處不腫此為可辨然有水則皮澤而薄無水則皮厚寒氣在膚腠之間按散之則不能猝聚故窅而不起腹色不變即皮厚故也愚按此上兩條云以手按其腹隨手而起者屬水窅而不起者屬氣此固然也然按氣囊者亦隨手而起又水在肌肉之中按而散之猝不能聚如按糟囊者亦窅而不起故未可以起與不起為水氣的辨但當察其皮厚色蒼或一身盡腫或自上而下者多屬氣若皮薄色澤或腫有分界或自下而上者多屬水也簡案論疾診尺篇云按其手足上窅而不起者風水膚脹也亦與本節同又金匱要略云皮水其脈亦浮外證跗腫按之沒指不惡風又云按其手足上陷而不起者風水巢源云燥水謂水氣溢於皮膚因令腫滿以指畫肉上則隱隱成文字者名曰燥水以指畫肉上隨畫隨散不成文字者名曰濕水由此推之膚脹即金匱所謂皮水風水巢源所謂燥水也然脹不可拘起與不起之說當為實驗之言也殼玉篇物皮空也𪔣字亦從鼓從空蓋中空之義諸注為鼓聲豈有不堅而有聲之理乎腹脹止此其候也馬雲鼓脹與膚脹等不言按之起與不起當亦是不起者惟其腹筋起者為辨又按素問腹中論黃帝曰有病心腹滿旦食則不能暮食名為何病岐伯曰名為鼓脹治之以雞矢醴一劑知二劑已此方果有奇驗云李云鼓脹膚脹大同小異只以色蒼黃腹筋起為別耳腸覃止此其候也甲乙癖作瘕瘜作息離臟作離歲月三字諸本唯作離歲獨志改作離臟張云覃延布而深也寒氣與衛氣相搏則稸積不行留於腸外有所繫著故癖積起瘜肉生病日以成矣瘜肉惡肉也離歲越歲也寒邪客於腸外不在胞中故無妨於月事其非血病可知蓋由汁沫所聚而生此腸覃之候也簡案覃義未詳蓋此與菌同慈在切唐韻菌生木上又玉篇菌地菌也腸中垢滓凝聚生瘜肉猶濕氣蒸郁生菌於土木故謂腸覃正字通方書鼻疣曰瘜肉亦謂之瘜菌鼻通息故從息瘜菌乃與腸菌之義符但以鼻息釋瘜者誤說文瘜寄肉也即生息一肉之義甲乙作息肉可證離歲歷歲也離訓歷見詩小雅小宛疏腸覃治方陳氏三因有烏喙丸羅氏衛生寶鑑有晞露丸見晛丸等當並考石瘕止可導而下甲乙下下有之字張云衃凝敗之血也子門閉塞則衃血留止其堅如石故曰石瘕月事不以時下惟女子有之也故可以導血之劑下之按篇首帝有石水之問而此下無答必闕失也考之陰陽別論曰陰陽結邪多陰少陽曰石水少腹腫其義即此簡案說文衃凝血也五臟生成篇赤如衃血死是也導謂坐導藥其病在胞中故用坐藥以導下之張注非先瀉其脹之血絡止去其血絡也甲乙脹作腹後血絡作血脈張云先瀉其脹之血絡謂無論虛實凡有血絡之外見者必先瀉之而後因虛實以調其經也刺去其血絡即重明先瀉之義按本篇自水而下所言者凡六證而此獨以二證之刺為問者蓋水俞五十七穴已詳於水熱穴論故不必再問此云膚脹鼓脹者蓋兼五證而統言之辭雖簡而意則賅也賊風篇第五十八諸本無篇字甲乙名四時賊風邪氣大論篇賊風邪氣止其故何也張云賊者傷害之名凡四時不正之氣皆謂之賊風邪氣詳歲露篇室穴者古人多穴居也非不離賊風邪氣言雖避風邪而亦有病者何也張氏醫通云按痛風一證靈樞謂之賊風素問謂之痹金匱名曰歷節後世更名白虎歷節多由風寒濕氣乘虛襲於經絡氣血凝滯所致近世邪說盛行而名之曰箭風風毒腫潰乃謂之曰箭袋禁絶一切湯藥恣行艾尉針挑此雖靈樞刺布衣之法而藥尉之方世絶不聞使既病之肌肉復受無辜之痛楚奈何懵憧無知甘受其惑良可概夫此皆嘗止閉而不通張云凡此五者皆如下文之所謂故邪也其開而止為寒痹甲乙無其開二字遇上有適字馬雲及其腠理開而或遇風寒則血氣凝結與濕氣惡血等之故邪相襲如春秋齊師襲莒之襲則為寒痹即痹論之所謂寒氣勝者為痛痹也張云其開者謂冒露於風寒也故邪在前風寒繼之二者相值則血氣凝結故為寒痹簡案據甲乙考之馬注為是其有熱止有因加而發焉張云其或有因熱汗出而受風者雖非賊風邪氣亦為外感必有因加而發者謂因於故而加以新也新故合邪故病發矣此亦有故邪止故似鬼神甲乙搏作薄馬雲人有濕氣惡血等之故邪留而未發因病人素所不知因而偶有所觸或好或惡則血氣內亂故邪與新志相搏遂爾為病此其所從來者甚微非見聞之所能及故人不知其故而以鬼神為疑乃似鬼神而非鬼神也志云此病氣而不病形故視之不見聽之勿聞若有似乎鬼神其祝而已者止可祝而已也甲乙祝下並有由字病之以從生病上有百字張云祝者巫咒之屬即祝由也勝者凡百病五行之道必有所以勝之者然必先知其病所從生之由而後以勝法勝之則可移精變氣祛其邪矣病有藥石所不及非此不可者惟先巫知之故可祝而已也然則先巫用祝之妙正不在祝其機在勝之而已王弘義云上古有十三科祝由乃其一也先巫者言上古之能祝由而愈病者謂之巫醫故古之醫字從巫非與師巫之賤役比也南人有言曰人而無恆不可以作巫醫即上古祝而已病之醫非醫巫之有二也簡案十三科昉於元言上古者誤介按吳鞠通曰按祝由二字出自素問祝告也由病之所從出也近時以巫家為祝由科並列於十三科之中內經謂信巫不信醫不治巫豈可列之醫科中哉吾謂凡治內傷者必先祝由詳告以病之所由來使病人知之而不敢再犯又必細體變風變雅曲察勞人思婦之隱情婉言以開導之莊言以振驚之危言以悚懼之必使之心悅誠服而後可以奏效如神衛氣失常篇第五十九諸本無篇字衛氣之留於腹中止何以去之甲乙腹中作脈中肢脅作搘簡案與技同脅無胃字馬志搐作稸是張云衛氣者水穀之悍氣也其氣循皮膚之中分肉之間熏於肓膜散於胸腹此衛氣之常也失其常則隨邪內陷留於腹中稸積不行而苑蘊為病故禁腹篇曰衛氣為百病母也大迎天突喉中甲乙道藏趙府元本正脈脹本大作人張云積於上者為喘呼逆息故當瀉之於上人迎足陽明經穴大突喉中俱任脈穴喉中即廉泉也三里與氣街張云積於腹中者當瀉其下三里氣街俱足陽明經穴馬雲對胸中而言故謂腹為下季脅之下一寸甲乙云季脅之下深一寸馬雲即足厥陰肝經章門穴簡案脈經云脾以胃合為腑合於中焦脾胃之間名曰章門在季脅前一寸半與馬注符雞足取之樓氏云正入一針左右斜入二針如雞足足三爪也張云謂攢而刺之也即官針篇合谷刺之謂志云以足緩伸緩縮如雞足之踐地蓋以疏陽明之經脈以通衛氣之所出也簡案志注非是大而弦急止不可刺也甲乙弦作強腹皮急作腹皮絞張云脈大而弦急陰虛而真臟見也絶不至者營氣脫也腹皮急甚者中和氣絶而脾元敗也不宜刺矣色起兩眉張云兩眉者闕中也其應主肺故病在皮病在肌肉張云脾氣通於唇故病在肌肉營氣霈然者諸本霈作濡馬雲欲知血氣有病當觀之於營氣但營氣無形而濡然多汗則知病之在血氣也張云濡濕也營本無形若膚腠之汗肌肉之脹二便之泄利皆濡然之謂其病在營則氣血濡也玉篇霈大雨也病在筋張云目為肝之竅肝主筋也病在骨張云耳為腎之竅腎主骨也皮之部輸於四末張云病在皮者在陽分也陽受氣於四末以其皮淺氣浮也故皮之部輸於四末肉之柱張云病在肌肉當治其柱柱者䐃之屬也堅厚之肉多在手足三陽分肉間以肉主於脾而脾主四肢也足少陰之經自足心循內踝後人足跟以上腨肉出膕內廉上股肉後廉會於尻臀貫脊其肉俱厚故亦為肉之柱血氣之輸張云病在血氣當治其輸輸於諸絡謂諸經之絡穴也氣血留居則經絡壅盛故當取之筋部止候病所在張云病在筋者不必分其陰陽左右但當隨病所在而治之骨之屬者止益腦髓者也甲乙上益字作液下益字作溢是張云病在骨之屬者當治骨空以益其髓髓者骨之充也故益髓即所以治骨簡案屬者趺屬之屬見骨度篇兩骨相交之處十二關節皆是是所以受液而溢腦髓者故骨病當求其所屬而取之各在其處馬雲取穴以刺之者亦惟於皮肉氣血筋骨各視其處間者小之止故曰上工甲乙小作少是張云間者病輕故用針宜淺宜小甚者病重故用針宜深宜衆病變無窮能隨其變而調治得宜者故曰上工大小寒溫馬雲大小者身之大小也寒溫者身寒暖也人年五十止為小馬雲十八以上六歲以上之上字俱當作下王弘義云數始於一成於三三而兩之為六三而三之成九十八者二九之數也二十者陰陽之生數始也五十者五行之生數終也簡案千金引小品方云凡人年六歲以上為小十六歲以上為少三十歲以上為壯五十歲以上為老由此考之以上不必以下之誤膕肉堅止不相離者肉甲乙膕作䐃肥作脂張膕作䐃注云肥者即下文所謂脂也䐃肉肉之聚處也此言偉壯之人而有脂膏肉三者之異脂者緊而滿故下文曰肉緊身小膏者澤而大故下文曰肉淖垂腴皮肉連實而上下相應者曰肉故下文曰身體容大志云腠理者肌肉之文理如豕之精肉條分而有理路理中之白膜曰脂肉外連皮之肥肉曰肥膏者即肥之脂膏謂如豕肉之紅白相間而有數層者為膏簡案韻會云凝者曰脂澤者曰膏博雅云人一月而膏二月而脂又漢五行志在人腹中肥而包裹心者脂也經文皮之滿緩可以證其凝與否也馬雲膏者油也脂者骨中髓也誤膏者止粗理者寒甲乙細理者熱之熱作和非張云淖柔而潤也膏者肉淖脂者肉堅若其寒熱則粗理者皆寒細理者皆熱志云粗理者衛氣外泄故身寒細理者衛氣收藏故身熱膏者多氣止其身收小張云縱寬縱也腴脂肥也膏者縱腹垂腴脂者其身收小是膏肥於脂也肉為皮肉連實自與脂膏者有間志云衛氣盛則腠理肥是以膏者多氣而皮縱緩故能縱腹垂腴腴者臍下之少腹也肉者身體容大此衛氣盛而滿於分肉也脂者其身收小此衛氣深沉不能充乎分肉以致脂膜相連而肌肉緊密故其身收小也簡案說文腴腹下肥也又禮少儀注腴腹下也通雅云凡肉肥軟處曰腴志直為少腹恐非也膏也多氣止故不能大張云膏者多氣氣為陽故質熱而耐寒也肉者多血血養形故形充而氣質平也脂者血清而氣滑少故不能大若此三者雖肥盛皆別於衆人而脂者之氣血似不及乎膏肉也愚按世傳肥白之人多氣虛而此云膏者多氣不無相左若據余聞見之驗則蒼瘦之氣虛者固不減於肥白是以不宜膠柱也泉人皮肉止命曰衆人張云衆人者言三者之外衆多之常人也其皮肉脂骨血氣各有品格故不能相加亦不能相多而形體大小皆相稱而已余伯榮云不能相加者謂血氣和平則皮肉脂膏不能相加於肥大也血氣之浮沉淺深各有常所不能相多於肥肉間也皮肉筋骨各自稱其身故其形不大不小也必先別其三形止不能大也甲乙膏人下有者字張云三形既定血氣既明則宜補宜瀉自可勿失常經矣是故膏人以下此重言其詳也玉版篇第六十馬雲末有著之玉版以為重寶故名篇素問有玉版論亦著之玉版也諸本無篇字五兵者止其孰小乎馬雲按管子曰蚩尤受盧山之銅而作五兵則黃帝時即有五兵一弓二殳三矛四戈五戟一云東方矛南方弩中央劍西方戈北方鎩也張云五兵即五刃刀劍矛戟矢也五兵雖大但備殺戮之用置之死者也小針雖小能療萬民之病保其生者也夫天地之間唯人最重故為天地之鎮而治人之生則又唯針最先蓋針之為用從陽則上合乎天從陰則下合乎地從中則變化其間而動合乎人此針道之所以合乎三才功非小補較之五兵其孰大孰小為可知矣簡案周禮夏官司兵掌五兵鄭注五兵者戈殳戟酋矛殳音殊兩熱相搏甲乙兩作而搏作薄簡案兩熱未詳甲乙為是聖人不能使化者止遭其已成也張云邪在天下則為亂邪在人身則為病及其已成則雖聖人不能使之化是以邪不可留也譬之用兵者必有夙教必有定謀而後可保其無危人之治身可素無調養之道乎故惟聖人乃能自治於未形愚者每遭其患矣余伯榮云按本經及素問論所生癰疽多因於風寒外邪有傷榮衛留積而成癰膿此因內傷喜怒飲食故曰不從天下不從地出其以形止奈何諸本以作已甲乙十六字作其已有形膿已成為之奈何十一字故聖人止為其不豫遭也張云此言兆庶之多千古之邈安得人人遭遇以救其疾苦故惟有著之竹帛以遺教將來正為人之不豫遭也志云聖人勿使已成而明為良方著之竹帛使後學之能者踵而傳之後世無有終時者為其不豫遭而成十死一生之證也遭遇也言其已形而不豫遭膿已成而不豫見此癰生於臟腑之間而不與我見乃多死少生之候也其已有膿血止以小針治乎甲乙無而後遭乎不道之七字以上有可字簡案據甲乙文義尤通以小治小者止鈹鋒之所取也甲乙治大者下有其功大以小治大者八字害下有大字鈹作䤵張云針少者功小無濟於事針大者多害恐有所傷故惟砭石及鈹針鋒針皆可以取癰疽之膿血簡案原文義難通得甲乙其旨甚晰蓋以大治大謂以砭石鈹針取大膿血也以為傷者止為順矣馬雲白眼屬肺今反青是肝邪侮所不勝當為肺氣衰也黑眼者即眼之睛也屬於肝今反小乃肝氣衰也納藥而嘔乃脾氣衰也腹痛者邪甚渴甚者火盛肩屬手之三陽項屬手足六陽及督脈經今肩項不便是陽盛陰虛也音嘶者肺衰也色脫者五臟衰也志云太陽為諸陽主氣肩項中不便陽氣傷也在心主言心之合脈也其榮色也音嘶色脫心臟傷也犯此五逆者死除此五者為順矣張云寒熱病篇曰五臟身有五部伏兔一腓二背三五臟之腧四項五此五部有癰疽者死是亦五逆之屬也內納同嘶音西聲破損也巢源云凡破癰潰膿之後有逆有順云云是為五逆皆死候諸病志云謂凡病多生於榮衛血氣之不調非獨癰膿也腹脹身熱止五逆也張云身熱脈大而加以腹脹表裡之邪俱盛也是為一逆也腹鳴而滿四肢清冷而兼後泄陰證也脈不宜大而大者脈證相反是為二逆鼻衄在陰脈大為陽陽實陰虛是為三逆咳而溲血脫形者正氣已衰脈小而急者邪氣仍在邪正不能相當是為四逆脫形身熱真陰衛虧而火猶不清也其脈細小疾數正邪盛正衰之候是為五逆不過十五日而死矣張云一節之更時移氣易客強主弱則不能勝故不過十五日而死其腹大脹止是五逆也甲乙脈搏作喘一字張云此下言五逆之急證也腹大脹者最忌中虛若見四肢清冷而脫形泄甚者脾元敗而陽氣去也故為一逆也腹脹便血陰病也脈大時絶孤陽將脫也故為二逆咳而溲血者氣血俱病形肉脫者敗在脾脈搏者真臟也敗在胃氣故為三逆嘔血胸滿引於背者臟氣連乎背也脈見細小疾數則真元大虧矣故為四逆上為嘔咳中為脹滿下為飧泄三焦俱病而脈至於絶者有邪無正也故為五逆不及一時而死馬雲一時者一周時也乃一日之意張云不及一時謂不能周一日之時也是謂逆治張云病不可治而強治之非惟無益適以資害是謂逆治甚駿張云駿大也簡案詩商頌為下國駿厖毛傳駿大也二十八會馬雲手足十二經左右相同共有二十四脈加以兩蹺督任共為二十八會也能殺生人不能起死者也簡案外臺明堂序云經脈陰陽各隨其類故湯藥攻其內以灸攻其外則病無所逃知火艾之切過半於湯藥矣其針法古來以為深奧今人卒不可解經云針能殺生人不能起死人若欲録之恐傷性命今並不録此依本節之義而立言也玉函經總例云針能殺生人亦能起死人亦同其如刀劍止猶可知矣張云言不善用針者徒能殺生人不能起死者正如以刀劍加人則死以酒飲人則醉此理之必然自不待診而可知者也人之所受氣者止奪之而已矣馬雲試觀海之行雲氣者本於地氣上為云而後雲氣行於天之下也胃之有氣血本於穀氣所化而後血氣行於十二經之隧也是經隧者誠為五臟六腑之大脈絡耳迎其氣之來而有以奪之則能殺生人矣上下有數乎止奪其天氣者也張云上下謂手足經也五里手陽明經穴此節指手之五里即經隧之要害若迎而奪之則臟氣敗絶必致中道而止且一臟之氣大約五至而已針凡五往以迎之則一臟之氣已盡若奪至二十五至則五臟之輸氣皆竭乃殺生人此所謂奪其天真之氣也氣穴論云大禁二十五在天府下五寸即此之謂志云至者迎其氣之至也往者追其氣之行也故五至而迎其五臟之氣至即已若五往而追之則五臟之氣盡泄於外矣非能絶其命而傾其壽者也張云不知刺禁所以殺人針非絶人之命傾人之壽者也志云非由命之自絶壽之自絶實所以殺生人也窺門止死於堂上馬雲吾窺門而見其刺其人當死於家中吾入門而見其刺其人當死於堂上死之最易又如是耶張云門即生氣通天等論所謂氣門之門也窺門而刺言猶淺也淺者害遲故死於家中入門而刺言其深也深則害速故死於堂上志云窺者窺俟其所出也門首衛氣篇之所謂契紹之門戶乃氣血從孫絡而出於皮膚之門也故俟其氣之出門而刺之者稍緩而死於家中入門而逆刺於絡內者即死於醫者之堂上也夫天氣一日一夜繞地環轉一周逆則不過一周而死況針刺之傷乎簡案三家所取義各異未知孰是五禁篇第六十一諸本無篇字馬雲內有五禁五奪五過五逆九宜等法然以五禁為首故名篇五過張云補之過度資其邪氣瀉之過度竭其正氣是五過也介按疏五過論曰不知病情治之一過也不知補瀉治之二過也工不知診治之三過也病不能醫治之四過也醫不能明治之五過也甲乙日自乘止是謂五禁馬雲天干之應人身頭為甲乙肩喉為丙丁戊己為手足四肢合辰戌丑未之四季庚辛應股膝壬癸應足脛故凡天干自乘之日皆無刺之發矇振埃俱刺法名目見本經刺節真邪篇張云日自乘者言其日之所直也簡案據刺節真邪篇發矇之刺治耳目之病即頭面之病振埃之刺治咳喘胸滿肩息上氣等之病即肩喉兼全之病去爪之刺刺關節脈絡四肢之病即瀉脾土之水是五奪也張云此五奪者皆元氣之大虛者也若再瀉之必置於殆不惟針刺用藥亦然熱病脈靜止是謂五逆也甲乙無下血衃三字張云熱病脈靜陽證得陰脈也汗已出脈躁盛真陰敗竭也病泄脈宜靜而反洪大者孤陽邪勝也著痹破䐃身熱而脈偏絶者元有所脫也淫而奪形身熱下血衃者精血去而亡陰發熱也寒熱奪形而脈堅搏者脾陰大傷而真臟見也凡此五逆者皆陰虛之病故本神篇曰陰虛則無氣無氣則死矣是皆不可刺者也馬雲其身熱脈宜洪盛今已偏絶蓋偏則一手全無絶則二手全無也淫者好淫也志云淫者酷虐之邪奪形者邪傷形也如但熱不寒之瘧氣內藏於心而外淫於分肉之間令人消爍肌肉簡案馬偏絶及淫字之解恐非也傷寒論云脈陰陽俱盛大汗出不解者死成氏注云若汗出不解則邪氣內勝正氣外脫故死內經云汗出而脈尚躁盛者死千金云熱病已得汗脈尚躁盛此陽脈之極也死動輸篇第六十二諸本無篇字馬雲內論手太陰足少陰足陽明之俞穴獨動不休故名篇經脈十二止何也甲乙作經脈十二而手太陰之脈獨動不休何也無足少陰陽明五字張云手足之脈共十二經然惟手太陰足少陰足陽明三經獨多動脈而三經之脈則手太陰之太淵足少陰之太溪足陽明上則人迎下則衝陽皆動之尤甚者也是明胃脈也止故動而不止甲乙是作足陽二字是也志云是明胃脈者謂宗氣榮氣衛氣皆胃腑水穀之所生也清氣者宗氣也積於胸中上注於肺肺氣從手太陰之經而行於十二經脈其行也以息往來故人一呼脈動而行三寸一吸脈再動而行三寸呼吸定息脈行六寸呼吸不已故動而不止是以十二經中皆有動脈也上十焉息止不知其極甲乙十八俱作出字馬雲上之從息而行者可擬十分下之伏於臟內者可擬八分但不知其何道而來何道而還罔有抵極張云寸口手太陰脈也上下言進退之勢也十八喻盛衰之形也焉何也息生長也上十焉息言脈之進也其氣盛何所來而生也下八焉伏言脈之退也其氣衰何所去而伏也此其往還之道真若有難窮其極者志云上十焉息者謂胃腑所生之清氣如弓弩之發盡過於寸口以應呼吸定息下八焉伏者謂胃腑所生之榮氣如水之下岸流溢於中而伏於胞內簡案三家之解未知孰是但張注似稍義通然不如甲乙改十八作出字之尤明晰也氣之離臟也止故其行微張云凡脈氣之內發於臟外達於經其卒然如弓弩之發如水之下岸言其徑鋭之氣不可遏也然強弩之末其力必柔急流之末其勢必緩故脈由寸口以上魚際盛而反衰其餘氣以衰散之勢而逆上故其行微此脈氣之盛衰所以不等也胃氣上注於肺止別走於陽明者也甲乙顑作頷張云胃氣上注於肺而其悍氣之上頭者循咽喉上行從眼系入絡腦出顑下會於足少陽之客主人以及牙車乃合於陽明之本經並下人迎之動脈此內為胃氣之所發而外為陽明之動也牙車即曲牙當是頰車也簡案牙車之義詳出經脈篇頰車注故陰陽上下止相傾者病張云此云陰陽上下者統上文手太陰而言也蓋胃氣上注於肺本出一原雖胃為陽明脈上出於人迎肺為太陰脈下出於寸口而其氣本相貫故彼此之動其應若一也然人迎屬腑為陽陽病則陽脈宜大而反小者為逆寸口屬臟為陰陰病則陰脈宜小而反大者為逆故四時氣篇曰氣口候陰人迎候陽也汪云言陰陽動靜當如引繩平等所謂脈有胃氣者生也若相傾則病矣馬注作引繩以相傾謬簡案五色篇云脈之浮沉及人迎與寸口氣小大等者病難已馬蓋依此以引繩為病脈歟張志並同然而禁服篇云寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人知是汪注得其旨矣衝脈者止此脈之常動者也甲乙入足下無入字入踝下有內字溫足脛脛作跗張云足少陰之脈動者以衝脈與之並行也衝脈亦十二經之海與少陰之絡同起於腎下出於足陽明之氣衝循陰股膕中內踝等處以入足下其別者邪出屬跗上注諸絡以溫足脛此太溪等脈所以常動不已也汪云按諸篇俱言衝脈上衝惟此篇及順逆肥瘦論言衝脈並腎脈下行簡案仲景取寸口跗陽太溪即手太陰足陽明足少陰之脈也榮衛之行也甲乙作衛氣之行也氣何由還張云榮衛之行陰陽有度若邪氣居之則其運行之道宜相失也又何能往還不絶因問其故夫四末止此之謂也張云四末四肢也十二經皆終始於四肢故曰陰陽之會而為氣之大絡也然大絡雖會於四肢復有氣行之徑路謂之四街衛氣篇頭胸腹脛各有街凡邪之中人多在大絡故絡絶則徑通及邪已行而四末解彼絶此通氣從而合回還轉輸何能相失此所以如環無端莫知其紀也馬雲此四街為榮衛二氣之經路故大絡雖或阻絶而徑路則自相通彼逢邪氣大寒之時手足固嘗懈惰及懈惰已畢而少解則二氣復從而合相輸如環尚何相失之有哉五味論篇第六十三趙府正脈道藏熊本無篇字志本無論篇二字酸入於胃止故癃甲乙無以收上之兩焦六字膀胱下有之胞二字馬雲酸之氣味滯澀而收斂既入於胃之中脘則上兩焦即上中二焦也其氣味弗遽能出入乃留於胃中久則胃中和溫而下注膀胱膀胱為胞之室胞在其中其體薄其氣懦得此酸味則縮而且綣所以約而不通水道不行而為癃也張云綣不分也約束也癃小水不利也味過於酸則上之兩焦弗能出入若留於胃中則為吞酸等疾若胃中溫和不留則下注膀胱膀胱得酸則縮故為癃也愚按胞溲脬也類纂曰膀胱者胞之室王安道又有胞居膀胱之室之說甚屬不經夫胞即膀胱膀胱即胞也焉得復有一物耶簡案懦音儒說文駑弱也又音軟又作愞玉篇弱也縮綣馬雲連讀為是說文新附字繾綣不相離也又釋名繾綣束縛也張注縮下為句非陰者止走筋矣甲乙終下有聚字張云陰者陰器也積筋者宗筋之所聚也肝主筋其味酸故內為膀胱之癃而外走肝經之筋也又宣明五氣篇曰酸走筋筋病無多食酸鹹入於胃止走血矣甲乙注於脈則血氣走之作注於諸脈脈者血之所走也十一字則凝凝則作則血涘則胃中汁以下八字無又走血矣下有腎合三焦血脈雖屬肝心而為中焦之道故鹹入而走血矣四句張云血為水化咸亦屬水咸與血相得故走注血脈若味過於咸則血凝而結水液注之則津竭而渴然血脈必化於中焦故鹹入中焦而走血又宣明五氣篇曰咸走血血病無多食鹹簡案鹹入於胃其氣上走中焦又上文云酸入於胃云云上之兩焦弗能出入此似胃與中焦所指各異然考下文辛入於胃苦入於胃甘入於胃每章必有此一句則殆似章首標識故云胃雲中焦云兩焦宜無異義前注未疑及之録以俟考辛入於胃止與汗俱出甲乙熏之作熏至營衛四字洞心注云洞一作熅馬雲辛入於胃其氣必走於上焦上焦者受氣而運諸陽者也故辛味既走於上焦則不得不走於氣耳如姜韭者氣味之辛者也衛氣由下焦而生亦必出而行於分肉之間所以不時受此辛味之氣也惟此姜韭之氣久留心下則物在心下而氣熏於上焦上焦氣湊心內似空故多食辛者必洞心也且此辛氣與心中之氣相得而俱行辛入則汗必出汗之出者以氣之出也其心安得而不洞宣明五氣篇云辛走氣氣病無多食辛張云洞心透心若空也甲乙注千金云辛入胃而走氣與氣俱出故氣盛苦入於胃止知其走骨也甲乙下脘下有下脘者三字變上有氣字復出下有必黧疏三字馬雲苦入於胃而胃中五穀之氣皆不能勝此苦味故苦入下脘則上中下焦之氣皆閉而不通遂使五穀在胃者氣味不知所以變而為嘔也況齒者乃骨之所終故苦入則走骨走骨則走齒今入而復出者即從齒出也宣明五氣篇云苦走骨骨病無多食苦志云苦乃火味故入於下而復出於上以其性下泄而上湧也簡案變嘔即嘔變佛典有變吐之文可以證焉張云其變為嘔非也入而復出未詳據甲乙乃似苦味之氣入而復出為齒黧黑疏豁之義甘入於胃止故甘走肉甲乙弱小作弱少留於胃中者者上有甘字潤下無者字悗作悶其氣外通於肉以下作其氣通於皮故曰甘走皮皮者肉之餘蓋皮雖屬肺與肉連體故甘潤肌肉並皮也三十二字蟲馬本作蠱注蠱作蟲張云甘性柔緩故其氣弱小不能至於上焦味過於甘則與穀氣留於胃中令人柔潤而緩久則甘從濕化致生諸蟲蟲動於胃甘緩於中心當悗矣悗悶也甘入脾脾主肉故甘走肉宣明五氣篇曰甘走肉肉病無多食甘陰陽二十五人篇第六十四諸本無篇字伯高曰甲乙作少師張云按本節引通天篇少師之答而此云伯高者豈少師即伯高之別稱耶無考矣不離於五張云由陰陽而化五行所以天地萬物之理總不離五而人身之相應者亦惟此耳故五五止從外知內張云五行之中又各有五如下文以五形之人而又分左之上下右之上下是為五矣五而五之計有二十五人也然此言五行之詳非若通天篇所謂太陽少陽太陰少陰和平五態而已故曰陰陽之人不與焉又不合於衆者五也別而以候欲別其外而知其內也簡案馬雲計有二十五人之式而彼陰陽和平之人不與也此政讀為式遵循簡案逡巡同莊子至樂作蹲循通雅云古人不惟借聲見形義近者時牽率書之故循以借逡又以借巡耳本形之人止他他然甲乙無似於蒼帝其為人七字下同此例肩下有平字馬雲比者擬議之謂蓋以人而擬角故謂之曰比此言木形人有五有全偏之分也木形之人木氣之全者也下文四股則偏矣木主東方其音角其色蒼故木形之人當比之上角似於上天之蒼帝色蒼者木之色蒼也頭小者木之巔小也面長者木之體長也肩背大者木之枝葉繁生其近肩之所闊大也身直者木之體直也小手足者木之枝細而根之分生者小也此自其體而言耳好有才者木隨用而可以成材也力少者木必易搖也言多憂而外勞於事者木不能靜也耐春夏者木以春夏而茂盛也不耐秋冬者木以秋冬而雕落也此自其性而言耳故秋冬有感於邪則病易生肝經屬起厥陰為根干故足厥陰經之分肉形體他他然有安重之義案詩經國風君子偕老篇云委委他他朱注云雍容自得之貌張云足厥陰肝木之經也肝主筋為罷極之本故曰他他然他他筋柔遲重之貌足厥陰為木之臟足少陽為木之腑此言臟而下言腑者蓋以厥陰少陽為表裡而臟為腑之主耳故首云上角厥陰者總言木形之全也後云大角左角釱角判角少陽者分言木形之詳也茲於上角而分左右左右而又分上下正以明陰陽之中復有陰陽也余准此志云他他美也如木之美材也大角之人止遺遺然甲乙注一曰左角張云稟五形之偏者各四曰左之上下右之上下而此言木形之左上者是謂大角之人也其形之見於外者屬於左足少陽之經如下文所謂足少陽之上氣血盛則通髯美良以及血氣多少等辨正合此大角之人也遺遺柔退貌愚按通天篇有云太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同是統言大體而分其陰陽五態也此以木火土金水五形之人而復各分其左右上下是於各形之中而又悉其太少之義耳總皆發明稟賦之異而示人以變化之不同也馬雲遺遺然者如有所遺失然行之不驟而馴也簡案馬注不允志云遺遺謙下之態如枝葉之下垂也亦恐非是左角之人止隨隨然甲乙作右角張云左角一云少角隨隨從順貌下文云足少陽之下血氣盛則脛毛美長者正合此少角之人而此言其右之下也余仿此釱角之人止推推然甲乙推推作鳩鳩張云一曰右角角形而並於右足少陽之上者是謂右角之人此即言其右之上也推推前進貌志云大謂之釱即太角也大角之人比於左足少陽釱角之人比於右足少陽推推上進之態如枝葉之上達也簡案廣韻釱音大義同然則釱角乃與上文大角何別上文大角攄甲乙作左角近是判角之人止栝栝然正脈甲乙栝栝作括括張云判半也應在大角之下者是謂判角之人而屬於左足少陽之下即言其左之下也栝栝方正貌凡此遺遺隨隨推推栝栝者皆所以表木形之象志云栝栝正直之態如木體之挺直也火形之人止核核然甲乙無似於赤帝其為人七字核核作竅竅簡案疑是核核誤字形相似矧諸本作䏖常改馬雲此言火形之人有全偏之分也火主南方其音徵其色赤故火形之人似於上天之赤帝䏖者脊肉也廣䏖者火之中勢熾而廣大也面鋭頭小者火之炎上者必鋭且小也好肩背髀腹者火之自下而上漸大而狹故謂之好也手足小者火之旁及者勢小也行安地者火必著地而起也疾心者火勢猛也行搖肩者火之勢搖也背肉滿者即廣䏖之義也有氣者火有氣勢也此自其體而言耳輕財者火性易發而不聚也少信者火性不常也多慮而見事明者火性明通而旁燭也好顏者火色光明也急心者火心急也不壽暴死者火勢不久也耐春夏者火令行於暑時也不耐秋冬者火畏水也此自其性而言耳故秋冬有感於邪則病易生手少陰心經屬火其經脈穴道之行於分部者若核核然有真實之義下文言手太陽小腸經者以心與小腸為表裡耳張云核核然火不得散而結聚為形也質徵之人止肌肌然甲乙質作太張云一曰質之人一曰大徵以徵形而應於左之上是謂大徵之人而屬於左手太陽之上也肌肌膚淺貌此下詳義同前木形注中馬雲肌肌肌肉充滿之義也少徵之人止慆慆然張云應右徵之下者是謂少徵之人而屬於右手太陽之下也慆慆不反貌又多疑也馬雲慆音滔詩經東山篇有慆慆不歸朱注以慆慆為久意今此當作滔滔從水為宜又云滔滔者饒洽之意也志云慆慆喜悅之態簡案說文慆說也玉篇喜也志正本此右徵之人止鮫鮫然張云以徵形而屬於右手太陽之上是謂右徵之人鮫鮫踴躍貌質判之人止支支頤頤然甲乙質判作判徵支支下有然字頤頤然作熙熙然張云此居質徵之下故曰質判而屬於左手太陽之下判亦半之義也支支枝離貌頤頤自得貌凡此肌肌之類者皆所以表火形之象馬雲支支者支持之義頤頤者垂下之義也志云支支頤頤上下之相應也土形之人止敦敦然甲乙無似於上古黃帝六字馬雲此言土形之人有全偏之分也中央主土其音宮其色黃故土形之人比於上宮似於上古之黃帝曰上古者以別於本帝也色黃者土之色黃也面圓者土之體圓也頭大者土之體平也肩背美者土之體厚也腹大者土之體闊大也股脛美者土之體肥也小手足者土本大亦可以小也多肉者土主肉也上下相稱者土自上而下其體如一也行安地者體安重也舉足浮者土揚之則浮也此自其體而言耳安心者土不輕動也好利人者土以生物為德也不喜權勢善附人者土能容垢納汙不棄賤趨貴也耐秋冬者土喜滋潤也不耐春夏者土畏亢燥也故春夏有感於邪則病易生此自其性而言耳足太陰者脾經也其經脈穴道所行之分部皆敦敦然有敦重之義猶五常政大論所謂敦阜也下文言足陽明胃經者以脾與胃為表裡耳張云美股脛土主四肢也小手足盛在中也舉足浮大氣舉之也敦敦重實貌大宮之人止婉婉然張云以宮形而應於左之上是謂大宮之人而屬於左足陽明之上也婉婉委順貌此下詳義同前木形注中馬雲婉婉者有委曲之義也加宮之人止坎坎然甲乙作烗烗然音咳注一曰坎坎然張云應在大宮之下者是謂加宮之人而屬於左足陽明之下也坎坎深固貌馬雲坎坎者亦持重之義也仇汝霖云加宮者右宮也蓋西北之地高厚而多山嶽故曰加宮少宮之人止樞樞然張云應在太宮之右故曰少宮之人而屬於右足陽明之上也樞樞圓轉貌馬雲樞樞者有拘守之義也志云如樞轉之持重土之體也左宮之人止兀兀然張云詳此義當是右宮之人故屬於右足陽明之下也兀兀獨立不動貌凡此婉婉之類者皆所以表土形之象也志云兀兀不動貌如平陸之安夷也金形之人止敦敦然甲乙無似於白帝四字馬雲此言金形之人有全偏之分也西方主金其音商其色白故金形之人比於上商似於上天之白帝面方者金之體方也色白者金之色白也曰頭曰肩背曰腹俱小者金體沉重而不浮大也手足小如骨發踵外者金之旁生者必小而其足跟之外如另有小骨發於踵外也骨輕者金無骨故其骨則輕也身清廉者金之體冷而廉靜不染他汙也此自其體而言耳急心者金性至急也靜悍者金之性不動則靜動之則悍也善為吏者金主肅殺有威也耐秋冬者金令王於涼寒之候也不耐春夏者金畏火也故春夏有感於邪則病易生此自其性而言耳手太陰肺經屬金凡其經脈穴道所行之分部當敦敦然有敦重之義也足手太陰皆曰敦敦然下文言手陽明大腸經者以肺與大腸為表裡耳張云敦敦堅實貌手足太陰皆曰敦敦而義稍不同金堅土重也志云善為吏者有斧斷之才也釱商之人止廉廉然甲乙釱作太張云釱亦大也左右之上俱可言釱故上文云釱角者比於右足少陽之上此釱商者比於左手陽明之上也廉廉稜角貌此下詳義同前木形注中志云廉廉如金之潔而不汙左商之人止脫脫然諸本作右商之人馬雲右商之人疑是左商之人張云詳此當是右手陽明庶與右商之人相屬脫脫蕭灑貌馬雲脫脫無纍之義志云脫脫如金之堅白涅而不淄太商之人止監監然甲乙太商作左商馬雲左商之人當是右商之人也監監然有所制也張云詳此當是左手陽明庶與左商之人相屬監監多察貌志云監監如金之鑑而明察也少商之人止嚴嚴然張云應左右之下者是謂少商之人而屬於右手陽明之下也嚴嚴莊重貌凡此廉廉之類者皆所以表金形之象也馬雲嚴嚴然不敢肆也水形之人止汗汗然甲乙無似於黑帝四字面不平注一作曲面廉頤作廣頤戮上有殆字汗汗作汙汙志亦作汗汗皆諸本作背當改馬雲此言水形之人有全偏之分也北方主水其音羽其色黑故水形之人比於上羽似於上天之黑帝色黑者水之色黑也面不平者水上有波也頭大者水面不鋭也頤廉有角者水流四達也肩小者水之自高而瀉下者其高處不大也腹大者水之腹大而善藏物也手足動及發行必搖身者水流而達也下尻長者水流必長也背延延然者亦長意也此自其體而言耳不敬畏者水決而不可遏也善欺紿者水性不實也戮死者水滅體消也耐秋冬者水以秋冬不虧也不耐春夏者水以火而沸也此自其性而言耳故春夏有感於邪則病易生足少陰腎經屬水故其經脈分部皆汗汗然如有所依著也下文言足太陽膀胱經者以腎與膀胱為表裡耳張云大腹容物如海也不敬畏任性趨下不向上也戮死水無恆情故多厄也汗汗濡潤也志云汗汗然者卑下之態如川澤之納汙也仇汝霖云五行五音上應五星故曰似於蒼帝者上應歲星也似於白帝者上應太白也太羽之人止頰頰然張云以水形而應於右之上者是謂太羽之人而屬於右足太陽之上也頰頰得色貌此下詳義同前木形注中馬雲頰頰然者其盈滿如兩頰也志云頰頰然者謂太陽在上如有俠輔而尊貴也少羽之人止紆紆然張云應在左之下者是謂少羽之人而屬於左足太陽之下也紆紆曲折貌馬雲紆紆然者有周旋之義也志云紆紆紆洄之態如水之洄旋也衆之為人止潔潔然馬雲衆之為人未詳意潔潔然者獨行之義也張云衆常也一曰加之人應在右之下者曰衆之為人而屬於右足太陽之下也潔潔清淨貌諸形皆言太少而此獨曰衆意者水形多變而此獨潔潔故可同於衆也志云衆羽之人比於右足太陽潔潔如水之清潔也曰衆之為人者謂居海濱平陸之大衆如水之在下而形體清潔也桎之為人止安安然馬雲桎之為人未詳意水形之人為戮死曰桎者受桎梏之人也安安然者自如之義張云桎窒同局窒不通之義桎音質說文足桎也徐曰在足曰桎在手曰梏又窒也莊子達生篇其靈臺一而不桎居左之上者曰桎之為人而屬於左足太陽之上也安安定靜貌諸不言桎而此獨言者蓋以水性雖流而為器所局則安然不動故云桎也凡此頰頰之類者皆所以表水形之象也志云桎之為人者謂居岡陵山谷之人民如山之在上安然而不動也蓋水性動而不靜故水形之人動手足發行搖身如居於高陵山谷之中受加宮之所勝制則手足如桎梏而安然不動矣倪仲宣云不曰左羽右羽而曰衆之為人桎之為人此即以衆桎而為左右也倪仲玉云水形之人豈應桎梏而戮死耶經義淵微聖辭古朴非覃思精粹豈易疏也簡案衆羽桎羽見五音五味篇五形之人止相欺者是也馬雲此總結上文五行之人有二十五等之異者乃衆人之難辨而易欺者也張云形分為五而又分為二十五稟賦既偏則不免強弱勝負之相欺故惟不偏不易而鍾天地之正氣者斯為陰陽和平之人是以有聖跖賢愚之別也楊慎云相法出於黃帝雖不能通其詳其大旨可知矣乃知此術不始於左傳荀子所載唐舉管輅之所師當出於此出升庵外集五十一卷形勝色止富貴大樂甲乙惑作害馬雲人有形勝色者如木形人而黃色現也有色勝形者如本形人而白色現也但此等之人不以本形之本色相見而有他色來見至其形色相勝之時值有年忌相加則感之而病倘有疏失則甚可憂矣如得本形本色相得者其年當富貴大樂也張云勝時年者如木王土衰而又逢丁壬之木運或東方之干支或厥陰氣候之類值其王氣相加而感之則病矣既病而再有疏失乃可憂也簡案張以運氣釋之恐非經旨至其勝時下句凡年忌止是謂年忌甲乙凡年忌下上之人大忌作凡人之大忌五字似是張云此言年忌始於七歲以至六十一歲皆遞加九年者蓋以七為陽之少九為陽之老陽數極於九而極必變故自七歲以後凡遇九年皆為年忌馬雲凡所謂年忌者乃各經下上之人大忌其常加也如太角之人比是於左足少陽之上判角之人比於左足少陽之下屬木之人也簡案相勝之時下句足陽明之上止兩吻多畫甲乙髯美髯短髯少及無髯之髯俱作須漢書高祖紀師古注在頤曰須在頰曰髯血少氣多作血多氣少氣少血多作氣多血少張云此下言手足三陽之外候也足陽明胃經之脈行於上體者循鼻外挾口環唇故此經氣血之盛衰皆形見於口旁之髯也吻口角也畫紋也陽明血氣不充兩吻故多紋畫簡案漢周亞夫從理入口而餓死其理略同足陽明之下止足痹甲乙足趾作足大趾馬雲瘃音祝釋文云手足中寒瘡也張云足陽明之脈行於下體者由歸來至氣街陰陽總宗筋之會會於氣街而陽明為之長故形見於下毛而或有至胸至臍也行則善高舉足者因其血多蓋四肢皆稟氣於胃足受血而能步也足趾少肉足善寒者因其氣少蓋四肢者諸陽之本陽氣不足則指少肉而善寒也血少氣多則浮見於外故下體肉分多為寒腫也悴憔悴也足陽明為五臟六腑之海主潤宗筋束骨而利機關也今氣血俱少於下故為痿厥足痹等病樓云下毛陰毛也簡案瘃音劚說文中寒腫核玉篇手足中寒瘡也前趙充國傳手足皸瘃足少陽之上止無須張云足少陽膽經之脈行於上體者抵於䪼下頰車故其氣血之盛衰必形見於鬚髯也在頤曰須在頰曰髯志云通髯美者俗名連鬢胡也善痹骨痛爪枯也張云此皆筋骨之病以少陽厥陰為表裡而肝主筋也足少陽之下止無肉張云足少陽之脈行於下體者出膝外廉下外轉骨外輔之前故其形見者皆在足之外側足太陽之上止美色甲乙面多少理作面多小理張云足太陽膀胱之脈行於上體者起於目內眥其筋之支者下顏結於鼻故其氣血之盛衰皆形見於眉面之間也志云毫毛者眉中之長毛因血氣盛而生長惡眉者無華彩而枯瘁也少理當作小理而多小理者多細小之紋理蓋氣少而不能充潤皮膚也足太陽之下止踵下痛張云足太陽經之行於下體者從後廉下合膕中貫腨內出外踝之後結於踵故其形見為病皆在足之跟踵也手陽明之上止無髭甲乙無髭上有善轉筋三字張云手陽明大腸之脈行於上體者挾口交人中上挾鼻孔故其氣血之盛衰必形見於髭也在口上曰髭在口下曰須手陽明之下止以寒張云手陽明之行於下體者上臑外前廉下近於腋且陽明太陰為表裡而太陰之脈出腋下故腋下毛美手魚肉者大指本節後厚肉也本經之脈起次指出合谷故形見於此手少陽之上止惡色張云手少陽三焦之脈行於上體者出耳前後至目鋭眥故其血氣之盛衰皆見於眉耳之間手少陽之下止多脈甲乙卷作拳張云手少陽之脈行於下體者起名指端循手腕出臂外上肘故其形見若此志云蓋手少陽之血氣循手表腕盛則皮緩肉淖故善於卷握也多脈者皮肉瘦而脈絡多外見也手太陽之上止惡色甲乙有多須無有字須作髯惡色作黑色張云手太陽小腸之脈行於上體者循頰上䪼斜絡於顴故其血氣之盛衰皆形見於須面之間也手太陽之下止以寒張云手太陽之脈行於下體者循手外側上腕故其形見者如此按本篇首言五形者以臟為主而言其稟此言六陽者以腑為表而言其形稟質相合象變斯具矣此所以有左右上下之分也有約乎止可以知逆順矣張云約度也此言足太陽一經之盛衰而他經之有餘不足亦由是也審察既明而後調之則不失其逆順矣馬雲審察其形氣之有餘不足而盛則瀉之虛則補之可以知當補而補當瀉而瀉之為順而反此則為逆矣志云逆順者皮膚經脈之血氣交相逆順而行者也知逆順之有餘不足則知所以調之矣仇汝霖云脈字其字宜玩蓋用脈字以知足太陽之脈之氣血多少加其字以分別肥而澤者乃諸陽之脈之血氣有餘也按其寸口止決之乃行甲乙澀作泣張云寸口在手太陰脈也人迎在頭陽明脈也太陰行氣於三陰陽明行氣於三陽故按其寸口人迎而可以調陰陽也禁服終始經脈等篇所謂人迎脈口一盛二盛三盛等義皆是也切深也循察也經絡為病身必痛痹甚則血氣不行故脈道凝澀也血脈凝澀氣不至也故當留針以補而致其氣以溫之致使之至也決者開泄之謂簡案王注脈要精微論云切謂以指切近於脈也張訓深兆馬注甚則不行云甚則不能起而行也似是故曰止則而豫之甲乙休作往則而豫之作即而取之馬雲大凡病之氣有餘於上者則病在上求之下當針其穴之在下者以導而下之氣不足於上者則仍刺其上穴乃推其針而久留以休息之候其氣至可也如針已稽留而氣尚未至必因而迎之隨即有以推之耳凡此者必先明於各經經脈之隧然後可持針以刺之其間有寒熱相爭者則導而行之有氣鬱陳宛陳素問湯液醪醴論有去宛陳莝自水積言本經首篇有宛陳則除之自結血言本篇此節有宛陳而不結者指積氣言而血未結者必側其針以刺之則側同側針即臥針豫與同張云休者留針以待氣也稽留不至言氣至之遲滯者接之引之而使其必來也迎去聲凡物來而接之則平聲物未來而迓之使來則去聲隧道也必明經脈之道路而後能執持之也其有寒熱不和者因其偏而導去之脈道雖有郁陳而血不結者則其勢而豫治之則度也必先明知二十五人止刺約畢也甲乙則作別刺上有則字也作矣張云凡刺之道須明血氣故必知此二十五人之脈理而刺之大約可以盡矣五音五味篇第六十五馬雲內論人身合五音五穀五果五畜等義故名右徵與少徵調右手太陽上馬雲上下字必有缺張云此下十二條並後九條皆所以言六陽之表也左商與左徵調左手陽明上馬雲以火人而調金部未知其所謂也少徵與太宮調左手陽明上馬雲以土人而調金部未知其所謂也張云義似不合右角與太角調右足少陽下馬雲前篇太角之人比於左足少陽少陽之上遺遺然而此以右代左以下代上者必有訛耳志云前章有左角而無右角左右二字有誤太徵與少徵調左手太陽上馬雲前篇以少徵之人比於右手太陽太陽之下慆慆然而此以左代右以上代下必有誤耳衆羽與少羽調右足太陽下馬雲前篇少羽之人比於左足太陽太陽之下紆紆然今以右代左者必有訛耳少商與右商調右手太陽下馬雲以金人而調火部未知其所謂也張云義似不合少宮與太宮調右足陽明下馬雲前篇以太宮之人比於左右陽明陽明之上婉婉然今乃以右代左亦為異耳釱商與上商調右足陽明下馬雲前篇以少商之人比於右手陽明陽明之下嚴嚴然又云手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒此以上商而調右手陽明之下者是也但前止有釱商少商右商左商並無上商非此之上為誤則彼之少為誤也張云義似不合釱商與上角調左足太陽下馬雲以金人而調水部未知其所謂也按據前所屬五音而調各部正承前篇末節言先明二十五人之形然後可以明經隧而調陰陽故此即二十五人之屬於五音者而指其當調之所在也但有以別音而互屬則是太少左右上下陰陽等字非前篇則此篇必有訛處正以此書向無明注而讀者不曉録者不慎故不得改正之愚欲據五行生剋大義悉改正之其說自明但此經非比尋常不敢妄更姑俟後之君子志云按此節論調手足之三陽有左右上下之相通者有手太陽而調之手陽明者有手陽明而調之手太陽者有手陽明而調之足陽明者有足厥陰而調之足太陽者陰陽之血氣各有分部而調治錯綜抑經氣之交通或魯魚之舛誤姑從臆見箋疏以俟後賢參正上徵與右徵同止時夏張云此下五條言五臟之裡以合四時五色五味也仇汝霖云按前後二篇並無針刺二字所謂調右手太陽上左足太陽下者即以此五味調之也列左右上下者分別二十五變之人使後學觀形以知血氣之盛虛非用五味之中而有上下之分也如用調左手太陽上右手太陽下總以麥谷羊畜調之也書不盡言言不盡意學者以意逆之則得之矣太宮與上角同右足陽明上馬雲太宮屬土宜調足陽明胃土而此又以上角之人義不可曉左角與太角同左足陽明上馬雲角乃木音宜調木部今足陽明屬土而乃調之義不可曉張云義似不合加宮與太宮同左足少陽上馬雲加宮太宮屬土而調足少陽之木義不可曉然太宮又重出矣張云義似不合質判與太宮同左手太陽下馬雲質判屬火宜調手太陽小腸經火而太宮又附之義不可曉且重出太羽與太角同右足太陽上馬雲太羽屬水宜調右足太陽膀胱經水而太角屬木附之義不可曉太角與太宮同右足少陽上馬雲太角為木宜調足少陽膽經木而太宮屬土附之義不可曉右按以宮調胃土以羽調膀胱水等義固以五行相屬其間以別音之人互入必是手足左右上下陰陽字面多訛今以此九項而與前十二項相配有重者如左手陽明上右足太陽下右足陽明下左手陽明上有缺者如右足少陽上左足少陽下右手陽明上左足太陽上右足太陽上右足陽明上此必由重者差訛故致有缺者不全也俟後之君子正之張云按此篇乃承前篇陰陽二十五人而詳明其五行相屬之義但前節言調者十二條後節言同者九條總計言角者十二徵者六宮者八商者八羽者七有重者如左手陽明上右足太陽下右足陽明下右足少陽下有缺者如左手陽明下右手陽明上右手陽明下左足太陽上左足陽明下且有以別音互入而復不合於表裡左右五行之序者此或以古文深諱向無明注讀者不明録者不慎而左右上下太少五音之間極易差錯愈傳愈謬是以義多難曉不敢強解姑存其文以俟後之君子再正簡案志順文詮釋其義較明然未免牽強故不敢收其說右徵止少羽左角宮馬本志本無角字似是張云此上五條結上文而總記五音之目也五音各五是為二十五人之數婦人無須者馬雲前篇言氣血盛則須美長今婦人無須豈無氣血乎衝脈任脈止生毫毛甲乙背作脊腹下無右字淡滲作滲灌張云胞者子宮是也此男女藏精之所皆得稱為子宮惟女子於此受孕因名曰胞然衝任督脈皆起於此所謂一原而三歧也衝任陰陽也故循腹右上行然左乳之下則有胃之大絡此正左陽右陰相配之妙也以其數脫血也甲乙作以其月水下數脫血任沖並傷故也張云數脫血謂血不留而月事以時下也衝任為血之海須為血之餘血不足則衝任之脈不榮於口而須不生矣士人有傷於陰止故須不生甲乙無士字馬雲士人有傷於陰器而陰器絶而不起亦不能復有所用其須之生者自若惟宮者陰器既傷而須獨不生帝之所以疑也伯言士人雖有傷於陰器其宗筋未嘗去而衝脈未嘗傷也彼宮者不然所以血一瀉而不復其所傷之處皮膚內結衝任之脈不榮於上之口唇故須焉得而生也張云陰不用者陽痿不舉也志云宗筋者前陰也簡案士人壯而傷其宗筋者其須猶不去宮者少小時去其勢故須不生勢陰丸也此言宗筋亦指陰丸絶而不起謂陰莖萎弱也天宦張云謂身為男子而終身無須若天生之宦官然故曰天宦志云天宦者謂之天閹不生前陰即有而小縮不挺不長不能與陰交而生子此先天所生之不足也簡案沈氏筆談云須屬腎稟水氣故下生男子腎氣外行上為須下為勢故女子宮者無勢則亦無須而眉發無異於男子則知不屬腎也此與本節之旨異也又輟耕録云世有男子雖娶婦而終身無嗣育者謂之天閹世俗則命之曰黃門晉海西公嘗有此疾北齊李庶生而天閹按黃帝針經云云大般若經載五種黃門云梵言扇半釋迦周禮閹人鄭注云閹真氣藏者李時珍本草人傀條五不男天犍漏怯變也天者陽痿不用古云天宦是也犍者陽勢閹去寺人是也漏者精寒不固常自遺漏也怯者舉而不強或見敵不興也變者體兼男女俗名二形若日月之光影止萬物之精張云日月有光見影可識音聲有應聞響可知惟聖人者能明物理之精故因此可以知彼因外可以知內也此其時然也志云此論人歸於天道而合於天之四時又無分手與足也簡案此一句馬張不釋難通夫人之常數止天之常數也馬雲按此又見素問血氣形志論本經九針論但厥陰常多血少氣太陰常多氣少血有不同耳大義當以素問為的百病始生篇第六十六夫百病之始生也止不可勝數張云百病始生無非外感內傷而復有上中下之分也喜怒不節五志病也內傷於臟故起於陰清濕襲虛陰邪之在表也故起於下風雨襲虛陽邪之在表也故起於上受病之始只此三部至其浸淫流泆則變有不可勝數矣先師張云先進之稱也風雨寒熱止分為三員甲乙相得作相搏肉堅作肉間員作真馬雲上文言風雨寒暑清濕而此曰風雨寒熱又曰疾風暴雨辭不同而均之為外感也然此諸外感者不得天之虛邪則不能傷人也虛邪見本經九宮八風等篇又不得之人之本虛亦不能傷人也此以天之虛人身形之虛兩虛相得所以諸邪得以客其形耳若天有實風九宮八風篇以從其所居之鄉來為實風主生長養萬物人有實氣則兩實相逢衆人肉堅必不客其形矣三員猶言三部也蓋人身大體自縱而言之則以上中下為三部自橫而言之則以在表在裡半表半裡為三部故謂之上下中外之三員也張云三員如下文虛邪之中人病因表也積聚之已成病因內也情欲之傷臟病在陰也即內外三部之謂志云此論風雨傷上下節論情濕傷下末節論喜怒傷中而分為三員也簡案據有一外字張注為是員數也故馬注為部是故止故皮膚痛甲乙抵作稍張云此下言陽邪傳舍之次也邪之中人必由表入里始於皮膚表虛則皮膚緩故邪得乘之邪在表則毛髮豎立因而淅然寒邪傷衛則血氣凝滯故皮膚為痛凡寒邪所襲之處必多痠痛察系何經則在陰在陽或深或淺從可知矣診表證者當先乎此也此下百病始生之義與皮部論大同留而不去止大經乃代甲乙其痛之時息作其病時痛時息張云邪在皮毛當治於外留而不去其入漸深則傳舍於絡脈絡淺於經故痛於肌肉之間若肌肉之痛時漸止息是邪將去絡而深大經代受之矣簡案馬以代為脈代中止之義非也志云大經者經隧也經隧者五臟六腑之大絡也蓋大經即經脈對絡而謂之大經志注恐誤留而不去止喜驚張云絡浮而淺經隱而深邪氣自絡入經猶為在表故灑淅惡寒然經氣連藏故又喜驚也留而不去止乃強甲乙四肢則肢節痛作四節即痛四字張云凡諸輸穴皆經氣聚會之處其所留止必在關節溪谷之間故邪氣自經傳舍於輸則六經為之不通而肢節腰脊為痛為強也留而不去止身痛張云伏沖之脈即衡脈之在脊者以其最深故曰伏沖歲露篇曰入脊內注於伏沖之脈是也邪自經輸留而不去深入於此故為體重身痛等病簡案伏沖之脈即瘧論伏膂之脈馬以伏膂之脈為下文所謂膂筋誤留而不去止溏出麋張云邪氣自經入臟則傳舍於腸胃而為奔向腹脹之病寒則澄徹清冷水穀不分故為腸鳴飧泄食不化熱則溺垢下注故為溏為麋以麋穢如泥也簡案麋糜古通用及麋爛也溏出麋蓋謂腸垢赤白滯下之屬張注似為麋鹿之屎恐非也馬則云麋者谷之不化也志同則與上文飧泄何別誤尤甚留而不去止息而成積馬雲募原之間者即皮裡膜外也張云腸胃之外募原之間謂皮裡膜外也是皆隱蔽曲折之所氣血不易流通若邪氣留著於中則止息成積如瘧痁之屬也志云募原者腸胃外之膏膜樓氏綱目從是故虛邪之中人也至舍於腸胃之外募原之間為一節注云以上數端皆邪氣襲虛留而不解去以次相傳未曾留著無有定所若留著而有定所則不能傳矣所謂留著者當如下文法云或著孫脈止不可勝論甲乙孫脈作孫絡志云伏沖者伏行於腹之衝脈募原者腸胃之脂膜也膂筋者附於脊膂之筋緩筋者循於腹內之筋也此數者在於腸胃之前後左右邪隨著而為積邪之淫溢不可勝數也簡案張云募原如手太陰中腑為募太淵為原之類也緩筋支別之柔筋也此說不可從志注為是蓋緩筋即宗筋也王氏痿論注云橫骨上下齊兩旁豎筋正宗筋也此可以證下文云其著於緩筋也似陽明之積乃與痿論衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋相符臂手止故時切痛甲乙臂手作擘乎注云擘音拍破盡也句作拘腸胃之間之間作外無水字䐜上有腹字無張字張云凡絡脈之細小者皆孫絡也句拘也邪著孫絡成積者其積能往來上下蓋積在大腸小腸之絡皆屬手經其絡浮而淺緩而不急不能句積而留止之故移行於腸胃之間若有水則湊滲注灌濯濯有聲若有寒則為脹滿及雷鳴相引時為切痛簡案臂手作擘於義易通其著於陽明之經止益小張云足陽明經挾臍下行故其為積則挾臍而居也陽明屬胃受水穀之氣故飽則大飢則小其著於緩筋也止飢則安張云緩筋在肌肉之間故似陽明之積飽則肉壅故痛肌則氣退故安志云緩筋者經於腹內之筋故有似乎陽明之積飽則脹故痛肌則止而安也其著於腸胃之募原也止飢則痛張云腸胃募原痛連緩筋飽則內充外舒故安飢則反是故痛志云募原者腸胃之膏膜飽則津液滲潤於外故安飢則乾躁故痛也其著於伏沖之脈者止如湯沃之狀張云伏沖義如前其上行者循背裡絡於督脈其下行者注少陰之大絡出於氣街循陰股內廉入膕中故揣按於腹舊作股今改則應手而動若起其手則熱氣上行於兩股間此邪著伏沖之驗也馬雲以手揣摸其積應手而動舉手則熱氣下於兩股間簡案舉痛論曰寒氣客於衝脈則脈不通則氣因之故喘動應手矣乃此之義也其著於膂筋止按之不得張云膂呂同脊骨也脊內之筋曰膂筋故在腸胃之後飢則腸空故積可見飽則腸滿蔽之故積不可見按之亦不可得也其著於輸之脈者止孔竅乾壅張云輸脈者所以通血氣若閉塞不通則津液干壅如此志云輸之脈者轉輸津液之脈臟腑之大絡也胃腑水穀之精從胃之大絡而注於臟腑之大絡從臟腑之大絡而出於皮膚故積著於輸之脈則脈道閉塞不通津液不下而皮毛之化竅乾塞也此邪氣之從外而內從上而下以成其積也此邪氣之從外入內從上下也張云此總結上文邪氣之起於陽者必自外而內從上而下也樓云此謂風雨襲陰之虛病起於上而積生也厥乃成積也甲乙厥下有止字張云此下言積之所以成也厥氣生足悗止日以成積甲乙二悗字作溢張云此言寒氣下逆之成積者厥氣逆氣也寒逆於下故生足悗謂肢節痛滯不便利也由脛寒而血氣凝澀則寒氣自下而上漸入腸胃腸胃寒則陽氣不化故為䐜脹而腸外汁沫迫聚不散則日以成積矣卒然多食飲止而積成矣張云此言食飲起居失節之成積者也卒然多食飲謂食不從緩多而暴也腸胃運化不及則汁溢膜外與血相傳乃成食積如嬰童痞疾之類是也又或起居用力過度致傷陰陽之絡以動其血瘀血得寒汁沫相聚於腸外乃成血積此必縱肆口腹及舉動不慎者多有之馬雲如陽經之絡脈受傷則血當外溢而為衄如陰經之絡脈受傷則血當內溢而去後有血志云陽絡者上行之絡脈陰絡者下行之脈絡卒然外中於寒止積皆成矣甲乙憂怒作憂恐六輸作穴輸蘊里作蘊裹澀滲作凝澀張云此言情志內傷而挾寒成積者也寒邪既中於外憂怒復傷其內氣因寒逆則六經之輸不通暖氣不行則陰血凝聚血因氣逆而成積此必情性乖戾者多有之也樓云此謂清濕襲陰之虛病起於下而成積也簡案甲乙六字裡字並誤憂思傷心止傷腎甲乙浴下有水字張云傷心者病在陽傷肺者病在氣傷肝者病在血傷脾者病在營衛傷腎者病在真陰凡傷臟者皆病生於陰也此節與下篇邪氣臟腑病形論者大同樓云此謂喜怒傷臟病起於陰也風雨襲陰之虛則病起於上而生積清濕襲陰之虛則病起於下而成積此內外三部皆受病其積方成矣毋逆天時馬雲如春氣在肝及月郭空滿之類皆是也行針篇第六十七王云針上用行字雲行雨施乎時行物生乎於此著想方得百姓志云百姓者天下之大衆倪仲玉云此篇論刺形故提二形字末結一形字髮針簡案下文云針入而氣逆乃知髮針即下針之謂熇熇高高甲乙作矯矯蒿蒿馬雲熇熇而有上炎之勢高高而無卑屈之心張云熇熇明盛貌高高不屈貌簡案詩大雅多將熇熇不可救藥傳熇熇然熾盛也熇音臛舉足善高志云足三陽之在下也陽氣滑盛而揚馬雲陽氣者衛氣也張云心肺為二陽之臟陽氣滑盛而揚故神易於動志云揚字含易散意多陽者止神不能先行也張云光明爽朗陽之德也沉滯抑鬱陰之性也故多陽則多喜多陰則多怒然數怒者頗有陰也易解者本乎陽也陽中有陰未免陽為陰纍故其離合難而神不能先行也馬雲蓋以陽中有陰則陽為陰滯初雖針入而與陽合又因陰滯而復相離其神氣不能易動而先針以行也志云心為陽中之太陽肝為陰中之少陽心主喜肝主怒心藏神肝藏魂魂隨神以往來者也神動而氣先行者神魂之相離也重陽而頗有陰者陰陽之相合也陰陽之離合難故神與魂合則其神不能先行矣上文曰氣先行此則曰神不能先行蓋氣行則神行神行則氣行神氣之相隨也夫行針者貴在得神取氣然而神有易動氣有易往是以數刺而病益甚者反傷其神氣也簡案陰陽之離合難諸說各異未知孰是蓋此陰陽離合論之離合乃開闔樞之義相逢張云相逢者針入氣即至言其應之速也其陰陽多止故獨行也張云陰性遲緩其氣內藏故陰多於陽者其針已出氣乃隨後而獨行也馬雲陰氣者營氣也陽氣者衛氣也下文同簡案馬注恐非此人之多陰止乃知也張云此亦陰滯故氣往為難往至也較之上節則此為更甚徐振公云此言陰中有陽之人數刺而始知也陰中有陽者多陰而少陽其氣沉而難於往來故數刺乃知此陰陽廝守於內也二節言多陰少陽之人有陰陽之相離者有相守者陰陽離合之道行針者不可不知針入而氣逆者簡案推上下文例者下似脫其數刺病益甚者七字其氣逆止無過焉張云逆從弗失何至氣逆補瀉得宜何以病益甚凡若此者乃醫之所敗所失非陰陽表裡形氣之過也上膈篇第六十八諸本無篇字氣為上膈者甲乙上膈下更有上膈二字馬雲此言膈證有上下之分而尤詳下膈之義也膈者膈膜也前齊鳩尾後齊十一椎所以遮隔濁氣不使上熏心肺也然有為膈上之病者乃氣使然食飲一入即時還出有為膈下之證者乃蟲使然食飲周時始復外出但帝明於上膈向昧於下膈張云晬時周時也愚按上膈下膈即隔食證也喜怒不適止邪氣居之甲乙二流字俱作留張云凡傷胃氣則陽虛而寒汁流於腸中蟲寒不行則聚於下管而腸胃充滿也衛氣脾氣也脾氣不能營運故邪得聚而居之人食則蟲上食止癰上皮熱甲乙即而作沉而其癰在外作其癰在脘外者並是張云癰壅同如論疾診尺篇曰目窠微癰者義亦猶此蟲寒聞食則喜而上求之上則邪氣居之而乘虛留聚以致癰於下脘要約不行故食入晬時復出也管之內外即言下脘也邪伏於中故熱見於皮肉之上微按其癰止谷乃下矣甲乙伍作互咸作酸乃下下有鬲字張云察其氣所必由以刺之也先淺刺其旁氣所及之處稍納其針而漸深之以泄其流行之邪然後還刺其所病之正穴以拔其積聚之本但宜至再三而止不可過也邪沉者深刺之邪浮者淺刺之刺後必尉以火而日使之熱則氣溫於內而邪自潰散也三相參為參五相伍為伍凡食息起居必參伍宜否守其禁以除內之再傷又必恬憺無為以養其氣則正氣乃行而邪氣庶乎可散蓋膈證最為難愈故當切戒如此咸從水化可以潤下軟堅苦從火化可以溫胃故皆能下谷也簡案甲乙以本篇為邪氣聚於下脘發內癰次篇以胃脘癰之診志注亦以癰如字釋之今據其有癰上皮熱及大癰乃潰等語而推之則似因內癰而膈食者蓋上文所謂上膈者巢源諸書所論五膈之屬病源五膈憂膈恚膈氣膈寒膈熱膈外臺集驗五膈憂膈氣膈食膈寒膈飲膈所謂下膈食晬時乃出邪氣臟腑病形篇云脾脈急甚為膈中食飲入而還出後沃沫今膈證不必如此蓋古該翻胃而謂之膈故虞摶云膈亦曰反胃豈本此歟再案食已而吐者龔氏回春謂之回食病即本經所謂膈中上膈也因蟲與癰者五膈等外別是一種之膈證也馬張癰讀為壅雖義稍通其旨趣終未明晰且張記治驗一則乃尋常膈證非本篇所載下膈證自別志以癰為內癰然注文亦糊塗故不可從也醫說引雞峰方云噎膈病乃神意間氣也勸令淨觀內外將一切用心力事委之他人服藥方見效即本節恬憺無為之旨也憂恚無言篇第六十九諸本無篇字馬雲人有憂與怒以無言蓋有其由故名篇何氣出行甲乙出作不是咽喉喉嚨張云人有二喉一軟一硬軟者居後是謂咽喉乃水穀之道通於六腑者也硬者居前是謂喉嚨為宗氣出入之道所以行呼吸通於五臟者也其在太陰陽明論則單以軟者為咽硬者為喉故曰喉主天氣咽主地氣會厭張云會厭者喉間之薄膜也周圍會合上連懸雍咽喉食息之道得以不亂者賴其遮厭故謂之會厭能開能闔聲由以出故謂之戶汪云氣喉之蔽以掩飲食使不錯入氣喉音聲之扇也志云如戶扉之開合故曰扇簡案說文扇扉也音聲之機也馬雲猶弩之有機懸壅垂張云懸而下垂俗謂之小舌當氣道之沖為喉間要會故謂之關頏顙張云頏頸也頏顙即頸中之喉顙當咽喉之上懸雍之後張口可見者也顙前有竅息通於鼻故為分氣之所泄志云頏顙者齶之上竅口鼻之氣及涕唾從此相通故為分氣之所泄謂氣之從此而分出於口鼻者也簡案根結篇張玉師注云頏顙者鼻之內竅通於喉嚨故頏顙不開則洞涕不收蓋頏顙諸注未詳唯志所釋為明備但考字書無其義疑是吭嗓吭嗓即咽喉之謂活人書釋頏顙者懸壅兩旁肉也未知何據橫骨張云即喉上之軟骨也下連心肺故為神氣所使上連舌本故主舉發舌機也鼻洞張云涕液流泄於鼻也頏顙之竅不開則清氣不行清氣不行則濁液聚而下出由於分氣之失職也簡案鼻洞即鼻淵千金方引氣厥論鼻淵作鼻洞頏顙不開甲乙開作閉張云頏顙之竅不開則清氣不行清氣不行則濁液聚而下出由於分氣之失職也疾薄甲乙無疾字是重言也甲乙也下有所謂吃者其言逆故重之十字張云重言言語蹇澀之謂志云口吃而期期也開闔不致張云不致不能也寒氣客於會厭則氣道不利既不能發揚而高又不能低抑而下開闔俱有不便故卒然失音志云厭不能發謂不能開也發不能下謂不能闔也兩瀉其血脈濁氣乃闢馬雲必兩次瀉其血脈則濁氣乃闢除矣張云兩瀉者兩足俱刺也足少陰之血脈當是所注之腧穴即太溪也然人有虛勞失音者觀此節之義則亦無非屬乎腎經但其所致有漸與此卒然者不同其治當分補瀉耳闢開也志云濁氣者寒水之濁氣闢除也兩瀉其血脈者謂脈道有兩歧一通氣於舌本一通精液於廉泉玉英蓋足少陰主藏先天之精氣而上通於空竅者也簡案兩瀉謂兩次瀉天突之穴經文義自分明馬注為是天突張云天突為陰維任脈之會取之能治暴喑
