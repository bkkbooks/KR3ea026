body:
  text: 卷三經別篇第十一諸本無篇字當刪五位志云五方之定位六律建陰陽諸經甲乙建作主持二字志云建立六陰六陽以合諸經十二辰十二節周禮硩簇氏十有二辰注辰謂從子至亥左傳成王九年浹辰之間注浹辰十二日也邪客篇云辰有十二人有足十趾莖垂以應之又云歲有十二月人有十二節又生氣通天論五臟十二節十二經水詳於經水篇十二時顧炎武日知錄云古無所謂時凡言時若堯典之四時左氏傳之三時桓公六年三時不害皆謂春夏秋冬也自漢以下曆法漸密於是以一日分為十二時蓋不知始於何人而至今遵用不廢離合出入奈何張云十二經脈已具前經脈篇但其上下離合內外出入之道猶有未備故此復明其詳然經脈篇以首尾循環言故上下起止有別此以離合言故但從四末始雖此略彼詳然義有不同所當參閱粗之所過上之所息也張云過猶經過謂忽略不察也息如止息謂必所留心也足太陽之正止皆為正也張云此膀胱與腎為表裡故其經脈相為一合也足太陽之正入膕中與少陰合而上行其別一道下尻五寸當承扶之次上入肛門內行腹中屬於膀胱散於腎循膂當心入散上出於項而復屬於本經太陽此內外同為一經也足少陰之正自膕中合於太陽內行上至腎當十四椎旁腎俞之次出屬帶脈其直者上系舌本復出於項合於太陽是為六合之一也然有表必有里有陽必有陰故諸陽之正必成於諸陰之別此皆正脈相為離合非旁通交會之謂也余仿此志云正者謂經脈之外別有正經非支絡也蓋從經而別行復屬於太陽之經脈故名經別謂經脈之別經也馬氏以正為正經宜與經脈篇之直行者相合別者為絡宜與經脈篇之其支者其別者相合噫經脈血氣之生始出入頭緒紛紜不易疏也甲乙無成以以下九字注云九墟曰或以諸陰之別者皆為正也足少陽之正止此為二合也張云此膽肝二經為表裡經脈相為一合也足少陽繞髀陽入毛際與足厥陰合其內行而別者乃自季脅入胸屬膽散之上肝由肝之上系貫心上挾咽自頤頷中圖翼云頷中為頤頷腮下也虎頭燕頷義即此出散於面上系目系復合少陽本經於目外眥瞳子髎也足厥陰之正別足跗內行上至陰毛之際合於足少陽與別者俱行上布脅肋是為六合之二也簡案肝上之上衍足陽明之正止此為三合也甲乙太陰之正下有則別二字結作絡舌中作舌本額䪼正脈道藏熊本張本並作頞䪼馬本志本作額顱張云此胃脾二經表裡相為一合也足陽明上至髀關其內行者由氣街入腹裡屬於胃散於脾上通於心循咽出於口上頞䪼入承泣之次系目系為目下綱以合陽明本經也足太陰之正上股內合於足陽明與別者俱行上咽貫舌是為六合之三也手太陽之正止此為四合也張云此小腸與心表裡經脈相為一合也指地者地屬陰居天之內手太陽內行之脈別於肩解入腋走心繫於小腸皆自上而下自外而內故曰指地經脈篇言交肩上入缺盆絡心此言別於肩解入腋走心蓋前後皆有入心之脈手少陰之正自腋下三寸足少陽淵腋之次行兩筋之間內屬於心與手太陽入腋走心者合乃上行挾於咽出於面合於目內眥是當與足太陽睛明相會矣此六合之四也手少陽之正止此為五合也張云此三焦心主表裡經脈相為一合也指天者天屬陽運於地之外手少陽之正上別於巔入缺盆下走三焦散於胸中包羅臟腑之外故曰指天手厥陰之正其別面內行者與少陰之脈同自腋下三寸足少陽淵腋之次入胸中屬於三焦乃出循喉嚨行耳後合手足少陽於完骨之下此六合之五也志云少陽初陽也從陽而生自下而上故曰指天曰指地者謂手合於足也曰指天者謂足合於手也蓋分手足於二經則為六合論陰陽之氣止三合矣簡案別下淵液三寸馬雲別於腋下之天池穴考本輸篇云腋下三寸手心主也名曰天池馬似是手陽明之正止此六合也道藏馬志本大腸作太陽誤也張云此大腸與肺為表裡經脈相為一合也手陽明之正循胸前膺乳之間其內行者別於肩髃入柱骨由缺盆下走大腸屬於肺其上者循喉嚨復出缺盆而合於陽明本經也手太陽之正其內行者自天府別入淵腋出手少陰心經之前入內走肺散之大腸其上行者出缺盆循喉嚨復合於手陽明經以上共十二經是為六合也經水篇第十二馬雲內論十二經脈合於十二經水故名篇簡案管子水地篇云水者地之血氣如筋脈之流通者也酈道元水經注引經脈志蓋其書志經水之流通者夫經水者止可得聞乎張云經水者受水而行於地也人之五臟者所以藏精神魂魄者也六腑者所以受水穀化其精微之氣而布揚於內外者也經脈猶江河也血猶水也江河受水而經營於天下經脈受血而運行於周身合經水之道以施治則其源流遠近固自不同而刺之淺深灸之壯數亦當有所辨也八尺之士簡案周禮考工記人長八尺又淮南天文訓人修八尺而周禮卿大夫國中七尺以及七十七尺謂二十又淮南修務訓吾生也有七尺之形則與考工記天文訓異荀子曷足以美七尺之軀哉又家語六七尺之體今據本經骨度篇人長其實七尺五寸而泛言其修或云七尺或云八尺舉其大概耳其死可解剖而視之簡案漢書王莽傳云翟義黨王孫慶捕得莽使大醫尚方與巧屠共刳剝之量度五臟以竹筳導其脈知所絡始云可以治病宋楊介存真圖歐希範五臟圖蓋其遺也而與本節之旨符矣其臟之堅脆止其常有合乎張云如臟之堅脆則見於本藏篇腑之大小谷之多少則見於平人絕谷篇脈之長短則見於脈度篇血之清濁則見於根結篇十二經血氣多少各有大數則見於血氣形志等篇此其針灸淺深多寡故各有所宜如下文也甲乙大數作定數足太陽外合於清水張云此下以經脈配經水蓋欲因其象以辨血氣之盛衰也馬雲按古今輿地圖清水遺籍無之黃河合淮處謂之清河今有清河懸疑是清水也張云按清水即大小清河輿地圖志曰大清河即濟水之故道自兗州府東北流出長清等縣由利津等界入海小清河一名灤水源發濟南府趵突泉經章丘受漯河之水由新城入海禹貢曰浮於濟漯達於河者必此河也今俱屬山東省濟南府簡案今考水經無清水王砯注離合真邪論引本節作涇水蓋古本有如此者書禹貢涇屬渭汭詩穀風涇以渭濁通水道焉志云肺屬天而主氣膀胱為津液之腑受氣化而出六腑皆濁而膀胱之水獨清故足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水張云足少陽經內屬於膽常少血多氣故外合於渭水按地誌渭水出隴西郡渭源縣西南鳥鼠山至同州入河今俱隸陝西省渭源屬臨洮府同州屬西安府也志云渭水獨清諸陽皆濁而膽為中精之腑獨受其清故足少陽外合於渭水內屬於膽簡案張注義未允當志云渭水獨清與古說乖矣以渭合膽必有別所據今不可得而考也下節諸水亦多不可解者足陽明外合於海水張云足陽明經內屬於胃常多氣多血為五臟六腑之海故外合於海水按海包地外地在海中海水周流實一而已今云四海者以東西南北而分言之也故東曰渤海南曰漲海西曰青海北曰瀚海足太陰外合於湖水志云湖水有五湖即洞庭彭澤震澤之類脾位中央而灌溉於四旁故足太陰外合於湖水而內屬於脾又云土數五故合五湖張云五湖皆在東南周禮職方氏楊州澤藪曰具區簡案湖水與五湖各異水經注湖水出桃林塞之夸父山又五湖謂長塘湖太湖射黃湖上湖滆湖足少陰外合於汝水張云足少陰經內屬於腎常少血多氣故外合於汝水按汝水源出汝州天息山出西平上蔡汝陽等縣入淮今屬河南省汝寧府足厥陰外合於澠水志云澠水出於青州之臨淄而西入於淮天下之水皆從東去澠水自東而來故應足厥陰東方之肝木簡案澠史音彌善切張音免志音成廣韻食陵切又泯湎二音集韻神陵切音繩手太陽外合淮水合下諸本有於字當補張云手太陽經內屬小腸常多血少氣故外合於淮水按淮水出唐州桐柏山繞徐揚之界東入於海今屬河南省南陽府改名唐縣水道出焉簡案膀胱通水道而小腸受盛胃之水液而濟泌於膀胱故二腑特言及之手少陽外合於漯水張云手少陽經內屬三焦常少血多氣故外合於漯水按渭水源出章丘長白山入小清河歸海今屬山東省濟南府漯音磊又太合切手陽明外合於江水張云手陽明經內屬大腸常多血多氣故外合於江水按江源出西蜀之岷山今屬四川省成都府茂州其長萬里至吳地入海此即所以限南北也手太陰外合於河水張云手太陰經內屬於肺常多氣少血肺為臟腑之蓋其經最高而朝百脈故外合於河水按河有兩源一出蔥嶺一出於闐合流東注滿昌海潛行地中南出積石以入中國一說黃河源出星宿海在中國西南直四川馬湖府之正西三千餘里雲南麗江府之西北一千五百餘里合諸流自西而東行二十日至崑崙繞崑崙之西南折而東北又折而西北又轉而東北又行二十餘日歷雲中九原至大寧始入中國是為四瀆之宗手少陰外合於濟水張云手少陰經內屬於心常少血多氣故外合於濟水按江源初發王屋山下曰沋水既見而伏復出為濟濟截河而流不混其清故又曰清濟流雖微而獨尊故居四瀆之一今屬河南省懷慶府濟源縣手心主外合於漳水張云手厥陰經內屬心主常多血少氣故外合於漳水按漳水有二一出上黨沽縣大黽谷曰清漳一出上黨長子縣發鳩山曰濁漳皆入於河今俱隸山西省沽縣即樂平縣屬太原府長子縣屬潞安府凡此五臟六腑止腰以下為地張云夫經水者河海行於外而源泉出於地經脈者脈絡行於表而臟腑主於中故內外相貫如環無端也然經水經脈各有陰陽之分如天以輕清在上故天為陽地以重濁在下故地為陰六微旨大論曰天樞之上天氣主之天樞之下地氣主之人身應天地故腰以上為天屬陽腰以下為地屬陰而經脈臟腑之應於經水者亦然故海以北止此一隅之陰陽也陽中之太陽甲乙作陽中之陽一隅作一州張云如海合於胃湖合於脾脾胃居於中州腰之分也海以北者為陰就胃腑言自胃而下則小腸膽與膀胱皆屬腑居胃之北而為陰也湖以北者為陰中之陰就脾臟言自脾而下則肝腎皆屬臟居脾之北而為陰中之陰也腰以上者如漳合於心主心主之上惟心與肺故漳以南者為陽也河合於肺肺之下亦惟心與心主故河以北至漳者為陽中之陰也凡此皆以上南下北言陰陽耳然更有其陽者則臟腑之外為三焦三焦之外為皮毛本藏篇曰肺合大腸大腸者皮其應今三焦合於漯水大腸合於江水故曰漯以南至江者為陽中之太陽也此天地人相合之道天地至廣而茲所言合者特舉中國之水耳故曰此一隅之陰陽也所以人與天地相參也簡案自海以北者至河以北至漳者則以上南下北言陰陽其義自明矣惟至漯以南至江者則以三焦大腸為陽中之太陽其義未詳張注似牽強志云河以北至漳者謂從上焦而後行於背也漯以南至江者謂從中焦而前行於腹也此以人之面南而背北也此說亦難據足陽明刺止留二呼甲乙陽明下有多血氣三字太陽下有多血氣刺四字少陽下有少血氣刺四字太陰下有多血少氣刺五字少陰下有少血多氣刺五字厥陰下有多血少氣刺五字張云此足六經之刺度也出氣曰呼入氣曰吸曰十呼七呼之類則吸在其中矣蓋一呼即一息也但刺有補瀉之異呼吸有先後之分故凡用瀉者必候病者之吸而入針再吸轉針候呼出針凡用補者必因其呼而入針再呼輔針俟吸出針故針賦曰補者先呼後吸瀉者先吸後呼正此義也後世令病人咳嗽以代呼收氣以代吸氣有出入亦與呼吸相同耳皆無過二分張云手之六經皆在於上肌肉薄而溪谷淺故刺不宜深經脈短而氣易泄故留不宜久肥瘦終始篇云刺肥人者以秋冬之齊刺瘦人者以春夏之齊撩之甲乙作料之史音云一本作以意料之馬雲撩料同張云撩音遼又上去二聲通俗文理亂謂之撩理簡案說文撩理也玉篇料理也知是二字音義並同灸之亦然止脫氣張云刺有淺深遲速之度灸有壯數大小之度刺有補瀉灸亦有補瀉凡以火補者毋吹其火以火瀉者疾吹其火血實氣壅病深肉厚者宜瀉陽衰氣怯元虛體弱者宜補背腹股髀道遠勢緩者宜大而多頭面臂臑羸弱幼小者宜小而少此其大法也設不知此而灸過其度非惟無益反以害之是惡火也故灸失其宜則骨枯脈澀刺失其宜則脫泄元氣均致人之夭殃矣膕之大小甲乙膕作䐃是可為度量乎馬雲度量俱去聲若夫度之人甲乙夫作失是與中度相反文脈貫穿痟瘦張云痟通作消切循捫按簡案切謂診寸口循謂循尺膚蓋經脈之大小膚之厚薄當寸尺度之如肉之堅脆䐃之大小非一一捫按不能知之故舉此四字以見其義因適而為之真也張云因其情適其宜必出於心應於手斯得病治之真訣矣志云適從也真正也是謂適其中而為度之正也簡案真猶知毒藥為真之真言因其各所適而為治法之真也經筋篇第十三馬雲各經皆有筋而筋又有病及各有治法故名篇張云凡十二經筋所起所行之次與十二經脈多相合其中有小異者乃其支別亦互相發明耳獨足之三陰則始同而終不同也所當並考愚按十二經脈之外而復有所謂經筋者何也蓋經脈營行表裡故出入臟腑以次相傳經筋聯綴百骸故維絡周身各有定位雖經筋所行之部多與經脈相同然其所結所盛之處則惟四肢溪谷之間為最以筋會於節也筋屬木其華在爪故十二經筋皆起於四肢指爪之間而後盛於輔骨結於肘腕繫於膝關聯於肌肉上與頸項終於頭面此人身經筋之大略也筋有剛柔剛者所以束骨柔者所以相維亦猶經之有略綱之有紀故手足項背直行附骨之筋皆堅大而胸腹頭面支別橫絡之筋皆柔細也但手足十二經之筋又各有不同者如手足三陽行於外其筋多剛手足三陰行於內其筋多柔而足三陰陽明之筋皆聚於陰器故曰前陰者宗筋之所聚此又筋之大會也然一身之筋又皆肝之所生故惟足厥陰之筋絡諸筋而肝曰罷極之本此經脈經筋之所以異也起於足小趾張云即足太陽經脈所止之處至陰穴次也邪上甲乙邪作斜馬雲邪斜同結於踵上循跟張云踵即足跟之突出者跟即踵上之硬筋處也乃僕參申脈之分其別者止與膕中並張云此即大筋之旁出者別為柔軟短筋亦猶木之有枝也後凡言別者支者皆仿此此支自外踝別行由足腨肚之下尖處行少陽之後結於腨之外側絡穴飛陽之分乃上膕內廉合大筋於委中而一之也上挾脊上項張云夾脊背分左右上項會於督脈之陶道大椎此皆附脊之剛筋也為目上網下結於頄張云網網維也所以約束目睫司開闔者也目下曰頄即顴也志云網當作綱簡案上網蓋謂睫上細筋網羅目窠者頄甲乙作鼻丸下同小指支跟腫痛簡案支字諸家不釋蓋支枝通謂小指枝梧於跟而腫痛下文支缺盆小指次指支並同紐痛說文紐系也楚辭注結束也燔針劫刺張云燔針燒針也劫刺因火氣而劫散寒邪也以知為數方言云南楚病愈者謂之瘥或謂之間或謂之知知通語也以痛為輔馬雲其所取之俞穴即痛處是也俗雲天應穴者名曰仲春痹張云足太陽之經應二月之氣也此與陰陽系日月篇義同但彼以左足右足分十二經以主十二月此以手六經足六經分主十二月蓋以辨陰陽盛衰之義也志云在外者皮膚為陽筋骨為陰病在陰者名曰痹痹者血氣留閉而為痛也卯者二月主左足之太陽故為仲春之痹蓋手足陰陽之筋應天之四時歲之十二月故其為病亦應時而生非由外感也足少陽之筋止結於膝外廉張云小趾次趾即第四趾竅陰之次也外踝丘墟之次脛外廉外丘陽交之次膝外廉陽陵泉陽關之次此皆剛筋也其支者止結於尻張云此支自外輔骨上走於髀分為二歧前結於陽明之伏兔後結於督脈之尻至此剛柔相制所以聯臀膝而運樞機也上乘䏚季脅張云季脅下兩旁軟處曰䏚五音篇曰少也蓋其處少骨之義支者止為外維張云此支者從顴上斜趨結於目外眥而為目之外維凡人能左右盻視者正以此筋為之伸縮也頸維筋急馬雲頸維之筋皆急張云維者牽繫之謂志云維筋左右之交維也簡案張注誤從左之右止命曰維筋相交張云從左之右則右目不開是右病由左也然則左目不開者病由於右可知矣角額角也並蹺脈而行者陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥故左絡於右傷左角之筋而右足不用則其從右之左者亦然蓋筋之維絡相交如此也孟春痹志云寅者正月之生陽也主左足之少陽故為孟春之痹起於中三指馬雲蓋厲兌穴起於次指而其筋則自次指以連三指張云即足之中趾厲兌之旁也循骭結於尻尻字道藏正脈熊馬志本並缺馬一本作缺盆案此因小注有缺字下一盆字者不可從甲乙樓氏綱目並作膝張仍之為是張云骭足脛骨也其直者自跗循骭結於膝下外廉三里之次聚於陰器張云上行聚於陰器陰陽總宗筋之會會於氣街而陽明為之長也太陽為目上網陽明為目下網張云太陽細筋散於目上故為目上網陽明細筋散於目下故為目下網論疾診尺云診目痛赤脈從上下者太陽病從下上者陽明病結於耳前張云其支者自頤頰間上結耳前會於足少陽之上關頷厭上至頭維而終也腳跳堅張云跳者跳動堅者堅強也卒口僻止故僻張云僻歪斜也其筋自缺盆上頸頰挾口上合於太陽太陽為目上網陽明為目下網故凡目之不合不開口之急縱歪僻者皆足陽明之筋病寒則急而熱則緩也志云蓋左筋急則口僻於左左筋緩則口僻於右也治之以馬膏止三拊而已甲乙炭作灰綱目同以坐作與坐並似是張云馬膏馬脂也其性味甘平柔潤能養筋治痹故可以膏其急者白酒辣桂性味辛溫能通經絡行血脈故可以塗其緩者桑之性平能利關節除風寒濕痹諸痛故以桑鉤鉤之者鉤正其口也復以生桑火炭置之地坎之中高下以坐等者欲其深淺適中便於坐而得其暖也然後以前膏熨其急頰且飲之美酒啖之美肉皆助血舒筋之法也雖不善飲亦自強之三拊而已言再三拊摩其患處則病自已矣簡案李時珍馬鬐膏鬐項上也發明載本法云靈樞無注本世多不知此方之妙竊謂口頰喎僻乃風中血脈也手足陽明之筋絡於口會太陽之筋絡於目寒則筋急而僻熱則筋緩而縱故左中寒則逼熱於右右中寒則逼熱於左寒者急而熱者緩也急者皮膚頑痹營衛凝滯治法急者緩之緩者急之故用馬膏之甘平柔緩以摩其急以潤其痹以通其血脈用桂酒之辛熱急束以塗其緩以和其營衛以通其經絡桑能治風痹通節竅也病在上者酒以行之甘以助之故飲美酒啖炙肉云樓氏綱目云以水調生桑灰於鉤柄之坎縫處連頰塗之以收其弛其桑鉤柄別線繫於肩後使勿走作也王子接古方選注云坎頰間之坎陷也以桑灰置之坎中務使高下厚薄相等也考坎字三說不同然張注於高下以坐等似為妥帖李杲脾胃論有清陽湯治口喎頰腮急緊乃為此證設焉當並考志云此治口頰喎僻之法也其轉筋㿉疝諸證治在燔針劫刺治在燔針劫刺樓氏云治在燔針之上當有其病轉筋者五字如足厥陰筋行水清陰氣之下所言也蓋燔針但宜施於筋寒轉筋之病其筋熱緩縱者則不宜也名曰季春痹張云足陽明正盛之經應三月之氣也志云辰者三月主左足之陽明故為季春之痹足太陰之筋止上結於內踝張云大指之端內側隱白也循覈骨而上結於內踝下商丘之次其直者絡於膝內輔骨張云絡當作結此自內踝直上結於膝內輔骨陰陵泉之次簡案有直者必有支者疑脫之循陰股結於髀張云股之內側曰陰股結於髀箕門之次也下引臍兩脅痛甲乙下作上是孟秋痹張云孟秋當作仲秋此與下文足少陰條謬誤當迭更之蓋足太陰之經應八月之氣也志云孟當作仲酉者八月主左足之太陰故為仲秋之痹起於小指之下止結於內輔之下甲乙下下有入足心三字張云起小指之下邪趨足心又邪趨內側上然谷並足太陰商丘之次走內踝之下結於跟踵之間與太陽之筋合由踵內側上行結於內輔骨下陰谷之次主癇瘛及痙張云癇癲癇也瘛牽急也痙堅強反張尤甚於瘛者也足少陰為天一之經真陰受傷故為此病在外者止不能仰張云在外者與太陽之筋合故不能俯在內者循脊內挾膂上至項故不能仰陽病者即在外者也陰病者即在內者也余伯榮云足少陰之筋與足太陽之筋上合於頸項此臟腑陰陽之氣交也病在外在陽者病太陽之氣故腰反折不能俯在內在陰者病少陰之氣故不能仰如傷寒病在太陽則有反折之痙強在少陰則蜷臥矣簡案小兒癇病有內釣外釣之別亦此理也熨引飲藥張云熨引所以舒筋飲藥所以養血所紐所諸本作折是也當改張云折紐者即轉筋之甚發日數病日甚者陰虧之極也故當死不治志云紐折者癇瘈強痙也如紐發頻數而甚者死不治仲秋痹張云仲秋誤也當作孟秋蓋足少陰為生陰之經應七月之氣也志云仲當作孟申者七月之生陰也主左足之少陰故為孟秋之痹足厥陰之筋止結於內踝之前張云大趾上三毛際大敦次也行跗上與足太陰之筋並行結於內踝前中封之次結於陰器張云陰器者合太陰厥陰陽明少陰之筋以及沖任督之脈皆聚於此故曰宗筋厥陰屬肝肝主筋故絡諸筋而一之以成健運之用治在行水清陰氣甲乙氣作器張云清理也此言當以藥治之在通行水臟而調陰氣蓋水則肝之母也志云厥陰之木氣本於水故治在行水以清厥陰之氣季秋痹張云足厥陰者陰盡之經也故應九月之氣志云戌者九月主右足之厥陰手太陽之筋止應小指之上張云手小指之上外側少澤穴也上行結於手腕外側腕骨陽谷之次上循臂內側結於肘下銳骨之後小海之次但於肘尖下兩骨罅中以指捺其筋則痠麻應於小指之上是其驗也後走腋後廉甲乙作從腋走後廉上繞臑外廉走太陽之前甲乙作出足太陽之筋前張云自腋下與足太陽之筋合走腋後廉上繞肩胛行肩外腧肩中腧循頸中天窗之分出走太陽經筋自缺盆出者之前同上結於耳後完骨之次也簡案張注為足太陽乃與甲乙符矣馬為手太陽誤痛應耳止乃得視甲乙得作能馬雲其頸痛應耳中鳴而痛其頸痛又引於頷而痛且其痛時目瞑良久乃得開視筋瘻頸瘇甲乙作筋痿頸腫諸本亦作頸腫但張本作瘇簡案瘇腫同足腫也後世為腫脹之腫非張云筋瘻頸腫即鼠瘰之屬復而銳之張云刺而腫不退者復刺之當用銳針即鑱針也本支者止以痛為輸甲乙無此四十一字與下節手少陽之筋文重當從甲乙刪之仲夏痹張云手太陽之經應五月之氣也手少陽之筋止結於腕上循臂上張本作中云小指次指之端無名指關衝之次也上結於手腕之陽池循臂外關支溝之次馬志腕字下句上上聲曲牙沈氏釋骨云齒左右勢轉微曲者曰曲牙簡案氣穴論云曲牙二穴謂地倉穴上乘頷結於角張云頷當作額蓋此筋自耳前行目外眥與三陽交會上出兩額之左右以結於額之上角也季夏痹張云手少陽之經應六月之氣也手陽明之筋止結於腕張云大指次指之端食指尖商陽之次也歷合谷結於腕上陽谿之次上左角絡頭下右頷張云此直者自頸出手太陽天窗天容之前行耳前上額左角絡頭以下右頷此舉左而言則右在其中亦如經脈之左之右右之左也故右行者亦上額右角交絡於頭下左頷以合於太陽少陽之筋簡案繆刺論邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角又虛里之動獨應於左則經筋之有偏於左者不可言無也張注難憑孟夏痹張云手陽明為兩陽合明之經故應四月之氣手太陰之筋止結於魚後甲乙魚下有際字張云手大指上少商之次也魚後魚際也散貫賁合賁下抵季脅甲乙合賁作合脅季脅作季肋是張云散貫於胃上口賁門之分與手厥陰之筋合下行抵季脅與足少陽厥陰之筋合也按四十四難七衝門者胃為賁門楊玄操云賁者膈也胃氣之所出胃出穀氣以傳於肺肺在膈上故胃為賁門詳此則經絡之行於三焦臟腑之列於五內其脈絡相貫之處在上焦則聯於咽喉中焦則聯於賁膈下焦則聯於二陰舍此三處無所連屬矣息賁馬雲本經邪氣臟腑病形篇有肺脈滑甚為息賁仲冬痹張云手太陰之經應十一月之氣也手心主之筋止結於肘內廉張云中指端中衝之次也循指入掌中至掌後大陵之次並手太陰之筋上結於肘中廉曲澤之次上臂陰止挾脅張云上臂陰天泉之次由曲腋間並太陰之筋結於腋下當天池之次下行前後布散挾脅聯於手太陰足少陽之筋結於臂張云臂當作賁蓋此支並太陰之筋入散胸中故同結於賁也志云臂當作賁賁葉臂散於胸中結於賁門故成息奔也支轉筋甲乙筋下有痛手心主四字孟冬痹張云手厥陰以兩陰交盡之經故應十月之氣手少陰之筋止結肘內廉張云小指內側少衝次也結於銳骨神門次也肘內廉少海次也循臂張云臂字亦當作賁蓋心主少陰之筋皆與太陰合於賁而下行也樓氏云臂當作胸心承伏梁下為肘網張云承承於下也伏梁堅伏之積也網如羅網之牽急也手少陰之筋起於小指內側結於銳骨上結肘內廉上入腋挾乳里結於胸中下繫於臍故在內則為內急為伏梁在外則為肘網及當其所過之處則為轉筋等病經筋之病止無用燔針張云此以下皆結上文經筋為病而總言之也馬雲寒急有陰陽之分背為陽陽急則反折腹為陰陰急則俯不伸故製為焠刺者正為寒也焠刺即燔針簡案張以陽急陰急為足太陽少陰非名曰季冬痹樓氏以此五字移前段唾血膿者死不治下張同雲手少陰之經應十二月之氣也此節舊在後無用燔針之下蓋誤次也今移正於此足之陽明止皆如上方也甲乙噼作僻馬雲噼僻同口僻之義此申言胃與小腸二經之筋其有病當治法如前也足之陽明胃經手之太陽小腸經其筋若急則口與目皆為喎噼其目眥亦急不能猝然視物治之者用燔針以劫刺之以知病為刺數以痛處為輸穴故曰治法如右方也前俱詳言而又申言之叮嚀之意也簡案志以上方為右喎之方誤甚骨度篇第十四諸本無篇字伯高曰止脈度定矣志云此言經脈之長短從骨節之大小廣狹長短而定其度數故曰骨為幹脈為營如藤蔓之營附於木干也眾人之度人長七尺五寸張云此言欲知脈度者必先求骨度以察其詳也眾人者眾人之常度也常人之長多以七尺五寸為率如經水篇岐伯云八尺之士周禮考工記亦曰人長八尺乃指偉人之度而言皆古黍尺數也黍尺一尺得今曲尺八寸志云長七尺五寸者上古適中之人也頭之大骨圍二尺六寸張云圍周圍也簡案頭骨於耳尖上周圍而度之胸圍張云此兼胸脅而言也缺盆之下兩乳之間為胸腰圍張云平臍周圍曰腰志云此胸骨腰骨圍轉一周之總數也簡案平臍周圍無骨此蓋謂腰髖骨之周圍發所覆者顱至項尺二寸馬雲此言仰人之骨度蓋縱而數之也顱頭顱也顱之皮生髮發所覆者即顱也張云發所覆者謂髮際也前髮際為額顱後髮際以下為項前自顱後至項長一尺二寸圖翼云如髮際不明則取眉心直上後至大杼骨折作一尺八寸發以下至頤馬雲頷下為頤髮際以下至頤長一尺男子終折男諸本作君當改甲乙作君子參折注云一作三又作終馬雲言士君子之面部三停齊等可以始中終而三折之也眾人未必然耳張云終終始也折折衷也言上文之約數雖如此然人有大小不同故君子當約其終始而因人以折衷之此雖指頭胸為言則下部亦然矣簡案據甲乙馬三停之解似是結喉以下至缺盆中張云舌根之下肺之上系屈曲外凸者為結喉膺上橫骨為巨骨巨骨上陷中為缺盆圖翼云即天突穴處缺盆以下止肺小張云𩩲𩨗一名鳩尾一名尾翳蔽心骨也缺盆之下鳩尾之上是為胸肺臟所居故胸大則肺亦大胸小則肺亦小也𩩲𩨗以下至天樞張云天樞在臍旁二寸足陽明經穴自𩩲𩨗之下臍之上是為中焦胃之所居故上腹長大者胃亦大上腹短小者胃亦小也圖翼云天樞足陽明穴名在臍旁此指平臍而言簡案至真要大論云半所謂天樞也王砯注身之半正謂臍中也天樞以下至橫骨張云橫骨陰毛中曲骨也自天樞下至橫骨是為下焦迴腸所居也故小腹長大者迴腸亦大小腹短狹者迴腸亦小也橫骨長六寸半止長一尺八寸張云橫骨橫長六寸半一曰七寸半廉隅際也內輔膝間內側大骨也亦曰輔骨三寸半張云此言輔骨之上下隅也內輔下廉下至內踝馬雲足跟前兩旁起骨為踝在外為外踝骨在內為內踝骨李時珍云踝足螺螄骨也志云內輔內踝者以足八字分立則內骨偏向於面也膝膕以下至跗屬圖翼云膕腿灣也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也故骨橫止不及張云凡上文所言皆中人之度其有大者過之小者不及也下文同法角以下至柱骨張云此下言側人之縱度也角頭側大骨耳上高角也柱骨肩骨之上頸項之根也行腋中不見者張云此自柱骨下通腋中隱伏不見之處季脅張云脅下盡處短小之肋是為季脅季小也髀樞張云足股曰髀髀上外側骨縫曰樞此運動之機也志云在臀之兩旁即足少陽之環跳穴處膝中張云言膝外側骨縫之次志云膝蓋骨內之中分京骨張云足太陽穴名在足小趾本節後大骨下赤白肉際陷中耳後當完骨張云此言耳後之橫度也耳後高骨曰完骨足少陽穴名入髮際四分左右相去廣九寸志云從耳以至於腦後也廣橫闊也耳前當耳門止廣六寸半張云此言仰人之橫度也耳門者即手太陽聽宮之分目下高骨為顴兩髀之間言兩股之中橫骨兩頭盡處也圖翼云橫骨兩頭之處俗名髀縫七寸甲乙作九寸半注云九墟作七寸肩至肘張云肩肩端也臂之中節曰肘肘至腕張云臂掌之節曰腕中指本節志云本節者指掌交接之骨節末者指尖也項發以下至背骨背甲乙作脊二寸半作三寸半馬雲此言伏人之骨度也張云項發項後髮際也背骨除項骨之外以第一節大椎骨為言也膂骨以下止分之七甲乙膂作脊四分分之一作四分分之七奇分之一張云膂骨脊骨也項脊骨共二十四椎內除項骨三節膂骨自大椎而下至尾骶計二十一節共長三尺上節各長一寸四分分之一即一寸四分一釐也故上之七節共長九寸八分七釐其有餘不盡之奇分皆在下部諸節也簡案本節詳論上七節之度數而不及八節以下考神應經云中七椎每椎一寸六分一釐十四椎與臍平共二尺一寸一分四釐圖翼作一尺一寸二分七釐是下七椎每椎一寸二分六釐圖翼云共八寸八分二釐總共二尺九寸九分六釐不足四釐者有零未盡也此眾人骨之度也簡案計其大概伏人八尺二寸五分仰人七尺五寸側人七尺一寸是故止多氣也甲乙氣下有乃經之長短五字張云此結首節而言因骨度以辨經絡乃可察其血氣之盛衰也簡案此一節與骨度不相涉疑是他篇錯簡五十營篇第十五諸本無篇字馬雲營者運也脈之營行有五十度故名篇天周二十八宿甲乙作周天簡案詳見衛氣行篇人氣行一周周甲乙作周樓氏云人氣行一周之下當有與十分身之八六字千八分之上當有宿字下當有人氣行五十周於身八字蓋天周二十八宿宿三十六分人氣行一周於身與十分身之八宿三百六十分人氣行一十八周於身宿千八分人氣行五十周於身也簡案樓說本於衛氣行篇千八分張云以周天二十八宿宿三十六分相因共得一千零八分人之脈氣晝夜運行一周亦合此數馬雲積而推之十宿得三百六十分二十宿得七百二十分八宿三八得二百四十分六八得四十八分共得一千八分日行二十八宿甲乙無此六字似是二十八脈馬雲十二經有十二脈而左右相同則為二十四脈加以陽蹺陰蹺督脈任脈共計二十八脈以應天之二十八宿以分晝夜之百刻也漏水下百刻日知錄云周禮絜壺氏注漏箭晝夜共百刻禮記樂記百度得數而有常注百度百刻也靈樞經漏水下百刻以分晝夜說文漏以銅受水刻箭晝夜百節隋書天文志昔黃帝創觀漏水製品取則以分晝夜其後因以命官周禮絜壺氏則其職也其法總以百刻分於晝夜氣行六尺日行二分氣甲乙作脈六尺下樓補二十七息氣行一丈六尺二寸十二字馬雲積至十息則其脈氣行六尺而天之日其行為七釐五毫按正文本云二分今細推之其所謂二分者誤也假如曰二分則百息當行二十分千息當行二百分萬息當行二千分加三千五百息又當行七百分原數止得一千八分今反多得一千六百九十二分想此經向無明注遂致誤傳未正今考其數當云日行七釐半則一萬三千五百息正合日行一千八分之數張云其日行之數當以每日千八分之數為實以一萬三千五百息為法除之則每十息日行止七釐四毫六絲六忽不盡此云日行二分者傳久之誤也二百七十息止日行二十五分甲乙二十五分作二十分有奇樓以五字為衍馬雲其下水計二刻日行二十分一釐二毫按正文曰二十五分者蓋誤寫一釐二毫為五分也張云凡一百三十五息水下一刻之度也人氣當半周於身脈行八丈一尺故二百七十息氣行於身一周水下當二刻日行當得二十分一釐六毫為正五百四十息止日行四十分甲乙分下有有奇二字馬雲下水四刻日行四十分二釐二毫正文缺二釐二毫張云氣行一周脈行三十二丈四尺日行當得四十分三釐二毫為正上文言二十五分者太多本節言四十分者太少此其所以有誤也二千七百息止五宿二十分甲乙二十五分作二十分有奇馬雲日行五宿二十一分六釐正文缺一分六釐自此以下當云五千四百息氣行二十周於身下水四十刻日行十一宿七分二釐又當云八千一百息氣行三十周於身下水六十刻日行十六宿二十八分八釐又當云一萬八百息氣行四十周於身下水八十刻日行二十二宿一十四分四釐皆盡脈終矣甲乙注王砯曰此略而言之也細言之則常以一千周加一分又十分分之六乃奇分盡也並行一數也張云此釋上文交通二字之義並行一數謂並二十八脈通行一周之數也凡行八百一十丈也甲乙凡上有氣字也下有一日一夜五十營以營五臟之精不應數者謂之狂生所謂五十營者五臟皆受氣也三十三字注云此段舊在經脈根結之末今移在此營氣篇第十六諸本無篇字營氣之道內谷為寶馬雲此言營氣之運行一如宗氣之所行也宗氣所行之次盡見於經脈篇此篇論營氣所行與宗氣無異辭雖不同而其次同也宗氣者大氣也大氣積於胸中出喉嚨司呼吸以行經隧始於手太陰肺經絡於肝經積至一萬三千五百息脈行八百一十丈如前篇五十營之所論者是也營氣者陰氣也由中焦之氣陽中有陰者隨中焦之氣以降於下焦而生此陰氣故謂之清者為營又謂之營氣出於中焦者是也然此營氣者必成於水穀所化精微之氣故曰營氣之道穀氣為寶非穀氣不能生此營氣非營氣不能生血也道者脈氣所由行之經隧也張云內納同谷不入則營氣衰故云內谷為寶精專者志云精專者中焦之汁即化而為赤布散之血流溢於下焦水火交濟而化赤者也故氣從太陰出甲乙出下有循臂內上廉五字張云此下言營氣運行之次即前十二經脈之序也至跗上注大指間馬上字接下句恐非抵髀甲乙髀作脾馬雲即陰陵泉血海箕門等穴俱在髀之內廉屬脾經穴簡案據下文注腎從腎注心外之例甲乙似是出䪼內甲乙注一作項內馬以內字接下句恐非馬雲目下為䪼顴髎等處從肝上注肺甲乙肺作膈入頏顙之竅志云頏顙鼻之內竅憂恚章曰人之鼻洞涕出不收者頏顙不開分氣氣失也究於畜門張云究深也畜門即喉屋上通鼻之竅門也如評熱病論啟玄子有云氣衝突於畜門而出於鼻即此謂也畜臭同許救切志云畜門鼻之外竅究終也簡案張所謂畜門即頏顙耳蓋頏顙者喉屋上通於鼻之竅門畜門者鼻孔中通於腦之門戶畜嗅同以鼻吸氣也亦作齅嗅並許救切上循腹裡入缺盆簡案據上文之例此下當有是任脈也四字然骨空論任督互稱以其為一源也故不別著任脈耶逆順之常也志云逆順者謂經脈內外之血氣交相逆順而行也馬雲或逆數或順數皆合常脈其運行之次無相失也張云前經脈篇未及任督而此始全備是十四經營氣之序樓氏全錄此篇末引東垣云十二經一脈也略為十二分而已脈度篇第十七諸本無篇字手之六陽張云手有三陽以左右言之則為六陽凡後六陰及足之六陰六陽皆仿此五六三丈六下甲乙有合字下文五六三丈六八四丈八六六三丈六尺並同簡案管子云伏戲作九九之數以合天道從足上至頭甲乙作從頭至足張云按手足十二經脈手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹此其起止之度今雲手之六陰從手至胸中蓋但計其丈尺之數俱以四末為始而言非謂其行度如此也後仿此蹺脈止合一丈五尺馬雲蹺脈有陽蹺陰蹺陽蹺自足申脈行於目陰蹺自足照海行於目然陽蹺左右相同陰蹺亦左右相同則蹺脈宜乎有四今曰二七一丈四尺二五一尺則止於二脈者何也觀本篇末云蹺脈有陰陽何脈當其數岐伯答曰男子數其陽女子數其陰則知男子之所數者左右陽蹺女子之所數者左右陰蹺也合一十六丈二尺潘氏醫燈續焰云據越人二十三難云脈數總長十六丈二尺任督二蹺在內其始從中焦注於手太陰終於足厥陰厥陰復還注手太陰所謂如環無端者不知二蹺任督從何處接入豈附行於足少陰太陽耶附則不能在循環注接之內當俟知者為孫盛而血者疾誅之甲乙孫下有絡孫絡之四字而下有有字張云凡人遍體細脈即皆膚腠之孫絡也絡脈有血而盛者不去之則壅而為患故當疾誅之誅除也飲藥以補之張云邪氣臟腑病形篇曰陰陽形氣俱不足勿取以針而調以甘藥即虛者飲藥以補之之謂閱於上七竅也簡案馬訓閱為通本於謝堅白三十七難注張云閱歷也五臟位次於內而氣達於外故云云漢文帝紀注閱猶更歷也又車千秋傳注閱經歷也五臟不和馬雲二句結上起下之辭陽氣太盛則陰不利三十七難及甲乙作邪在臟則陰脈不和下不利亦作不和並是不能榮也張云本經榮營通用不能榮謂陰陽乖亂不能營行彼此格拒不相通也故曰關三十七難關作格簡案六節藏象亦以陰盛為關故曰格三十七難格作關簡案六節藏象亦以陽盛為格終始禁服並同馬雲難經三十七難誤以六陰脈盛為格六陽脈盛為關致後世不曰脈體而指曰鬲症尤誤之誤也汪云按關格二字字面雖殊而意義則一難經雖顛倒疑無傷也如素問脈要精微論陰陽不相應病名曰關格是明以關格屬之病矣又仲景平脈篇下微本大者則為關格不通不得尿又曰趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格是仲景亦以關格為病證而二字之義內經與仲景均未嘗細分也又難經第三難曰關之前者陽之動也遂上魚為溢為外關內格此陰乘之脈也關以後者陰之動也遂入尺為覆為內關外格此陽乘之脈也是亦以溢覆言脈而以關格言病也今馬氏既訾難經復以仲景東垣丹溪為非是而指關格為脈體不亦並背內經乎又曰關為陽不得入格為陰不得出是兩脈共為一病矣於義亦難分也何氣榮水甲乙水作也馬雲人身氣血如水之流帝遂以蹺脈起止何氣營水為問簡案榮水不成義今從甲乙蹺脈者少陰之別樓氏云蹺脈始終獨言陰蹺而不及陽蹺者有脫簡張云繆刺論曰邪客於足陽蹺之脈刺外踝之下半寸所蓋陽蹺為太陽之別故二十八難曰陽蹺脈者起於跟中循外踝上行入風池陰蹺者亦起於跟中循內踝上行至咽喉交貫衝脈故陰蹺為足少陰之別起於照海陽蹺為足太陽之別起於申脈庶得其詳也濡目張云陰蹺陽蹺之氣並行回還而濡潤於目若蹺氣不榮則目不能合故寒熱病篇曰陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥陽氣盛則瞋目陰氣盛則瞑目此所以目之瞑與不瞑皆蹺脈為之主也氣獨行五臟張云帝以蹺脈為少陰之別因疑其氣獨行五臟不榮六腑也故有此問如水之流止外濡腠理張云如水之流如日月之行皆言不得無行也陰榮其臟指陰蹺也陽榮其腑指陽蹺也言無分臟腑蹺脈皆所必至也流者流於內溢者溢於外故曰流溢之氣內溉臟腑外濡腠理謂其不獨在臟也按此蹺脈之義陰出陽則交於足太陽陽入陰則交於足少陰陽盛則目張陰盛則目瞑似皆隨衛氣為言者故陰脈榮其臟陽脈榮其腑也簡案馬以陰脈陽脈為手足三陰三陽之義然考前後章之旨張注為得矣當數者樓氏云當數為當脈度一十六丈二尺之數也張云蹺脈陰陽之數男女各有所屬男屬陽當數其陽女屬陰當數其陰故男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡也營衛生會篇第十八諸本無篇字衛於焉會甲乙於焉作安從老壯張云五十以上為老二十以上為壯見營氣失常篇與曲禮所言異人受氣於谷止皆以受氣張云人之生由乎氣氣者所受於天與穀氣並而充身者也故穀食入胃化而為氣是為穀氣亦曰胃氣此氣由自中焦傳化於脾上歸於肺積於胸中氣海之間乃為宗氣宗氣之行以息往來通達三焦而五臟六腑皆以受氣是以胃為水穀血氣之海而人所受氣者又唯谷而已故谷不入半日則氣衰一日則氣少矣其清者止衛在脈外張云穀氣出於胃而氣有清濁之分清者水穀之精氣也濁者水穀之悍氣也諸家以上下焦言清濁者皆非清者屬陰其性精專故化生血脈而周行於經隨之中是為營氣濁者屬陽其性慓疾滑利故不循經絡而直達肌表充實於皮毛分肉之間是為衛氣然營氣衛氣無非資藉於宗氣故宗氣盛則營衛和宗氣衰則營衛弱矣營營運於中也衛護衛於外也脈者非氣非血其猶氣血之橐籥也營屬陰而主裡衛屬陽而主表故營在脈中衛在脈外衛氣篇曰其浮氣之不循經者為衛氣其精氣之行於經者為營氣正此之謂介按衛在脈外者謂衛氣上輸於肺走於臟腑外達皮毛以為護衛營血之作用故三十二難曰心者血肺者氣血為營氣為衛相隨上下謂之營衛通行經絡營周於外亦即此意也陽隴馬雲隴當作隆素問生氣通天論有日中而陽隆蓋古以隆隴通用張云隴盛也方以智通雅云陽隴陰隴子午之橋起關也猶言擁起為隴而過此漸平迤也莊子曰於是橋起簡案素離合真邪論經之動脈其至也亦時隴起義正同太陰主內太陽主外張云太陰手太陰也太陽足太陽也內言營氣外言衛氣營氣始於手太陰而復會於太陰故太陰主內衛氣始於足太陽而復會於太陽故太陽主外營氣周流十二經晝夜各二十五度衛氣晝則行陽夜則行陰亦各二十五度營衛各為五十度以分晝夜也夜半為陰隴止陰受氣矣張云夜半後為陰衰陽生於子也日西而陽衰陰生於午也如金匱真言論曰平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之即此節之義夜半而大會止與天地同紀張云大會言營衛陰陽之會也營衛之行表裡異度故嘗不相值惟於夜半子時陰氣已極陽氣將生營氣在陰衛氣亦在陰故萬民皆瞑而臥命曰合陰合陰者營衛皆歸於臟而會於天一之中也平旦陰盡而陽受氣故民皆張目而起此陰陽消息之道常如是無已而與天地同其紀所謂天地之紀者如天地日月各有所會之紀也晝瞑甲乙作夜寤晝精熊氏俗解難經四十六難注云精清爽也相搏甲乙搏作薄從來甲乙來作始營出於中焦衛出於下焦張云營氣者由谷入於胃中焦受氣取汁化其精微而上注於肺乃自手太陰始周行於經隨之中故營氣出於中焦衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間不入於脈故於平旦陰盡陽氣出於目循頭項下行始於足太陽膀胱經而行於陽分日西陽盡則始於足少陰腎經而行於陰分其氣自膀胱與腎由下而出故衛氣出於下焦又云衛氣屬陽乃出於下焦下者必升故其氣自下而上亦猶地氣上為云也營本屬陰乃自中焦而出於上焦上者必降故營氣自上而下亦猶天氣降為雨也雖衛主氣而在外然亦何嘗無血營主血而在內然亦何嘗無氣故營中未必無衛衛中未必無營但行於內者便謂之營行於外者便謂之衛此人身陰陽交感之道分之則二合之則一而已志云下當作上決氣篇曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣五味篇曰辛入於胃其氣走於上焦上焦者受氣而榮諸陽者也衛者陽明水穀之悍氣從上焦而出衛於表陽故曰衛出上焦簡案千金方三焦病論云榮出中焦衛出上焦榮者絡脈之氣道也衛者經脈之氣道也外臺引刪繁論亦同志注不可言無據也明理論引亦作上焦上焦出於胃上口止下足陽明千金及外臺引刪繁作胃上脘張云胃上口即上脘也咽為胃系水穀之道路也膈上曰胸中即膻中也其旁行者走兩腋出天池之次循手太陰肺經之分而還於手陽明其上行者至於舌其下行者交於足陽明以行於中下二焦凡此皆上焦之部分也志云按金匱要略曰若五臟元真通暢人即安和病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之文理也蓋三焦乃初陽之氣運行於上下通合於肌腠不入於經俞是以上焦之氣常與榮俱行陽二十五度行陰二十五度者與充膚熱肉之榮血間行於皮膚臟腑之文理也上焦出胃上口上貫膈布胸中走腋下至陽明上至舌此論上焦氣之所出與經脈之循臂肘上肩胛入缺盆出耳頰之不同也常與榮止大會於手太陰矣張云上焦者肺之所居宗氣之所聚營氣者隨宗氣以行於十四經脈之中故上焦之氣常與營氣俱行於陽二十五度陰亦二十五度陽陰者言晝夜也晝夜周行五十度至次日寅時復會於手太陰肺經是為一周然則營氣雖出於中焦而施化則由於上焦也馬雲難經營字下誤多一衛字簡案千金及外臺引刪繁並有衛字蓋據難經矣其不循衛氣之道而出何也張云衛氣之道晝行於陽夜行於陰有常度也今有熟飲食者方入於胃其氣之留行未定而汗輒外泄出無方所是不循衛氣之道也故以為問此外傷於風止命曰漏泄張云風為陽邪有外熱也熱食氣悍因內熱也熱之所聚則開發腠理所以毛蒸理泄而衛氣走之故不循其常道也此即熱食之氣也出不由度故曰漏泄志云衛氣者水穀之悍氣其性慓悍滑疾如腠理不密即見開而出簡案志以此氣為衛氣是外臺引刪繁載療上焦實熱飲食下胃其氣未定汗出而背身中皆熱名曰漏氣通脈瀉熱澤瀉湯澤瀉生地骨皮甘草半夏石膏柴胡茯苓生薑竹葉人參桂心蓮心右十二味即為此證所立也中焦亦並胃中出上焦之後千金及外臺引刪繁作其氣起於胃中脘在上焦之後甲乙巢源作胃口此所受氣者止命曰營氣者下千金有主化水穀之味六字甲乙無肺脈之脈字張云胃中中脘之分也後下也受氣者受穀食之氣也五穀入胃其糟粕津液宗氣分為三隧以注於三焦而中焦者泌糟粕蒸津液受氣取汁變化而赤是謂血以奉生身而行於經隧是為營氣故曰營出中焦按下文云下焦者別迴腸注膀胱然則自膈膜之下至臍上一寸水分穴之上皆中焦之部分也隧音遂伏道也簡案泌說文俠流也奉俸古通養也故馬雲凡心中所生之血賴此營氣而化以奉養生活之身夫血之與氣止無兩生張云營衛之氣雖分清濁然皆水穀之精華故曰榮衛者精氣也血由化而赤莫測其妙故曰血者神氣也然血化於液液化於氣是血之與氣本為同類而血之為汗亦非兩種但血主營為陰為里汗屬衛為陽為表一表一里無可並攻故奪血者無取其汗奪汗者無取其血若表裡俱奪則不脫於陰必脫於陽脫陽亦死脫陰亦死故曰人生有兩死然而人之生也陰陽之氣皆不可無未有孤陽能生者亦未有孤陰能生者故曰無兩生也志云營衛者水穀之精氣也血者中焦之精汁奉心神而化赤神氣之所化也血與營衛皆生於精故異名而同類也簡案外臺引刪繁論云夫血與氣異形而同類衛是精氣營是神氣故血與氣異形而同類焉奪血無汗此是神氣奪汗無血此是精氣故人有一死而無再生也千金再作兩字視之正文覺稍明備下焦者止滲入膀胱焉張云迴腸大腸也濟泲同猶釃濾也字典濟古文作泲釀酒也泌如狹流也別汁分別清濁也別迴腸者謂水穀並居於胃中傳化於小腸當臍上一寸水分穴處糟粕由此別行迴腸從後而出津液由此別滲膀胱從前而出膀胱無上口故云滲入凡自水分穴而下皆下焦之部分也按三十一難曰下焦者當膀胱上口主分別清濁其言上口者以滲入之處為言非真謂有口也如果有口則不言滲入矣何後世不解其意而爭言膀胱有上口其謬為甚志云迴腸大腸也有九回因以為名簡案外臺引刪繁論云下焦如瀆起胃下管別迴腸注於膀胱而滲入焉故水穀常並居於胃中成糟粕而俱下於大腸主足陽明千金作足太陽灌滲津液合膀胱主出不主入別於清濁亦本節之義也但本節似脫起胃下管三十一難云下焦者當膀胱上口主分清濁亦可以見耳介按唐容川曰近說膀胱有上口無下口非也內經明言下焦當膀胱上口近人不知三焦實有其物焦古作膲即人身之油膜西醫名為連網乃行水之路道內經所謂三焦者決瀆之官水道出焉蓋水之路道全在三焦油膜之中凡人飲水入胃胃之通體有微絲管將水散出走入油膜其能散者肺氣布之也故肺為水之上源水散入油膜走入膀胱其水未散盡者至小腸中又有微絲管將水散出走下焦以入膀胱膀胱上口即在下焦連網之中此皆下行之水未化為氣者也黃帝曰人飲酒止液出焉馬雲此言酒之所以先穀氣而出也承上文有滲膀胱之語故遂以酒之先谷而下者問之正以酒為熟谷之液其氣至悍而清故雖後谷而入必先谷而下也熟者腐也上焦如霧止此之謂也張云如霧者氣浮於上也言宗氣積於胸中司呼吸而布濩於經隧之間如天之霧故曰上焦如霧也漚者水上之泡水得氣而不沉者也言營血化於中焦隨氣流行以奉生身如漚處浮沉之間故曰中焦如漚也瀆者水所注泄言下焦主出而不納逝而不反故曰下焦如瀆也然而肺象天而居上故司霧之化脾象地而在中故司漚之化大腸膀胱象江河淮泗而在下故司川瀆之化也千金及外臺引刪繁論云上焦如霧霧者霏霏起上也中焦如漚漚者在胃中如漚也下焦如瀆瀆者如溝水決泄也白虎通引禮運記云三焦者包絡腑也水穀之道路氣之所終始也故上焦如竅中焦如編下焦如瀆俞氏續醫說詳解之當考參張氏質疑錄載三焦有三三焦之論云靈樞云上焦如霧中焦如漚下焦如瀆此三焦為一氣之所主故三十一難因之曰上焦在胃上口主內而不出其治在膻中中焦在胃中脘主腐熟水穀其治在臍旁下焦在臍下主分別清濁出而不內此三焦者即靈樞所謂如霧如漚如瀆之三焦也故難經又繼言之三焦為水穀之道路氣之所以終始三焦者原氣之別使原氣在兩腎中間之動氣為人之生命十二經之根本主通行三氣經歷於五臟六腑此所謂三焦者屬之於氣正王叔和所謂有名無狀之三焦也四時氣篇第十九諸本無篇字為定甲乙定作實下同春取經馬雲經當作絡義見素問水熱穴論張云春取經即本輸篇大經分肉之間也夏取盛經孫絡馬雲水熱穴論云夏取盛經分腠又曰絕膚而病去者邪居淺也蓋言夏氣在表故病在表止於皮膚絕而不深入以刺之正以邪之所居為甚淺也又曰所謂盛經者陽經也則止取手足六陽經之經穴耳取之合馬雲水熱穴論曰取合以虛陽邪則知是六陽經之合穴也冬取井滎馬雲水熱穴論云取井以瀉陰逆則陰經當刺井穴如手太陰肺經少商為井之類取滎以實陽氣則陽經當刺滎穴如手陽明大腸經二間為滎之類溫瘧素瘧論云先傷於風而後傷於寒故先熱而後寒也亦以時作故曰溫瘧五十九刺詳後熱病篇刺諸本作痏唯張作刺風㽷膚脹馬雲㽷即水以水為疾故加以疾之首風水見素奇病論水熱穴論評熱論本經論疾診尺篇膚脹者即本經水脹論之所謂膚脹也簡案外臺引肘後方云療卒大腹㽷病諸方此病本由水來應水字而經方皆水為病故施疾狀此乃與馬說符矣吳音水病貌集韻貳類切音稅腫病並非五十七痏詳見素水熱穴論三陰之上甲乙之作交馬雲補三陰之上者補三陰交乃足三陰血氣之所交宜補之因有二穴故用二補字及有一皆字張志同熱行馬雲候針下熱行乃止針張云陽氣至而熱行熱行則泄止矣轉筋於陽止卒刺之馬雲卒猝同凡手足之外廉皆屬陽經若轉筋於陽則治其陽經凡手足之內廉皆屬陰經若轉筋於陰則治其陰經皆當猝然刺之張云卒病也故不必拘於時日但隨其病而卒刺之志云卒猝同淬刺者燒針劫刺以取筋痹簡案樓氏綱目亦作淬蓋本於經筋篇亦當備一說徒㽷張云徒但也有水無風故曰徒水簡案馬雲徒但也上文言風水者有風有水也此曰徒水則有風無水也若無水則下文何得云㽷盡乃止必是字之誤志云徒眾也土為中央之灌溉於四旁土氣虛則四方之眾水反乘侮其土而為水病也此解尤為牽強環谷馬雲按各經無環谷穴止足少陽膽經有環跳穴今曰下三寸意者風市穴乎理亦甚的張同志云環谷者取手足之分肉以瀉其水也溪谷有三百六十五穴會肉之大會為谷大會者手足股肱之大肉也簡案據志注則三寸二字竟不穩妥筩馬雲筩直也已刺而直其針以納之張云筒箭室也已刺而筒之而內之入而復之以盡其㽷謂用針如箭之歸筒出入頻復開通其道以盡其水也志云筩筒也以如筒之針而內之入而復出簡案筒之義諸注未明九針論圓針筒其身如是筩筒同又樓氏綱目載本節文云筒針針中有空竅如筒出水也今據志以筒釋之蓋此似言以筒納針孔內使水自筒中泄出者世有用此術得效者然不可妄施張云針要曰凡水氣惟得針水溝若針余穴水盡即死是又不可不知也必堅來緩則煩俯來急則安靜馬雲必欲盡去其水水力盡時其肉必堅且水來緩則內必煩悶來急則內必安靜張云㽷在膚中其候必堅志云水腫於肌肉則浮而軟水盡則肉必堅矣余與馬同簡案徒㽷以下其義未詳甲乙文有異同然亦未明晰錄左備考甲乙云徒水先取環谷下三寸以排針刺之而藏之引而內之入而復出以盡其水必堅束之束緩則煩悶束急則安靜飲閉藥馬雲必飲通閉之藥以利其水防其再腫志云謂水乃盡當飲充實脾土之藥勿使水之復乘也簡案馬為是方飲無食止百三十五日張云藥食不宜相混混則難於取效水腫既消當忌傷脾發濕等物至一百三十五日之外方保其不復矣著痹不去張云痹論云濕氣勝者為著痹謂其重著難動故云不去若寒濕相搏久而不已當猝取足陽明之三里穴溫補胃氣則寒濕散而痹可愈也沈亮宸曰溪谷屬骨此承上文肌腠未盡之水流於關節則為著痹故取陽明之三里從腑以瀉臟也骨為幹馬雲此句與上下文不相蒙意者乃經脈篇之說簡歟沈亮宸云此承上文而言骨之為病在骨之髓節也乾者如木干之堅勁是故溫瘧之邪藏於骨髓濕痹之氣流於關節其骨如干而不受邪之所傷簡案今仍馬注腸中不便張云小腸不便者不能化物大腸不便者不能傳道大腸小腸皆屬於胃故當取足陽明之三里穴邪氣盛則瀉之正氣虛則補之癘風者止無食他食甲乙素作索銳針針三字作吮一字惡氣之氣作血馬雲癘癩同此言刺厲風之法也按素問風論云癘者有營衛熱腑其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風骨空論長刺節論皆謂之大風也張云食得其法謂之方食無食他食忌動風發毒等物也介按癘風即癩病又名麻風屬於慢性傳染病故凡傳染之後要過數年方才顯露其病狀則遍體麻木不仁甚至四肢周身逐漸毀滅先由手指繼而足趾終至鼻柱均現毀壞面上狀若頑癬搔破則流稠水其未破之處皮膚片片脫落奇癢難當此病可分二種如面部臀部四肢等處俱發紅色結節繼即潰穿後且知覺麻痹毛竅脫落容貌奇醜者斑紋癩也如初則神經過敏發神經痛後則知覺漸次脫失營養障害神經肥厚面部麻痹者神經癩也腹中常鳴氣上衝胸止三里甲乙常作雷上作常志云此邪在大腸而為病也大腸為傳導之官病則其氣反逆是以腹中常鳴氣上衝胸張云九針十二原篇曰肓之原出於脖胦即任脈之下氣海也巨虛上廉三里皆足陽明經穴按本輸篇曰大腸屬上廉此以邪在大腸故當刺巨虛上廉若下文之邪在小腸者則當取巨虛下廉也小腸控睪止以調之甲乙熏肝下有肺字簡案據下文刺太陰甲乙似是沈亮宸云控睪引腰脊上衝心者小腸之疝氣也張云控引也睪陰丸也小腸連於小腹若其邪盛則厥逆自下上衝心肺熏於肝胃引於腰脊下及肓臍睪系之間也取肓原以散之散臍腹之結也刺太陰以予之補肺經之虛也取厥陰以下之瀉肝經之實也取巨虛下廉以去之求小腸之所屬也按其所過之經謂察其邪之所在以調之也長太息志云膽氣欲升故長太息以伸之憺憺張云心虛貌簡案馬釋為靜誤嘔苦甲乙千金苦下有汁字則刺少陽血絡馬雲則當作側膽之經絡在肋之後旁故曰側張云又刺足少陽血絡以平其木千金無則字閉膽逆馬雲閉者止也孟子云陳善閉邪朱注云閉止也在上脘則刺止去之馬雲則側同胃脘上下脘之總名如在上脘臥針刺之當抑而下之即本經上膈篇之所謂氣為上膈故治之者如此如在下脘則刺下脘當散而去之即上膈篇之所謂蟲為下膈故治之者如此張云刺抑而下之謂刺上脘以瀉其至高之食氣散而去之謂溫下脘以散其停積之寒滯也邪在三焦約止取三里志云此邪在膀胱而為病也三焦下俞出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺小腹腫痛不得小便邪在三焦約也故當取足太陽之大絡即取大絡之委陽大絡經脈也小絡孫絡也足太陽厥陰之絡交絡於跗膕之間視其結而血者去之蓋肝主疏泄結在厥陰之絡亦不得小便矣如小腹腫上及胃脘取足三里聖濟總錄云黃帝三部針灸經言少腹腫痛不得小便邪在三焦病名曰三焦約營衛不調風邪入客則決瀆之官約而不通所以不得大小便也刺法取足少陰太陽之經輔以湯劑則三焦疏導清濁判矣方載枳殼丸等六首方中多用大黃牽牛郁李之類簡案本節三焦即指膀胱上文列六腑之病而不及膀胱知是三焦為膀胱明矣千金云三焦名中清之腑別號玉海水道出屬膀胱是也詳見素問識靈蘭秘典注蓋約即脾約之約而喬世寧校本千金以約字屬下句亦似有理張云太陽大絡飛陽穴也考甲乙委陽三焦下輔俞也在足太陽之前少陽之後云云此足太陽之別絡也則志注為是睹其色察其目以知其散復諸本無目字但張本有焉馬雲以為也論語云視其所以志云察其以者察其所以然之病簡案張補目字據九針十二原小針解今從之一其形馬雲曰一者肥瘦各相等否志云靜守其神形與俱也病將下張云下退也諸經實者病三日已張云凡邪氣未解者最忌脈弱無力如平人氣象論曰病在中脈虛玉機真藏論曰病在外脈不實堅者皆難治邪客篇曰虛而細者久以持皆不實之謂也若病在諸經而脈實有力者邪將外達也故可三日而已矣氣口候陰人迎候陽也張云氣口在手太陰肺脈也氣口獨為五臟主故以候陰人迎在頭陽明胃脈也胃為六腑之大源故以候陽五邪篇第二十諸本無篇字馬雲內論五臟之邪故名篇上氣喘汗出志云上氣喘者肺氣逆也膺中外腧馬雲雲門中府等穴背三節五藏之旁藏張本作節馬雲背三節旁之肺俞及五椎旁之心俞穴志云乃肺俞旁之魄戶也簡案甲乙作背三椎之旁乃謂肺俞甲乙為是原注顴字當作顀史音顀音椎可證按之快然張云覺快爽者即其真穴取之缺盆中以越之張云缺盆足陽明經穴也手太陰之脈上出於此故當取之以散越肺邪但忌大深令人逆息志云缺盆中者手陽明經之扶突蓋從腑以越陰臟之邪邪在肝止時腳腫張云兩脅中痛肝之經也寒中水乘脾胃也惡血在內肝所主也行善牽掣其關節肝主筋而邪居之也肝經自足大趾上行內踝故時為腳腫甲乙掣作瘈簡案掣縱又作瘈瘲知二字義同取耳間青脈以去其掣甲乙掣作瘈張云足少陽經循耳前後足厥陰主諸筋而與少陽為表裡故取耳間青脈可以去掣節志云耳間青脈一名雞足青簡案甲乙瘈脈一名資脈在耳本後雞足青絡脈蓋謂此穴陽氣有餘陰氣不足簡案諸注以陰陽分說脾胃恐非陰痹馬雲陰痹者痛無定所按之而不可得即痹論之所謂以寒勝者為痛痹也後世以為白虎歷節風又曰痛風志云在外者筋骨為陰病在陰者名曰痹陰痹者病在骨也按之而不得者邪在骨髓也簡案至真要大論云陰痹者按之不得即是肩背頸項痛時眩馬雲此皆膀胱經脈所行以腎與膀胱為表裡也且時時眩暈亦兼膀胱與腎邪也喜悲馬雲本神篇曰心氣虛則悲然實則亦然調之其輸也馬雲邪客篇曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在心者皆在心之包絡包絡者心主之脈也故獨無腧焉其外經病而內不病故獨取其經於掌後銳骨之端寒熱病篇第二十一諸本無篇字馬雲篇內所謂諸證不止寒熱然首節所論在寒熱故名篇但此寒熱主外感言與瘰癧之寒熱不同不可附席張云邪在外故畏於近席鼻槁臘馬雲鼻孔枯臘臘者干也取三陽之絡馬雲當取足太陽膀胱經之絡穴飛揚以瀉之蓋太陽為三陽也取三陽於下馬雲不言穴者必俱是絡穴病無所安止死不治病甲乙作痛張云陰騰者必躁故無所安也陰傷則液脫故汗注不休也齒者骨之餘若齒未稿者陰氣尚充獨為可治當取足少陰之絡穴大鐘以刺之若齒有枯色則陰氣竭矣其死無疑近以愚見則不獨在齒凡爪枯者亦危候也骨寒而厥者皆然簡案馬以從皮寒熱至骨寒熱為從淺而及深遂至死之證恐非也又考文例不及脈寒熱筋寒熱者豈其脫漏乎骨厥志云謂腎臟為病而腎氣厥熱也簡案足少陰之病為骨厥者經脈篇骨痹止補之張云骨痹者病在陰分也支節不用而痛汗注煩心者亦病在陰分也真陰不足則邪氣得留於其間故當取三陰之經察病所在而補之按五邪篇曰邪在腎則病骨痛陰痹取之湧泉崑崙視見血者盡取之與此互有發明所當參閱簡案舉合也謂支節盡痛馬雲骨痹已成節不能舉而痛非也馬又依一本改陰作陽志仍之亦非身有所傷止關元也懈惰甲乙作解㑊馬雲身有所傷出血已多而傷處中於風寒此證近於後世之所謂破傷風或有所墜墮不必身傷出血也四肢懈惰其名曰體惰當取小腹臍下三結交之穴以刺之蓋本經為任脈而足陽明胃足太陰脾經之脈亦結於此故謂之三結交也即臍下三寸之關元穴耳簡案張亦云破傷風之屬此恐不然甲乙云關元足三陰任脈之會故曰三結交厥痹者止補陰經也張云厥必起於四肢厥而兼痹其氣上及於腹者當取足太陰之絡穴公孫足陽明之絡穴豐隆以腹與四肢治在脾胃也然必視其主病者或陰或陽而取之陽明多實故宜瀉太陰多虛故宜補簡案馬至名曰天府為一節併為治厥痹之穴恐非頸側之動脈人迎張云頸前中行任脈也二行動脈即足陽明之人迎穴嬰筋張云說文曰嬰頸飾也故頸側之筋曰嬰筋通評虛實論癰疽不知所刺纓脈王注云纓脈亦足陽明脈也近纓之脈故曰纓脈纓謂冠帶也扶突張云在頸之第三行足少陽脈馬雲當作手少陽觀前本輸篇第十三節雲手少陽也名曰天牖六次脈可證張同天牖張云在頸之第六行天柱張云在頸之第七行臂太陰張云即手太陰也以上五穴本輸篇言之尤詳即所以治下文之病者也陽迎頭痛甲乙迎作逆張云迎逆也陽邪逆於陽經而為頭痛胸滿者當取之人迎也簡案張本於樓氏綱目馬改陽明誤暴喑氣硬甲乙鞕作硬張云喑聲瘂不能言也氣硬喉舌強硬也凡言暴者皆一時之氣逆非宿病也馬雲硬當作梗志云硬梗同簡案今從張注暴聾氣蒙張云經氣矇蔽而耳目暴有不明者當取天牖暴攣癇眩足不任身甲乙足下有痛欲折三字馬雲暴攣者拘攣也暴癇者癲癇也暴眩者眩暈也合三證而足不任身當取天柱暴癉內逆甲乙癉作痹馬雲暴時大熱而在內氣逆乃肝肺兩經之火邪相為搏擊以致血溢於鼻口張云癉熱病也志云癉消癉暴癉暴渴也肝脈貫肺故手太陰之氣逆則肝肺相搏肺主氣而肝主血氣逆於中則血亦留聚而上溢矣肺乃水之生原搏則津液不生而暴癉矣皆當取手太陰之天府以疏其搏逆夫暴疾一時之厥證也此因於氣厥故用數暴字簡案志暴渴之解不可從此為大牖五部甲乙作此為胃之大腧五部也馬雲大當作天此句總結上文五節其穴為天牖五部也曰天牖五部者舉一穴以統五穴耳猶後世立湯藥之方舉一品以概眾品也張云以天牖居中統前後上下而言也志云牖窗也頭面之穴竅如樓閣之大牖所以通氣者也簡案志注尤牽強臂陽明止不惡寒瀉之馬雲臂陽明即手陽明大腸經也以其脈行於臂故不稱曰手而曰臂也手陽明之脈其支者從缺盆上頸循天鼎扶突上貫於頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔循和髎迎香以交於足陽明故曰臂陽明有入頄遍齒者其名曰大迎正以大迎出足陽明穴而手陽明之脈則入而交之也齒有痛病謂之齲故下齒病齲者當取此臂陽明之穴商陽二間三間皆治痛齒如惡寒飲者虛也宜補之不惡寒飲者實也宜瀉之張云頄音求顴也但臂惡寒者多虛故宜補不惡寒者多實故宜瀉簡案馬以臂字接上句似是然以惡寒為惡寒飲亦未允妥足太陽止出鼻外甲乙足作手一曰取之出鼻外作一曰取之出眉外方病之時盛瀉虛補馬雲足太陽膀胱經之脈亦入頄遍齒其所入之脈乃手少陽三焦經之角孫穴其上齒齲者正足陽明胃經脈氣之所歷取之在鼻與頄前乃地倉巨髎等穴也如正痛之時其脈必盛盛則宜瀉之或虛則宜補之一曰當取之出於鼻外即本經之和髎迎香等穴也足陽明止益不足諸本不足下有反者益其四字甲乙其作甚張云其當作甚馬志以其字接下節非也張云足陽明之脈有挾鼻入於面者道出於足少陽之懸顱其下行者屬於口其上行者對口入系目本或目或口凡有過者皆可取之然必察其有餘不足以施補瀉若反用之病必益甚簡案志云足陽明當作手太陽非也對口蓋指玉枕下邊而言腦疸有對口發之稱可以見耳足太陽止盛則瞑目馬雲此言頭目痛者當取玉枕而又言睛明為陰陽二蹺之所交乃寤寐之所以分病也足太陽膀胱經有通項入於腦者名曰玉枕開督脈一寸半腦戶枕骨上入髮際二寸此正屬於目之根兩眼中之系皆繫於此故名之曰眼系凡苦頭痛或苦目痛者皆取之其脈在項中兩筋間入於腦與陰蹺陽蹺相別實各陰陽諸經交會之所也又陽蹺之脈入於陰陰蹺之脈出於陽交於目銳眥之睛明穴陽蹺之氣盛則目瞋而不得閉陰蹺之氣盛則目瞑而不得開也張云按脈度篇言蹺脈屬目內眥合於太陽下文熱病篇曰目中赤痛從內眥始取之陰蹺然則此云銳眥者當作內眥也志云目之尖角曰銳故外內皆名銳眥簡案志注誤癲狂篇云目眥外決於面者為銳目張注本於樓氏綱目今從之熱厥止皆留之張云熱厥者陽邪有餘陰氣不足也故當取足太陰而補之足少陽而瀉之寒厥者陰邪有餘陽氣不足也故當取足陽明而補之足少陰而瀉之補者補脾胃二經以實四肢瀉者瀉水火二經以泄邪氣然必皆久留其針則瀉者可去補者乃至矣此當與終始篇義相參為用簡案馬雲少陽當作少陰少陰當作少陽未為得矣舌縱涎下張云此下三節皆兼寒熱二厥而言也舌縱不收及涎下煩悶者腎陰不足不能收攝也故當取足少陰經而補之振寒洒洒止取手太陰張云鼓頷振寒鼓腮也凡此諸證皆陽氣不足之候故當取手太陰肺經而補之刺虛者止刺其來也張云刺其去追而濟之也刺其來迎而奪之也衛氣行篇亦有此二句春取絡脈止治骨髓張云春夏之取與前四時氣篇水熱穴論皆同秋取氣口者手太陰肺脈應秋金也冬取經俞者經穴通臟氣藏主冬也絡脈浮淺故治皮膚分腠有理故治肌肉氣口者脈之大會故治筋脈經輸連臟故治骨髓按此言經輸者總言經穴也非諸經之經穴俞穴蓋水熱穴論以五輸言故云秋取經俞冬取井滎此以內外言故云絡脈治皮膚經輸治骨髓也當解其意齊劑同藥曰藥劑針曰砭劑也五臟身有五部止有癰疽者死簡案五臟在內而關係於身者有五部其一在伏兔在膝上六寸起肉間足陽明胃經之要害也其二在腓腨即小腿肚也足太陽少陰及三焦下腧之所繫者腓音肥腨音篆其三在背背之中行曰督脈而背旁四行皆足太陽膀胱經穴臟氣所繫之要害也其四在五臟之俞肺俞三椎旁心俞五椎旁肝俞九椎旁脾俞十一椎旁腎俞十四椎旁各開中行一寸半其五在項亦系督脈統諸陽之綱領也凡上五部皆要害之所忌生癰疽生者多死以上繫馬張二注節錄汪云按陽毒起發者尚可治若陰毒不起者斷難治也劉氏玉機微義云大抵所言地分皆脈絡所會內系腑臟然患者得而早言醫者審證案法治之則皆為不死矣介按癰之與疽截然兩途陽症為癰陰症為疽治法迥殊若以癰疽連稱未免貽害惟王洪緒之全生集分辨甚明可參考焉至於此條原注是系陰疽其一即伏兔疽其二為腓腨發其三是發背其四是脾發疽腎俞發之類其五即天柱疽之類也病始手臂止止之於陰簡案甲乙此一節載傷寒熱病中又從病始手臂至取足陽明而汗出見素刺熱篇馬張以為承上文刺癰疽法誤也張云臂太陰肺經也足陽明胃經也按熱病篇曰脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出按以上四穴皆手足太陰經之滎輸也此言臂太陰者即魚際太淵二穴然則足陽明者亦當取之滎輸則內庭陷谷是也補太陰而汗出甚者陰之勝也當補陽明可以止之瀉太陰而汗出甚者陽之勝也當瀉陽明可以止之蓋以陰陽平而汗自止也取陽而汗出甚者其止法亦然凡刺之害止生為癰疽也此一節見九針十二原篇癲狂篇第二十二諸本無篇字目眥止下為內眥馬雲眥眼角也目眥外決於面者為銳眥俗云外眼角在內近鼻者為內眥俗云內眼角眼之上胞屬於外眥眼之下胞屬於內眥也志云太陽為目上綱陽明為目下綱上為外眥下為內眥者乃太陽陽明之氣主於上下之目眥也簡案此節與癲狂不相涉必是古經殘文癲疾始生止陽明太陰張云先不樂神志將亂也頭重痛視舉目赤厥氣上行也甚作極已而煩心躁急不寧也此皆癲疾將作之兆顏天庭也候之於顏邪色必見於此也當取手太陽支正小海手陽明偏歷溫溜手太陰太淵列缺等穴瀉去邪血必待其血色變而後止針也甲乙視上有直字血甚作極已而煩心諸本作血變而止癲疾始作當改引口啼呼止血變而止張云引口者牽引歪斜也或為啼呼或為喘悸當候於手陽明太陽二經察病所在而刺之穴如前強堅強也左右牽引病多在絡故左強者當攻右右強者當攻左必候其血變而止此繆刺之法也足太陽陽明太陰太陽諸本陰下有手字下太陽吳本作手太陰非張云足太陽之委陽飛陽僕參金門足陽明三里解谿足太陰隱白公孫等穴皆主之手陽明經穴同前置其血於瓠壺之中止骶骨也志云瓠壺葫蘆也致其血於壺中發時而血獨動者氣相感召也如厥氣搏於手太陰太陽則血於壺中獨動感天氣太陽之運動也不動者病入於地水之中故當灸骶骨二十壯經云陷下則灸之此疾陷於足太陽太陰故當灸足太陽之骶骨馬雲骶骨穴名長強顑齒諸腧分肉止不治甲乙顑作頷居作倨馬雲顑苦感切舊釋以為飢黃起行今此篇與雜病篇有曰顑痛當有定所想頷與顑可通用屈原賦離騷云長顑頷亦何傷又可總稱張云顑之釋義云飢而面黃色乃與經旨不相合動輸篇言自腦出顑下客主人則此當在腦之下鬢之前客主人之上其即鬢骨之上兩太陽之間為顑也骨癲疾者病深在骨也其顑齒諸穴分肉之間皆邪氣壅閉故為脹滿形則尪羸唯骨獨居汗出於外煩悶於內已為危證若嘔多沃沫氣泄於下者尤為脾腎俱敗必不可治志云顑葉坎面也分肉溪谷也溪谷屬骨骨居者骨肉不相親也簡案顑馬與甲乙符為是考工記矩之直者為倨骨倨即強直之義當從甲乙身倦攣急大甲乙作身卷攣急脈大簡案馬張並云其脈急大甲乙為是暴僕止不治張云暴僕猝倒也縱弛縱也治此者如脈脹滿則盡刺之以出其血如脈不滿則灸足太陽經挾項之天柱大杼穴又灸足少陽經之帶脈穴此穴相去於腰計三寸許諸分肉本輸謂諸經分肉之間及四肢之輸凡脹縱之所皆當取也王氏證治準繩云氣下泄則自腎間正氣虛脫於下故死癲發如狂者由心之陽不勝陰氣之逆神明散亂陽氣暴絕故如狂猶燈將滅而明也狂始生止陽明甲乙始上有之字苦怒作善怒張云神不足則悲魂傷則狂妄不精志傷則喜忘其前言肝乘脾則苦怒血不足則善恐皆得之憂而且飢致傷臟氣也取手太陰之太淵列缺手陽明之偏歷溫溜足太陰之隱白公孫足陽明之三里解谿等穴並可治之必候其血色變而止針也狂始發馬雲上節言始生而此曰始發則病已成而發也舌下少陰張云手陽明太陽太陰經穴俱如前舌下者任脈之廉泉也少陰者心經之神門少衝也簡案手太陽上文不言取之張偶誤耳舌下少陰蓋謂足少陰廉泉穴不盛釋之也甲乙盛下有者字馬雲如不盛則釋之而不取也張云當釋之無論也狂言驚甲乙言作喜是少氣之所生也張云氣衰則神怯所以妄見妄聞而驚呼也兩顑甲乙顑作頷簡案諸家不注經穴狂者多食止不發於外者張云多食見鬼善暗笑者以大善傷神所致難經曰脫陽者見鬼脫陰者目盲也志云不發於外者冷笑而無聲也心氣虛故冷笑心氣實則大笑矣未應如此者張云謂狂病新起未有如上文五節之見證也曲泉簡案此穴屬厥陰肝經見本輸篇而甲乙諸書未有言及動脈者唯外臺云橫向脛二寸當脈中是也以法取之馬雲如前置血於瓠之中而驗之也張云如不已則當照前五節求法以取之灸骨骶二十壯甲乙作灸骶骨二十壯骶骨者尾屈也志云骶骨乃督脈之所循督脈與肝脈會於頭項故灸骨骶引厥陰之脈氣復從下散也風逆止取井經也張云風感於外厥氣內逆是為風逆身漯漯皮毛寒慄也唏然時寒氣咽抽息而噤也飢則煩飽則變動不寧風邪逆於內也手太陰表裡肺與大腸也足少陰腎也足陽明胃也清寒冷也取滎取井取經即指四經諸穴為言漯音磊唏音希志云風淫未疾故暴腫四肢漯漯寒濕也唏然寒兢貌乃風動水寒之氣而見此證也簡案漯漯蓋滀漯之義水攢聚貌見木華海賦此狀四肢暴腫也張注雜病篇唇漯漯然云腫起貌是也下文身漯漯亦同唏蓋唏噓之唏唏噓又懼貌故狀寒慄也足暴清止溫則瀉之甲乙煩作䐜無小字諸本緩作暖當改張云足暴清暴冷也胸若將裂腸若刀切懊憹痛楚也煩不能食氣逆於中也脈大小皆澀邪逆於經也如身體溫暖則當取足少陰以瀉之身體清冷則當取足陽明以補之按足少陰則湧泉然谷足陽明則厲兌內庭解谿豐隆皆主厥逆簡案胸若將裂腸若將以刀切之乃䐜脹之甚故也甲乙為是下胸二脅止立快者是也甲乙二脅作三肋間動手間有應字張云下胸二脅謂胸之下左右二脅之間也蓋即足厥陰之章門期門令病人咳其脈動而應手者是其穴也又當取之背腧以手按之其病立快者乃其當刺之處蓋足太陽經肺腧膈腧之間也志云胸下二脅乃手太陰中府雲門之動脈處簡案胸下二字若以為中府雲門則不穩當焉內閉不得溲止以長針張云此下四節皆言厥逆兼證也內閉不得溲者病在水臟故當刺足少陰經之湧泉築賓足太陽經之委陽飛揚僕參金門等穴骶上即督脈尾骶骨之上穴名長強刺以長針第八針也氣逆止動者之經也張云太陰脾經取隱白公孫陽明胃經取三里解谿厥陰肝經取章門期門甚則兼少陰陽明而取之動者之經謂察其所病之經而刺之以上二節甲乙載三焦約內閉發不得大小便篇中少氣身漯漯也止補足少陰馬雲身漯漯然而無所拘束言吸吸然而無所接續張云身漯漯寒慄也言吸吸氣怯也此皆精虛不能化氣故當補足少陰腎經志雲氣不呴則體重短氣止去血絡也志云短氣者氣上而短故息短而不能連屬若有動作則氣更消索矣張云此亦氣虛也故宜補腎但察有血絡則當去之按此二節皆屬氣虛不補手太陰而補足少陰者陽根於陰氣化於精也治必求本於此可見用針用藥其道皆然簡案以上六節馬志併為指癲狂而言非也風逆以下三節張以為厥逆之兼證然以甲乙推之各章異義亦不必癲狂厥逆也熱病篇第二十三諸本無篇字馬雲篇內所言諸病不一然論熱病更多故名篇偏枯止乃可復也志云經曰虛邪偏客於身半其入深內居榮衛榮衛稍衰故真氣去邪氣獨留故為偏枯案出刺節真邪論是風寒之邪偏中於形身則身偏不用而痛夫心主言腎藏志言不變志不亂此病在於分腠之間而不傷於內也以巨針取之益其正氣之不足損其邪氣之有餘而偏傷之正氣乃可復也巨針大針也取大氣不出關節大氣虛風也巨針取之千金作溫臥取汗痱之為病也止不可治也簡案據巢源外臺痛下衍者字張云痱亦風寒屬猶言廢也上節言身偏不用而痛此言身不知痛而四肢不收是偏枯痱病之辨也智亂不甚其言微有知者神氣未為全去猶可治也神失則無能為矣聖濟總錄云字書謂病痱而廢肉非其肉者以身體無痛四肢不收而無所用也樓氏綱目云右內經論中風之淺深也其偏枯身偏痛而言不變志不亂者邪在分腠之間即仲景東垣所謂邪中腑是也痱病無痛手足不收而言喑志亂者邪入於裡即仲景東垣所謂邪中臟是也痱廢也痱即偏枯之邪氣深者痱與偏枯是二疾以其半身無氣榮運故名偏枯以其手足廢而不收或名痱或偏廢或全廢皆曰痱也樓又云中風世俗之稱也其症卒然仆倒口眼喎斜半身不遂或舌強不言唇吻不收是也然名各有不同其卒然仆倒者經稱為擊僕世又稱為中乃初中風時如此也其口眼喎斜半身不遂者經稱為偏枯世又稱為左癱右瘓及腲腿風乃中倒後之證邪之淺者如此也其舌強不言唇吻不收者經稱為痱病世又稱為風懿風氣亦中倒後之症邪之深者如此也病先起於陽止浮而取之甲乙淨而取之作必審其氣之淨沉而取之張云此治必先其本也病先起於陽分故當先刺其表浮而取之而後取其陰此下不言先起於陰者然病始於陰直中臟也多不可治故不復言之介按吳鞠通曰實其陰以補其不足此一句實治溫熱之吃緊大綱蓋熱病未有不耗陰者其耗之未盡則生盡則陽無留戀必脫而死也而葉子雨謂吳注頗明析治溫暑保津液固為第一義知瀉其陽之有餘即所以補其陰之不足則進乎道矣熱病三日止以補其不足者張云此下所言熱病即傷寒時疫也熱病三日邪猶居表若氣口靜而人迎躁者正病在三陽而未入陰分故當取諸陽經為五十九刺以瀉陽邪之實仍補三陰之不足也身熱甚止有死徵也張云身熱甚而陰陽之脈皆靜者陽證得脈陰也故不宜刺若察其可刺者當急取之雖不汗出則邪亦從而泄矣此言勿刺者以其脈證相反有死徵也下文皆然脈口動喘而短止淺刺手大指間甲乙短作眩張從一本作弦馬雲其脈口之脈甚動證則喘而短氣當急取手太陰肺經之少商張云熱病七八日邪必深至陰分故脈口之脈當動疾如喘而且弦志云按素問有喘脈喘而短者謂脈之喘動於寸口而不及於尺故知其可汗解也王師曰喘者喘滑如珠也簡案據下文喘且復熱又喘甚者死及甲乙喘即證而非脈也脈微小止一日死張云脈微小者正氣虛也溲血口中乾者傷其陰也皆為死證若脈來變亂失常是為代脈其死尤促熱病已得汗出止喘甚者死甲乙勿刺膚作勿庸刺張云熱病已得汗邪當退矣若脈尚躁氣尚喘身復熱者是謂不為汗衰乃反證也故勿刺其膚刺而重傷其氣若喘甚者則必死也躁不散數止勿腠刺之甲乙腠刺之作庸刺巢源同馬雲脈雖不躁然亦不散且帶數是邪尚未退當再過三日之中宜有汗出而愈若不汗出乃正氣衰而不能為汗至於四日當死也且未曾汗出勿刺其膚腠刺之無益也張云脈猶不躁則陰之類也即有躁意而力不散大至不數疾皆正氣衰微不能鼓動亦陰之類也必且未能解散故當再俟三日庶得有汗若三日不汗又逾四日則病在旬日外矣陰陽不應期當死也志云熱病七八日脈不躁者外已解也脈即躁而不散數此邪熱雖未去而正氣不傷後三日乃再經之十一日此復傅於裡陰必得陰液之汗而解故未曾汗者勿腠刺之當取汗於陰也若三日不汗乃陽熱盛而陰氣已絕故至四日而死簡案三說未知孰是志注似允當窒鼻充面止五十九甲乙九下有刺字下並同馬雲肺屬金其合在皮今熱病之始膚痛鼻塞而亦充然而浮乃病在於皮也當取之皮以瀉之所謂刺皮無傷肉之義也用第一針名鑱針者以刺五十九穴之皮苛軫鼻止火者心也甲乙苛軫鼻作苛鼻乾注靈樞作診鼻乾馬雲軫當作𤺋海篇有此字身體苛重鼻上生疹皆皮病也此其求之於皮即所以求之於肺也如刺之而病不得退則當求之於火所謂火者心也補其心經以致火王則金衰肺熱自可退耳張云苛深也軫車上前後兩端橫木也言鼻窒之甚內外不通亦猶軫之橫塞也簡案苛軫謂小疹也苛疥也本小草之謂故假為疥之義禮記疾痛苛養素問苛疾肉苛義並同軫本作胗見釋名又作𤺋病源多用軫字乃癮疹之疹也張注尤誤身澀倚止水者腎也甲乙倚作煩悗作悶干唇口嗌作唇嗌乾馬張志取之皮作取之脈是也馬雲其身澀滯倚著而熱心則煩悶唇口與嗌皆干乃病在於脈也當取之脈以瀉之所謂刺脈無傷皮也用第一針名曰鑱針者以刺五十九穴之脈正以膚脹口乾冷汗出皆脈病也此其求之於脈即所以求之於心也如刺之而病不得退則當求之於水所謂水者腎也補其腎經致水王則火衰心熱自可退耳張云澀燥澀也倚身無力也簡案澀倚未詳其義千金有傷寒勑澀語巢源作勑嗇亦不知何謂熱病嗌乾止水者肝也甲乙目眥青作目眥赤馬雲熱病而嗌乾故多飲且善驚悸四肢懈倦臥不能起乃病在於肉也當取之膚肉以瀉之所謂刺肉無傷筋也用第六針名曰圓利針者以刺五十九穴之肉正以目眥色青乃木來剋土主肉病也此其求之於肉即所以求之於脾也如刺之而病不得退則當求之於木所謂木者肝也補其肝木以致木王則土衰脾熱自可退耳志云此當以第四針取膚肉面青腦痛止金者肺也甲乙面青腦作而胸脅第四針下更有針字張云熱病面青肝色見也腦痛厥陰肝經與督脈會於巔也手足躁者肝之榮在爪木病在四末也皆肝經之病故當取之筋結之間用第四針曰鋒針者以瀉其四逆等證四逆者肝邪盛而四肢厥也筋躄者足不能行也目浸者淚出不收也皆為肝病肝屬木其合在筋故但求之於筋即所以求於肝也若求肝不得其效則當求之於金金者肺也補肺之氣則金能勝木而肝熱可平矣簡案手足躁其義未詳馬雲以脾主四肢而肝熱有餘四肢熱也志云肝主筋諸筋皆起於四肢之指井並經而循於形身故手足為之躁擾志注稍通數驚止木者腎也志云心病熱故數驚本經曰心脈急甚為瘈瘲心氣實則狂也當取之脈以第四針急瀉其血絡之有餘者癲疾脈癲疾也發者血之餘若癲疾而毛髮去當索血於心不得索之水水者腎也取腎水之氣以勝制其心火身重止土者脾也甲乙耳青作耳青赤志云腎為生氣之原熱傷氣故身重腎主骨故骨痛也骨開竅於耳腎氣逆故耳聾病在少陰故欲寐也當取之骨以第四針為五十九刺之法以刺骨若病而不欲食者腎氣實也經曰腎是動病飢不欲食齧齒者熱盛而咬牙也齒者骨之餘耳者腎之竅若齧齒耳青當索骨於腎不得索之土土者脾也取脾土之氣以勝制其水焉夫五臟者形藏也五行者五臟之氣也病氣出於外合之皮肉筋骨故先治其外不得故復內索於五臟五行之氣焉簡案刺字下句熱病不知所痛止死不可治甲乙痛作病張云凡熱病有痛而不得其所耳聾寂無所聞體重不能收持口液乾涸值陽勝之時則熱甚陰勝之時頗有寒者此以邪居陰分熱深在髓乃死證之簡案陰陽馬以為陰經陽經志以為內外並非顳顬目𤬓脈痛止寒熱痔甲乙無𤬓字痛作緊痔下注云一作痛脈經作病張云顳顬即足少陽腦空穴一曰鬢骨也案見廣韻又集韻耳前動也目𤬓脈痛目脈抽掣而痛也衄鼻血也厥熱病熱逆於上也取以第三針鍉針也視有餘不足察所病之經脈虛實而為補瀉也寒熱痔三字於上下文義不相續似為衍文熱病體重止得氣也甲乙胳作絡馬雲胳音各釋文云腋下也胃之經脈與腋下無著疑當作絡張云脾主肌肉四肢邪在脾故體重大腸小腸皆屬於胃邪在胃則腸中熱故當用第四針曰鋒針者取脾胃二經之腧曰太白曰陷谷也及下諸指間者謂在足諸腧也下文曰五指間各一凡八痏足亦如是者其義即此索氣於胃胳得氣者陽明之絡曰豐隆別走太陰故取此可以得脾氣胳當作絡熱病挾臍急止針嗌裡張云挾臍急痛足少陰腎經取行也胸脅滿足太陰脾經取行也故在少陰則取湧泉在太陰則取陰陵泉用第四針曰鋒針者刺之針嗌裡者以少陰太陰之脈俱上絡咽嗌即下文所謂廉泉也熱病而汗且出止以止之張云熱病陽氣外達脈躁盛者汗且出也陽證得陽脈者脈之順也皆為可汗當取手太陰之魚際太淵足太陰之大都太白瀉之則熱可去補之則汗可出也若汗出太甚則當取內踝上橫脈即脾經之三陰交也瀉之則汗自止矣上三節所言胃胳湧泉陰陵泉魚際太淵大都內踝上橫脈凡十四穴皆不在下文五十九穴之數內者故特表見於此也熱病已得汗止脈靜者生張云熱病已得汗則邪當退脈當靜矣如汗後脈尚躁盛者孤陽不斂也此以陰脈之虛極有陽無陰耳乃為逆證若汗後即脈靜者邪去正復也乃為順證得逆者死得順者生熱病者脈尚盛躁止靜者生甲乙外臺引九卷尚作常靜上有而脈二字張云熱病脈尚躁盛者必當邪解汗出也若脈雖盛而汗不得出以陽脈之亢極而陰虛不能外達也故死若得汗而靜則為順證故生按此二節一曰陰極一曰陽極義若有二然脈之躁盛者皆陽勝之候也汗者液之所化其發在陽其原在陰也若既得汗而脈猶躁盛者以陽無所歸由陰虛也脈躁盛而汗不得出者以陰竭於中亦陰虛也故脈之盛與不盛當責其陽汗之出與不出當責之陰觀本神篇曰陰虛則無氣無氣則死矣其所重者正此陰字陰為生氣之本無根則氣脫故必死也簡案張注雖如此然以理推之前節陰脈之極胃亡陽陰寒之極反見躁盛之脈本節陽脈之極謂亡陰陽熱之極尚見盛躁之脈蓋二證有冰炭之別矣熱病不可刺者有九甲乙及外臺引九卷作熱病死候有九外臺注太素云不可刺者九一曰止噦者死甲乙注太素云汗不出大顴發赤者必不反而死外臺引九卷作汗不出大灌發者死注太素云汗不出大灌發赤噦者死張云汗不得出陰無力也大灌發赤謂之戴陽面戴陽者陰不足也噦者邪犯陽明胃虛甚也本原虧極難乎免矣二曰外臺注甚一作黃張云以邪傷太陰脾氣敗也故死三曰張云五臟六腑之精氣皆上注於目而為之精目不明者臟腑之精氣竭也熱不已者表裡之陰氣竭也故死四曰張云邪傷脾臟也老人嬰兒尤以脾氣為本故犯之者死志云夫老人者外內之血氣已衰嬰兒者表裡之陰陽未足腹滿者熱逆於中不得從外內散也五曰張云汗不出者陰之虧也再或嘔而下血陰傷尤甚六曰張云心肝脾腎之脈皆繫於舌本舌本爛加之熱不已者三陰俱損也故不免於死七曰張云邪在肺經動陰血也汗不出或出不至足尤為真陰潰竭故死八日張云髓者至陰之精骨之充也邪入最深乃為髓熱腎氣敗竭故死簡案熱在髓見前九曰止齒噤齘也甲乙腰下有反字外臺同張云痙風強病也凡脊背反張曰腰折肢體抽掣曰瘈瘲牙關不開曰噤切齒曰齘即皆痙之謂也此以熱極生風大傷陰血而然既然且痙乃為死證痙音敬瘈翅寄系三音瘲音縱凡此九者不可刺也張云刺之無益必反招嫌介按吳鞠通曰此節歷敘熱病之死徵以禁人之刺為刺則必死也然刺固不可亦有可藥而愈者蓋刺法能泄能通開熱邪之閉結最速至於益陰以存津實刺法之所短而湯藥之所長也兩手外內側各三張云兩手外內側即太陽之少澤少陽之關衝陽明之商陽也三陰俱在內側即太陰之少商厥陰之中衝少陰之少衝也左右共十二穴痏刺瘡也有刺必有瘢故即以痏為數五指間止足亦如是張云五指間者總言手五指也各一者本節之後各一穴也觀上文第十五節云取之於其腧及下諸指間正謂此也蓋諸經腧穴皆在指之本節後如手經則太陽之後溪少陽之中渚陽明之三間獨少陰之在本節後者則少府之滎也手之六經惟太陰厥陰則本節後俱無穴故左右四經凡八痏也其在足經之腧則太陽曰束骨少陽曰臨泣陽明曰陷谷太陰曰太白皆在本節之後其少陰之脈不行於指厥陰之脈則本節後亦無穴左右四經止共八穴故曰足亦如是頭入發止凡六痏甲乙發下有際字注靈樞無分字馬雲此分字作去聲猶言三處也若平聲則三分旁無穴張云頭入發一寸即督脈上星之次其旁穴分而為三則足太陽之五處承光通天也左右各三故凡六痏更入發止凡十痏張云更入發者自上星之次向後也三寸邊五者去中行三寸許兩邊各五也即足少陽之臨泣目窗正營承靈腦空左右二行凡十痏耳前後止凡六痏甲乙口下注靈樞作以下張云耳前者聽會也耳後者完骨也俱足少陽經穴各二口下者任脈之承漿也一穴項中者督脈之瘂門也一穴共凡六痏巔上一張云百會也督脈穴髮際一張云前髮際神庭也後髮際風府也俱督脈穴凡二痏按本篇所載者熱病五十九俞也水熱穴論所載者亦熱病五十九俞也考二篇之異同則惟百會囟會五處承光通天臨泣目窗正營承靈腦空等十八穴相合其餘皆異然觀本篇所言者多在四肢蓋以瀉熱之本也水熱穴論所言者多隨邪之所在蓋以瀉熱之標也義自不同各有取用且本經靈樞在前素問在後後者所以補前之略耳故皆謂之熱病五十九俞非謬異也今總計二篇之數再加以上文所言胃胳湧泉等穴原不在五十九數之內者凡十四穴仍除去重複十八穴則總得一百一十四穴皆熱俞也均不可廢凡刺熱者當總求二篇之義各隨其宜而取用之庶乎盡刺熱之善矣簡案甲乙載本經及水熱穴論五十九俞云按二經雖不同皆瀉熱之要穴也乃與張之意符矣馬雲彼之五十九穴所以刺水病而此則刺熱病病有不同故穴因以異成無己注傷寒論乃兩入之蓋不考諸穴所在耳考水熱穴論水俞五十七穴熱俞五十九穴極為分明不知馬何因而有此說成氏非失考也氣滿胸中止氣下乃正韭道藏本元本趙藏本張本作薤溜諸本作留當改馬雲此以下七節另言雜證與上熱病無涉而此一節則言氣證者之有刺法也凡氣滿於胸中而其息喘促者呼吸為息則病在上者取之下當刺足太陰脾經之隱白穴候其氣下不喘乃止針也張云內寒者氣至遲故宜久留其針內熱者氣至速故宜疾去其針志注本輸篇云上古如韭葉今時如大米許心疝止去其血絡張云心疝者如脈要精微論曰診得心脈而急病名心疝少腹當有形也取足太陰厥陰盡刺去其血絡者以二經皆聚於少腹去其絡血即所以散其邪也喉痹舌卷止如韭菜甲乙作臂表痛注靈樞及太素作臂內廉痛馬雲陰陽別論曰一陰一陽結謂之喉痹則喉痹明系手厥陰心包絡手少陽三焦經也其病舌卷而短口中作干心煩且痛臂之內廉亦痛不能舉之以上及於頭當取手小指之次指即第四指也系手少陽三焦經其穴在次指之端名關衝去爪甲如韭葉者是也目中赤痛止取之陰蹺張云陰蹺之脈屬於目內眥足少陰之照海即陰蹺之所生也故當刺之風痙止取三里張云痙強直也身反折反張向後也此風證之在膀胱經者故當取足太陽經穴膕中委中穴也血絡浮淺之絡也皆當刺出其血若中氣有寒仍當取足陽明之三里溫補胃氣而風寒可除也癃取之陰蹺止出血甲乙癃作痙馬雲膀胱不利為癃謂小便不通也膀胱與腎為表裡當取腎經之照海穴以刺之乃陰蹺脈氣所發也及肝經之大敦穴在足大趾外側之三毛上及二經之有血絡者皆取之出血李東垣曰腎主閉藏肝主疏泄則取之兩經也宜矣張云腎與膀胱為表裡肝經行於少腹故當取此二經男子如蠱止盡見血也怚甲乙作阻馬雲怚秦呂切又子銜功玉篇云驕也但義不甚通疑當作疽男子有脹病如犯蠱毒相似女子有郁病如成疽疾相似其身體腰脊俱如解分不相連屬又不欲飲食此病在上者當取之下宜先取腎經湧泉穴以見血又視足而之為跗上者其血絡盛處盡取之以見血蓋指足陽明胃經也張云怚當作胎如蠱與馬同如胎無是病而形相似也志云怚當作阻女子如阻者如月經之阻隔也男子無月事之留阻故曰如蠱簡案玉機真藏論云脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱蓋男子如蠱謂如疝瘕而非疝瘕也怚作阻為是阻即妊娠阻病謂其證如惡阻而非惡怚也此乃腎胃二經之病故刺湧泉及跗上以見血耳
