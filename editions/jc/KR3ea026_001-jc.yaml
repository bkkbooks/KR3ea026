body:
  text: 卷一九針十二原第一馬雲內有九針之名又有十二原穴故名篇自篇內小針之要以下岐伯盡解於第三篇小針解之內素問有針解篇亦與此二篇小同當合三篇而觀之其義無餘蘊矣舊本以第一篇為法天第二篇為法地三篇法人四篇法時五篇法音六篇法律七篇法星八篇法風九篇法野乃後人襲本經七十八篇九針論之意而分注之殊不知彼乃論針而非論篇目也甚為無理簡案本經多不下篇字論字乃所以為古書也餘子萬民馬雲按本紀記帝經土設井立步制畝藝五穀撫萬民則子萬民收租稅信矣百姓國語周語注百姓百官有世功者又書堯典孔傳百姓百官租稅租稅田賦也又凡賦取者曰稅史食貨志食租衣稅不給而屬有疾病給相足也屬附也微針志云按篇名九針而帝曰微針伯曰小針是九針之外又立小針也簡案微針小針蓋謂九針中之毫針下文曰尖如蚊虻喙靜以取往微以久留之是也營其逆順出入之會志云皮膚經脈之血氣有逆順之行有出入之會簡案營運也易用難忘志云明其理則易用持於心則難忘經紀志云經徑紀維也月令鄭注經紀謂天文進退度數為之終始志云九針者聖人起天地之數始於一而終於九九而九之九九八十一以起黃鐘之數先立針經張云靈樞即名針經義本諸此易陳而難入張云易陳者常法易計也難入者精微難及也志云易言而難著於人也粗守形上守神馬雲下工泥於形跡徒守刺法上工則守人之神凡人之血氣虛實可補可瀉一以其神為主不但用此針法而已也神乎神客在門馬雲所謂神者人之正氣也神乎哉此正氣不可不守也邪氣之所感有時如客之往來有期名之曰客客在門者邪客於各經之門戶也張云神乎神言正氣盛衰當辨於疑似也客在門言邪之往來當識其出入也簡案小針解曰神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也據此則神乎二字句神客謂神與客也刺之微在速遲馬雲刺之微妙在於速遲速遲者即用針有疾徐之意也粗守關上守機張云粗守關守四肢之關節也上守機察氣至之動靜也不離其空馬雲素問有骨空論指各經之穴言簡案據小針解空下當有中字清靜而微張云言察宜詳慎也其來不可逢其往不可追志云如其氣方來乃邪氣正盛邪氣盛則正氣大虛不可乘其氣來即迎而補之當避其邪氣之來其銳氣已往則邪氣已衰而正氣將復不可乘其氣往追而瀉之恐傷其正氣在於方來方去之微而發其機也離合真邪論曰俟邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也不可掛以發馬雲知機之道者唯此一氣而已猶不可掛一發以間之志云靜守於來往之間而補瀉之少差毫髮之間則失矣工獨有之甲乙工作上往者為逆來者為順張云往氣之去也故為之逆來氣之至也故為之順正行無問志本問作間非逆而奪之惡得無虛追而濟之惡得無實甲乙逆作迎張云逆其氣至而奪之瀉其實也惡得無虛隨其氣去而濟之補其虛也惡得無實故瀉必因吸內針補必因呼內針此即迎來隨去之義高武云迎者逢其氣之方來如寅時氣來注於肺卯時氣來注大腸此時肺大腸氣方盛而奪瀉之也隨者隨其氣之方去如卯時氣去注大腸辰時氣去注於胃肺與大腸此時正虛而補濟之也余仿此大要簡案蓋古經篇名徐而疾則實疾而徐則虛張云徐出針而疾按之為補故虛者可實疾出之而徐按之為瀉故實者可虛簡案張據素針解篇釋之與小針解之旨乖若有若無馬雲實者止於有氣虛者止於無氣氣本無形似在有無之間耳察後與先張云求病所急而治分先後也若存若亡察氣之行與不行以為針之去留也若得若失張云欲虛而虛欲實而實是得法也粗工妄為則失之矣簡案小針解云為虛與實若得若失者言補者佖然若有得也瀉則恍然若有失也知張註失經旨矣補瀉之時針解篇曰補瀉之時者與氣開闔相合也張云當補當瀉用有其時瀉曰必持內之放而出之排陽得針甲乙作迎之迎之意必持而內之放而出之排揚出針張云凡用瀉者必持內之謂因其氣來出之疾而按之徐也故可排開陽道以泄邪氣簡案據下文補曰甲乙近是按而引針是謂內溫簡案連下二句言補法若病當用瀉法而反按而引針以補之是謂內溫引針謂退其針溫蘊同乃素問溫血之溫謂血氣蘊蓄於內而不得散泄也諸注並接下文補曰為釋恐誤意若妄之志云之往也張云妄虛妄也意若妄之言意會於有無之間也妄甲乙作忘若行若按若蚊虻止張云若行若按言行其氣按其處也若蚊虻止言當輕巧無跡而用得其精也如留如還去如弦絕張云留留針也還出針也去如弦絕輕且捷也故無損而能補還甲乙作環令左屬右張云右手出針左手隨而按捫之是令左屬右也必無留血急取誅之馬雲如有留血當急取以責之但此補法必無留血者張云凡取血絡者不可使有留血宜急取之也志云此補正運邪之法故必無留血設有留血急取而誅之簡案以理推之此間恐有遺脫堅者為寶甲乙寶作實王注素針解篇手如握虎者欲其壯也云壯謂持針堅定也針經曰持針之道堅者為實則其義也新校正云按甲乙經實字作寶乃與今本異正指直刺簡案針解篇云義無邪下者欲端以正也王注正指直刺針無左右神在秋毫張云醫之神見在悉秋毫必精必確屬意病者針解篇云神無營於眾物者靜志觀病人無左右視也王注目絕妄視心專一務則用之必中無或誤也審視血脈馬雲審視其血脈之虛實而刺之則無危殆矣必在懸陽及與兩衛甲乙必作心衛作衡注云一作沖張云懸猶言舉也陽神氣也凡刺之時必先舉神氣為主故曰懸陽兩衛者衛氣在陽肌表之衛也脾氣在陰臟腑之衛也二者皆神氣所居不可傷犯凡用針者首宜顧此故曰兩衛簡案馬陽為揚志以懸陽為心並義難通姑仍張注血脈者甲乙血上有取字是在腧橫居視之獨澄切之獨堅甲乙澄作滿志云腧經腧也刺節真邪篇曰六經調者謂之不病一經上實下虛而不通者此必有橫絡盛大加於經令之不通視而瀉之此取謂解結也故有血絡橫在於經腧者當視之獨清切之獨確而去之也張云視之獨澄者必欲索其隱切之獨堅者欲拔其本也鑱針鑱鋤銜切犁鐵也說文銳器也史扁鵲傳鑱石注鑱石針也鍉針鍉音時又音低鏑也箭鏃也鋒針鋒王本作蜂非鈹針鈹音皮說文大針也毫針長三寸六分九針論作一寸六分是吳氏尊經集云毫針又名小針取用益多猶布帛菽粟為日用之所急也馬雲此言九針之體而及其所以為用也大義見本經九針論第七十八篇故此不詳解之今亦從此介按考針類有九種分述如後一曰鑱針即今之箭頭針也此針長一寸六分上去末寸半下只留一分之鋒欲淺刺不令深入也二曰圓針即絮針也長一寸六分取其筒其身而卵其鋒者身直如竹筒末鋒員如卵銳也三曰鍉針長三寸半取法於黍粟之銳者圓而微尖利於用補者也四曰鋒針即今日之三稜針也長一寸六分是上去八分下留八分取法於絮針刃三隅者謂直壯而銳可以瀉熱出血也五曰鈹針長四寸廣二分半取法於劍鋒以其能開通也六曰圓利針其形微大其末反小其身長一寸六分取法於犛者以毛之強者曰犛用其細健可稍深也七曰毫針長二寸六分其尖如蚊虻喙者取其微細徐緩也八曰長針長七寸取法於綦針以能使深邪出遠痹也九曰大針長四寸尖形如挺粗而且巨其鋒微圓取法於鋒針可以瀉通機關也如犛前王莽傳師古注毛之強曲者曰犛又後漢岑彭傳注犛長毛也以取暴氣甲乙云痹氣暴發者取以圓利針張云暴氣痹氣之暴發也靜以取往諸本取作徐當改如挺道藏本挺作挻簡案挺挻同杖也邪氣在上馬雲邪氣之中人也高凡風寒暑雨之邪由上感之故曰邪氣在上也此以下當參考小針解陷脈張云諸經孔穴多在陷者之中故凡欲去寒邪須刺各經陷脈則經氣行而邪氣出乃所以取陽邪之在上者志云陷脈額顱之脈顯陷於骨中故針陷脈則陽氣之表邪去矣簡案張注為是中脈小針解云取之陽明合也馬雲陽明合即足三里也病各有所宜甲乙宜作舍是無實無虛甲乙作無實寶虛虛是五脈張云五脈者五臟五輸也志云五臟諸陰之脈也義具小針解三脈據小針解當三陽之脈恇馬雲曲王切不足也張云音匡衰殘也志云怯也奪陰者死甲乙死作厥簡案與小針解之義不合若風之吹雲志云邪散而正氣光明也明乎若見蒼天甲乙作昭然於天經脈十二絡脈十五凡二十七氣張云臟有五腑有六而復有手厥陰心主一經是為十二經十二經各有絡脈如手太陰別絡在列缺之類是也此外又有任脈之絡曰屏翳督脈之絡曰長強脾之大絡曰大包共為十五絡十二十五總二十七氣以通周身上下也所出為井馬雲其始所出之穴名為井穴如水之所出從山下之井始也六十三難楊注云凡臟腑皆以井為始井者謂谷井爾非謂掘作之井山谷之中泉水初出之處名之曰井井者主出之義也馬雲如肺經少商之類水從此而流則為滎穴所溜為滎史云溜按難經當作流馬雲如肺經魚際之類又從此而注則為腧穴張云急流曰溜小水曰滎脈出於井而溜於滎其氣尚微也簡案急流曰溜未見所據六十三難楊注云泉水既生留停於近滎迂未成大流故名之曰滎滎小水之狀也此溜讀為留也然六十八難明言所流為滎今從史說所注為腧馬雲腧者注此而輸運之也如肺經大淵之類又從而經過之則為經穴張云注灌注也腧輸運也脈注於此而輸於彼其氣漸盛也所行為經張云脈氣大行經營於此其正盛也六十三難楊注云經者徑也亦經營之義也馬雲如肺經經渠之類又從而水有所會則為合穴所入為合張云脈氣至此漸為收藏而入合於內也馬雲如肺經尺澤之類六十三難楊注云經行既達合會於海故名之曰合合者會也知其要者馬雲凡節之所交計三百六十五會實經絡滲灌諸節者也此節者乃要之所在張云其要則在乎五腧而已志云血者神氣也二十七氣三百六十五會總屬血氣之流行故曰知其要者一言而終簡案今從志注重竭張云臟氣已絕於內陰虛也反實其外誤益陽也益陽則愈損其陰是重竭也陰竭必死死則靜也取腋與膺張云腋與膺皆臟脈所出氣絕於內而復取之則致氣於外而陰愈竭矣逆厥張云臟氣已絕於外陽虛也反實其內誤補陰也助陰則陽氣愈竭故致四逆而厥逆厥必死死必躁也反取四末張云四末為諸陽之本氣絕於外而取其本則陰氣至而陽愈陷矣害中而去則致氣張云害中而不去去針太遲也不中而去去針太早也均足為害此節與寒熱病篇文同但彼云不中而去則致氣者是此云害中者誤也簡案害當作不張注為是癰瘍寒熱病篇作癰疽張云不中而去則病未除而氣已致故結聚而為癰疽皆刺之害也十二原出於四關張云臟腑之氣表裡相通故五臟之表有六腑六腑之外有十二原十二原出於四關四關者即兩肘兩膝乃周身骨節之大關也故凡井滎腧原經合穴皆手不過肘足不過膝而此十二原者故可以治五臟之疾陽中之少陰肺也張云心肺居於膈上皆為陽臟而肺則陽中之陰故曰少陰太淵馬雲掌後陷中肺脈所注為俞土陰經無原俞穴代之余仿此陽中之太陽心也張云心為陽中之陽故曰太陽大陵張云按大陵系手厥陰心主腧穴也邪客篇帝曰手少陰之脈獨無俞何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈故此言大陵也大陵二穴在掌後骨下兩筋間陰中之少陽肝也張云肝脾腎居於膈下皆為陰臟而肝則陰中之陽故曰少陽太衝馬雲足大趾本節後二寸動脈應手陷中肝脈所注為俞土陰中之至陰脾也張云脾屬土而象地故為陰中之至陰太白馬雲足大趾內側內踝前核骨下陷中脾脈所注為俞土陰中之太陰腎也張云腎在下而屬水故為陰中之太陰太谿馬雲足內踝後跟骨上動脈陷中男子婦人病有此脈則生無則死腎脈所注為俞土膏之原志云中焦之氣蒸津液化其精微發泄於腠理淖澤注於骨補益腦髓潤澤皮膚是津液注於三百六十五節而滲灌於皮膚肌腠者也溢於外則皮肉膏肥余於內則膏肓豐滿蓋膏者臟腑之膏膜肓者腸胃之募原也簡案左傳成公十年居肓之上膏之下杜云肓膈也心下為膏正義曰賈服何休諸儒等皆以為膏雖凝者為脂釋者為膏其實凝者亦曰膏內則云小切狼臅膏此膏為連心脂膏也獨劉炫以為膏當作膈改易傳文以規杜之失傅遜辨誤云考素問刺禁論云膈肓之上中有父母楊上善說云心下膈上為肓心為陽父也肺為陰母也曾親諦觀豬髒心膈之處方憶膈者隔也自膈以上皆心肺清潔之屬自膈以下皆腸胃汙濁之屬而心下有微脂為膏膈上有薄膜為肓也素問曰膈肓則明云膈之肓也膈之肓非其膜而何其痹論又云皮膚之中分肉之間熏於肓膜注云肓膜謂五臟之間膈中膜也則正與心下之微脂相對益明矣二豎居膏肓之上下則於腑臟略無所繫為至虛之處非經絡穴道所關以故攻之不可達之不及藥不至焉也春秋元命苞云膏者神之液也介按膏肓之義惟前哲唐容川時賢張錫純之解釋甚為詳晰茲節錄如下唐云凡有膜網處無論上中下及內外膜網其上皆生膏油左傳所謂膏肓也肓言其膜屬三焦之物膏即言其油乃屬於脾凡化水化谷皆是膏油發力以薰吸之所謂脾主利水化食者如此而其路道則總在中焦之膜中也此膜著背脊處上行至肝是為肝膈肝膈半在體上半在膈下膈發於肝循肋骨而至胸前之鳩尾下遮濁氣上護心肺為陰陽之界限肝氣之通於膈以入腸胃走血室路道皆在膈膜與中下之油網中也張云素問刺禁篇曰膈肓之上中有父母是肓即膈也又靈樞九針十原論曰膏之原出於鳩尾夫鳩尾之內即膈乃三焦之上焦為手少陽之腑與手厥陰心包臟腑相連互為配偶心包者即心肺相連之系其體質原系脂膜脂即膏也傳既云居肓之上膏之下是其病定在胸中無疑特是胸中之地大氣之所貯藏也雖不禁針然止可針三二分不敢作透針以瀉大氣故曰攻之不可其外又皆硬骨衛護不能用砭故曰達之不及又其處為空曠之腑上不通咽喉下有膈膜承之與膈下臟腑亦不相通故曰藥不至焉所以不可為也鳩尾馬雲一名尾翳一名𩩲𩨗蔽骨之端在臆前蔽骨之下五分人無蔽骨者從歧骨下一寸言其骨垂下如鳩尾肓之原志云肓者腸胃之募原也簡案腹中論云此風根也其氣溢於大腸而著於肓肓之原在臍下刺禁論云膈肓之上中有父母楊注心下膈上為肓痹論云陷於肓膜王注肓膜謂五臟之間膈中之膜也脹論云熏於肉肓而中氣穴雜病篇云上衝腸胃熏肝散於肓結於臍故取之肓原以散之據以上經文考之肓即膈膜也而臟腑之間悉有薄膜其於軀殼中遮隔濁氣最有用者為膈膜故單言肓則指膈膜張注痹論云肓者凡腔腹肉理之間上下空隙之處皆謂之肓然史扁鵲傳搦荒說苑作肓莫即肓膜也空隙之處安得搦之肓自肓原自原安得釋肓以膜原二張之解俱不可從脖胦馬雲一名下氣海一名下肓臍下一寸半宛宛中男子生氣之海出於甲乙簡案玉篇脖胦臍也猶天樞即臍而其穴則在俠臍兩膀各一寸邪張云上文五臟之原各二並膏肓之原共為十二而臟腑表裡之氣皆通於此故可以治五臟六腑之有疾者也簡案本篇止言五臟之原而不言六腑乃以鳩尾脖胦足之馬氏因引六十六難六腑之原以為悉然而此本於經文別發一義者乃不可以彼律此脹取三陽飧泄取三陰甲乙飧泄作滯張云脹腹脹也飧泄完穀不化也病脹者當取足之三陽即胃膽膀胱三經也飧泄者當取足之三陰即脾肝腎三經也簡案甲乙滯蓋謂滯下亦作䐭釋名㿃羲之帖即痢病也閉馬本作柹云柹讀為閉志云柹音卞搏也簡案玉篇柹俗閉字柹字書無考夫善用針者止未得其術也張云此詳言疾雖久而血氣未敗者猶可以針治之故善用針者猶拔刺也去刺於膚貴輕捷也猶雪汙也汙染營衛貴淨滌也猶解結也結留關節貴釋散也猶決閉也閉塞道路貴開通也四者之用各有精妙要在輕摘其邪而勿使略傷其正氣耳故特舉此為諭若能效而用之則疾雖久未有不愈者矣張兆璜云汙在皮毛刺在膚肉結在血脈柹在筋骨簡案雪洗也莊子知北遊澡雪而精神如以手探湯張云用在輕揚熱屬陽陽主於外故治宜如此如人不欲行張云有留戀之意也陰寒凝滯得氣不易故宜留針若此陰有陽疾者張云熱在陰分也下陵三里馬雲足陽明胃經穴即三里系四字一名無殆張云殆怠同簡案老子周行而不怠釋文殆怠也氣下張云邪氣退也疾高而內者張云在上也當下取之然高而內者屬臟故當取足太陰之陰陵泉疾高而外張云屬腑故當取足少陽之陽陵泉也本輸篇第二馬雲輸俞腧三者古通用輸者以其脈氣之轉輸也俞者從省腧從肉本篇輸字是言推本谷經之有腧穴也十二經絡之所終始張云謂如十二經脈之起止有序也絡脈之所別處志云臟腑之血氣從大絡而外注於皮膚復從指井而內注於經脈故曰必通絡脈之所別處五輸之所留張云如下文井滎腧經合穴各有所留止也六腑之所與合志云謂五臟之五俞六腑之六俞也四時之所出入志云血氣隨四時之氣而生長收藏也五臟之所溜處志云五臟之血氣溜於皮膚經脈之外內者也溜張讀為流闊數之度志云闊數寬窄也經脈寬大孫絡窄小淺深志云絡淺而經深也高下志云血氣之上下循行也其次志云次序也少商志云太陰主秋金之不及故名少商余命名之義各有所取甲乙云在手大指端內側去爪甲如韭葉為井木張云肺經脈氣所出為井也其氣屬木此下凡五臟之井皆屬陰木故六十四難謂之陰井木志云井者木上有水乃澹滲皮膚之血從井木而溜於脈中注於腧行於經動而不居行至於肘膝而與經脈中之血氣相合者也肺心肝脾腎內之五臟也膽胃大腸小腸三焦膀胱內之六腑也手足太陰少陰太陽少陽外之經氣也肺出於少商者謂臟腑之血氣從大絡而注於孫絡皮膚之間肺臟所出之血氣從少商而合於手太陰之經也又云十二臟腑之脈出於井者非經脈之貫通是以十二經脈止論至肘膝而已簡案志注發前哲所未發然而人身一氣脈而已其云非經脈之貫通者恐非也張云按本篇五臟止言井木六腑止言井金其他皆無五行之分考之六十四難分析陰陽十變而五行始備矣下仿此溜於魚際馬雲溜者流也流於魚際即手之魚肉也甲乙云魚際者火也在手大指本節後內側散脈中大淵張云此肺經之所注為腧也屬陰土甲乙雲水也在掌後陷者中簡案為水誤經渠張云此肺經之所行為經也屬陰金經渠當寸口陷中動而不止故曰不居居止也尺澤張云此肺經所入為合也甲乙云在肘中約上動脈中衝甲乙云在手中指之端去爪甲如韭葉陷者中張云按此下五腧皆屬手厥陰之穴而本經直指為心腧者正以心與心胞本同一臟其氣相通皆心所主故諸邪之在於心者皆在於心之包絡包絡者心主之脈也邪客篇曰手少陰之脈獨無腧正此之謂詳義見前章勞宮甲乙云在掌中央動脈中大陵甲乙云在掌後兩筋間陷者中方下張云謂正當兩骨之下也間使甲乙云在掌後三寸兩筋間陷者中有過馬雲有病也有病則其脈至無病則其脈止曲澤甲乙云在肘內廉下陷者中屈肘得之大敦甲乙云在足大趾端去爪甲如韭葉及三毛中行間甲乙云在足大趾間動脈陷者中太衝甲乙云在足大趾本節後二寸或曰一寸五分陷者中中封甲乙云在足內踝前一寸仰足取之陷者中伸足乃得之使逆則宛張云宛郁同言用針治此者逆其氣則鬱和其氣則通也簡案馬為宛宛中之宛誤曲泉甲乙云在膝內輔骨下大筋上小筋下陷者中隱白甲乙云在足大趾端內側去爪甲如韭葉大白甲乙云在足內側核骨下陷者中簡案經文腕骨當作核骨諸家不議及者誤商丘甲乙云在足內踝下微前陷者中陰之陵泉甲乙云在膝下內側輔骨下陷者中伸足乃得之湧泉甲乙云在足心陷者中屈足卷指宛宛中志云地下之泉水天一之所生也故少陰之始出名曰湧泉復溜者復溜於地中故合穴曰陰谷然谷甲乙云在足內踝前起大骨下陷者中復留馬志作復溜甲乙同簡案此穴諸書不言有動脈至陰甲乙云在足小趾外側去爪甲如韭葉張云以下凡六腑之井皆屬陽金故六十四難謂之陽井金也通谷甲乙云在足小趾外側本節前陷者中束骨甲乙云在足小趾外側本節後陷者中京骨甲乙云在足外側大骨下赤白肉際陷者中按而得之為原張云本篇惟六腑有原而五臟則無前十二原篇所言五臟之原即本篇五臟之腧然則陰經之腧即原也陽經之原自腧而過本為同氣亦當屬陽木下仿此崑崙甲乙云在足外踝後跟骨上陷中細脈動應手委中甲乙云在膕中央約文中動脈素問骨空論注云膕謂膝解之後曲腳之中背面取之刺腰痛論注云在膝後屈處委而取之簡案委曲也前淮南王傳骩天下之正法師古注骩古委字曲也邪氣臟腑病形篇委中央竅陰甲乙云在足小趾次趾之端去爪甲如韭葉俠谿甲乙云在足小趾次趾二歧骨間本節前陷者中臨泣甲乙云在足小趾次趾本節後間陷者中去俠谿一寸五分丘圩甲乙云在足外廉踝下如前陷者中去臨泣一寸陽輔甲乙云在足外踝上四寸輔骨前絕骨端如前三分去丘圩七寸沈彤釋骨云俠膝之骨曰輔骨陽之陵泉甲乙云在膝下一寸䯒外廉陷者中厲兌甲乙云在足大趾次趾之端去爪甲角如韭葉陷谷甲乙云在足大趾次趾間本節後陷者中去內庭二寸衝陽甲乙云在足趺上五寸骨間動脈上去陷谷三寸皆屬於胃張云三里下三寸為上廉上廉下三寸為下廉大腸屬上廉小腸屬下廉蓋胃為六腑之長而大腸小腸皆與胃連居胃之下氣本一貫故皆屬於胃而其下腧亦合於足陽明經也張開之曰大腸小腸受盛胃腑水穀之餘濟泌別汁而生津液故皆屬於胃是以大腸受胃腑之經氣而屬於巨虛上廉小腸屬巨虛下廉上合手少陽張云按諸經皆不言上合而此下三經獨言之者蓋以三焦並中下而言小腸大腸俱在下而經則屬手故皆言上合某經簡按三焦亦專指下焦詳見下文注關衝甲乙云在手小指次指之端去爪甲角如韭葉中渚甲乙云在手小指次指本節後陷者中三焦下腧止是太陽絡也張云足大趾當作足小趾蓋小趾乃足太陽脈氣所行而三焦下俞則並足太陽經出小趾之前上行足少陽經之後上出膕中外廉委陽穴是足太陽之絡也按邪氣臟腑病形篇曰三焦病者候在足太陽之外大絡大絡在太陽少陽之間則此為小趾無疑簡案此本馬注然考甲乙云委陽三焦下輔俞也在足太陽之前少陽之後出於膕中外廉兩筋間承扶下六寸此足太陽之別絡也據邪氣臟腑病形篇及甲乙足大趾之前當作足太陽之前張注未為得矣手少陽經也張云以上三焦之腧皆手少陽經也足少陽太陰之所將簡案一本作陽注亦見道藏本據上文陰作陽為是馬氏仍此而張雲陽陰二字互謬也當作少陰太陽蓋三焦屬腎與膀胱也將領也改少陽為少陰亦未為得矣宣明五氣篇王注引本經云足三焦者太陽之別也上踝五寸馬雲其上外踝計五寸名光明穴又足少陽膽經之絡穴別行者三焦與之別入貫腨腸腨腸馬雲即足腹也簡案刺腰痛論王注腨踵魚腹之外云腨形勢如臥魚之腹系腨以腸亦因此耶少澤甲乙云在手小指之端去爪甲一分陷者中前谷甲乙云在手小指外側本節前陷者中後谿甲乙云在手小指外側本節後陷者中腕骨甲乙云在手外側腕前起骨下陷者中陽谷甲乙云在手外側腕中兌骨下陷者中伸臂甲乙云屈肘得之商陽甲乙云在手大指次指內側去爪甲如韭葉二間甲乙云在手大指次指本節前內側陷者中三間甲乙云在手大指次指本節後內側陷者中合谷甲乙云在手大指次指間陽谿甲乙云在腕中上側兩旁間陷者中曲池甲乙云在肘外輔骨肘骨之中沈彤釋骨云肘大骨之兩起者曰肘外輔骨三十六腧也馬雲腧從肉者穴之總名非井俞滎經合之俞張云五臟各有井滎腧經合五穴共計二十五腧六腑復多一原穴故共計三十六腧也簡案馬俞腧之別不必矣上合於手者也張云凡五臟六腑之經臟皆屬陰腑皆屬陽雖六腑皆屬三陽然各有手足之分故足有太陽膀胱經則手有太陽小腸經足有陽明胃經則手有陽明大腸經足有少陽膽經則手有少陽三焦經此所謂上合於手者也不惟六腑六臟亦然如足有太陰脾經則手有太陰肺經足有少陰腎經則手有少陰心經足有厥陰肝經則手有厥陰心經此臟腑陰陽手足皆相半也然其所以分手足者以經行有上下故手經之腧在手足經之腧在足也缺盆之中任脈也名曰天突馬雲此舉諸經之穴有列其行次而言之有指其穴所而言者皆亦人以覓穴之法也腹部中行系任脈經然在缺盆之中間是為任脈其穴曰天突在頸前結喉下四寸宛宛中乃腹中央第一行次之脈也缺盆系足陽明胃經穴在肩下橫骨陷中去中行二寸故在脈當為缺盆之中間一次馬雲次字下據下文當有一脈字猶言脈之一行也下仿此張云一次者次於中脈一行足陽明也簡案今從張注人迎馬雲夾結喉兩旁一寸半張云頸中第二行脈也扶突張云二次於足陽明之外者手陽明也穴名扶突在頸當曲頰下一寸人迎後一寸五分即第三行脈也天窗張云在頸大筋前曲頰下扶突後即第四行脈也天容馬雲按天容系手太陽經非足少陽經疑是天衝穴張云四次於手太陽之後者足少陽也上出天窗之外而頸中無穴是第五行脈也此雲天容者系手太陽經穴疑誤簡案天衝雖為足少陽經穴然在耳上如前三分無屬頸部之理馬注不可據天牖張云在頸大筋外天容後天柱前完骨後髮際上是第六行脈也天柱張云在挾項後大筋外廉髮際陷中是第七行脈也風府張云在項後入髮際一寸自前中行任脈至此是為第八行而頸脈止於此也腋內動脈止名曰天池張云此言腋下二經之脈也手太陰之穴名天府手厥陰之脈名天池二穴俱在腋下三寸然天府則在臂臑內廉天池則在肋間乳後一寸也刺上關者止伸不能屈馬雲此言取穴之法也上關即客主人穴系足少陽膽經呿大張口貌欠撮口出氣也刺上關者必開口有空故張口乃得之所以呿而不能欠也在耳起骨上廉下關系足陽明胃經穴刺下關者必合口乃得之故能欠而不能呿也在客主人下耳前動脈下廉開口則閉閉口有穴犢鼻系足陽明胃經穴膝臏下䯒骨上俠解大筋陷中形如牛鼻故名刺犢鼻者必屈足以取之故屈而不能伸也兩關者內關系手厥陰心包絡經手掌腕後二寸兩筋間與外關相抵外關系手少陰三焦經手背腕後二寸兩筋間陽池上二寸刺兩關者必伸手以取之故伸而不能屈也挾喉之動脈也張云此下乃重言上文六陽經脈以明其詳也挾喉動脈即足陽明人迎也其腧在膺中馬雲胸之兩旁謂之膺也張云自挾喉而下行於胸膺凡氣戶庫房之類皆陽明之腧故曰其腧在膺中不至曲頰一寸張云此復言扶突穴在足陽明動脈之外當曲頰下一寸也當曲頰張云此復言天窗穴也耳下曲頰之後馬雲足少陽經名天衝者為五行然穴在耳下曲頰之後正耳後髮際二寸耳上如前三寸也張云仍如上文言手太陽之天容也此非足少陽之穴而本篇重言在此意者古以此穴屬足少陽經也簡案甲乙天衝在耳上如前三分銅人云天衝在耳後入髮際二寸知是馬注不可據上加完骨之上馬雲手少陽經名天牖者為六行然穴在耳後上加完骨之上正以完骨在上而天牖在下則完骨加其上也簡案甲乙云天牖在頸筋間缺盆上天容後天柱前完骨後髮際上今考文理其穴在完骨下者不宜言加完骨之上馬注未清晰挾項大筋之中張云此復言天柱穴挾後項大筋中髮際簡案馬以下文陰字接際字下為句注云挾項後大筋之中髮際之陰也不可從志本依馬為句陰尺動脈張云言陰氣之所在也小針解曰奪陰者死言取尺之五里其義即此案小針解張注尺之五里尺澤後之五里也馬雲尺澤之上三寸有動脈即肘上三寸向里大脈之中央名五里穴屬手陽明大腸經志云按皮膚之氣血從手足之指井溜注於脈中而合於肘膝間故曰尺動脈右五里五腧之禁也簡案逆奪之凡五至井榮俞經合五腧之血氣盡故言五腧之禁也詳見素氣穴論本經玉版論傳道之腑馬雲道導同凡小腸已化之物從此傳導而下也志云此節止論五臟所合之六腑者本篇論十二經脈之所出從井而入於合蓋自外而內也中精之腑甲乙作清淨之腑馬雲他腑之所受者皆至濁之物而唯膽則受五臟之精汁也少陽屬腎甲乙作少陰馬雲少陽三焦也三焦之正脈至項散胸中而腎脈亦上連於肺三焦之下腧屬於膀胱而膀胱為腎之合故三焦亦屬乎腎也故將兩臟張云三焦為中瀆之腑膀胱為津液之腑腎以水臟而領水腑理之當然故腎得兼將兩臟將領也兩臟腑亦可以言臟也本臟篇曰腎合三焦膀胱其義即此中瀆之腑張云謂如川如瀆源流皆出其中也即水穀之入於口出於便自上而下必歷三焦故曰中瀆之腑水道出焉膀胱受三焦之水而當其疏泄之道氣本相依體同一類故三焦下腧出於少陽並太陽之正入絡膀胱約下焦也孤之腑也簡案肺合大腸心合小腸肝合膽脾合胃腎合膀胱而三焦唯屬膀胱無所配合故謂孤之腑也蕭吉五行大義云三焦處五臟之中通上下行氣故為中瀆腑也又引河圖云三焦孤立為內瀆之腑並與本節之旨符矣而此所言三焦專指下焦張氏質疑錄論之詳也素問識靈蘭秘典六節藏象論注舉數證當參考春取絡脈張云十二經之大絡如手太陰列缺之類是也諸滎張云十二經之用穴如手太陰魚際之類是也分肉之間水熱穴論曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉之間簡案四時之刺諸篇所說有異同甲乙類例通會殆為明備當參考諸腧孫絡張云諸腧者十二經之腧穴如手太陰經太淵之類是也絡之小者為孫絡皆應夏氣夏以老陽之令陽盛於外故宜淺刺於諸腧孫絡及肌肉皮膚之上也諸合張云十二經之合穴如手太陰尺澤之類是也諸合應秋故宜取之秋以少陰之令將降未降氣亦在中故余如春法謂亦宜中取於大經分肉之間而可淺可深也諸井張云十二經之井穴如手太陰少商之類是也諸腧井云即前太淵三間之類張云臟腑之腧如肺腧心腧之類是也非上文五腧之謂諸井諸臟皆主冬氣冬以老陰之令陽氣伏藏故宜取井腧欲其深而久留之也簡案二說各異未知孰是氣之所處張云處上聲謂氣之所居也轉筋者止快也張云轉筋者必拘攣立而取之故筋可舒也痿厥者必體廢張其四肢而取之故血氣可令立快也志云張者仰臥而張大其四肢小針解第三馬雲九針十二原中有小針之要而此篇正以解其首篇故名之曰小針解素問又有針解篇與此小同神客張云神正也客邪也邪正相干故曰共會在門張云出入所由故謂之門先知何經之病張云若不能先知是為未睹其疾又曰惡知其原速遲馬本志本作數遲非守四肢張云手之兩肘足之兩膝謂之四關守氣張云往來逆順至與不至皆氣之機也針以得氣張云以已同氣易失地張云毫釐之差即失其氣之機也氣不下也張云補瀉不得其法雖竭盡血氣而病氣不應也小者逆也張云氣去故脈虛而小平者順也張云氣來故脈平而和氣口虛而當補之也張云此與針解篇皆釋九針十二原之義但此以氣口言虛實彼以針下氣至言虛實義雖若異然互有發明皆當察也徐而疾則止徐出也張云此二句釋義其用似反當針解篇者為得針解篇曰徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之以下張云言已退也佖然史云佖音必滿貌張云音弼詩曰威儀佖佖怳然史云籲往切狂貌志云怳惚也簡案怳恍同恍惚又作怳惚不分明也志為是字典怳然失意貌邪氣之中人也高張云傷於風者上先受之故凡八風寒邪之中人其氣必高而在上濁氣在中止在中也張云水穀入胃其清者化氣上歸於肺是為精氣若寒溫失宜飲食過度不能運化則必留滯腸胃之間而為病此濁氣在中也簡案溜張讀為留非也所溜為滎難經作流知溜流古通針陷脈則邪氣出者取之上張云諸經孔穴多在陷者之中如刺禁論所謂刺缺盆中內陷之類是也故凡欲去寒邪須刺各經陷脈則經氣行而邪氣出乃所以取陽邪之在上者簡案志注十二原篇云陷脈額顱之脈顯陷於骨中故針陷脈則陽之表邪去矣據此則取之上之上字與下文陽明合對殆為穩貼但以顱額之脈為陷脈者未見所本俟考針中脈則邪氣出張本邪作濁據十二原作濁為是陽明合也張云足三里也刺之可以清腸胃故能取濁氣之在中者奪陰者死止五往者也張云奪臟氣也尺之五里尺澤後之五里也手陽明經穴禁刺者也正言也張云即如上文取三陽之謂尺寸小大緩急滑澀簡案邪氣臟腑病形篇云調其脈之緩急小大滑澀而病變定矣又論疾診尺篇云審其尺之緩急小大滑澀肉之堅脆而病形定矣此云小大緩急滑澀者乃兼寸口之脈與尺之皮膚而言也在於終始張云終始本經篇名持心也張云釋前文觀其形聽其動靜知其邪正者皆主持於心也內絕張云脈口浮虛按之則無是謂內絕不至臟氣之虛也無氣以動故靜張云外者陽之分陰氣既虛復留針於外以致陽氣則陰愈虛而氣竭於內無氣以動故其死也靜外絕張云脈口沉微輕取則無是謂外絕不至陽之虛也陰氣有餘故躁張云陽氣既虛復留針四末以致陰氣則陽氣愈竭必病逆厥而死陽並於陰則陰氣有餘故其死也躁五色循明馬雲六節藏象論岐伯曰五氣入鼻藏於心肺上使五色修明音聲能彰則循明當作修明張云五臟六腑之精氣皆上注於目而為之精故能使五色循明蓋色明於外者由氣盛於內故其聲音亦必彰大與平生異矣簡案仍張注循明不必改字志云聲與平生異者散敗之聲也恐誤邪氣臟腑病形篇第四馬雲篇內首三節論邪氣入於臟腑第四節論病形故名篇邪氣之中人高也志云邪氣者風雨寒暑天之邪也故中人也高濕乃水土之氣故中於身半以下此天地之邪中於人身而有上下之分溜於腑甲乙溜作留馬雲溜當作流下文溜於經亦同異名同類張云經脈相貫合一本同類也然上下左右部位各有所屬則陰陽之名異矣諸陽之會止則下少陽張云此言邪之中於陽經也手足六陽俱會於頭面故為諸陽之會凡足之三陽從頭走足故中於面則自胸腹下行於陽明經也中於項則自脊背下行於太陽經也中於頰則自脅肋下行於少陽經也脈遍周身者惟足六經耳故但言足也若飲食甲乙作熱飲食足其中於膺背兩脅亦中其經史云一作其中於肩背兩脅亦下其經張云膺在前陽明經也背在後太陽經也兩脅在側少陽經也中此三陽經與上同其陰張云臂胻內廉曰陰手足三陰之所行也淖澤史云淖澤也澤液非張云柔潤也不能客史云客一本作容簡案甲乙作容俱通邪之中人臟奈何甲乙作邪之中臟者奈何愁憂恐懼止而上行張云此下言邪之中於五臟也然必其內有所傷而後外邪得以入之心藏神憂愁恐懼則神怯故傷心也肺合皮毛其臟畏寒形寒飲冷故傷肺也若內有所傷而外復有感則中外皆傷故氣逆而上行在表則為寒熱疼痛在裡則為喘咳嘔噦等病汪云形寒傷外飲寒傷內素問咳論云其寒飲食入胃則肺寒肺寒則外內合邪與此文義正同今人惟知形寒為外傷寒而不知飲冷為內傷寒訛為陰證非也凡飲冷者雖無房事而亦每患傷寒也若房事飲冷而患傷寒亦有在三陽經者當從陽症論治不得便指為陰症也世醫不明妄以熱劑投之殺人多矣特揭出以告人氣逆上行故有發熱頭痛諸證簡案氣逆甲乙作氣迎非傷肝張云肝藏血其志為怒其經行脅下也有所擊僕止則傷腎百病始生篇黃帝曰其生於陰者奈何岐伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎張云脾主肌肉飲食擊僕者傷其肌肉醉後入房汗出當風者因於酒食故所傷皆在脾腎主精與骨用力舉重則傷骨入房過度則傷精汗出浴水則水邪犯其本臟故所傷在腎簡案擊僕與下文所謂異得往張云往進也卒寒張云卒猝同空竅張云空孔同精陽氣上走於目張云精陽氣者陽氣之精華也故曰五臟六腑之精氣皆上注於目而為之精其彆氣張云彆氣者旁行之氣也氣自兩側上行於耳氣達則竅聰所以能聽其宗氣張云宗氣大氣也宗氣積於胸中上通於鼻而行呼吸所以能臭為臭簡案臭齅同許救切說文以鼻就臭也亦作嗅㗜其濁氣張云濁氣穀氣也谷入於胃氣達於唇舌所以知味皆上熏於面張云凡諸氣之津液皆上熏於面如脈度篇曰五臟常內閱於上七竅也故肺氣通於鼻心氣通於舌肝氣通於目脾氣通於口腎氣通於耳此五臟之氣皆上通於七竅不獨諸陽經絡乃得上頭也天氣甚寒簡案諸本及甲乙作大熱甚寒但張本與此同上文曰天寒而不曰天熱則作天氣甚寒為是四十七難云人面獨能耐寒者何也然人頭者諸陽之會也諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳故令面耐寒也張揭數證駁難經今不繁引虛邪之中身也八正神明論云虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形又管能篇文與本篇略同命曰明止命曰工張云六十一難曰望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧蓋本諸此與尺之相應也甲乙作與尺之皮膚相應也據下文皮膚二字正系缺文甲乙為是桴鼓簡案桴枹同音浮擊鼓槌也漢李尋傳猶枹鼓之相應是也本末根葉之出候也志云夫精明五色者氣之華也乃五臟五行之神氣而見於色也脈者榮血之所循行也尺者謂脈外之氣血循手陽明之絡而變見於尺膚脈內之血氣從手太陰之經而變見於尺寸此皆胃腑五臟所生之氣血本末根葉之出候也形肉志云謂尺膚也知色脈與尺之三者則神且明矣見其色止則已矣張云不得其脈言不得其合色之正脈也相勝之脈如青色得毛脈以金剋木之類是也相生之脈如青色得石脈以水生木之類是也調其脈之緩急小大滑澀張云緩急以至數言小大滑澀以形體言滑不澀也往來流利如盤走珠澀不滑也虛細而遲往來覺難如雨沾沙如刀刮竹六者相為對待調此六者則病變可以定矣調察也賁而起甲乙作大字更有脈沉者尺之皮膚亦沉一句據上文舉六者則為剩文張云賁忿奔二音大也沸起也論疾診尺篇曰審其尺之緩急小大滑澀肉之堅脆而病形定矣義與此同簡案十三難云脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑亦此義也故善調尺者止十全六張云此正本末根葉之義也以尺寸言則尺為根本寸為枝葉以脈色言則脈為根本色為枝葉故善調尺者不待於寸善調脈者不待於色也然必能參合三者而兼行之更為本末皆得而萬無一失簡案十三難云經言知一為下工知二為中工知三為上工上工者十全九中工者十全八下工者十全六周禮天官醫師職云歲終稽其醫事則以制其食十全為上十失一次之十失二次之十失三次之十失四為下心脈急樓氏綱目云謂色赤脈鉤而急也張云急者弦之類瘈瘲張云急主風寒心主血脈故心脈急甚則為瘈瘲筋脈引急曰瘈弛長曰瘲瘈熾寄系三音瘲音縱緩甚為狂笑張云心氣熱則脈縱緩故神散而為狂笑心在聲為笑也微緩為伏梁止唾血志云伏梁乃心下有餘之積故微主邪薄於心下也心主血熱則上溢而時唾血也簡案經筋篇云手少陰之筋病內急成伏梁唾血膿者死不治大甚為喉吤甲乙作喉吤吤脈經作喉介馬雲心火充溢喉中吤然有聲簡案吤字書無義下文云喉中吤吤然唾出素咳論云喉中吤吤如梗狀介芥古通乃芥蔕之芥喉間有物有防礙之謂吤唯是介字從口者必非有聲之義心痹見五臟生成篇及痹論善淚出張云以手少陰之脈挾咽喉連目系也小甚為善噦張云陽張虛而胃土寒故善噦微小為消癉馬雲血液枯燥病為消癉志云消癉者三消之證簡案張為肌膚消瘦之義非心疝見脈要精微論四時刺逆從篇大奇論喑張云心脈澀甚則血氣滯於上聲由陽發滯則為喑血溢張云澀當傷血也簡案吐衄血之屬維厥史云經絡有陽維陰維故有維厥馬同張云四維厥逆也以四肢為諸陽之本而血衰氣滯也耳鳴顛疾志云南方赤色入通於心開竅於耳心氣虛故耳鳴顛疾簡案甲乙顛作癲顛癲瘨三字並通肺脈急甚樓氏云謂色白脈毛而急也癲疾張云風邪勝也木反乘金故生癲疾微急止息肉不通馬雲皆肺氣不足風邪有餘所致也多汗張云皮毛不固故表虛而多汗志云緩則熱甚故多汗痿瘻志云肺熱葉焦則為痿也鼠瘻寒熱病也其本在臟其末在脈肺主百脈是以微緩之有熱微澀之有寒皆為鼠瘻在頸腋之間簡案脈經無瘻字偏風志云本經曰偏枯身偏不用病在分腠之間蓋病在皮膚則為寒熱病在血脈為寒熱鼠瘻在分腠則為偏風肺主周身之氣而朝百脈也腠理開故頭以下汗出不可止頭以下者頸項胸背之間脈之外部也簡案脈經注云一作漏風據汗出不可止作漏風近是脛腫張云心火爍肺真陰必涸故為脛腫肺痹見痹論及五臟生成篇喻氏法律云肺痹心膈窒塞上氣不下蓋肺為相傳之官治節行焉管領周身之氣無微不入是肺痹即為氣痹明矣起惡日光張云以氣分火盛而陰精衰也志云日光太陽之火陰血少故惡日光金畏火也脈經作起腰內三字為泄論疾診尺篇云尺膚寒其脈小者泄少氣張云陽氣虛而腑不固病當為泄志云肺與大腸為表裡也消癉張云金衰則水弱故為消癉志云肺主津水之生原也息賁張云氣血皆實熱故為息賁上氣息賁喘急也賁音奔上下出血張云上言口鼻下言二陰也澀甚止善酸矣張云澀脈因於傷血肺在上焦故澀甚當為嘔血若其微澀氣當有滯故為鼠瘻在頸腋間氣滯則陽病血傷則陰虛故下不勝其上而足膝當痠軟也酸音酸肝脈急甚樓氏云謂色青脈弦而急也惡言甲乙注一作妄言志云肝主語在志為怒張云言多嗔惡也肥氣張云以木邪傷土故為肥氣在脅下脅下者肝之經也五十六難楊注云肥氣者肥盛也言肥氣聚於左脅之下如覆杯突出如肉肥盛之狀也小兒多有此病善嘔志云食氣入胃散精於肝緩主多熱熱則肝氣逆故善嘔簡案馬張以緩為脾脈恐誤水瘕痹也甲腋無也字是志云水瘕痹者亦食飲之所積也簡案蓋水癖癖飲之類痹閉也大甚為內癰止為消癉志云本經曰喜怒不測飲食不節陰氣不足陽氣有餘榮氣不行乃發為癰大主肝氣盛盛則鬱怒而不得疏達故為內癰嘔衄肝氣逆於上也陰縮肝氣逆於下也肝脈抵少腹上注肺咳引小腹者經氣逆於上下也小者血氣皆少少則木火盛故多飲及為消癉也簡案肝痹見痹論及五臟生成篇㿉疝張云熱壅於經故為㿉疝遺溺張云以肝火在下而疏泄不禁也溢飲志云飲留於四肢則經脈阻滯故脈澀脈經作淡飲瘈攣筋痹甲乙作瘈瘲攣筋張云皆血不足以養筋也脾脈急甚為瘈瘲張云木乘土也脾主肢體而風氣客之故為瘈瘲膈中馬雲木邪侮土其在上為膈中食飲入而還出脾氣不上通也本經上膈篇云氣為上膈食飲入而復出後沃沫志云不能遊溢津液上歸於肺四布於皮毛故涎沫之從口出也簡案馬雲在下為去後沃沫脾氣不下疏也誤緩甚止若無病張云脾脈宜緩而緩甚則熱脾主肌肉四肢故脾熱則為肉痿及為厥逆若微緩而為風痿四肢不用者以土弱則生風也痿弱在經而臟無恙故心慧然若無病擊僕張云脾主中氣脾脈大甚為陽極陽極則陰脫故如擊而仆地樓氏云凡病偏枯必先仆倒故內經連名稱為擊僕偏枯也疝氣張云以濕熱在經而前陰為太陰陽明之所合也簡案他四臟舉積名而此獨云疝氣可疑脈經作痞氣是五十六難云脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚楊注痞否也言否結成積也腹裡大膿血張云腹裡大者以膿血在腸胃之外亦脾氣壅滯所致簡案脈經無腹字里作裹素腹中論云伏梁裹大膿血居腸胃之外此則痞氣而裹大膿血在腸胃之外也寒熱張云中焦之陽氣不足也志云血氣虛也消癉志云脾虛而不能為胃行其津液故為消癉㿉癃張云脾脈滑甚太陰實熱也太陰合宗筋故為㿉癃疝蛕蠍張云其微滑濕熱在脾濕熱薰蒸故生諸蟲及為腹熱簡案蛕蚘蛔並音回說文蛕腹中長蟲爾雅注蠍木中蠹蟲劉勰新論云身之有欲如樹之有蠍澀甚止下膿血張云脾脈澀甚而為腸㿉微澀而為內㿉及多下膿血者以澀為氣滯血傷而足太陰之別入絡腸胃也腸㿉內㿉遠近之分耳一曰下腫病蓋即疝漏之屬簡案脈經腸㿉作腸頹內㿉作內潰甲乙同頹作㿗注云㿗一作潰蓋二證各別腸㿗四種㿗病之一見千金方內㿉則馬亦以潰字釋之然不詳其為何證張云疝漏之屬姑仍之腎脈急甚樓氏云謂色黑脈石而急也骨癲疾見癲狂篇甲乙作骨痿癲疾沉厥馬雲蓋風邪入腎則為厥而腎氣不足則當沉滯而無知也奔豚志云虛氣反逆故為奔豚陰寒在下故足不收腎開竅於二陰氣虛不化故不得前後也張云按五十六難曰腎之積名曰奔豚發於少腹上至心下若豚狀或上或下無時其義本此簡案骨空論云督脈生病從少腹上衝心而痛不得前後為沖疝又史倉公傳云湧疝令人不得前後溲蓋皆奔豚也折脊志云督脈屬腎貫脊緩則督脈懈弛故脊折也簡案樓氏綱目脊痛門引本經文知是脊痛之謂猶折髀折腰之折洞甲乙作洞泄脈經作洞下簡案根結篇倉廩無所輸膈洞此謂洞泄與膈證也張則見下嗌還出之文以為上出之義則似為膈證不可從蓋洞即史所謂迵風倉公云迵風者飲嗌下倉而輒出不留又云迵風之狀飲食下嗌輒後之又云即數十出還出即後之之謂其為洞泄洞下明矣陰痿馬雲火盛水衰當為陰痿也石水止不治張云若其微大腎陰亦虛陰虛則不化不化則氣停水積而為石水若至胃脘則水邪盛極反乘土藏氾濫無制故死不治石水義見素陰陽別論大奇論腄音垂重墜也腕當作脘諸本並訛洞泄消癉馬雲腎氣甚衰無以主下焦而為洞泄亦水不配火當為消癉之證也癃㿉骨痿志云腎有熱則為小便閉癃為睪丸腫㿉骨痿坐不能起熱傷腎氣也目無所見志云熱傷骨精也甲乙見下有見黑丸三字脈經視見黑花四字大癰志云血氣皆始於腎澀則血氣阻滯故為大癰不月沉痔志云氣血不行故為女子不月為沉痔簡案沉痔蓋謂痔之沉滯不已者諸急張云急者弦緊之謂仲景曰脈浮而緊者名曰弦也緊則為寒成無己曰緊則陰氣勝故凡緊急之脈多風寒而氣化從乎肝也簡案氣化從乎肝不可信據下仿此緩者張云緩者縱緩之狀非後世遲緩之謂仲景曰緩則陽氣長又曰緩者胃氣有餘故凡縱緩之脈多中熱而氣化從乎脾胃也大者張云大為陽有餘陽盛則陰衰故多氣少血仲景曰若脈浮大者氣實血虛也故脈之大者多浮陽而氣化從乎心也小者張云近於微細在陽為陽虛在陰為陰弱脈體屬陰而氣化從乎腎也滑者張云滑脈為陽氣血實也故為陽氣盛而微有熱仲景曰滑者胃氣實玉機真藏論曰脈弱以滑是有胃氣故滑脈從乎胃也澀者張云澀為氣滯為血少氣血俱虛則陽氣不足故微有寒也仲景曰澀者榮氣不足亦血少之謂而此曰多血似乎有誤觀下文刺澀者無令其血出少可知矣澀脈近毛故氣化從乎肺也刺澀者止以和其脈張云脈澀者氣澀俱少難於得氣故宜必中其脈而察其逆順久留疾按而無出其血較之諸刺更宜詳慎者以脈澀本虛而恐傷其真氣耳循音巡摩按也痏委偉二音刺瘢也調以甘藥也張云愚按此節陰陽形氣俱不足者調以甘藥甘之一字聖人用意深矣蓋藥食之入必先脾胃而後五臟得稟其氣胃氣強則五臟俱盛胃氣弱則五臟俱衰胃屬土而喜甘偉中氣不足者非甘溫不可土強則金王金王則水充此所以土為萬物之母而陰陽俱虛者必調以甘藥也入安連過張云五臟六腑皆有五腧五腧之所入為合即各經之合穴也然手之三陽復有連屬上下氣脈相通者亦謂之合故此以入安連過為問甲乙作入安從道屬於腑者也張云此下言六陽之經內屬於腑因以明手之三陽下合在足也滎輸止治內腑張云滎腧氣輕浮淺故可治外經之病合則氣脈深入故可治內腑之病巨虛上廉馬雲此本足陽明胃經之穴其實為大腸之合前本輸篇有云復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉大腸屬上廉小腸屬下廉張云大腸手陽明也本經之合在曲池也其下腧則合於足陽明之巨虛上廉也巨虛下廉張云小腸手太陽也本經之合在小海其下腧則合於足陽明之巨虛下廉委陽張云三焦手少陽也本經之合在天井其下腧則合於足太陽之委陽穴按大腸小腸三焦皆手三陽之經然大小腸為下焦之腑連屬於胃其經雖在上而氣脈不離於下故合於足陽明之巨虛上下廉三焦為孤獨之腑其於三部九候無所不統故經之在上者屬手腧之在下者居足所以十二經中惟此手之三陽乃有下腧故本輸篇曰大腸小腸皆屬於胃三焦下腧在於足小趾之前少陽之後出於膕中外廉名曰委陽即此謂也屈伸而索之馬雲屈其體以覓承扶之陰紋伸其體以度委陽之分寸委陽在趺下一寸六分承扶在尻臀下陷紋中正豎膝予之齊張云謂正身蹲坐使兩膝齊也委陽之陽馬雲古人謂外為表又名之曰陽張云當作委中之陽蓋委中之外廉即陽陵泉之穴也揄申而從之馬雲必揄揚以申其手足善取之耳張云揄引也申明也取外經者在滎輸然亦必引正詳明方可從而治也揄音余簡案揄引也見說文張注骨空論折使揄臂亦同今從之志云揄音於引也抒也伸舒其四體使經脈之流通也魚絡血張云手陽明之脈行於手魚之表簡案血絡論云血脈者盛堅橫以赤上下無常處小者如針大者如箸則而瀉之萬全也豎陷者甲乙作堅若陷者是志豎作堅張云兩跗之上脈即衝陽也豎者堅而實陷者弱而虛皆足陽明胃脈之病切痛而鳴濯濯馬雲切痛者痛之緊也濯濯者腸中有水而往來氣衝則有聲也冬日重感張本日作曰注云當作月支兩脅支甲乙作搘控睪而痛時窘之後馬雲睪音皋陰丸小腸近小腸之內後附腰脊下連睪丸故小腹痛腰脊控引睪丸而痛痛時窘甚而欲往去後也張云不得大小便而時窘之後蓋即疝之屬也當耳前止此其候也張云皆手太陽之經故其病如此腹氣滿甲乙腹下有張字亦見於脈馬雲脈必下陷當取此穴以刺之志云其脈亦見於皮部當取之委陽小便偏腫諸本作小腹是但張與此同肩上熱甲乙肩作眉注云一作肩皆熱若脈陷甲乙無若脈陷三字簡案此係剩文當刪善太息志云膽氣不升故太息以伸出之口苦嘔宿汁簡案即嘔膽見奇病論心下澹澹恐人將捕之甲乙恐上有善字恐下有如字千金恐下有如字張云澹澹失意貌簡案澹憺同憺集韻動也經脈篇心主之脈是動則心中憺憺大動又至真要大論太陽司天寒淫所勝則心澹澹大動並是跳動貌張注非吤吤然數唾吤吤千金作介介唾上甲乙有咳字簡案馬張並云吤吤然有聲也非義見上文喉吤注在足少陽之本末甲乙在上有候字張云在腑為本在經為末也志云足少陽經脈之本在下其末在頸嗌之間陷下者灸之經脈篇云陷下則灸之張云陷下者為不足故宜灸其寒熱者志云少陽之樞證也當以經取之少陽之經氣外內出入者也必中氣穴志云氣穴者腑氣所注之經穴故中氣穴則針遊於巷即氣穴論之所謂遊針之居肉節張云肉有節界其謂肉節針染一作遊於巷馬雲氣脈相通即素問氣穴論遊針之居也如名氣衝穴為氣街而衛氣篇有胸氣腹頭氣脛氣皆有街則巷即街之義張云染著也巷道也中其氣穴則針著脈道而經絡通簡案染作遊為是反還內著馬雲與真氣相搏而亂邪反內著根結篇第五馬雲內有陰陽諸經根於某穴結於某穴故名篇岐伯曰甲乙作黃帝曰陰道偶陽道奇張云奇者數之單如一三五七九是也偶者數之拆如二四六八十是也發於春夏馬雲凡病發於春夏者則陰氣少而陽氣多是謂陰陽不調也志云發者謂人之陰陽開闔簡案今從馬義故莖葉枯槁濕雨下歸簡案此二句蓋謂上莖葉枯槁則濕雨歸其下根而養之乃秋冬之時候也然與上文之例不同或恐是衍文陰陽相移甲乙移作離奇邪離經馬雲奇邪不正之邪也感此入彼謂之離經張云奇邪弗常之邪也離經流傳無定也志云奇邪離經者邪不入於經流於大絡而生奇病言邪之變易不可勝數也折關敗樞馬雲素問離合真邪論曰太陽為開陽明為闔少陽為樞太陰為開厥陰為闔少陰為樞正與下文相同今曰關者是有關乃所以開闔也開闔而走陰陽大失馬雲關折樞敗門闔誤走其氣陰陽大失氣難復取張云敗折其關樞走失其陰陽簡案據張注八字為一句今仍馬注九針之玄要在終始甲乙作九針之要在於終始馬雲九針玄妙之法其要在終始篇中張云終始本末也即下文根結開闔之義又本經有終始篇所載者皆針道故不知終始針道咸絕命門者目也張云足太陽下者根於至陰穴上者結於睛明穴故曰命門者目也王氏曰命門者藏精光照之所則兩目也志云命門者太陽為水火生命之原目竅乃經氣所出之門也王氏說見陰陽離合論注顙大者鉗耳也馬雲謂頭維穴也張云足陽明下者根於厲兌上者結於承泣今曰顙大者意謂項顙之上大迎穴也大迎在頰下兩耳之旁故曰鉗耳志云顙大者頏顙也在上齶之中兩耳之間故曰鉗耳簡案樓氏云顙大謂額角入髮際頭維二穴也以其鉗束於耳上故名鉗耳也知馬依樓說今從之甲乙作結於頏顙頏顙者鉗大鉗大者耳也義未詳窗籠者耳中也馬雲謂聽宮穴也按手太陽小腸經有天窗穴一名窗籠出甲乙去頸大筋前曲頰下扶突後動脈應手陷中觀下文腎經結於任脈經之廉泉肝經結任脈經之玉英則本經有結之他經者疑天窗為足少陽經之所結歟張云乃手太陽聽宮穴也為手足少陽手太陽之會故足少陽結於此志云窗籠者耳中也如窗之通氣於上也簡案窗籠者耳也亦出衛氣篇太陽為開止為樞張云所謂開闔樞者不過欲明內外而分其辨治之法也志云開闔如戶扉樞猶轉牡舍樞則不能開闔舍開闔則無從運樞此三陽之氣互相出入於經脈皮膚形身臟腑之外內者也開闔樞義具陰陽離合論瀆而暴病起矣甲乙瀆作潰緩張云太陽為陽中之表故氣在肌肉為肉節瀆也表主在外邪易入之故多新暴病也簡案瀆慁也慁擾也瀆者皮肉宛膲而弱也甲乙作潰緩者皮肉緩膲而弱也張云即消瘦乾枯之謂簡案淮南子天文訓高注膲肉不滿也痿疾張云陽明主潤宗筋束骨而利機關故為痿疾骨徭馬雲正以其節緩而不能收即骨之搖動故也素問氣交變大論有筋骨徭復王注亦以為筋骨搖動簡案至真要大論又有筋骨徭並文亦同義當窮其本甲乙窮作竅張云竅此三陽所在之本或開或闔或樞以治之也太倉馬雲即中脘系任脈經甲乙云中脘一名太倉胃募也志云太倉者舌本也脾為倉廩之官其脈連舌本散舌下使之迎根故結於舌本名曰太倉簡案以太倉為舌本無所考廉泉簡案諸家為任脈經穴非也氣腑論足少陰舌下各一王注舌本左右二穴也刺瘧論舌下兩脈者廉泉也並謂腎經穴玉英馬雲即玉堂穴系任脈經甲乙云玉堂一名玉英張兆璜云謂唇內之齦交英木而人也謂齒白如玉木而人也簡案以玉英為齦交亦未見所據絡於膻中志云肝脈貫膈也簡案厥陰特多此一句膈洞馬雲開折則脾不運化倉廩無所轉輸其病為膈證為洞泄張云膈隔塞也洞如邪氣臟腑病形篇曰洞者食不化下嗌還出也志云膈者上不開而不受納洞者下關折而飧泄也氣絕面喜悲甲乙絕作弛馬雲肝氣絕而喜悲簡案絕謂阻絕也脈有所結而不通馬雲腎脈有所結而下焦不通取之不足甲乙無不足二字張云脈有結者皆不足之所致簡案不足二字衍甲乙為是足太陽止飛揚也張云此下言手足三陽之盛絡凡治病者所當取也足太陽之至陰井也京骨原也崑崙經也天柱在頭飛揚在足皆本經之當取者後效此天容甲乙注云疑誤馬雲當作天衝張同天容手太陽經穴下陵馬雲當作解谿經也張同小海簡案他經舉原穴此獨舉合穴者何一日一夜止曰狂生張云營運也人之經脈運行於身者一日一夜凡五十周以營五臟之精氣如五十營篇者即此之義其數則周身上下左右前後凡二十八脈共長十六丈二尺人之宗氣積於胸中主呼吸而行經隧一呼氣行三寸一吸氣行三寸呼吸定息脈行六寸以一息六寸推之則一晝一夜凡一萬三千五百息通計五十周於身則脈行八百一十丈其有大過不及而不應此數者名曰狂生狂猶妄也言雖生未可必也簡案馬雲狂生猶云僥倖而生也非不一代者十一難代作止脈輕作投並文略不同張云代更代之義謂於平脈之中而忽見軟弱或乍數乍疏或斷而復起蓋其臟有所損則氣有所虧故變易若此均名為代若五十動而不一代者五臟受氣皆足乃為和平之脈簡案脈要精微論云代則氣衰張守節史記正義云候脈動不定曰代即此義也楊玄操云代者還尺中停久方來名曰代也此本於傷寒論不可從予之短期張云予與同短期死期也李中梓云短近也死期近矣終始馬雲其要法在本經終始篇中其義甚詳乍數乍疏張云此其時相變代乃與常代者不同蓋以臟氣衰敗無所主持而失常如此故三部九候等論皆云乍疏乍數者死簡案張圈外注甚詳不復繁引逆順五體馬雲五體者即陰陽二十五人篇有五形之人也張云骨節皮肉血氣經脈稟有不齊刺治亦異所以有逆順之變慓悍史上比昭切下候岸切勇健貌張云慓音飄急也膏粱菽藿張云膏脂肥也粱粟類谷之良者也菽豆也藿豆葉也貴者之用膏粱賤者之用菽藿食味有厚薄稟質所以不同也微以徐之簡案據上文疾遲留疾推之似徐是疾之誤此豈徐出而不留之謂歟形氣不足止急瀉之張云貌雖不足而神氣病氣皆有餘此外似虛而內則實邪氣勝也當急瀉之東垣李氏云氣謂口鼻中氣息也形謂皮肉筋骨血脈也出辨惑論簡案張帶說神氣卻覺不允形氣有餘止急補之張云形雖壯偉而病氣神氣則不足此外似實而內則虛正氣衰也當急補之志云形氣謂皮肉筋骨之形氣病氣者陰陽血氣之為病也此雖分別形氣病氣然重在病氣之有餘不足陰陽氣俱不足張云陽主外陰主內若形氣病氣俱不足此表裡陰陽俱虛也滿而補之甲乙滿作實充郭素湯液醪醴論津液充郭王注云郭皮也內䐜甲乙䐜作脹㒤闢甲乙㒤作懾馬雲僻積之意張云㒤畏怯也㒤邪僻不正也簡案素調經論虛者聶闢氣不足王注聶謂聶皺闢謂闢疊也玉篇㒤尺涉切與懾通依王注聶皺與闢貂通類篇襵謂衣襞積馬意蓋亦同薄著張云瘦而澀也夭膲張云夭短折也膲焦同膲義見前乃光甲乙光作充亂脈甲乙脈作經五臟變化之病甲乙作五臟之變化無之病二字五脈張云五臟之脈應也皮之柔粗甲乙皮下有膚字壽夭剛柔篇第六少師甲乙作岐伯陰中有陰陽中有陽甲乙作陰中有陽陽中有陰據下文甲乙非是張云剛柔強弱短長無非陰陽之化然曰陰曰陽人皆知之至若陰中復有陰陽中復有陽則人所不知也故當詳審陰陽則刺得其方矣得病所始張云謂知其或始於陰或始於陽故刺之有理也謹度病端張云謂察其風因木化熱因火化濕因土化燥因金化寒因水化故與時相應也故曰病在陰之陰者止刺絡脈張云陰之陰者陰病在陰分也當刺其滎輸以諸經滎輸氣微亦陰之類如手太陰經魚際為滎太淵為輸者是也陽之陽者陽病在陽分也當刺其合穴蓋所入為合猶在陽分刺此以防深入如手陽明經曲池之類是也陽之陰者陽病在陰也當刺陰之經穴蓋所行為經其氣正盛即陰中之陽如手太陰經渠之類是也陰之陽者陰病在陽也當刺諸絡脈蓋絡脈浮淺皆在陽分如手陽明經偏歷之類是也簡案絡脈甲乙作陽之絡義尤明矣馬以陰陽為五臟六腑皮膚筋骨之義覺不允當故曰病在陽者止命曰風痹馬雲病在陽經者其名曰風義見素問風論病在陰經者其名曰痹義見素問痹論陰陽兩經俱受其病其名曰風痹東垣李氏云病在陽者命曰風此病在陽因十二經各受風邪以高言之氣分也故身半以上風之中也病在陰者命曰痹身半以下濕之中也樓氏曰陰陽俱病言陰陽氣血俱病也簡案二氏所取義各異然以上文陰陽推之馬注為得張意亦同張氏醫通云行痹者走注無定風之用也經云病在陽者命曰風在陰者命曰痹陰陽俱病命曰風痹越脾加朮附湯病有形止陰之類也張云有形而不痛者病淺在外也無形而痛者病深在內也志云有形者皮肉筋骨之有形無形者五臟六腑之氣也病有形而不痛者病在外之陽也病無形而痛者氣傷痛也其陽完而陰傷之也馬雲陽經不傷而陰經受傷耳急治其陰無攻其陽甲乙作急治其陽無攻其陰其陰完而陽傷之也甲乙注云九墟完作緩馬雲陰經不傷而陽經受傷耳急治其陽無攻其陰甲乙作急治其陰無攻其陽陰陽俱動止其形不久張云陰陽俱動表裡皆病也乍有形乍無形往來不常也加以煩心陰病甚於陽也大凡治病必求於本若求其在表面里亦病求其在裡而表亦病此以陰陽並傷故曰不表不里治之為難形將不久矣形氣病之先後張云形見於外氣運於中病傷形氣則或先或後必各有所應風寒傷形止相應也張云風寒外襲故傷於形情欲內勞故傷於氣內傷則病在臟腑外傷則應於皮毛若風傷筋脈則居於外內之間故應於筋脈此形氣表裡之有辨也病九日者止衰之馬雲衰去聲人之感病不同日數各有多少遠近以此大略病三日而刺一次者之法等而殺之久痹止出其血馬雲惟久痹而其身不能往來者則見其血絡盡出其血不必拘於三日一刺之法也簡案不去身謂留著而不退去也馬及張併為行去之去恐非形先病止倍其日馬雲風寒傷形形先病而未入臟者其病尚在於表猶甚淺也刺之日數一半而已如病九日而刺二次病一月而刺五次之謂也憂恐喜怒傷氣氣傷臟而外形又應者其病表裡皆然殊為深也刺之日數必加倍之如病九日而刺三次病一月而刺十次之謂也此月內難易之應也月字甲乙道藏吳本並作外是張云病有淺深故治有難易耳相任則壽張云相任者相當也相果則壽不相果則夭二果字甲乙作裹是簡案馬雲相果者如果木之果皮肉相稱即所謂堅果也志云果成也並不可從蔣示吉望色啟微云果裹也皮所以裹肉皮厚肉堅則相果若皮厚肉脆皮薄肉堅則不相果也血氣經絡止則夭張云血氣經絡者內之根本也形體者外之枝葉也根本勝者壽枝葉勝者夭也形充而止則危矣張云形充而皮膚和緩者氣脈從容故當壽形充而皮膚緊急者氣脈促迫故當夭形充脈大者表裡如一故曰順形充脈弱者外實內虛故曰危顴不起者馬雲顴為諸骨之宗顴大則一身之骨皆大而勝其形體之充大張同志云顴乃腎之外候故顴不起者骨小骨小則夭此先天之氣薄也簡案顴者骨之標於面尤易見者可以此相周身之骨也大肉䐃堅而有分者張云大肉臀肉也䐃者筋肉結聚之處堅而厚者是也有分者肉中分理明顯也此言形體雖充又必以肉之堅脆分壽夭其必驗於大肉者以大肉為諸肉之宗也故凡形充而臀削者必非福壽之兆簡案史音䐃渠永切腹中䐃脂馬仍此非也玉篇䐃渠隕切腹中䐃脂玉機真藏論說肉破䐃王注䐃謂肘膝後肉如塊者牆基卑高不及其地馬雲面部四旁為牆其基甚卑不及明堂闕庭等地之高張云牆基者面部四旁骨骼也地者面部之肉也牆基不及其地者骨衰肉勝也志云牆基者面部之四方也地地閣也牆基卑高不及地者四方之平陷也蔣氏望色啟微云耳邊為牆基耳前肉為地言耳卑小高不及其肉也簡案諸說未知孰是天年篇曰基牆高以方五閱五使篇曰牆下無基垂角去外如是者雖平常殆乃蔣說似是有因加疾者馬雲蓋不慎守而或為外感內傷也平人止危矣張云人之生死由乎氣氣勝則神全故平人以氣勝形者壽設外貌雖充而中氣不足者必非壽器若病而至於形肉脫雖其氣尚勝形亦所必死蓋氣為陽形為陰陰以配陽形以寓氣陰脫則陽無所附形脫則氣難獨留故不免於死或形肉未脫而元氣衰竭者形雖勝氣不過陰多於陽病必危矣刺有三變馬雲法有不同謂之變也刺營者出血馬雲正以血者營氣之所化營衛生會篇云營氣化血以奉生身素問調經論云取血於營刺衛者出氣馬雲正以衛氣屬陽痹論云衛氣循於皮膚之中分肉之間熏於肓膜散於胸次調經論云取氣於衛寒熱少氣血上下行張云營主血陰氣也病在陰分則陽勝之故為寒熱往來陰病則陰虛陰虛則無氣故為少氣邪在血故為上下妄行所以刺營者當刺其血分氣痛止客於腸胃之中張云衛屬陽為水穀之悍氣病在陽分故為氣痛氣無定形故時來時去怫鬱怒也愾大息也賁響腹鳴如奔也皆氣分之病風寒外襲而客於腸胃之間以六腑屬表而陽氣歸之故病亦生於衛氣簡案怫史云郁也愾廣雅滿也怫愾蓋郁懣之義馬雲怒意也張則以鬱怒大息釋之並非千金方癰疽門云身中忽有痛處如遭打撲之伏名曰氣痛痛不可忍遊走不住服五香連翹湯蓋與此證自異內熱張云謂溫其經也張氏醫通云內納同謂溫其經使熱氣內入血脈流通也刺布衣止熨之馬雲布衣氣血澀濁刺其寒痹之後當以火焠之大人氣血清滑刺其寒痹之後當以藥熨之張云以火焠之即近世所用雷火針及芥蒜蒸灸之類焠音翠灼也乾薑一斤桂心一斤甲乙斤作升無心字玉函經方藥炮製云桂削去皮用里黑潤有味者為佳丹溪心法云桂心者皮之肉厚去其粗厚而無味者止留近其木一層而味辛甘者故名之曰心美之之辭也㕮咀馬雲以口焠藥如豆粒也後世雖以刀代而猶有㕮咀之稱者本此漬酒中馬雲漬浸也馬矢熅中張云燃干馬屎而煨之也此西北方所常用者前蘇武傳置熅火注聚火無焱也蓋封塗勿使泄甲乙蓋作善使下有氣字張云塗鹽泥封固也晬馬雲周日也復布為復巾張云重布為巾如今之夾袋所以盛貯綿絮藥滓也滓柤也生桑灰炙巾張云炙巾以生桑炭者桑能利關節除風寒濕痹諸痛也以巾試身甲乙作炙巾以拭身王子接古方選注云藥熨大人之寒痹大人者富貴之人也寒痹者時痛而皮膚不仁也其血脈筋骨雖痹而稟氣清靈但以藥熨導引即可蠲痹非若刺布衣而必以火焠之也椒酒薑桂專通營氣以散血分之寒清酒置馬矢熅中馬矢西北方常用之取其微火非有他義也晬盡日也復巾夾袋也熨至於汗庶營氣得通熨凡三十遍者欲其寒邪去盡以巾拭身亦必三十遍者恐汗液之氣留也起步內中張云刺後起步於密室內中欲其血氣行而慎避風寒也凡此者皆所謂內熱之法官針篇第七官針最妙馬雲官者任也官針者任九針之所宜也張云官法也公也制有法而公於人故曰官針病弗能移張云用不得法則不能去病皮膚為癰張云內傷良肉則血流於內而潰於外故皮膚為癰支為大膿甲乙支作反馬雲支當作皮或作反張云病氣不瀉而傷其支絡故為大膿凡病有浮沉刺分淺深過之則內傷不及則外壅邪反從之後生大病簡案支字今從甲乙作反大者瀉小者不移張云當小而大則瀉傷正氣當大而小則病不能移皆失針之宜也病在皮膚止勿取張云病在皮膚無常處者火之遊行也用鑱針者主瀉陽氣也膚白則無火可知故不宜刺取之鍉針於井滎分輸張云此針宜於用補分輸言各經也病在中者張云中言其遠也九針論八曰長針主取深邪遠痹者也痹氣暴發九針論云調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如犛且圓且銳中身微大以取暴氣知痹氣暴發即所謂暴痹也大針九針十二原云尖如挺其鋒微圓以瀉機關之水也九針論云主取大氣不出關節者固居馬本居作痹注云前云病在經絡痼痹者取以鋒針當同之也但彼止取經取絡而此則瀉其井滎與俞及照五臟以取四時耳簡案居作痹未見所據日應九變日諸本作以是當刪改諸經滎輸臟腧張云諸經滎輸凡井滎經合之類皆腧也臟腧背間之臟腑腧也本經輸腧俞三字皆通用遠道刺甲乙無遠字簡案道導同腑腧張云謂足太陽膀胱經足陽明胃經足少陽膽經十二經中惟此三經最遠可以因下取上故曰遠道刺大經志云五臟六腑之大絡也邪客於皮毛入舍於孫絡留而不去閉結不通則流溢於大經之分而生奇病故刺大經之結絡以通之小絡之血脈張云調經論曰病在血調之絡經脈篇曰諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也分刺志云分肉之間溪谷之會亦有三百六十五穴會邪在肌肉者取之大瀉刺甲乙注一作大刺毛刺志云邪閉於皮毛之間浮淺取之所謂刺毫毛無傷皮刺皮無傷肉也刺浮痹皮膚也甲乙痹下有於字巨刺馬雲素問繆刺論以刺經穴為巨刺刺絡穴為繆刺皆左取右右取左焠刺馬雲調經論曰病在骨焠刺藥熨張云即後世火針之屬取寒痹者用之以上謂之九變十二節志云節制也言針有十二節制以應十二經也偶刺馬雲前後各用一針有陰陽配合之義故曰偶刺張云偶兩也前後各一故曰偶刺也以手直心止傍針之也張曰直當也以手直心若背謂前心後心當其痛所各用一針治之然須斜針以刺其傍恐中心則死也馬雲傍當作旁古蓋通用報刺張云重刺也簡案猶報灸之報無常處也甲乙無也字無拔針甲乙無無字恢刺史云恢苦回切大也一本作怪道藏本怪作慳恐誤恢大也出說文張云恢恢廓也志云恢大之也前後恢蕩其筋之急恢刺直諸本直作者當改旁之舉之前後樓氏云謂直刺入郄轉針頭從旁挑舉其筋也張云不刺筋而刺其旁必數舉其針或前或後以恢其氣則筋痹可舒也齊刺張云齊者三針齊用也故又曰三刺甲乙作參刺以治寒氣小深者甲乙寒下有熱字揚刺張云揚散也中外共五針而用在浮泛故能祛散博大之寒氣志云從中而發揚於四旁也治寒氣之博大者甲乙寒下有熱字無氣字直針刺張云直入無避也引起其皮而刺之則所用不深輸刺張云輸委輸也言能輸瀉其邪非上滎文輸之謂直入直出用其銳也稀髮針留之久也久而且深故可以去盛熱之氣志云直入直出如轉輸也短刺張云短者入之漸也故稍搖針而深致骨所以摩骨痹摩迫切也志云短刺者用短針深入而至骨浮刺馬雲似前揚刺但彼有正納旁納而此則止有旁入之針耳張云浮輕浮也旁入其針而浮舉之故可治肌膚之寒此與上文毛刺義大同陰刺馬雲以其刺陰經也張云刺陰寒也志云刺少陰之寒厥也率刺之張云率統也中寒厥足踝後少陰也甲乙厥足作者取似是馬雲中去聲簡案上文言十二刺應十二經然特舉足踝後少陰不及他經其義今無可考旁針刺甲乙無針字張云一正一旁也正者刺其經旁者刺其絡故可以刺久居之留痹贊刺張云贊助也數髮針而淺之以後助前故可使之出血而治癰腫志云助癰腫之外散也致其空脈氣也甲乙作致其脈空也張云蓋恐太過反傷正氣故但久留而引致之使其空中之脈氣上行也張兆璜云致五臟之神機非營衛血氣故曰空脈氣脈淺者勿刺甲乙脈下有氣字張云脈淺者最易泄氣穀氣出馬雲終始篇曰凡刺之屬三刺至穀氣故一刺則陽邪出再刺則陰邪出三刺則穀氣至正與此節同張云穀氣即正氣亦曰神氣出至也終始篇曰所謂穀氣至者已補而實已瀉而虛故以知穀氣至也志云穀氣者通會於肌腠之元真脾胃之所主也故曰穀氣陰邪出張云絕皮及肌邪氣稍深故曰陰邪未入分肉間也甲乙無也字間下有後刺深之一句馬雲肌肉分肉之辨肌肉在皮內肉上而分肉則近於骨者也分肉有二各部在外之肉曰分肉其在內近骨之肉與骨根分亦曰分肉張云大肉深處各有分理是謂分肉間也逐邪氣而來血氣甲乙作逐陽邪之氣無而來血氣四字致陰氣之邪止此之謂也甲乙作致陰邪之氣張云凡刺之淺深其法有三先刺絕皮取衛中之陽邪也再刺稍深取營中之陰邪也三刺最深及於分肉之間則穀氣始下下言見也按終始篇之義與此互有發明年之所加止不可以為工也張云年之所加如天元紀至真要等論是也氣之盛衰如八正神明論陰陽系日月等篇是也知天地之氣候則人有五虛五實皆可因而知矣此數句又見六節藏象論簡案此五句疑後人所缺半刺張云此即前章毛刺之義淺入而疾發故可取皮分以應肺豹文刺張云豹文者言其多也主取血脈所以應心關刺張云關關節也左右四肢也盡筋即關節之處也慎無出血血以養筋也肝主筋刺筋所以應肝或曰淵刺一曰豈刺甲乙此二句在四曰合谷刺下合谷刺張云言三四攢合如雞足也邪在肉間其氣廣大非合刺不可脾主肌肉故取肌痹者所以應脾簡案張戴人治郾城梁賈麻痹針用雞足法向上臥針三進三引復向下臥針送入見儒門事親輸刺張云義見前章腎主骨刺深至骨所以應腎
