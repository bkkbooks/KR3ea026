body:
  text: 卷六寒熱篇第七十諸本無篇字馬雲凡有瘰癧者其病必發寒熱故名篇寒熱瘰癧止不去者也馬雲瘰癧者瘡名一名鼠瘻瘡生於頸腋兩脈間乃陽明少陽兩經之所屬也正以鼠瘻有寒熱之毒氣留於其脈而不去耳俗云鼠用飲食流涎於其中人誤用之所以毒氣感而生瘰癧今鼠之頸腋多塊其狀猶瘰癧然後世有用貓製藥方者亦所以勝其毒耳大義又見後論疾診尺篇中張云瘰癧者其狀纍然而歷貫上下也故於頸腋之間皆能有之因其形如鼠穴塞其一復穿其一故又名為鼠瘻蓋以寒熱之毒留於經脈所以聯絡不止一曰結核連續者為瘰癧形長如蜆蛤者為馬刀又曰脅肋下者為馬刀簡案巢源瘰癧瘻候云此由風邪毒氣客於肌肉隨虛處而停結為瘰癧或如梅李棗核等大小兩三相連在皮間而時發寒熱是也久則變膿潰成瘻也又外臺集驗九種瘻其二曰鼠瘻始發於頸無頭尾如鼷鼠瘻核時上時下使人寒熱脫肉此得之由食大鼠餘毒不去其根在胃貍骨主之由此考之瘰癧者未潰之稱鼠瘻者已潰之名說文瘻頸腫也其謂之鼠者如鼷鼠跧於皮下狀也淮南說山訓貍頭愈鼠王充論衡人有鼠病吞貍自愈後世字書遂作癙是也瘰漏也漏泄不止之謂故名曰鼠瘻其言食大鼠及鼠涎之毒者誕也朱震亨云瘰癧不作寒熱者可生稍久轉為潮熱者危此言信然介按小者為瘰大者為癧名色甚多如項前為痰瘰項後為濕瘰左右兩側形軟遇怒即腫為氣癧堅硬筋縮為筋癧若連綿如貫珠者為瘰癧至於鼠癧其形如鼠又名鼠瘡甚至瘡口已合旁邊有眼出膿不止又有頸項生之不已復從腳底而生俗稱老鼠打洞其症尤為險惡毒氣簡案毒本作㩆說文云㩆厚也害人之草往往而生從草從毒周禮云聚毒藥又以五毒攻之是也書盤庚云惟汝自生毒禮緇衣小人毒其正皆假以惡害之義此云毒氣亦以邪惡之氣為言後世寒毒風毒之類毒字皆本此鼠瘻之本止易去也張云瘰癧必起於少陽而後延及陽明二經表裡相傳乃至厥陰太陽但能為病大抵因鬱氣之積食味之厚或風熱之毒結聚而成故其所致之本皆出於臟而標則見乎頸腋之間也若其毒之未甚則但浮見脈中尚未著於肌肉以化膿血者去之猶易若其膿血既成則為力較難也請從其本止三刺而已樓氏云從此經脈取臟腑之本以治瘰癧之末也張云謂去其致之之本則外見之末自可引而衰也豫與之針也審按其道審脈氣所由之道也徐往徐來即補瀉之法所謂徐而疾則實疾而徐則虛也小如麥者其初起也故一刺即知其效三刺其病可已所以治在宜早不可因小而忽之反其目止可治也張云目者宗脈之所聚也瞳子者骨之精也赤脈下貫瞳子以邪毒之焰深賊陰分而然死之徵也然脈見二三者其氣散而緩脈聚為一者其毒鋭而專此又死期遲速之有異也又論疾診尺篇言診寒熱者亦同此法簡案陳言三因方云雖有此說驗之病者少有此證亦難考據此往往是三陽傳諸陰經方有之若本髒髮未必有此學者知之是實驗之說殆可信據焉邪客篇第七十一諸本無篇字目不瞑不臥出者甲乙作目不得眠者五字考下文答語甲乙為是馬雲邪之感於人身令人目不得瞑或不臥而出於外者張云令人寐無從生故云不臥出也五穀入於胃也止行呼吸焉甲乙心脈作心肺張云宗氣大氣也隊道也糟粕之道出於下焦津液之道出於中焦宗氣之道出於上焦故分為三隧喉嚨為肺之系而下貫於心故通宗氣而行呼吸營氣運行見營氣篇五十營篇衛氣之義見痹論及經脈篇夜行於陰甲乙陰下有其入於陰也一句馬雲大義見衛氣行篇厥氣客於五臟六腑甲乙厥作邪無六腑二字陽氣盛則陽蹺陷甲乙陷作滿樓氏云陷當作滿汪云大惑論作陽氣滿則陽蹺盛盛字是又曰衛氣盛於陰不得行於陽則陰氣盛陰氣盛則陰蹺滿陽氣虛故目閉也徐振公引大惑論亦云此章陷字疑誤簡案張云陷者受傷之謂非也補其不足瀉其有餘張云此刺治之補瀉也補其不足即陰蹺所出足少陰之照海也瀉其有餘即陽蹺所出足太陽之申脈也若陰盛陽虛而多臥者自當補陽瀉陰矣飲以半夏湯張云謂既刺之後仍當用藥以治之凡不臥之證有邪實者多屬外因有營虛者多屬內因此半夏湯一法蓋專為去邪者設耳樓氏云半夏湯去飲之劑也所謂甲乙謂作以簡案壅塞蓋水飲也故以半夏湯決瀆之陰陽和得甲乙作得和其湯方止三飲而已也置甲乙作煮李云千里流水取其流長源遠有疏通下達之義也揚之萬遍令水珠盈溢為甘瀾水可以調和陰陽炊以葦薪者取其火烈也治半夏猶言制過半夏也味辛性溫能下氣化痰用以為臣張云古今量數不同大約古之黍量一斗合今之鐵斛數三升二合然則云八升者即今之二升五合六勺云五升者即今之一升六合許耳簡案物氏度量考云明一合今五勺七撮明一升今五合七勺一撮火沸者先以火沸其水而後置藥於中也秫米糯小米也即黍米之類而粒小於黍可以作酒北人呼為小黃米其性味甘黏微涼能養營補陰半夏味辛性溫能和胃散邪除腹脹目不得瞑故並用之秫米一升約今之三合二勺半夏五合約今之一合六勺炊至一升半約今之四合八勺也滓音子柤也汪云半夏能和胃而通陰陽今人率以為燥而不敢用誤矣本草以秫為糯粟疑是糯稻樓氏云按本草秫米即所謂糯米也王子接云北地之膏粱茄粟也李時珍云火用陳蘆枯竹取其不強不損藥力也出蘆火條又云秫即粱米之黏者靈樞經岐伯治陽盛陰虛夜不得瞑半夏湯中用之取其益陰氣而利大腸也大腸利則陽不盛矣簡案爾雅秫黏粟也一名糯粟一名黃糯樓說非也千金方治虛煩不眠千里流水湯三因方治膽寒溫膽湯俱祖世方耳天圓地方張云圓者徑一圍三陽奇之數方者徑一圍四陰偶之數人首屬陽居上故圓而應天人足屬陰居下故方而應地地有九州張云九州者荊梁雍豫徐揚青兗冀也簡案此本於禹貢詳見素問識生氣通天論天有風雨張云和風甘雨天之喜摧拉霖潰天之怒天有六律張云六律者黃鐘太簇姑洗蕤賓夷則無射為六陽律大呂夾鍾仲呂林鐘南呂應鐘為六陰律天有十日張云十日者甲乙丙丁戊己庚辛壬癸是謂天干陰陽系日月篇云腰以上為天腰以下為地故天為陽地為陰故足之十二經脈以應十二月月生於水故在下者為陰手之十指以應十日日主火故在上者為陽辰有十二止以抱人形張云十二辰者子醜寅卯辰巳午未申酉戌亥是謂地支故應人之足趾足趾惟十並莖垂為十二莖者宗筋也垂者睪丸也女子少此二節故能以抱人形抱者懷胎之義如西北稱伏雞為抱者是也見楊氏方言人有肩膝張云肩膝骨大而高故以應山人有腋膕張云腋膕深陷故以應谷地有泉脈張云泉脈出於地下衛氣行於肉中地有草蓂張云蓂莢瑞草也堯時生於庭隨月雕榮朔後一日莢生望後一日莢落歷得其分度則蓂莢生簡案張注本於帝王世紀然無毫毛獨應瑞草之理爾雅菥蓂大薺郭注薺葉細俗呼之曰老薺李時珍云薺與菥蓂一物也但分大小二種耳由此考之蓋薺之為草隨在易生故草蓂乃對下文林木謂地上衆草也蓂莢之蓂音冥菥蓂之蓂音覓集注仇汝霖亦以上古蓂草釋之不可從人有牙齒張云齒牙疏朗故象似列星說文云牙牡齒也一曰鋭者為牙齊者為齒上古天真論以女子三七男子三八則真牙生而長極是以後生之大者為牙也女子七歲男子八歲齒更是以前生之小者為齒也故男子八月生齒八歲而齔女子七月生齒七歲而齔齔毀齒也高骨張云顴肩膝踝之類募筋張云募者筋脈聚蓄之處募音暮簡案募當作幕幕膜同痿論肝主身之筋膜全元起注云膜者人皮下肉上筋膜也可以證矣詳見素問識瘧論人有䐃肉張云䐃肉者肉脂之聚處也簡案聚邑者聚落邑里也十二筋張云四肢各三節是為十二節簡案陰陽別論云十二月應十二脈本篇上文云十二脈應十二經水地有四時不生草張云地有不毛之地人有不育之人徐振公云男子衝任不盛宗筋不成則須不生是以四時之草不生以應人之無子縱舍馬雲或縱針而不必持或舍針而不復用張云縱言從緩舍言弗用也捍皮馬雲捍分其皮以開其腠理而入刺之也張云捍說文忮也謂恐刺傷其皮而開腠理則奈之何也簡案捍為捍禦之義於本文難通張注亦迂考集韻與擀同以手伸物也馬捍分之解似略通焉至而出止聞其方張云出止徐疾入即五輸之義別離之處言經絡之支別離合也手太陰之脈止屈折也甲乙內屈作內側留作溜外屈上於本節之下作外屈本指以下注云一作本於上節陰諸絡作諸陰絡數脈並注云疑此處有缺文馬雲屈讀為曲壅骨即掌後高骨也張云此下二節皆言五腧之屈折也大指之端少商井也內屈循白肉際至本節之後大淵腧也凡人身經脈陰陽以紫白肉際為界紫者在外屬陽分白者在內屬陰分大概皆然淡水搖貌脈至大淵而動故曰留以淡也從此外屈上於本節之下內屈與諸陰絡會於魚際滎也諸陰皆會於此故數脈並注其氣滑利伏行掌後高骨之下外屈出寸口而行經渠經也上至肘內廉入於大筋之下尺澤合也乃由此內屈臑陰入腋走肺然肺經之脈從臟走手為順此則從手數至臟故為順行逆數之屈折簡案淡馬志併為淡滲諸經之義恐非也數脈並注義自分明甲乙注為有缺文誤沈彤釋骨云手大指本節後起骨曰壅骨邪客篇云云是壅骨固在魚際旁寸口前舊說謂即掌後高骨誤心主之脈止絡於心脈甲乙心脈作心胞馬志作心肺非張云中指之端中沖井也內屈循中指以上掌中勞宮滎也伏行兩骨之間外屈出兩筋之間骨肉之際大陵腧也其氣滑利上二寸外屈出行兩筋之間間使經也上至肘內廉入於小筋之下留兩骨之會者曲澤合也由此上入胸中內絡於心脈乃手厥陰經順行逆數之屈折按本篇於十二經之屈折獨言手太陰心主二經者蓋欲引止下文少陰無腧之義故單以膈上二經為言耳諸經屈折詳義已具經脈本輸等篇故此不必詳也少陰心脈也止故獨無腧焉甲乙大主也下有為帝王三字張云手少陰心經也手厥陰心包絡經也經雖分二臟實一原但包絡在外為心之衛心為五臟六腑之大主乃精神之所居其臟堅固邪不可傷傷及於心無不死者故凡諸邪之在心者皆在心外之包絡耳然心為居主之官而包絡亦心所主故稱為心主凡治病者但治包絡之腧即所以治心也故少陰一經所以獨無腧焉詳義出本輸篇少陰獨無腧者止因天之序甲乙不病上有心字外經下有脈字張云凡臟腑經絡有是臟則有是經臟居於內經行於外心臟堅固居內邪弗能容而經則不能無病故少陰經病者當取掌後鋭骨之端即神門腧也其餘脈之出入屈折余疾皆如手少陰心主之脈行者言少陰心主之腧其行相似故曰本腧者言少陰本經之腧非上文皆在心包之謂也然則邪在心包臟者當治心主之腧邪在少陰經者當治本經之腧因其虛實以取之則邪氣去而真氣固乃不失諸經天道之序也按本腧篇所載五臟五腧六腑六腧獨手少陰經無腧故此篇特以為問正欲明心為大主無客邪傷之義然既曰無腧而此節復言取其經於掌後鋭骨之端及如心主脈行本輸等義可見心臟無病則治臟無腧少陰經有病則治經有腧故甲乙經備載少陰之腧云少衝為井少府為滎神門為腧靈道為經少海為合於十二經之腧始全其義蓋本諸此馬雲外經有病獨取其掌後鋭骨之端神門穴耳其餘脈之出入曲折所行之徐疾皆如手厥陰心包絡之脈行也故本經本輸篇謂治手少陰者即治心包絡經皆調其氣之虛實疾徐以取之是謂因邪氣所沖而瀉之真氣衰而補之如是者則邪去而真固有以循天道四時之序簡案少陰無腧云云王冰三部九候論注引之云靈樞經持針縱舍論曰乃知古篇名與今本不同陰陽如一者病難治馬雲人迎氣口若一則脈為關格病當難治張云表裡俱傷血氣皆散者是為陰陽如一刺之必反甚當舍而勿針也志云皮膚筋骨之淺深皆病也其本末尚熱者病尚在甲乙作察其本末上下有熱者病常在馬雲胸腹為本四肢為末凡本末尚熱者其病尚在張云胸腹臟腑為本經絡四肢為末尚熱者餘邪未盡也宜從緩治其病亦去者可舍針也持其尺止寒熱痛痹志云邪氣臟腑病形篇曰脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀故持其尺察其尺膚之堅脆大小滑澀以知皮膚分肉之寒熱燥濕也五臟之血色見於目因視目之五色以知五臟而決死生蓋病在臟者半死半生也視其血絡察其皮毛以知痛痹之寒熱也皮部論曰凡十二經絡脈者皮之部也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也余未得其意也張云不惟病形輕重有縱舍而持針之際其進止退留亦有縱舍未得其詳因而復問持針之道止真氣得居甲乙左指作左手趙熊道臟正脈張同果作裹馬同輔作轉邪下有氣不二字張云持針之道宜審而慎必從和緩從容庶可無誤故欲端以正安以靜先知病之虛實以施疾徐之法左手執之右手循之必中其穴無中其肉而與肉果果即裹也瀉者欲端以正補者必閉其膚以手輔針導引其氣必使邪氣潰決而散真氣得復而居然後可以去針此持針縱舍之道也志云無與肉果者刺脈無傷肉也簡案甲乙改字似是因其分肉止邪氣得去馬雲所謂扞皮開腠理者因其分肉之在何經而捍分其皮以開其腠理而入刺之也先以左手別其皮膚然後右手微納其針而徐徐端正其針以入之斯乃捍皮開腠理之法其神氣自然不散而邪氣乃得以去矣八虛張云即五臟生成篇所謂八溪也是皆筋骨之隙氣血之所流注者故曰八虛肺心有邪張云人之五臟惟肺與心居於膈上其經屬手脾肝腎俱在膈下其經屬足故肺心有邪乘虛而聚其氣必留於兩肘在肺則尺澤在心則少海之次肝有邪張云肝與膽合其經自足而上皆行脅腋之間故肝邪乘虛而聚者其氣當流於兩腋即期門淵腋等穴之次脾有邪張云脾與胃合其脈皆自脛股上出衝門氣衝之間故邪氣留髀胯間者知為脾經之病腎有邪張云腎與膀胱為表裡其經皆出膝後陰谷委中之間故邪氣留於兩膕者知為腎經之病馬雲前四留字俱當作流簡案肝獨作流余並作留義俱通凡此八虛者止病攣也甲乙趙本張本病作痀是張云機樞機也關要會處也室猶房室也凡此八者皆氣血之所由行也正氣居之則為用邪氣居之則傷經絡機關而屈伸為之不利此八虛可候五臟也簡案痀說文曲脊也即拘攣之義通天篇第七十二諸本無篇字馬雲內言人有五等皆稟氣於天故名篇心能備而行之乎張云謂賢聖之心本異於人其有能兼備陰陽者否也蓋有太陰之人止各不等張云太陰少陰太陽少陽者非如經絡之三陰三陽也蓋以天稟之純陰者曰太陰多陰少陽者曰少陰純陽者為太陽多陽少陰者為少陽並陰陽和平之人而分為五態也此雖以稟賦為言至於血氣疾病之變則亦有純陰純陽寒熱微甚及陰陽和平之異也故陽臟者偏宜於寒陰臟者偏宜於熱或先陽而後變為陰者或先陰而後變為陽者皆醫家不可不察也下齊湛湛甲乙齊作濟馬雲內存陰險外假謙虛貌似下抑整齊湛然無私也張云湛湛水澄貌亦卑下自明之意志云湛湛清潔貌下齊謙下整齊足恭之態也簡案楚辭注湛湛深貌好內而惡出馬雲內納同好納而惡出者有所得則喜有所費則怒也心和而不發甲乙和作抑張云心和者陰性柔也不發者陰多臟也志云陰柔之性也簡案貪而不仁焉得有和甲乙為是動而後之甲乙之作人志云見人之舉動而後隨之柔順之態也見人有亡常若有得趙氏云少陰之人少偏於陰故少貪然陰險之性局量褊淺故常存賊害之心利人之失而忌人之得也張云即幸災樂禍之謂心疾而無恩馬雲其心忌嫉而無恩于于馬雲于于無爭之意張云于于自足貌出莊子疏志同志發於四野馬雲事不畏人知也趙氏云放曠而肆志也舉措說文措置也易繫辭舉而措之為事如常自用馬雲為事止庸常也自用者即中庸之所謂愚而好自用也簡案如而通常無悔甲乙無常字悔作改諦諦好自貴張云諦諦審而又審也小有聰明因而自貴簡案玉篇諦審也諦也又諦審也後漢祭祀志諦諦昭穆尊卑之義而集韻諦丁訂注與諦同此以諦蹄為一字可疑無為懼懼止或與不爭張云心有所主乃能不動貧賤不能移威武不能屈是無懼懼也利欲不能入富貴不能淫是無欣欣也君子之接人也言忠信行篤敬雖蠻貊之邦行矣是婉然從物也聖人之道為而不爭老子曰以其不爭故天下莫能與爭之謙謙甲乙作謙讓馬雲易曰謙尊而光談而不治馬雲無為而治也張云同簡案禮大戴子張問入官修業居久而談注謂安縱也陽明脈小而太陽脈大馬雲胃小故陽明之脈小也腸大故手太陽小腸之脈大也張云此其多陰少陽者以陽明為五臟六腑之海小腸為傳送之腑胃小則藏貯少而氣必微少腸大則傳送速而氣不蓄陽氣既少而又不蓄則多陰少陽矣必當審察而善調之然其氣少不能攝血故多致血易脫而氣易敗也陽重脫者易狂馬本志本陽作陰易作陽張云陰氣既少而復瀉之其陰必脫故曰無脫其陰而但可瀉其陽耳然陰不足者陽亦無根若瀉之太過則陽氣重脫而脫陽者狂甚至陰陽俱脫則暴死不知人也趙氏云無脫其陰而瀉其陽者陽為陰之固也若陰氣重脫則為陽狂陽氣生於陰中陰重脫則陽亦脫陰陽皆脫則為暴死潘楫醫燈續焰云觀宣明五氣篇生氣通天論病能篇等則狂病之為重陽陽實明矣靈樞通天篇亦云陽重脫易狂脫非陽脫言重並於陽分而若與陰脫離也簡案腹中論曰石之則陽氣虛虛則狂此陽脫未必不狂也趙改陰字潘脫離之解未為得焉陽狂史傳多為佯狂之義未知趙為何之謂經小而絡大止病不起也甲乙多陽下有而字中氣下有重字張云經脈深而屬陰絡脈淺而屬陽故少陽之人多陽而絡大少陰而經小也血脈在中氣絡在外所當實其陰經而瀉其陽絡則身強矣惟是少陽之人尤以氣為生若瀉之太過以致氣脫而疾則中氣乏而難於起矣安容儀甲乙安下有其字審有餘不足甲乙審下有其字餘下有察其二字五態之人尤不合於衆者也張云衆人者即前章陰陽二十五人之謂與五態之人不同故不合於衆也黮黮馬雲甚黑張云色黑不明也甲乙注云黮音朕簡案說文黮桑椹之黑也集韻直稔切音朕汙也念然下意張云意念不揚也即上文下齊之謂臨臨張云臨下貌馬雲長大之貌膕然未僂張云言膝膕若屈而實非傴僂之疾也清然竊然固以陰賊馬雲清然者言貌似清也竊然者消沮閉藏之貌雖曰清然竊然實以陰險賊害為心即上文所謂賊心者而始有此態也張云清然者言似清也竊然者行如鼠雀也固以陰賊者殘賊之心堅不可破也立而躁嶮行而似伏張云立而躁嶮者陰險之性時多躁暴也出沒無常行而似伏嶮險同簡案不似太陰之純陰故時有躁嶮之態也軒軒儲儲反身折膕馬雲車之向前曰軒軒軒然者猶俗云軒昂也儲儲者挺然之意若反其身而在後視之則其膕似折亦不檢之態也張云儲儲蓄積貌盈盈自得也反身折膕言仰腰挺腹其膕似折也立則好仰止常出於背張云立則好仰志務高也行則好搖性多動也志云其兩臂兩手常出於背者謂常反挽其手於背此皆輕倨傲慢之狀無叉手掬恭之貌也委委然止皆曰君子甲乙愈愈作袞袞馬雲委委然安重貌詩君子偕老章有委委他他隨隨然不急遽也顒顒然尊嚴貌詩卷阿篇顒顒昂昂愈愈然和悅也論語云愈愈如也㼐㼐然周旋貌禮云周旋中規折旋中矩豆豆然不亂貌君子者有聖人以至成德之士皆可以君子稱也禮運云此大君子者未有不謹於禮者也蓋指禹湯文武成王周公又詩指文王為豈弟君子則聖人亦可以君子稱也張云委委雍容自得也隨隨和光同塵也志云㼐㼐目好貌豆豆有品也蓋存乎人者莫良於眸子胸中正故眸子瞭然而美好也簡案委委張本於詩注為是㼐玉篇好貌正字通云舊注音旋目好貌古通用旋俗加目字典引本經注云目好貌乃志注也官能第七十三馬雲官任也任其所能也即本篇第七節雷公有官能之問故名篇一紀張云匯言也志云紀綱也司誦之簡案司主也言帝自主誦之也血氣多少馬雲大義見素問血氣形志篇行之逆順張云陰氣從足上行至頭而下行循臂陽氣從手上行至頭而下行至足故陽病者上行極而下陰病者下行極而上反者皆謂之逆出入之合諸本云合一作會馬雲自表而之裡為入自里而之表為出張云經氣自內而出自外而入俞有不同謀伐有過馬雲即其犯病而為有過者則謀伐之張云知其出入則可因過而伐之也知解結馬雲衛氣篇曰能知解結契紹於門戶氣門馬雲即氣穴也素問明有氣穴論凡穴皆可以氣穴稱張云即經絡類諸經標本氣街之義一曰手經為上足經為下氣脈必由之處是為門戶亦通簡案生氣通天論云氣門乃閉王注氣門謂玄府也所以發泄經脈營衛之氣故謂之氣門也蓋本節所謂氣門與此自異姑仍馬注四海馬雲本經海論云膻中為氣之海衝脈為血之海胃為水穀之海腦為髓之海寒熱淋露馬雲或為寒熱或為淋露疑即歲露篇之所謂遇歲露也張云淋於雨露於風邪感異處當審其經也志云寒熱陰陽血氣也淋露中焦所生之津液也下經曰中焦出氣如露志又歲露篇注云淋露寒熱者汗出而為寒為熱也簡案諸注未穩當考神農本經及名醫別録各藥主療言淋露者數條曰女子血閉淋露下血黃芩條崩中淋露延胡索條泄痢淋露厚朴條風邪淋露狗脊條傷中淋露白微並大豆條多汗淋露白膠條主淋露木香條繆希雍狗脊疏云氣血不足則風邪乘虛客之也淋露者腎氣與帶脈衝任俱虛所致也又厚朴疏云淋露雖屬下焦為病然多因胃家濕熱下流此為下血淋露不已也此說亦未允蓋淋露與淋瀝同義謂如淋下露滴病經久不止肘後方云尸注大略使人寒熱淋瀝恍恍默默不的知其所苦醫說引雞峰方作寒熱淋露沉沉默默外臺云勞極之病吳楚謂之淋瀝可以見耳九宮八風篇淋露寒熱亦淋瀝寒熱之謂以輸異處馬雲以其輸穴必皆異處當審於經調其脈氣之往來張云邪感異處當審其經也左右肢脈諸本脈作絡馬雲即前經脈篇所謂其支者其別者是也志云左注右而右注左左右上下與經相干布於四肢出於絡脈與脈外之氣血相會於皮膚分肉間也簡案肢即支字馬注為是虛與實鄰知決而通之馬雲若虛與實鄰則知決虛實而通之張云鄰近也近則易疑疑則以似為是冰炭相反矣故當知決而通之志云虛與實鄰者血與氣之不和也故決而通之犯而行之趙府本張本犯作把正脈道藏熊本並云犯一作把張云邪客大絡者左注右右注左把而行之即繆刺也志云左右不調者人迎氣口之不調故當犯而行之簡案左為人迎右為氣口出於王叔和而古無其說志誤陰陽不奇馬雲人身陰陽諸經相為配合未嘗有奇行者能知各經之所起張云奇不偶也不奇則和矣故知起時志云陰陽不奇者臟腑陰陽交相配合十二經脈交相貫通也故知起時者如乘秋則肺先受邪乘春則肝先受邪之類也審於本末止刺道畢矣馬雲禁服篇云審其本末察其寒熱又終始篇云本末之寒溫之相守司也張云本末標本也寒熱陰陽也所在三部九候之病脈處也官任也九針不同各有所宜能知以上之法而任用之則刺道畢矣明於五輸馬雲五臟有井滎俞經合之五俞六腑有井滎俞原經合之六俞然六腑之原並於俞則皆可稱為五俞也徐疾者針法也小針解云徐而疾則實疾而徐則虛是也屈伸出入者經脈往來也見邪客篇屈折逆順之數言陰與陽合於五行者泛言陰陽分而為五行也五臟六腑亦有所藏者指人身有陰陽五行也如肺為陰大腸為陽肺為金肝為木之類四時八風盡有陰陽者指天道有陰陽五行也八風見九宮八風篇各得其位合於明堂各處色部者言人身之面部各得其五行之位合於明堂及各處之色部也其面部之分為五臟六腑者可以察其身形之所痛並見五色篇其色見於左右上下者可以知其何經之寒溫張云皮膚之寒者多陰溫者多陽滑者多實澀者多虛簡案甲乙以知其所苦一句接下文為針法膈有上下止徐入之甲乙無在字稀作布疏作涿注太素作希而疏之案涿字書無考涿音斫擊也義難葉馬雲膈有上下心肺居於膈上脾居中州肝腎居於膈下必知其病氣之所在先得其經脈之道然後可以用針稀者針之少也疏者針之闊也終始篇云疏取之上深者深入其針也留者久留其針也引而去之張云泄於下也視前痛者馬雲視先痛者常先取穴以刺之所謂凡病必先治其本也志云視身以前痛者常先取之留而補之張云補中氣可以拒之志云候陽氣至而針下熱補其陽以勝其寒也從合瀉之馬雲從合穴以瀉之志云合治內腑使寒邪從腸胃以瀉出之也上氣不足止積而從之張云推而揚之引致其氣以補上也積而從之留針隨氣以實下也火自當之止下陵三里馬雲若陰陽皆虛而針所難用則用火以灸之又有厥而寒甚或骨廉下陷或寒過於膝則取下陵三里以補之下陵三里穴即三里見本輸篇陰絡所過止火所治之甲乙作火之所治馬雲又有陰絡所過為寒留止或寒入於中則必推其針而行以散之又有經脈陷下者則惟灸當之經脈篇云陷下則灸之禁服篇云陷下則徒灸之徒但也又有絡脈結而堅緊者亦用灸以治之不知所苦止針論畢矣張云寒邪在肌肉血脈之間有不痛不仁不知所苦者當灸兩蹺之下即足太陽申脈足少陰照海二穴也然男子數陽女子數陰見脈度篇若男陰女陽則反用矣故為良工之所禁調經論亦曰病不知所痛兩蹺為上與此法同用針之服必有法則馬雲此二句出八正神明論服事也詩小雅六月篇云共武之服大雅板篇云我言維服上視天光下司八正馬雲上視天光即八正神明論之所謂天寒無刺天溫無凝月生無瀉月滿無補月郭空無治是也下司八正即八正神明論之所謂八正者所以候八風之虛邪以時至者也出九宮八風篇簡案司伺通漢灌夫傳亦已使候司闢奇邪馬雲闢當作避張云闢避同觀百姓張云兼人己而言也簡案漢宣帝紀觀以珍寶師古注觀示也是得天之露止乃言針意張云天之風雨不時者皆謂之露歲露論曰故諸逢其風而遇其雨者命曰遇歲露焉歲之虛者乘年之衰逢月之空失時之和因為賊風所傷是謂三虛閔士先云得天之露者清邪中上陽中霧露之氣也簡案閔說恐非也乃言針意一句馬志接下節亦非法於往古止若神倣佛馬雲此節與八正神明論大義亦相同邪氣之中人也止莫知其情止邪之中人也微諸本止作正此本誤當改張云邪氣言虛邪也虛邪之中人也甚故灑淅動形正邪之中人也微故但先見於色而不知於身此節與八正神明論互有發明所當參閲又此數句與邪氣臟腑病形論同是故上工之取氣止所取之處馬雲八正神明論曰上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成者言不知三部九候之相失因病而敗之也上工論氣不論形所以預取其氣而早救其萌芽彼下工則反是矣瀉必用員止氣出乃疾八正神明論甲乙員作方馬雲遙搖同解懈回員當作方張云員流利也切直迫病所也迎奪也遙搖同用針員活而迎奪之則氣出乃疾故可以瀉閔士先云瀉必用圓者圓活而轉之其氣乃行也補必用方止無志其神八正神明論甲乙方作員馬雲方當作員張云方即端正安靜之謂外引其皮令當其門察穴於肌表也左引其樞右推其膚微旋而徐推之用針之樞要也必端以正安以靜堅心無懈候氣之誠確也欲微以留氣下而疾出之推其皮蓋其外門出針之防護也離合真邪論曰推闔其門令神氣存真氣得存故可以補用針之要無忘其神者總結前文而言小針解曰上守神者守人之血氣有餘不足可補瀉也按補瀉方員義與八正神明論之文似乎相反然詳求其意各有發明不可謂其誤而忽也官能閔士先云官之為言司也言各因其所能而分任之以司其事故曰官能蓋聖人欲得其人量材而官授任而治已不與於其間而總司其成也可使傳論張云如開導勸戒解疑辨正之屬皆所謂傳論也語徐止兼諸方張云語徐者不苟安靜者不亂手巧者輕重疾徐有妙心審諦者精思詳察無遺故可勝是任緩節止行氣張云導引者但欲運行血氣而不欲有所傷也故惟緩節柔筋而心和調者乃勝是任其義可知今見按摩之流不知利害專用剛強手法極力困人開人闕節走人元氣莫此為甚病者亦以謂法而所當然即有不堪勉強忍受多見強者致弱弱者不起非惟不能去病而適以增害用若輩者不可不為知慎疾毒止咒病張云人之惡口毒舌者亦由稟賦諸無所利而獨利於唾咒疾病爪苦止抑痹張云按積抑痹亦上文導引行氣之屬然積堅痹固非爪苦手毒者不能破術若相類而用有輕重也非其人勿傳張云氣交變大論曰得其人不教是謂失道傳非其人慢泄天寶手毒者止如故也馬雲試以按龜之法則其手之甘毒自別矣蓋遇人之手有凶有善猶用味之甘苦故即以甘毒名之毒即苦也張云龜能運任脈其息以耳而導引伏氣所以靈而多壽不易於死故可用此以驗人手之毒與否手甘者非以味言即不毒之謂簡案邦俗云苦手者弄蛇蛇畏縮不敢齧人豈手毒之謂歟論疾診尺篇第七十四諸本無篇字獨調其尺馬雲邪氣臟腑病形篇曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀故善調尺者不待於寸蓋脈在內肉在外內外相應故審其脈驗其肉而病形自定也愚謂診人脈時惟臂至尺澤可驗難以周身知之故止以尺言也視人之目窠上止風水膚脹也馬雲癰壅同窅窈同張云目窠目下臥蠶處也癰壅也即新起微腫狀頸脈人迎脈也窅而不起按之有窩也是即風水膚脹之外候風水義見評熱病論膚脹義見水脹篇簡案此一節與診尺之義不相干疑是他篇錯簡尺膚滑其淖澤者志云津液淖澤於皮膚故尺膚滑其淖澤者知風在於皮膚而鼓動其津液也解㑊甲乙㑊下有也字張云尺肉弱者肌必消瘦肉瘦陰虛當為解㑊解㑊者身體因倦故欲安臥簡案安臥下句安臥脫肉者寒熱不治簡案安臥脫肉為陰陽虧敗乃寒熱虛勞之候也故不治諸注恐非澤脂馬雲潤澤如脂膏者真為風也張云即前淖澤之謂風者陽氣陽在肌膚故滑而澤脂尺膚澀者張云尺膚澀者血少血不能營故為風痹水泆飲也脈經泆作淡張云如枯魚之鱗乾澀甚也以脾土衰而肌肉消水得乘之是為泆飲又邪氣臟腑病形篇云肝脈澀甚為溢飲泆飲同尺膚熱甚止病且出也脈經甲乙病且作汗且張云尺膚熱者其身必熱脈盛躁者陽邪有餘故當為溫病若脈雖盛而兼滑者是脈已不躁而正氣將復故不久當愈出漸愈之謂簡案病且作汗且義尤通尺膚寒者甲乙其作甚小作急張云膚寒脈小陽氣衰也故為泄為少氣尺膚炬然止亦寒熱也脈經炬作烜甲乙炬然作燒炙人手四字脈經甲乙久大作久持張云炬然火熱貌或先熱而後寒或先寒而後熱皆寒熱往來之候簡案集韻炬束葦燒也肘所獨熱者止胃中有寒甲乙肘後粗作肘後廉馬雲人之手自曲池以上為肘自曲池以下為臂肘在上應腰以上手臂在下應腰以下張云肘臂髆之節也肘前內廉也手三陰之所行故應於膺前肘後外廉也手太陽之所行故應於肩背肘下為臂臂在下故應腰腹肘後粗以下三四寸謂三里以下內關以上之所此陰分也陰分有熱故應腸中有蟲掌中者三陰之所聚故或熱或寒皆應於腹中魚上脈青胃之寒也經脈篇亦曰胃中寒手魚之脈多青矣志云肘所獨熱者腰以上熱手所獨熱者腰以下熱此診尺膚以候形身之上下故與脈候之上下反其診也肘前乃手厥陰之尺澤處肘後乃手少陽之天井處蓋以兩手下垂上以候上下以候下前以候前後以候後也夫所謂肘所手所者論手臂之背面臂中掌中魚上乃手臂之正面背面為陽故候形身之外正面主陰故候腰腹腸胃之內即尺外以候季脅尺裡以候腹中之大義出脈要精微論相同也簡案手所即下文所謂臂中肘後獨熱者肩背熱此乃與上文肘所獨熱者腰以上熱義相同而肘後粗以下三四寸乃上文手所之地後乃應背面而云腸中有蟲則似與上文所指上下前後相乖錯可疑經脈篇云胃中寒手魚之脈多青矣尺炬然熱止立死甲乙脈經作尺膚烜然熱志云尺炬然熱人迎大者三陽之氣偏盛也故當主奪血夫皮膚為陽血脈為陰尺堅大脈小甚者陽盛而陰絶於外也少氣悗有加者陽盛而陰絶於內也簡案脈經作尺緊人迎脈小甚則少氣色白有加者立死此蓋與尺炬然熱者相反陽絶之候目赤色者止病在胸中張云五臟六腑目為之候故目之五色各以其氣而見本臟之病脾應中州胸中者脾肺之部也志云前節視目窠以知皮膚之水此節視目色以知五臟之陰皆從外以知內也胸中膈中也黃色不可名者色黃而有黑白青赤之間色也病在胸中者五臟之氣皆從內膈而出故所見之色若是診目痛止少陽病張云足太陽經為目上綱出經筋篇故赤脈從上下者為太陽病足陽明經為目下綱出經筋篇故赤脈從下上者為陽明病足少陽經外行於鋭眥之後故從外走內者為少陽病也診寒熱止三歲死張云此邪入陰分而病為寒熱者當反其目以視之中有赤脈形如紅線下貫瞳於因其多少以知其死之遠近也寒熱篇文與此同但彼專言瘰癧之毒發為寒熱此節單以寒熱為言理則同也診齲齒止在上下熱張云齒痛曰齲上齒屬手陽明大腸經下齒屬足陽明胃經故按其陽脈之來有過者必為獨熱其脈在左右上下則病熱亦分左右上下也張云其脈太過者其經必獨熱診血脈止皆見者寒熱志云此以皮部之色而知血脈之寒熱也皮部論曰凡十二經脈者皮之部也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也身痛面色微黃止不嗜食馬雲平人氣象論云溺黃赤安臥者黃疸已食如飢者胃疸張云黃疸黃病也疸有陰陽脈小而澀者為陰疸陰疸者脾土弱也故不嗜食人病止病難已也張云氣口候陰人迎候陽故春夏人迎微大秋冬寸口微大此陰陽表裡之分也若寸口人迎大小浮沉相等者非偏於陰則偏於陽此病之所以難已五色篇與此稍同女子手少陰脈動甚者妊子馬雲此與平人氣象論所云相同簡案王注平人氣象云蓋指心經之脈即神門穴也其說甚善馬張為左寸志為兩手之少陰腎脈並非古之義也馬又以妊之為男子亦誤嬰兒病止必死馬雲頭毛逆上則血枯而不潤如草之枯者相似故以死擬之然曰病則無病之時尤宜忌也志云嬰兒者始生之兒嬰兒之頭毛從先天而生毛髮者血之餘少陰精血之所生也發覆下垂以應人之血氣從下而升復從巔而下若發上逆是惟升而無降矣升降息故不免於死亡千金云小兒發逆上啼哭面暗色不變是癇候耳間青脈起者掣痛脈經掣作瘈甲乙作瘈腹痛張云耳者少陽膽之經青者厥陰肝之色肝膽本為表裡青主痛肝主筋故為掣痛馬雲為身中牽掣而痛也簡案千金云耳後完骨上有青絡盛臥不靜是癇候青脈刺之令血出也以此推之掣瘈通掣痛謂掣瘲腹痛即癇病之候也大便亦辨止泄易已脈經甲乙赤作青甲乙泄易已之泄作者字並是馬雲辦按海篇瓣得莧切瓜瓠瓣則赤辨當作瓣張云赤辦者血穢成條成片也赤辦飧泄火居血分若脈小而手足寒是為相反所以難已若止於飧泄而無赤辦非火證也脈雖小而手足溫以脾主四肢而脾氣尚和所以易已辦當作瓣瓜瓣之類也簡案赤作青為是蓋小兒有便青乳瓣完出者即青瓣也此虛寒之候故手足寒難已瓣說文瓜中實也當據馬注而改之志云辨別也大便亦辨者謂黃赤之間別也義難通四時之變止謂四時之序也馬雲此節與素問陰陽應象大論第九節大義相同張云陰陽之氣極則必變故寒極則生熱熱極則生寒此天地四時消長更勝之道也疸音丹即溫熱之病刺節真邪篇第七十五諸本無篇字馬雲前論刺有五節後論有真氣有邪氣故名篇二曰發矇甲乙矇作蒙下文並同振埃者止相傾移也張云振埃者猶振落塵埃故取其外經可以去陽病也發矇者猶開發矇瞶故刺其腑輸可以治腑病也去爪者猶脫去余爪故取關節肢絡可以治血道不通之病也徹衣者猶徹去衣服故當盡刺諸陽之奇輸也解惑者猶解其迷惑故在盡知陰陽調其虛實可以移易其病也志云奇輸者六腑之別絡也憤䐜甲乙作憤䐜是志本同大氣逆上志云大氣宗氣也陽氣大逆故憤瞋肩息大氣逆上故喘喝坐伏也簡案千金奔氣湯治大氣上奔胸膈中諸病發時迫滿短氣不得臥劇者悁欲死蓋此證也坐伏馬雲坐伏不常病惡埃煙𩜺不得息甲乙惡埃煙𩜺四字作咽噎二字是張云如埃如煙𩜺不得息𩜺古噎字簡案張注未允當從甲乙玉篇𩜺音噎食不下也說文飯窒也辨脈篇云水得寒氣冷必相搏其人即𩜺天容志云手太陽小腸之經刺之以通陽氣之逆窮詘馬雲窮屈胸痛張云詘音屈不伸也志云詘者語塞也廉泉馬雲系任脈經穴志云通腎臟之逆氣無過一里甲乙作深無一里注云里字疑誤馬雲無過人行一里發矇馬雲禮仲尼燕居篇云於太子昭然若發矇注云若目不明為人所發而有所見也於日中刺其聽宮甲乙日上有白字馬雲手太陽小腸經之聽宮穴張云日中陽王氣行之時也中其眸子張云其脈與目相通故能中其眸子刺之而聲應於耳乃其穴也志云眸子耳中之珠刺耳之聽宮尚疾於發目之矇是耳竅與目竅之相通也簡案眸說文目童子也孟子云存乎人者莫良於眸子志以為耳中之珠者何堅按其兩鼻竅而疾偃張云此驗聲之法也刺其穴以手堅按鼻孔而疾為偃臥其聲則應於針也志云疾偃其聲閉其口竅也簡案志注近是蓋偃㰽通㰽怒腹也又作躽巢源有小兒躽啼候玉篇躽體怒腹也此所謂止相得者也馬雲此所謂彼雖弗見所為而不必以有目以為視吾能見而取之真有神明相得之妙也張云謂病無形見有不必相見而取者真有神明相得之妙也刺節言去爪止津液之道也甲乙爪作衣下同肢脛作股胻無管以二字垂作睪張云腰脊所以立身故為身之大關節肢脛所以趨翔故為人之管管鍵也莖垂者前陰宗筋也命門元氣盛衰具見於此故為身中之機精由此泄故可以候陰精而為津液之道也志云手足肢脛之骨節人之管以趨翔蓋津液淖澤於肢脛則筋骨利而脛能步趨肢能如翼之翔也簡案荀子儒效篇聖人也者道之管也注管樞要也故飲食不節止命曰去爪甲乙溢作流血道作水道日大不怵作炅不休息常作裳諸本不怵作不休此本誤當改張云飲食不節病在太陰陽明喜怒不時病在少陰厥陰故其津液內溢則下留於睪為日大不休不可蔽匿等證蓋即㿗疝之類治之者當察在何經以取其關節肢絡故命曰去爪者猶去其贅疣也睪音高陰丸也樓氏云內經刺久㿗疝共四法其一節此篇文所謂鈹石取睪囊中水液者是也其法今世人亦多能之睪丸囊大如斗者中藏穢液必有數升信知此出古法也鈹針如刀狀馬雲滎然有水凝蓄不行集韻云滎小水貌內熱相搏甲乙作兩熱相薄外畏綿帛近止又不可近席甲乙作衣熱不可近身身熱不可近席臘干甲乙作䘁一字注黃帝古針經作稿臘檢字書䘁字無考飲食不讓美惡甲乙作欲飲二字張云滋味不能辨也取之於其天府大杼止疾於徹衣甲乙稀作晞張云天府手太陰經穴大杼中膂俞俱足太陽經穴刺此皆可以去熱又補足太陰脾經手太陰肺經以出其汗熱去汗出而病除其速有如徹衣此蓋傷寒邪熱之類也志云或不必盡刺諸陽之奇輸取之於其天府大杼三痏使膀胱所藏之津液外濡於皮毛又刺太陽經之中膂通津液上滋於心臟以去其熱肺主皮毛脾主為胃行其津液故當補足手太陰以出其汗也簡案甲乙載之六經受病發熱傷寒熱病篇張注有所據大風在身止甚於迷惑張云風邪在身血脈必虛正不勝邪故為輕重傾側等病以其顛倒無常故曰甚於迷惑此即中風之類也馬雲其虛者為不足而輕其實者為有餘而重大體當傾側宛伏雖四方上下皆已反覆顛倒簡案宛郁同甲乙載之陽受病發風篇張注為是有容大者有狹小者甲乙無容字狹字五章馬雲漢史約法三章猶言五事也張云五條也痹熱諸本作疸熱張獨作痹誤凡刺癰邪止瀉之甲乙脆作越過癰者作遇癰所者四字馬雲隴隆同生氣通天論有日中而陽氣隆本經營衛生會篇作隴古蓋隴隆互用道去聲此承上文而言腫聚散亡之法也凡刺癰邪無迎其氣之來隆所謂避其來鋭者是也如易風俗如移性情相似須緩以待之若不得膿則揉以脆之導以行之去其癰腫之鄉彼當不安處所乃自散亡矣凡諸陰陽經之有病生癰者取其本經之輸穴以瀉之如手太陰輸穴太淵之類張云脆柔脆潰堅之謂凡癰毒不化則不得膿故或托其內或溫其外或刺以針或灸以艾務化其毒皆脆道更行也鄉向也安留聚也去其毒氣所向不使安留處所乃自消散矣故於諸陰經陽經但察其過於壅滯者皆當取輸穴以瀉其鋭氣是即所謂去其鄉也簡案志云氣壅而腫非癰膿也又云脆道肌肉之理路也並非凡刺大邪止刺諸陽分肉間甲乙作凡刺大邪用鋒針曰剽作標通作道肌肉上有於字無親字反其真作乃自直道四字張云大邪實邪也邪氣盛大難以頓除日促小之自可漸去去其有餘實者虛矣此釋上文大者必去也剽砭刺也通病氣所由之道也針無妄用務中其邪邪正脈色必當親切審視若以小作大則反其真盛大實邪多在三陽故宜刺諸陽分肉間簡案剽砭刺也出說文凡刺小邪止刺分肉間甲乙日作曰費作貴馬雲費廢同張云小邪虛邪也虛邪補之則正氣日大而邪自退也不足而補乃可無害若瀉其虛斯不免矣此釋上文小者益陽也迎之界者迎其氣行之所也先補不足之經後瀉有餘之經邪去正復則遠近之真氣盡至邪氣不得外侵則必費散無留矣小邪隨在可刺故但取分肉間也志云侵漸進也費用也凡刺熱邪止病乃已甲乙熱邪下有用鑱針三字蒼作滄開通作開道道下有平字馬雲此承上文而詳言疸熱消滅之法也凡刺熱邪其熱盛則神志外越而意氣蒼茫若出遊不歸乃欲無病當開闢之張云越發揚也蒼卒疾也出遊行散也歸還也凡刺熱邪者貴於速散散而不復乃無病矣開通壅滯闢其門戶以熱邪之宜瀉也簡案蒼作滄為是滄說文寒也枚乘傳欲湯之滄一人吹之百人揚之無益也刺熱邪宜發越而滄之也凡刺寒邪止其氣存也日以溫甲乙日作曰馬志溫作除非甲乙來作去其氣作真氣張云溫者溫其正氣也徐往徐來欲和緩也致其神者致其陽氣則寒邪自除此釋上文寒痹益溫也補其虛則門戶閉而氣不泄故虛實可調真氣可存此邪寒之宜溫也志云上節論開闢門戶以去邪此論門戶已閉乃存正刺癰者止用毫針也馬雲此承上文而言刺五邪之針各有所宜用也九針論五曰鈹針主大癰膿兩熱爭者也故此曰刺癰者用鈹針又四曰鋒針主癰熱出氣故此曰刺大者用鋒針又六曰圓利針主取遠痹者也故此曰刺小者用圓利針一曰鑱針主熱在頭身故此曰刺熱者用鑱針又七曰毫針主寒熱痛痹在絡故此曰刺寒者用毫針介按考癰疽刺法其輕重徐疾自有一定在人心度量用之不可亂施蓋皮薄針深反傷好肉肉厚針淺毒又難出大抵腫高而軟者在肌肉針四五分腫下而堅者在筋脈針六七分腫平肉色不變者附於骨也宜針寸許若毒生背腹肋脅等處宜扁針斜入以防透膜針既透膿視瘡口必有膿意如珠斯時欲大開口則將針斜出欲小開口則將針直出所謂逆而奪之順而取之也解論張云解結之論也人與天地相參應必知其道斯可與言解結矣下有漸洳上生葦蒲張云漸洳伏泉也下有漸洳則上生葦蒲內外之應理所皆然人之表裡可察盛衰亦猶是也志云漸洳濡濕之地葦蒲生於水中其質柔弱中抽堅莖名曰蒲槌內剛外柔為堅心之坎水以比人之元陽生於精水之中故曰此所以知形氣之多少也謂充於形中之氣生於天一水中知所秉之厚薄則知氣有多少矣簡案志注甚鑿以葦蒲為一物非也然漸洳之解為是洳說文作𩖵漸濕也詩魏風彼汾沮洳集韻漸洳濕貌也血氣減甲乙減作盛熱則滋雨而在上馬雲暑熱則地氣上蒸而滋雨氣在於上所以物之氣亦不在下而在上其根荄當少汁治厥者止以解結者也張云此治厥之法倘天時未溫而必欲用針則必藉火氣以尉調其經凡掌腋肘腳項脊之間皆溪谷大節之交會故當尉之溫之則火氣通而血脈行然後視其病脈淖澤者衛氣浮也故可刺而平之堅緊者邪氣實也故當破而散之厥逆除而宗氣下乃可止針矣結者邪之所聚刺去其邪即解結之謂也用針之類止弗能取之甲乙留於海作留積在海張云凡用針者必在調氣人受氣於谷故氣積於胃然氣義有三曰營氣曰衛氣曰宗氣清者為營營在脈中濁者為衛衛在脈外故各行其道也宗氣大氣也大氣者留止於上下之氣海其下者蓄于丹田注足陽明之氣街而下行於足其上者積於胸中出於息道而為呼吸凡此三者皆所謂氣當各求其屬而調之者也按氣街義如衛氣篇曰知六腑之氣街者能知解結契紹於門戶當與此參閲厥者逆也陰寒之氣也厥逆在足則陽道不行故宗氣不下而血脈凝滯不以火溫不能取也視其應動者乃後取之而下之馬雲視其氣之來應而動者然後取其穴而下針焉斯可也張云視其氣之應手而動者其微其甚則虛實可知然後用法取之而氣自下矣六經調者止解結也甲乙視而瀉之下有通而決之一句馬雲手足各有三陰三陽謂之六經也六經之脈各調和者謂之不病內有一經之脈上實下虛而不通此則足經之氣厥逆而上故上實而下虛其在外必有橫絡之脈盛加於大經之中令其不通乃視之可見者也當視而瀉之此亦所謂解結之法也上寒下熱止上之者也甲乙注一本合作冷張云上寒下熱者陽虛於上而實於下也當先刺項間足太陽經大杼天柱等穴久當其針而補之仍溫尉肩項之間候其氣至上熱與下相合乃止其針此所謂推其下者而使之上也上熱下寒止下之者也甲乙陷之作陷下馬雲凡上熱下冷者視其下脈之虛而陷之於經絡者補之使上之氣下乃止此其熱在於上者若引而下之所謂引而下之之法也大熱遍身止散之者也甲乙因其作因令諸本切之作切推馬志與此本同甲乙作切推之下至缺盆中馬雲上文上寒下熱上熱下寒其熱非遍身者也今大熱遍身狂而聞見言語以無為有則熱之極也足陽明經多氣多血為五臟六腑之海故當視其足陽明之大絡取之虛則補之血而實者則瀉之又必因病人偃臥之際醫工居其頭前以兩手各用大指食指共四指挾其頸之動脈而按之即人迎大迎處也又久而持之又卷而切之下至缺盆之中而後止又如前法行之候其熱去乃止此所謂推而散之之法也張云蓋三陽在頭故可獨取人迎而推散其熱也卷捲同一脈張云猶言一經也真氣者止充身也甲乙谷上有水字張云真氣即元氣也氣在天者受於鼻而喉主之在水穀者入於口而咽主之然鍾於未生之初者曰先天之氣成於已生之後者曰後天之氣氣在陽分即陽氣在陰即陰氣在表曰衛氣在裡曰營氣在脾曰充氣在胃曰胃氣在上焦曰宗氣在中焦曰中氣在下焦曰元陰元陽之氣皆無非其別名耳正氣者止非虛風也甲乙無來非實風又五字虛風注太素云非災風也志云正氣者大塊噫氣其名為風從一方來非實風又非虛風此天地之正氣也張云從一方來謂太一所居之方也風得時之正者是為正風然正風實風本同一方而此曰非實風者以正風之來徐而和故又曰正氣實風之來暴而烈故與虛風對言也按歲露篇曰諸所謂風者皆髮屋折樹木揚沙石此虛風實風之謂也邪氣者馬雲如冬居葉蟄之宮而風自後來者是也大義見歲露篇合而自去甲乙無合字張云謂邪與正合而正勝之故自去也閔士先云人秉天地之正氣所生故天之正氣與人之真氣相合不能勝真氣者合併之氣盛也灑淅甲乙作淒索張云寒栗也陽勝者止搏於皮膚之間張云若與衛氣相搏陽勝則熱陰勝則寒皆邪氣也何獨曰寒則真氣去去則虛蓋氣屬陽人以氣為主寒勝則陽虛所重在氣也陽氣既虛則陰寒搏聚於皮膚之間矣簡案馬以陽經之氣勝陰經陰經之氣勝陽經釋之且以寒則真氣去去則虛云云按下文為行則為癢之所因並非也其氣外發止為不仁甲乙行上有微字留上有氣字搖氣注云一本作淫氣諸本為痹作則痹馬志與原文同張云邪之在表者其氣外發或腠理開則汗為不斂或毫毛動搖則毛悴而敗或氣往來行則流而為癢或邪留不去則痛而為痹若衛氣受傷虛而不行則不知痛癢是謂不仁簡案張搖下句然不若作淫氣義易通虛邪偏容於身半止脈偏痛甲乙虛作淫容作客簡案中風偏枯之所因的在於此續命諸湯立方之皆亦本於此骨蝕馬雲骨有所損也張云其最深者內傷於骨是為骨蝕謂侵蝕及骨也簡案骨蝕未詳豈謂多骨附骨等之疽歟有所疾前筋筋屈甲乙無一筋字樓氏云前筋二字衍文也筋當作結簡案今從樓說筋溜甲乙溜作瘤張云有所疾前筋謂疾有始於筋也筋之初著於邪則筋屈不得伸若久居其間而不退則發為筋溜筋溜者有所流注而結聚於筋也即贅瘤之屬下仿此簡案劉熙釋名云瘤流也血氣聚所生瘤腫也陳氏外科正宗云筋瘤者堅而色紫壘壘青筋盤曲甚者結若蚯蚓腸溜甲乙作腸疸注腸一本作瘍張云留而不反則蓄積於中流注於腸胃之間乃結為腸溜簡案腸溜他書未見詳論其證者俟考甲乙腸疽亦同昔瘤張云其有久者必數歲而後成也然其始也按之雖柔或上或下已有所結及其久也氣漸歸之津液留之復中邪氣則易於日甚乃結為昔瘤昔瘤者非一朝夕之謂簡案即宿瘤也骨疽張云又有按之而堅者其深中骨是氣因於骨而然骨與氣並其結日大名為附骨疽也簡案骨疽不言有膿此似指骨瘤而言陳氏云骨瘤者形色紫黑堅硬如石疙瘩高起推之不移昂昂堅貼於骨肉疽張云又有結於肉中者則宗氣歸之宗大也以陽明之氣為言邪留為熱則潰腐肌肉故為膿無熱則結為粉漿之屬聚而不散是為肉疽簡案無膿而謂之肉疽此亦似指肉瘤而言陳氏云肉瘤者軟若綿硬似饅皮色不變不緊不寬終年只似覆肝凡此數氣者止有常名也張云雖有常名而發無常處無常處則形證亦無常矣此所以變化無常也樓氏云此皆虛邪中人為病弗去而久留著故積歲纍月而成疽瘤也衛氣行篇第七十六諸本無篇字出入之合甲乙合作會馬雲或出陽經以入陰經或出陰經以入陽經也日有十二辰止陰主夜張云十二辰即十二支也在月為建在日為時天象定者為經動者為緯子午當南北二極居其所而不移故為經卯酉常東升西降列宿周旋無已故為緯天分四面曰東西南北一面七星如角亢氐房心尾箕東方七宿也鬥牛女虛危室璧北方七宿也奎婁胃昴畢嘴參西方七宿也井鬼柳星張翼軫南方七宿也是為四七二十八星房在卯中昴在酉中故為緯虛在子中張在午中故為經自房至畢其位在卯辰巳午未申故屬陽而主晝自昴至尾其位在酉戌亥子醜寅故屬陰而主夜故衛氣之行止周於五歲甲乙歲作藏張云衛氣之行於身者一日一夜凡五十周於身天之陽主晝陰主夜人之陽主腑陰主臟故衛氣晝則行於陽分二十五周夜則行於陰分二十五周陽分者言表言腑陰分者言裡言臟也故夜則周於五臟歲當作臟誤也志亦改作臟是故平旦陰盡止至小指之端甲乙作陰氣盡諸本足太陰作足太陽此本誤當改張云此下言衛氣晝行陽分始於足太陽經以周六腑而及於腎經是為一周太陽始於睛明故出於目然目者宗脈之所聚凡五臟六腑之精陽氣皆上走於目而為睛故平旦陰盡則陽氣至目而目張目張則衛氣由睛明穴上頭循項下足太陽經之分循背下行以至足小趾端之至陰穴也其散者止下至手小指之間外側甲乙無鋭眥二字及間字手太陰諸本作手太陽當改張云散者散行者也衛氣之行不循經相傳故始自目內眥而下於足太陽其散者自目鋭眥而行於手太陽也下至手小指之間外側少澤穴也其散者止注小指次指之間張云此自太陽行於足手少陽也目鋭眥足少陽瞳子髎也足小趾次趾之間竅陰穴也以上循手少陽之分側止入五指之間甲乙五指上有足字樓氏云分側二字衍文也其下當有其散者三字張云分側當作外側小指下當有次指二字謂手少陽關衝穴也別者以上至耳者此自少陽而行於手足陽明也合於頷脈謂由承泣頰車之分下注足陽明經五指當作中指謂厲兌穴也其散者止故為一周甲乙耳下下無一下字樓氏云下行陰分下當作上汪云大指當作次指張云手陽明之別者入耳故從耳下行本經大指下當有次指二字謂商陽穴也其至於足也以下者自陽明入足心出內踝者由足少陰腎經以下行陰分也少陰之別為蹺脈蹺脈屬於目內眥故復合於目交於足太陽之睛明穴此衛氣晝行之序自手足六陽而終於足少陰經乃為一周之數也愚按衛氣之行晝在陽分然又兼足少陰腎經方為一周考之邪客篇亦曰衛氣者晝日行於陽夜行於陰嘗從足少陰之分間行於五臟六腑然則無論晝夜皆不離於腎經者何也蓋人之所本惟精與氣氣為陽也陽必生於陰精為陰也陰必生於陽故營本屬陰必從肺而下行衛本屬陽必從腎而上行此即衛出下焦之義而腎屬水水為氣之本也故上氣海在膻中下氣海在丹田而人之肺腎兩臟所以為陰陽生息之根本日行一舍止與十分身之八甲乙一周上有於身二字張云此下言衛氣運行之數也天周二十八舍而一日一周人之衛氣晝夜凡行五十周以五十周為實而用二十八歸除之則日行一舍衛氣當行一周與十分身之七分八釐五毫有奇為正數此言一周與十分身之八者亦如天行過日一度而猶有奇分也奇分義見後舍即宿也按太史公律書及天官等書俱以二十八宿作二十八舍曰舍者為七政之所舍也日行二舍張云日行二舍人氣當行三周於身與十分身之五分七釐一毫有奇為正數云十分身之六者有奇分也後仿此日行三舍張云人氣當行五周與十分身之三分五釐七毫有奇為正數余者為奇分日行四舍張云人氣當行七周與十分身之一分四釐二毫有奇為正數余者為奇分日行五舍張云人氣當行八周與十分身之九分二釐八毫為正數余者為奇分日行六舍張云人氣當行十周與十分身之七分一釐四毫有奇為正數余者為奇分日行七舍樓氏云在身二字衍文張云人氣當行十二周與十分身之四分九釐有奇為正數余者為奇分此一面七星之數也簡案在身二字諸本並有之然推前後文例必是衍文日行十四舍止陰受氣矣張本十分身之四字作二注云日行七舍為半日行十四舍則自房至畢為一晝人氣當行二十五周為正數今凡日行一舍人氣行一周與十分身之八則每舍當餘一釐四毫有奇為奇分合十四舍而計之共得十分身之二是為一晝之奇分也晝盡則陽盡陽盡則陰受氣而為夜矣簡案馬志於日行舍數細分而釋之然張注覺明備故姑仍之為周甲乙周上有一字張云此言衛氣夜行陰分以相剋為序故腎心肺肝脾相傳為一周而復注於腎也行於陰臟甲乙陰臟作身一字注一云陰臟馬雲陰臟者諸陰經也復合於目張云衛氣行於陰分二十五周則夜盡夜盡則陰盡陰盡則人氣復出於目之睛明穴而行於陽分是為晝夜五十周之度陰陽一日一夜止奇分不盡故也甲乙合有作舍於十分藏之二作十分藏之四注云一作二上文十分藏之八此言十分藏之四疑有誤簡案上文如陽行則云十分身之四張改作二蓋依十分藏之二而改之歟然至十分身之四則順文釋之殆為可疑以此推之陽經陰經宜無參差甲乙作四似是張云前日行十四舍人氣行二十五周為半日凡得奇分者十分身之二故此一晝一夜日行二十八舍人氣行五十周合有奇分者在身得十分身之四在臟得十分藏之二所謂奇分者言氣有過度不盡也故人之起臥亦有早晏不同耳樓氏云右衛氣之行晝行陽則目張而寤夜行陰則目瞑而寐謹案此節言平旦陽氣之出目而下行於手足三陽也皆一時分道並注非有先後次第也此經篇末言水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分者則是先下太陽究竟然後下少陽候少陽究竟然後下陽明候陽明究竟方上行陰分大與此節矛盾蓋衍文也不以期甲乙作無已其是分有多少馬雲春分後日長秋分後日短以平旦為紀張云陰陽所交之候也水下百刻甲乙水上有漏字無下字在於三陽止在陰分而刺之甲乙作病在於陽分必先候其氣之加在於陽分而刺之病在於陰分必先候其氣之加在於陰分而刺之水下一刻止在陰分張云此以平旦為始也太陽少陽陽明俱兼手足兩經為言陰分則單以足少陰經為言此衛氣行於陽分之一周也水下五刻止水下八刻張云此衛氣行於陽分二周也水下九刻止十二刻張云此衛氣行於陽分三周也水下十三刻止十六刻張云此衛氣行於陽分四周也水下十七刻止二十刻張云此衛氣行於陽分五周也水下二十一刻止二十四刻張云此衛氣行於陽分六周也水下二十五刻止此半日之度也甲乙作此少半日之度也張云水下二十五刻計前數凡六周於身而又兼足手太陽二經此日行七舍則半日之度也按前數二十五刻得周日四分之一而衛氣之行止六周有奇然則總計周日之數惟二十五周於身乃與五十周之義未合意者水下一刻人氣在太陽者二周或以一刻作半刻則正合全數此中或有別解惟後之君子再正從房至畢止日行半度諸本作一十四舍是當改甲乙作從房至畢一十四度水下五十刻半日之度也從昴至心亦十四度水下五十刻終日之度也張云從房至畢十四舍為陽主一晝之度水下當五十刻從昴至心十四舍為陰主一夜之度亦水下五十刻晝夜百刻日行共少天一度故此一晝五十刻日行於天者半度也回行一舍止七分刻之四甲乙回作日七作十注云素問作七張云此言日度回行一舍則漏水當下三刻與七分刻之四若以二十八歸除分百刻之數則每舍當得三刻與十分刻之五分七釐一毫四絲有奇亦正與七分刻之四毫忽無差也此節乃約言二十八舍之總數故不論宿度之有多寡也大要曰止天與地同紀甲乙無曰字也下有則知二字行三陽行上行字作在無下行字天與地作與天地馬雲之字衍大要曰日加於客宿之上張云以日行之數加於宿度之上則天運人氣皆可知矣此總結上文而言人與天地同其紀也紛紛𤽉𤽉史云按太素音義𤽉普巴切字彙𤽉音葩引本經馬雲紛紛然𤽉𤽉然氣雖似亂而有章張云言於紛紜叢雜之中而條理不亂也故終而復始晝夜循環無窮盡矣九宮八風篇第七十七諸本無篇字太一止四十六日張云太一北辰也按西志曰中宮天極星其一明者太一之常居也案此出史記天官書蓋太者至尊之稱一者萬數之始為天元之主宰故曰太一即北極也北極居中不動而鬥運於外鬥有七星附者一星自一至四為魁自五至七為杓斗杓旋指十二辰以建時節而北極統之故曰北辰故云太一運璇璣以齊七政者此之謂也斗杓所指之辰謂之月建即氣令所王之方如冬至節月建在正北故云太一居葉蟄之宮葉蟄坎宮也以周歲日數分屬八宮則每宮得四十六日惟乾巽天門地戶兩宮止四十五日共紀三百六十六日以盡一歲之數後仿此坎宮四十六日主冬至小寒大寒三節倪昌世云坎宮名葉蟄者冬令主蟄封藏至一陽初動之時蟄蟲始振故名曰葉蟄簡案易乾鑿度云太一取其數以行九宮鄭玄注云太一者北辰神名居其所曰大帝行八卦日辰之間曰太一或曰天一出入所遊息紫宮之外其星因以為名天一之行猶天子巡狩方嶽人君亦從而巡省每卒則復太一行八卦之宮每四季乃入於中央知是太一行九宮其說出於緯書也後漢黃香作九宮賦明日居天留張云明日即上文四十六日之次日謂起於四十七日也後仿此天留艮宮也主立春至雨水驚蟄三節其四十六日太一之所移居也連前共九十二日而止倪云艮宮名天留者艮為山止而不動因以為名明日居倉門張云倉門震宮也自九十三日起當春分清明穀雨三節共四十六日至一百三十八日而止倪云震宮名倉門者倉藏也天地萬物之氣收藏至東方春令而始震動開闢故名倉門明日居陰洛諸本六作五據上文張注此本誤當改張云陰洛巽宮也自一百三十九日起主立夏至小滿芒種三節共四十五日至一百八十三日而止倪云巽宮名陰洛者洛書以二四為肩巽宮位居東南而主四月因以為名明日居天宮張云天宮離宮也主夏至小暑大暑三節共四十六日至二百二十九日而止倪云離宮名天宮者日月麗天主離明在上之象因以為名明日居玄委張云玄委坤宮也主立秋至處暑白露三節共四十六日至二百七十五日而止倪云坤宮名玄委者坤為地玄幽遠也委隨順也地道幽遠柔順是以名之明日居倉果張云倉果兌宮也主秋分至寒露霜降三節共四十六日至三百二十一日而止倪云兌宮名倉果者果實也萬物至秋而收藏成實是以名之明日居新洛諸本六作五據上文張注此本說當改張云新洛乾宮也主立冬至小雪大雪三節共四十五日至三百六十六日周一歲之全數而止倪云乾宮名新洛者新始也洛書戴九履一一乃乾之始也此九宮之位應於八方四時各隨時而命名也太一日遊止終而復始馬雲其太乙所遊之日假如冬至居葉蟄之宮照圖數所在之日從一處至九冬至為一立秋為二春分為三立夏為四中央為五立冬為六秋分為七立春為八夏至為九復反於冬至之一常如是輪之無已終而復始張云此結上文而總其義也太乙始於坎終於乾乃八宮之日也八盡而九則復反於一而循環無已矣然河圖宮九而此居惟八蓋中宮為太一所主而臨御乎八宮者也盧良侯云此太一日遊於九宮也數所在日者以所在之宮數至九日而復反於本宮也如居葉蟄之宮即從葉蟄之一處一日而至天留二日而至倉門三日而至陰洛四日而至天宮五日而至中宮六日而至玄委七日而至倉果八日而至新洛九日復反於葉蟄之宮如居天留之宮即從天留數至九日而復反於天留也常如是無已簡案此與馬注異義馬則依圖解之似是太一移日止多汗張云移日交節過宮日也節之前後必有風雨應之若當其日而風雨和調則吉故歲美民安少病也汗當作旱志同風雨先期而至其氣有餘故多雨風雨後期而至其氣不足故多旱占在君張云冬至為一歲之首位在正北君居宸極南面而治其象應之故占在君占在相張云春分為卯之中位在正東相特文衡職司教化其象應春故占在相占在吏張云中宮屬土王在四維吏有分任其象應之故占在吏簡案上文太一所移之日但八宮而無居中央招搖之日似可疑然鄭玄雲四季乃入中央則四季每十八日在中宮也張謂四維蓋指四季而言觀下文注而可見耳占在將張云秋分為酉之中位居正西將在威武職司殺伐其象應秋故占在將占在百姓張云夏至為午之中位在正南兆民衆庶如物蕃盛其象應夏故占在百姓五宮馬雲東南西北中央也張云言所重者在子午卯酉四正之節及中宮之應即四季土王用事之日是也病風折樹木志作疾風注云此太一出遊之第一日即移宮之第四十七日也二至二分乃陰陽離合之候中宮乃占八風之時是以遞居本宮之第一日有變則占在君民將相也疾風折木揚沙暴戾之變氣也張云其病在風霾異常折樹木揚沙石者乃謂之變否則非也所居之鄉止此之謂也張云所居者太一所居之鄉也如月建居子風從北方來冬氣之正也月建居卯風從東方來春氣之正也月建居午風從南方來夏氣之正也月建居酉風從西方來秋氣之正也四隅十二建其氣皆然氣得其正者正氣王也故曰實風所以能生長養萬物沖者對衝也後者言其來之遠遠則氣盛也如太一居子風從南方來火反勝也太一居卯風從西方來金勝木也太一居午風從北方來水勝火也太一居酉風從東方來木反勝也氣失其正者正氣不足故曰虛風所以能傷人而主殺主害最當避也馬雲按歲露篇以太乙冬至居葉蟄宮而風雨從南方來者為虛風立春之日而風雨從西方來者為虛風則此篇所謂從後來者為虛風須知東以西與北為後南以北與東為後西以東與南為後北以南與西為後也立於中宮乃朝八風張云此正以明太一即北極也蓋中不立則方隅氣候皆不得其正故太一立於中宮而鬥建其外然後可以朝八風占吉凶所謂北辰北極天之樞紐者以此樓氏云中宮之日立春立夏立秋立冬四日屬四維中央之土也中宮當作五宮簡案白虎通云八風者所以象八卦陽生於五極於九五九四十五日變變以為風陰合陽以生風也蓋本篇之義大弱風張云此下皆言虛風傷人之為病南方離火宮也凡熱盛之方風至必微故曰大弱風其在於人則火臟應之內舍於心外在於脈其病為熱心病則包絡在其中矣謀風張云西南方坤土宮也陰氣方生陽氣猶盛陰陽去就若有所議故曰謀風其在於人則土臟應之故內舍於脾外在於肌脾惡陰濕故其氣主為弱外在於肌甲乙肌下有肉字是剛風張云西方兌金宮也金氣剛徑故曰剛風其在於人則金臟應之內舍於肺外在皮膚其病氣主燥也折風張云西北方干金宮也金主折傷故曰折風凡風氣傷人南應在上北應在下故此小腸手太陽經受病者以小腸屬丙為下焦之火府而乾亥虛風其沖在已也然西方之金其氣肅殺北方之水其氣慘冽西北合氣最伐生陽故令人善暴死脈絶則溢甲乙溢作泄大剛風張云北方坎水宮也氣寒則風烈故曰大剛風其在於人則水臟應之內舍於腎外在於骨肩背膂筋足太陽經也言腎則膀胱亦在其中而病氣皆主寒也凶風張云東北方艮土宮也陰氣未退陽和未盛故曰凶風其在於人則傷及大腸以大腸屬庚為下焦之金府而艮寅虛風其沖在申也兩脅腋骨下大腸所近之位肢節手陽明脈氣所及嬰兒風張云東方震木宮也風生於東故曰嬰兒風其在於人則本臟應之故病舍於肝外在筋紐肝病則膽在其中矣風本勝濕而其氣反為身濕者以東南水鄉濕氣所居故東風多雨濕徵可見矣筋紐簡案紐筋所束也說文系也一曰結而可解博雅束也弱風張云東南方巽木宮也氣暖則風柔故曰弱風東南濕勝挾木侮土故其傷人則內舍於胃外在肌肉其病氣主體重也簡案本篇八風與呂覽淮南子所言各異唯隋蕭吉五行大義引太公兵書云坎名大剛風乾名折風兌名小剛風艮名凶風坤名謀風巽名小弱風震名嬰兒風離名大弱風大剛風者太陰之氣好殺故剛折風者金強能摧折物也小剛風者亦金殺故也凶風者艮在鬼門凶害之所也謀風者坤為地太陰之本多陰謀也小弱風者巽為長女故稱弱也嬰兒風者震為長男愛之故曰兒大弱風者離為中女又弱於長女也大剛小剛客勝大弱小弱主人勝凶有凶害之事謀有謀逆之人折為將死嬰兒風主人強此並兵家觀客主盛衰候風所從來也三虛相搏止為痿甲乙兩實一虛作兩虛一實張云乘年之衰逢月之空失時之和是謂三虛兩實一虛言三虛犯一亦能為病其病則或因淋雨或因露風而為寒熱或犯其雨濕之地而為痿皆一虛之為病也三虛見歲露論為擊僕偏枯矣馬雲擊僕者如擊之而僕暈也偏枯者或左或右偏枯也張云擊僕為風所擊而仆倒也然必犯三虛而後為此病則人之正氣實者邪不能傷可知矣九針論第七十八馬雲篇內第一節詳論九針故名篇自天忌至末皆用針者之當知故並及之凡內經全書之論針者皆不出此九針耳真萬言一律也起黃鐘數焉帝王世紀云黃帝使伶倫於大夏之西崑崙之陰取竹解谷其竅厚均者斷兩節間吹之以黃鐘之管以象鳳鳴雌雄各六以定律呂淮南子云數始於一一生三三生萬物故三月為一時三三如九故黃鐘之律九寸而宮音調因而以九之九九八十一黃鐘之數立焉白虎通云黃鐘何黃中和之氣鍾者動也言陽於黃泉之下動萬物也張云自一至九九九八十一而黃鐘之數起焉黃鐘為萬事之本故針數亦應之而用變無窮也大其頭而鋭其末張云鑱針必大其頭鋒其末蓋所用在淺但欲出其陽邪耳馬雲按此節九針本經九針十二原篇官針篇素問針解篇相同二者地也甲乙此下有地者土也一句筒其身而員其末馬雲筒以竹為之其體直故謂直為筒張云員針如卵形以利導於分肉間蓋恐過傷肌肉以竭脾氣故用不在鋭而主治分間之邪氣也令無得傷肉分傷則氣得竭甲乙作以瀉肉分之氣令不傷肌肉則邪氣得竭瘤病甲乙作痼病張云瘤者留也簡案九針十二原官針等篇俱謂鋒針取痼疾又下文云痼病竭明是留乃痼之訛當從甲乙音者冬夏之分分於子午張云五以法音音者合五行而應天干故有冬夏子午之分志云五居九數之中故主冬夏之分分於子午如犛犛里之切音釐師古漢書注毛之強曲者曰犛星者人之七竅張云七以法星而合於人之七竅舉七竅之大者言則通身空竅皆所主也所客於經甲乙經字下有舍於絡三字無下文舍於經絡四字文意相貫當從之出針而養者也馬雲正氣因之而復其真邪雖俱往以出針而可以養其正氣不使之外泄也風者止為深痹也甲乙無八風二字及理字痹下有者字馬雲人之手足各有股肱關節計八今八正之虛風二至二分四立為八正合於東西南北東南西南西北東北之八風即八風以傷人張云九以法風而合於人之股肱八節言八節則通身骨節皆其屬也溜不能過於機關馬雲其流不能過於機關大節張云凡淫邪流溢於肌體為風為水不能過於關節而壅滯為病者必用大針以利機關之大氣為之治針甲乙針上有大字簡案官針篇云病水腫不能通關節者取以大針知是大針乃去水針也令小大如挺趙府本張本小大作尖一字簡案考九針十二原篇亦作尖當改巾針甲乙作布針張云按巾針絮針綦針等制必古針名也未詳其義簡案證類本草布針用縫布大針也寸半卒鋭之甲乙作半寸張云卒尾也此針身大其近末約寸半許而漸鋭之共長一寸六分主瀉去陽氣故治熱在頭身簡案此針通計長一寸六分其寸半而卒鋭之則其餘有一分豈有此理乎不若當從甲乙作半寸卒暴也此針之制長寸六分其去末五分之所暴鋭之其刺淺而瀉表陽氣也此說出本邦前輩芳恂益今從之筒其身而卵其鋒張云筒如竹筒也卵員如卵鋭也此針直其身員其末故但治分間之氣而不使傷其肌肉也按脈取氣張云九針十二原篇曰按脈勿陷以致其氣蓋利於用補者也鋒鐵張云九針十二原篇云刃三隅以發痼疾蓋三稜者也本篇言按其身者似或有誤兩熱爭者也張云言寒熱不調兩氣相搏也綦針博雅云綦綺彩也大小長短法也張云按以上九針之用凡所取者皆言有餘之實邪則針不宜於治虛也九野張云即八卦九宮之位也志云九州之分野也簡案考下文張注為是左足應立春甲乙作左手張云此左足應艮宮東北方也立春後東北節氣也寅醜二日東北日辰也故其氣皆應於艮宮然乾坤艮巽四隅之宮也震兌坎離四正之宮也土王於四季故四隅之宮皆應戊己而四正之宮各有所王後仿此左脅應春分甲乙脅作胸張云此左脅應震宮也左脅正東方也春分後正東節氣也乙卯日東方之正也故其氣皆相應左手應立夏甲乙作左足張云此左手應巽宮東南方也立夏後東南節氣也戊辰己巳東南日辰也故其氣皆相應膺喉著頭應夏至張云胸前曰齊齊喉首頭應離宮正南方也夏至後正南節氣也丙午日南方之正也故其氣皆相應右手應立秋張云此右手應坤宮西南方也立秋後西南節氣也戊申己酉西南日辰也故其氣皆相應右脅應秋分甲乙脅作胸張云此右脅應兌宮正西方也秋分後正西節氣也辛酉日西方之正也故其氣皆相應右足應立冬張云此右足應乾宮西北方也立冬後西北節氣也戊戌己亥西北日辰也故其氣皆相應倪仲玉云氣從下而上故左足應立春右足應立冬者氣復歸於下也腰尻下竅應冬至張云此腰尻下竅應坎宮正北方也冬至後正北節氣也壬子日北方之正也故其氣皆相應六腑膈下三臟應中州甲乙腑下有及字三作五簡案三作五恐傳寫之訛張云此膈下應中宮也膈下腹中也三臟肝脾腎也六腑三臟俱在膈下腹中故應中州其大禁大禁止及諸戊己甲乙作其口大禁是張云大禁者在太乙所在之日及諸戊己日蓋戊己屬土雖寄王於四季而實為中宮之辰故其氣應亦如太一出九宮八風篇按太一如冬至居葉蟄宮四十六日立春居天留宮四十六日之類是也但彼止言八宮而不及中宮此節乃言中宮太一所在之日意者於八宮太一數中凡值四季土王用事之日即中宮太一之期也惟博者正之簡案此即與干鑿度鄭注符矣王云遁甲經曰六戊為天門六己為地戶故為天忌凡此九者張云九九宮也正正風也八正即八方正氣之所在太一之謂也八宮定則八正之氣可候矣所主左右上下止謂天忌日也張云天地八正之方即人身氣王之所故所主左右上下凡身體有癰腫之處勿以所直之日潰治之恐其走泄元氣以犯天忌不吉也馬雲天忌見素問八正神明論前官能篇按後世針灸法最忌九宮尻神九部尻神十二部尻神此固當遵簡案癰疽逐日逐時之忌見甲乙經癰疽篇行年血忌患癰疽見劉涓子鬼遺方形樂止是謂形嗌諸本作喝馬雲喝當作嗌按素問血氣形志論與此節同但彼曰病生於咽嗌者為是彼曰治之以百藥此曰甘藥者是也彼末句云是謂五形志也此節之末句有缺簡案筋脈素問作經脈似是志云喝當作𩩲誤五臟氣止腎主缺馬雲此與素問宣明五氣論同六腑氣止為水馬雲宣明五氣論與此大同五味馬雲與宣明五氣論亦同但此多淡入胃一句王遜云淡附於甘故淡入胃五並畏甲乙作飽注一作畏馬雲與宣明五氣論亦同但彼末有云虛而相併者也王遜云肺在志為憂精氣並於肝則憂者所勝之氣乘之也多陽者多喜心為陽臟精氣並之故喜經云神有餘則笑不休精氣並於肺則肺舉而液上溢液上溢則泣出而悲腎在志為恐五精氣並之其間有所勝之氣乘之所不勝侮之故恐土氣灌於四臟而四臟之精氣反並於脾故畏此因臟氣虛而餘臟之精氣並之皆為病也陰陽應象論曰心在志為喜喜傷心腎在志為恐恐傷腎乃有餘而為病過猶不及也五惡馬雲與宣明五氣論同五液馬雲與宣明五氣論同五勞馬雲與宣明五氣論同王遜云勞謂太過也夫四體不勞則血氣不行而為病是以上古之民形勞而不倦蓋不可久而太過也久視損神故傷血久臥則氣不行故傷氣脾喜運動故久坐傷肉久立則傷腰腎脛膝故傷骨行走罷極則傷筋是五勞而傷五臟所主之血氣筋骨也五走馬雲此即宣明論之五味所禁較此更詳五裁馬雲與宣明五氣論同王遜云裁者酌其適中而不可多也夫五味入口內養五臟外濡形身病則嗜食故宜裁之案素問作五禁五發趙府道臟正脈熊本張本陰病作以味馬志本作陰病發於肉簡案宣明五氣論氣作肉當以馬本為正張注宣明五氣云按九針論尚有以味發於氣一句蓋食入於陰則長氣於陽故味發於氣也五邪甲乙及諸本巔作癲馬雲癲當作癲喜當作善此與宣明五氣論同以陽氣上升故項巔有疾如頭痛眩暈等證也志云喜當作善宣明五氣章曰陰出之陽病善怒五臟馬雲此與宣明五氣論同但彼則腎止曰藏精不及志難經兼言腎臟精與志故言有七腎之說五主馬雲與宣明五氣論同陽明止出氣惡血也馬雲此節與素問血氣形志論本經五音五味篇大同小異當以素問為的此言陰陽合經有血氣多少故刺之者凡多者則出之少者則惡出之也歲露論篇第七十九諸本無篇字馬雲末以逢其風而遇其雨者為遇歲露故名篇經言夏日傷暑止其病稍益至甲乙至作早諸本宴作晏當改馬雲按此節當與素問瘧論第三節參看張云瘧論云二十五日下至骶骨二十六日入於脊內與此不同蓋彼兼項骨為言此則單言脊椎也伏沖之脈彼作伏臂之脈至字誤瘧論云益早者是簡案馬以至字按下節非次日乃稸積而作焉馬雲據瘧論云其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也此節當以瘧論參考宜為間日而發故云然否則上下不相蒙矣氣之所舍節則其腑也馬雲節字衍按瘧論云云邪氣之所合則其腑也今此節不若素問之詳必與彼參看始明張云衛氣之所應瘧論作所發所舍節言所舍之節也夫風之與止瘧乃作也馬本以時休作以時依注云依當作休按瘧論云云此節不若瘧論尤詳當參看張云本篇兩搏字瘧論俱作薄故有寒暑甲乙故作因是八正虛邪甲乙虛作風賊風邪氣之中人也止徐以遲甲乙內極病作內亟也其病人也作疾其病人也張云此言賊風邪氣亦能傷人又有非八正虛邪之謂者凡四時乖戾不正之氣是為賊風邪氣非如太一所居八正虛邪之有常候此則發無定期亦無定位故曰不得以時也然其中人必因膚腠之開乃得深入深則內病極故其病人也卒暴若因其閉雖中必淺淺而不去其邪必留亦致於病但徐遲耳其故常有時也甲乙其故作固一字張云此謂平居無事之時其腠理之開閉緩急而致卒病者亦各有其故蓋因於時氣耳人與天地相參也止其病人也卒暴張云致密也郤閉也縱寬也人與天地日月相參應而此獨言月言水者正以人身之形質屬陰故上應於月下應於水也夫地本屬陰而西北則陰中之陰東南則陰中之陽故地之體西北高東南下月滿則海水西盛者陰得其位陰之實也在人應之則血氣亦實故邪風不能深入月郭空則海水東盛者陰失其位陰之衰也在人應之則血氣亦虛故邪風得以深入而為卒暴之病煙垢膩垢如煙也血實則體肥故膩垢著於肌膚表之固也血虛則肌瘦故膩垢剝落類乎風消表之虛也此所以皆關於衛氣郤隙同志云理者肌肉之文理乃三焦通會之處故曰焦理煙垢者火土之餘也三焦主火肌肉主土故焦理薄則煙垢落謂肌肉減腠理開則肌腠之氣亦消散也簡案下篇云上膲中膲故志為三焦會通之理也乘年之衰止工友為粗甲乙和下有人氣乏少四字張云乘年之衰如陰年歲氣不及邪反勝之及補遺刺法本病二論所謂司天失守等義是也逢月之空如八正神明論曰月始生則血氣始精衛氣始行及上文月滿則海水西盛月郭空則海水東盛等義是也失時之和如春不溫夏不熱秋不涼冬不寒客主不和者是也三虛在天又必因人之虛氣有失守乃易犯之故為賊風所傷而致暴死暴病使知調攝避忌則邪不能害故曰乘曰逢曰失者蓋兼人事為言也簡案乘年之虛諸家並以運氣家之言解之此恐不然必別有說聊記候識者兩邪相搏經氣結代者矣張云冬至中之立春又中之此兩邪也邪留而不去故曰結當其令而非其氣故曰代觀陰陽應象大論曰冬傷於寒春必溫病即此之調也簡案馬雲人之經氣相結而代脈見矣非也命曰遇歲露張云歲露即前章淋露之義歲則兼乎時也上二節言虛風之傷人此一節又言賊風邪氣之傷人而歲氣之多邪者尤為民之多病也志云風者天之氣雨者天之露故諸逢其風而遇其雨者命曰遇歲露焉簡案志注義長沈存中筆談云十一月中遇東南風謂之歲露有大毒若飢感其氣則開年著溫病蓋本於本節之義立說者正月朔日張云此下言歲候之占重在元旦也元旦為孟春之首發生之初志云正月朔日候四時之歲氣者以建寅之月為歲首人生於寅也簡案元旦占八風見漢書天文志平旦北風行民病多者熊本馬本風字下句馬志病多作病死旱鄉漢書天文志南方謂旱鄉白骨將志本將字接下句天寒而風甲乙作大寒疾風䔲傷馬張俱云䔲殘同簡案檢字書䔲字無考史熊亦缺二月醜止多暴死張云二三四月以陽王之時而丑日不風戌日不溫巳日不暑陰氣勝而陽不達也故民多病十月以陰王之時而申日不寒陽氣勝而陰不藏也故民多暴死諸所謂風者張云此釋上文諸所謂風者必其異常若是乃為凶兆否則不當概論大惑論篇第八十諸本無篇字清冷之臺止何氣使然甲乙作青霄之臺自上作自止張云臺之高者其氣寒故曰清冷之臺凡人登高博望目見非常之處無不神魂驚蕩而心生眩惑故特藉此以問其由然也上注於目而為之精精之窠為眼甲乙窠作裹馬雲精睛同張云為之精為精明之用也窠者窩穴之謂眼者目之總稱五臟六腑之精氣皆上注於目故眼為精之窠而五色具焉志云精精明也窠藏也簡案脈要精微論云夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣是也馬注誤瞳子張云眸子也骨之精主於腎腎屬水其色玄故瞳子內明而色正黑簡案慧琳一切經音義云睛者珠子也纂韻云眼黑睛也古人呼為眸子俗謂之目瞳子亦曰目瞳人也論文謂之眼根銀海精微云瞳人為水輪屬腎水是也黑眼張云黑眼黑珠也筋之精主於肝肝色青故其色淺於瞳子簡案銀海精微云黑睛為風輪屬肝木是也血之精為絡其窠甲乙絡其窠作其絡馬雲心主血血之精為絡所以絡其窠也簡案其窠張志接下句云窠氣者言目窠之氣非也銀海精微云大小眥為血輪屬心火是也白眼甲乙白作睛馬雲肺主氣氣之精為白眼簡案銀海精微云白為氣輪屬肺金是也為約束張云約束眼胞也能開能闔為肌肉之精主於脾也志云約束者目之上下綱肌肉之精為約束脾之精也裹擷止出於項中甲乙擷作契張云擷爻結切以衣衽收物謂之擷脾屬土所以藏物故裹擷筋骨血氣四臟之精而併為目系以上出於腦項之閭簡案擷韻會奚結切音潔將取也又與襭同以衣貯物而報其衽也張注本於此今考擷纈通纈說文結也一切經音義云纈賢結反以絲縛繒染之解絲成文曰纈乃結束之義也銀海精微云上下胞瞼為肉輪屬脾土是也馬雲後世五輪之說似是而不典當以此義為正考銀海精微等所載五輪之說乃與本節之旨不相詭不可為之典也但八廓之說無所見於古經故邪中於項止見兩物甲乙項因作頭目邪其精其精所中不相比也十一字作邪中之精則其精所中者不相比不相比十六字千金方亦作邪中其睛則其睛所中者不相比則睛散張云前邪字邪氣也後邪字與斜同邪氣中於風府天柱之間乘其虛則入腦連目目系急則目眩睛斜故左右之脈互有緩急視歧失正則兩睛之所中於物者不相比類而各異其見是以視一為兩也此承帝問而先發邪氣之中人者如此以明下文之目見非常者亦猶外邪之屬耳志云比周密也邪其精其精為邪所中則不相比密而精散矣簡案經文恐有脫誤注亦似牽強當以甲乙為正許氏本事方云荀牧仲項年常謂豫曰有人視一物為兩醫者作肝氣有餘故見一為二教服補肝藥皆不驗此何疾也豫曰孫真人云云睛散則歧故見兩物也令服驅風入腦藥得愈所常營也張本無也字陰陽合傳而精明也甲乙傳作揣志云陰乃肝腎陽乃心肺故陰陽相合傳於目而為睛明也神精亂而不轉甲乙作神分精亂而不揣東苑馬雲清冷之臺東苑之所有也心有所喜止甚者為惑甲乙感作惑張云偶為遊樂心所喜血忽逢奇異神則惡之夫神有所惡則志有不隨喜惡相感於卒然故精氣為亂去之則神移神移則復矣間者言其未甚也亦足相迷況其甚者能無惑乎上氣不足止故善忘也張云下氣有餘對上氣不足而言非謂下之真實也心肺虛於上營衛留於下則神氣不能相周故為善忘陽衰於上之兆也精氣並於脾止故不嗜食也甲乙寒作塞簡案諸注順文詮釋義殆難通豈有胃熱而胃脘寒之理乎當以甲乙為正蓋胃熱故善飢胃脘塞故不嗜食衛氣不得入於陰止故目不瞑矣張云衛氣晝行於陽夜行於陰行陽則寤行陰則寐此其常也若病而失常則或留於陰或留於陽留則陰陽有所偏勝有偏勝則有偏虛而寤寐亦失常矣志云陰蹺陽蹺並會於足太陽之睛明衛氣行陽行陰皆從目以出入故曰目者營衛魂魄之所常營也衛氣留於陰止故目閉也甲乙留作行行作入張云此言因病而目有不能開視及病而多寐者以衛氣留於陰分陰蹺滿而陽氣虛耳觀寒熱病篇曰陰蹺陽蹺陰陽相交陽入陰陰出陽交於目內眥陽氣盛則瞋目陰氣盛則瞑目即此上文兩節之義此人腸胃大止故多臥矣甲乙濕作澀更有澀則二字下濕字亦作澀不精注一作不清馬本衛氣作胃氣誤張云解利也腸胃大則陰道迂遠肉理濕滯不利今人有飽食之後即欲瞑者正以水穀之悍氣暴實於中則衛氣盛於陰分而精陽之氣有不能勝之耳世俗但呼為脾倦而不知其有由然也故少瞑焉甲乙瞑作臥其非常經也張云言其變也蓋以明邪氣之所致然者邪氣留於上膲止卒然多臥焉張云膲焦同邪氣居於上焦而加之飲食則衛氣留閉於中不能外達陽分故猝然多臥然有因病而不能瞑者蓋以邪客於臟則格拒衛氣不得內歸陰分耳治此諸邪馬雲自大惑論善忘以下七項張云統言本論八證也先其臟腑止定乃取之志云先其臟腑者先調其五臟六腑之精氣神志誅其小過者去其微邪也後調其氣者調其營衛也必先明知其形志之苦樂定其灸刺尉引甘藥醪醴以取之蓋志者精神魂魄志意也形者營衛血氣之所營也故志苦則傷神形勞則傷精氣矣癰疽篇第八十一諸本無篇字黃帝曰劉涓子鬼遺方作九江黃父問於岐伯千金翼作九江黃父相癰疽論黃帝問於岐伯曰上焦出氣張云宗氣也宗氣出於喉嚨而行呼吸其以溫分肉養骨節通腠理者是衛氣化於宗氣也中焦出氣如露甲乙露作霧是張云營氣也其於陰陽已張因息乃行是營氣化於宗氣也變化而赤為血甲乙作赤而似是皆盈甲乙皆上更是絡脈二字千金翼同從虛去實止補則有餘從虛去虛甲乙作從實是馬雲其實者則從虛之之法以去其實所以瀉則不足而為虛也蓋疾去其針則邪氣減矣若久留其針先後如一斯則從實之之法以去其虛所以補則有餘而為實也形氣乃持甲乙作神氣千金翼作形神張云持定也草萓馬本志本甲乙鬼遺方萓作蓂千金翼作蘆史音萓魚飢切張云音宜萓塢草鹿蔥也簡案玉篇塢萓本作宜男鹿蔥也然邪客篇地有草蓂此萓當蓂誤衛氣歸之不得復反志云歸當也榮血留泣不行則衛氣亦還轉而不得復反其故道故癰腫也潘氏續焰云言衛氣因以留聚而不復返於平常流行之故道也不當骨空止不相滎千金翼骨空下更有骨空二字甲乙作髓消不當骨空不得泄瀉則筋骨枯空枯空則筋骨肌肉不相親志云骨空者節之交也癰腫不當骨空之處則骨中之邪熱不得泄瀉矣潘氏云骨空骨中之細孔如鬃眼者所以通血液之滲灌簡案髓充骨空今髓消而不當骨空骨空無髓之可泄瀉則筋骨枯矣志注恐誤與忌日名外臺作與期日無名字岐伯曰鬼遺方千金翼外臺引集驗曰字下有略說癰疽之極者八十種一句癰發於嗌中名曰猛疽止三日已合千金翼作含外臺注一云無冷食志云嗌乃肺之上營呼吸出入之門發於嗌中其勢甚猛故名猛疽若膿不瀉而塞嗌則呼吸不通不待半日而死矣張云豕膏即豬脂之煉淨者也觀萬氏方有治肺熱暴喑者用豬脂一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈若無疾服之最能潤肺潤腸即是豕膏之屬簡案太陰陽明論云喉主天氣嗌主地氣史倉公傳云飲食下嗌說文嗌咽也此嗌為食道然本文言塞咽半日死則嗌為氣道明矣王氏準繩云結喉癰一名喉癰靈樞名曰猛疽以其勢毒猛烈可畏也此以喉外結喉上為嗌也按衛生寶鑑有砭刺腫上出紫黑血用桔梗甘草連翹黍黏黃芩升麻防風等藥醫治猛疽按此乃似指喉內壅腫為猛當參考發於頸名曰夭疽巢源夭作掖淵腋作掖淵千金翼其癰作其疽夭李本作天外臺注太素經曰項前曰頸李云天疽者在天柱也俗名對口潘氏云外在頸而內則入腋熏肺以其最上故曰天準繩頸癰乃夭疽簡案夭疽發於兩耳後左右頸上志云頸乃手足少陽陽明血氣循行之分部是也蓋其毒烈使人橫夭故名夭疽也陳氏正宗云夭疽鋭毒生於耳後一寸三分致命之處左為夭疽夭者妖變之物也故屬於肝木右為鋭毒鋭者利也鋒利之器屬於肺金是也對口即腦疽與此自別名曰腦爍其色不樂千金翼留項作流項鬼遺方爍作漯千金翼作腦爍疽注樂一作除潘云爍消爍也烈火熔金之謂腦被其熱爍亦加之煩心者腎毒傳心也志云陽氣大發者三陽之氣併發也三陽者太陽也太陽經脈入於腦出於項故陽氣大發留於項名曰腦爍張云色有不樂傷乎心也痛如刺以針毒之鋭也煩心者邪犯其臟也簡案準繩以鬼遺方腦疽為腦爍發於肩及臑名曰疵癰止逞焫之鬼遺方作雌疽甲乙作疵疽甲乙千金翼外臺逞作逆巢源肩作髆逞作燉張云肩髆下軟白肉處曰臑此非要害之所故不及五臟逞疾也焫艾炷也謂宜速灸以除之也志云肩臑乃肺之部分故令人汗出至足此癰生浮淺如疵之在皮毛故名疵癰而不害五臟逞快也速焫治之則毒隨氣而散矣燉玉篇火盛貌名曰米疽止勿裹之千金翼米作朱砭之作啓之志云米者言其小也治之以砭石者癰亦浮淺也毒氣在於皮膚之間六日則氣已周而來復故已勿裹之者使毒氣外泄也張云砭石欲細者恐傷肉也欲長者用在深也故宜疏不宜密薛氏外科心法云腋疽一名米疽又名疚疽發於胳肢窩正中初起之時其形如核由肝脾二經憂思恚怒氣凝血滯而成腋癰又名夾肢癰李云豕膏者即豬油煎當歸以蠟收者也馬刀挾纓千金翼其癰作其疽按上節而為一節甲乙纓作癭外臺注太素經曰頸前曰纓張云此即瘰癧也挾纓經脈篇作俠癭欲急治者恐遲則傷人也潘云馬刀蛤蠣之屬癰形似之挾纓者發於結纓之處大迎之下頸側也二癰一在腋一在頸常相連絡故俗名歷串簡案李志並云纓當作癭非也嬰癭從疒者井疽李云井者喻其深而惡也發於胸者近犯心王治之宜早準繩云心窩生疽初起如黃豆肉色不變名曰井疽又名穿心冷瘻申氏啓玄雲井疽又名心漏疽又名穿心毒最為難治甘疽色青其狀如谷實栝蔞巢源栝蔞作瓠瓜鬼遺方作萎瓜史音栝蔞古栝樓字馬雲谷木名李云膺逼近在乳上也穴名膺窗足陽明胃之脈也土味甘故曰甘疽薛氏云此疽生於乳上肉高聳處屬肺經中腑穴之下無論左右皆由憂思氣結而成簡案谷㮴下從木音構考本草楮實亦名谷實大如彈丸青緑色至六七月漸深紅色乃成熟馬注為是張志及潘俱為米穀之義殊不知谷谷字自別也志云死後出膿者謂至將死之候然後出膿而死此即乳岩石癰之證也出膿之解近是其為乳岩石癰者恐非也敗疵止灸之巢源千金翼外臺敗疵作改訾巢源又云癰發女子陰旁名曰改訾疽久不治其中生息肉如赤小豆麻黍也翼外臺灸之作久之李云脅者肝之部也婦人多鬱怒故患此瘡潘云亦乳串之類銼䔖𧄍草根止至足已甲乙根下有及赤松子根五字外臺䔖作連草下有及字千金翼一升作一斗馬雲䔖𧄍今之連翹也張云䔖芰也草𧄍連翹也二草之根俱能解毒故各用一升大約古之一升得今之三合有零以水一斗六升煮取三升俱折數類此李云乘其熱而強飲之復厚衣坐於熱湯之釜薰蒸取汗汗出至足乃透已者愈也簡案䔖說文芰也玉篇䔖蓤同故張志以為菱然據外臺馬注為是發於股脛名曰股脛疽止三十日死矣巢源上脛字作陽股脛疽作兌疽甲乙搏骨作薄於骨鬼遺方巢源作附骨張云股脛大股也狀不甚變言外形不顯也癰膿搏骨言膿著於骨即今人之所謂貼骨癰也毒盛而深能下蝕三陰陽明之大經故不為急治則死矣胡公弼云貼骨癰即附骨疽生大腿外側骨上高不見高腫不見紅痛深至骨者是也簡案下文有發於股陰名曰赤施知是發於股脛當是股陽樓引劉涓子作股陽今本作股陽明準繩以此為伏兔發鋭疽張云尻尾骨骶也穴名長強為督脈之絡一名氣之陰郤故不治則死潘云尾骨盡處而尖鋭故名簡案顧氏瘍醫大全以此為鸛口疽正宗云鸛口疽發在尾閭之穴高骨頭尖初起形似魚胞久則突如鸛嘴赤施甲乙巢源千金翼外臺施作弛鬼遺方作赤旋疽張云股陰大股內側也當足太陰箕門血海及足厥陰五里陰包之間皆陰氣所聚之處故不治則死若兩股俱病則傷陰之極其死尤速志云股陰者足三陰之部分也以火毒而施於陰部故名曰赤施潘氏云股陰足太陰厥陰二經所過之處火毒傷陰之甚則發此曰赤施者謂赤火之施發耳準繩以此為股陰疽疵癰鬼遺方作雌疽甲乙巢源千金翼作疵疽甲乙千金翼如堅石作而堅者其柔作其色異柔鬼遺方作須以手緩柔之乃破外臺作其柔色異志云膝者筋之會足少陽之分也色不變者色與皮膚相同而不赤也其狀如大癰而色不變者毒在外內之間也如堅石者石之則死毒氣入於內也須其柔軟而石之者生毒氣出於外也余伯榮曰堅石者毒氣尚未透發柔則發於外矣故有外內死生之分焉薛氏心法云膝癰生膝蓋色紅焮腫疼痛屬氣血實疵疽亦生在膝蓋腫大如癰其色不變寒熱往來屬氣血虛和軟為順堅硬如石者逆兩膝俱生屬敗證不可治也簡案準繩一名鶴膝風一名鼓槌風恐誤諸癰疽之發於節止三十日死甲乙三十作四十馬雲節者關節也其節之外廉為陽內廉為陰張云諸節者神氣之所遊行出入也皆不宜有癰毒之患若其相應則發於上而應於下發於左而應於右其害尤甚為不可治然發於三陽之分者毒淺在腑其死稍緩發於三陰之分者毒深在臟不能出一月也志云百日死者日之終也三十日者月之終也簡案外臺注云丈夫陽器曰陽婦人陰器曰陰樓氏云陽謂諸節之背陰謂諸節之膕郤間劉涓子云應者內發透外也數說未穩張注得其旨矣兔齧其狀赤至骨巢源作兔齧疽甲乙千金翼作其狀如赤豆志云齧音業噬也準繩云足跟疽又名兔齧其狀如兔齧故名簡案此生於脛而為足跟疽之名誤也顧氏大全脛疽門引本篇為是走緩止數石其輸而止鬼遺方緩作湲千金翼外臺作數灸而止千金翼無內踝之內字志云癰疽之變有病因於內而毒氣走於外者有腫見於外而毒氣走於內者此邪留於脈而不行故名曰走緩張云數石其輸砭其所腫之處也準繩云足內踝生疽名曰鞋帶癰簡案作數灸而止近是寒熱不死志云蓋足少陰秉先天之水火故能為寒為熱也簡案為寒熱而不死者其義可疑志注缺詳馬張無解四淫其狀大癰鬼遺方大作如張云陽受氣於四末而大癰淫於其間陽毒之極盛也時氣移易則真陰日敗故逾三月而死簡案顧氏大全於足發背門列此證覺不穩焉厲癰止不消輒益千金翼厲作癘如字甲乙千金翼外臺作從巢源鬼遺方無志云此寒邪客於足陽明之脈而為癰也足陽明之脈起於足大趾次趾之厲兌故發於足旁名曰厲癰閔士先云初如小趾其狀腫而長乃邪在經絡之形也衛氣歸之則圓而墳起矣李云去其黑者而猶不消反益大焉則百日必死矣簡案志厲字之解始為傅會焉其言發於足旁則初從小趾發可知耳如字必誤當依甲乙等作從脫癰止斬之甲乙鬼遺方癰作疽斬下有去字張云六經原腧皆在於足所以癰發於足者多為凶候至於足趾又皆六井所出而癰色赤黑其毒尤甚若無衰退之狀則急當斬去其趾庶得保生否則毒氣連臟必至死矣陳氏正宗云脫疽者外腐而內壞也凡患此者多生手足初生如粟一點黃泡其皮猶如煮熟紅棗黑色侵漫相傳五趾傳遍上至腳面疼如湯潑火燃其形骨枯筋縱其穢異香難解其命仙方難活孫真人曰在肉則割在趾則切即此病也不則死矣馬雲不否同腐則為膿甲乙腐上有肉字不能陷骨髓甲乙重骨髓二字淳盛甲乙千金翼淳作純陷肌膚筋髓枯志本膚作肉甲乙枯作骨肉二字是上之皮夭以堅止此其候也甲乙夭下有瘀字張云夭以色言黑暗不澤也此即皮色之狀可以辨其淺深矣李云夭者色枯暗也牛皮喻其厚也澤者光亮也癰字從壅疽字從沮總是氣血稽留營衛不通之症大而淺者為癰六腑受傷可無大患深而惡者為疽五臟受傷大可憂畏治之者顧可緩乎顧可忽乎簡案癰疽二證以陰陽深淺輕重分之耳而考上文諸篇癰疽互稱亦似無大分別後世精要諸書二寸至五寸為癰五寸至一尺為疽之類皆謬說也
