body:
  text: 卷二本神篇第八馬雲此篇推本五臟之神故名篇簡案篇首有凡刺之法必先本於神語故命篇悗亂史音悗音悶簡案悶悶並通道藏本及馬張志作恍誤天之罪與人之過乎志與下句簡案依志意與平聲天之在我者止生者也張云人稟天地之氣以生天地者陰陽之道也自太極而生兩儀則清陽為天濁陰為地自兩儀而生萬物則乾知大始坤作成物故易曰天地之大德曰生寶命全形論曰人生於地懸命於天然則陽先陰後陽施陰受肇生之德本乎天成形之氣本乎地故天之在我者德也地之在我者氣也德流氣薄而生者言理賦形全而生成之道斯備矣故生之來謂之精張云所謂精者天之一地之六也天以一生水地以六成之而為五行之最先故萬物初生其來皆水如果核未實猶水也胎卵未成猶水也即凡人之有生以及昆蟲草木無不皆然易曰男女構精萬物化生此之謂也志云決氣篇曰常先身生是謂精蓋未成形而先受天一之精故所生之來謂之精簡案此以下止於謂之智見子華子兩精相搏謂之神張云兩精者陰陽之精也搏交結也易曰天數五地數五五位相得而各有合周子曰二五之精妙合而凝是皆兩精相搏之謂凡萬物生成之道莫不陰陽交而後神明見故人之生也必合陰陽之氣構父母之精兩精相搏形神乃成所謂天地合氣命之曰人也又決氣篇曰兩神相搏合而成形常先身生是謂精志云平人絶谷篇曰神者水穀之精氣也蓋本於先天所生之精後天水穀之精而生此神故曰兩精相搏謂之神真邪章曰真者所受於天與穀氣並而充身者也簡案兩精之解張義似長矣馬雲相搏之搏音博禮儒行鷙蟲攫搏不程勇者亦讀為博此恐非也博子華子作薄乃易所謂雷風相薄之薄二字古通用見通雅隨神往來者謂之魂並精而出入者謂之魄張云精對神而言則神為陽而精為陰魄對魂而言則魂為陽而魄為陰故魂則隨神而往來魄則並精而出入愚按精神魂魄雖有陰陽之別而陰陽之中復有陰陽之別焉如神之與魂皆陽也何謂魂隨神而往來蓋神之為德如光明爽朗聰慧靈通之類皆是也魂之為言如夢寐恍惚變幻遊行之境皆是也神藏於心故心靜則神清魂隨於神故神昏則魂蕩此則神魂之義可想象而悟矣精之與魄皆陰也何謂魄並精而出入蓋精之為物重濁有質形體因之而成也魄之為用能動能作痛癢由之而覺也精生於氣故氣聚則精盈魄並於精故形強則魄壯此則精魄之狀亦可默會而知也然則神為陽中之陽而魂則陽中之陰也精為陰中之陰而魄則陰中之陽者乎雖然此特其陰陽之別耳至若魂魄真境猶有顯然可鞫者則在夢寐之際如夢有作為而身不應者乃魂魄之動靜動在魂而靜在魄也夢能變化而寤不能者乃陰陽之離合離從虛而合從實也此雖皆魂魄之證而實即死生之幾苟能致心如太虛而必清必靜則夢覺死生之關知必有洞達者矣諸家得理之論再附於下以詳其義唐孔氏曰人之生也始變化為形形之靈曰魄魄內自有陽氣氣之神曰魂魂魄神靈之名初生時耳目心識手足運動此魄之靈也及其精神性識漸有知覺此則氣之神也樂祁曰心之精爽是謂魂魄魄屬形體魂屬精神精又是魄魄是精之神神又是魂魂是氣之神邵子曰氣形盛則魂魄盛氣形衰則魂魄亦從而衰魂隨氣而變魄隨形而化故形存則魄存形化則魄散朱子曰魂神而魄靈魂陽而魄陰魂動而魄靜生則魂載於魄而魄檢其魂死則魂遊散而歸於天魄淪墜而歸於地運用動作底是魂不運用動作底是魄魄盛則耳目聰明能記憶老人目昏耳聵記事不得者魄衰也又曰人生則魂魄相交死則各相離去月之黑暈是魄其光是魂魂是魄之光焰魄是魂之根柢火是魂鏡其魄燈有光焰物來便燒鏡雖照見卻在裡面火日外景金水內景火日是魂金水是魄陰主藏受故魄能記憶在內陽主運用故魂能發用出來二物本不相離精聚則魄聚氣聚則魂聚是為人物之體至於精竭魄降則氣散魂遊而無知矣所以任物者謂之心馬雲其所謂心意志思智慮舉不外於一心焉耳故凡所以任物者謂之心素問靈蘭祕典論曰心者君主之官神明出焉則萬物之機孰非吾心之所任者乎簡案白虎通云心之為言任也任於思也心有所憶謂之意張云憶思憶也謂一念之生心有所響而未定者曰意李云心已起而未有定屬者意也簡案禮大學疏總包萬慮謂之心為情所意念謂之意又禮運注意心所無慮也意之所存謂之志甲乙意下之字作有張云意之所存謂意已決而卓有所立者曰志李云意已決而確然不變者志也因志而存變謂之思張云因志而存變謂意志雖定而復有反覆計度者曰思因思而遠慕謂之慮張云深志遠慕必生憂疑故曰慮簡案子華子遠慕作有所顧荀子禮論禮之中焉能思索謂之能慮說文慮謀思也大學朱注處事精詳也因慮而處物謂之智張云疑慮既生而處得其善者曰智按此數者各有所主之臟今皆生之於心此正諸臟為之相使而心則為之主宰耳簡案子華子處物作有所決擇長生久視老子五十九章云是謂深根固柢長生久視之道怵惕史云悚懼也張云怵恐也惕驚也簡案書冏命怵惕惟厲孔注言常悚懼惟危流淫而不止甲乙止作正張云流淫謂流泄淫溢如下文所云恐懼而不解則傷精精時自下者是也竭絶而失生張云悲則氣消悲哀太甚則胞絡絶故至失生竭者絶之漸絶則盡絶無餘矣神憚散而不藏張云喜發於心樂散在外暴喜傷陽故神氣憚散而不藏憚驚惕也簡案詩雲漢我心憚暑箋憚猶畏也國語周語憚其犧也注憚懼也文選西京賦驚蝄蜽憚蛟蛇薛綜注驚憚謂皆使駭怖也迷惑而不治張云怒則氣逆甚者心亂故至昏迷皇惑而不治不治亂也蕩憚而不收甲乙注云不收太素作失守張云恐懼則神志驚散故蕩憚而不收上文言喜樂者神憚散而不藏與此稍同但彼云不藏者神不能持而流蕩也此云不收者神為恐懼而散失也所當詳辨心怵惕止死於冬張云此下言情志所傷之病而死各有時也心藏神神傷則心怯故恐懼自失䐃者筋肉結聚之處心虛則脾弱故破䐃脫肉毛悴者皮毛憔悴也下文准此色夭者心之色赤欲如白裹朱不欲如赭也火衰畏水故死於冬脾愁憂止死於春張云憂本肺之志而亦傷脾者母子氣通也憂則脾氣不舒不舒則不能運行故悗悶而亂四肢皆稟氣於胃而不得至經必因於脾乃得稟也故脾傷則四肢不舉脾色之夭者黃欲如羅裹雄黃不欲如黃土也土衰畏木故死於春肝悲哀止死於秋甲乙作狂妄其精不守令人陰縮而筋攣張云肝藏魂悲哀過甚則傷魂魂傷則為狂為妄而不精明精明失則邪妄不正其人當陰縮筋攣兩脅骨不舉者皆肝經之敗也肝色之夭者青欲如蒼壁之澤不欲如藍也木衰畏金故死於秋李云悲哀亦肺之志而傷肝者金伐木也肺喜樂止死於夏甲乙作意不存其人簡案其人接下句似是張云喜本心之志而亦傷肺者暴喜傷陽火邪乘金也肺藏魄魄傷則神亂而為狂意不存人者旁若無人也五臟之傷無不毛悴而此獨云皮革焦者以皮毛為肺之合而更甚於他也肺色之夭者白欲如鵝羽不欲如鹽也金衰畏火故死於夏腎盛怒止死於季夏張云怒本肝之志而亦傷腎者肝腎為子母其氣相通也腎藏志志傷則意失而善忘其前言也腰脊不可俯仰屈伸者腰為腎之府也腎色之夭者黑欲如重漆色不欲如地蒼也水衰畏土故死於季夏恐懼而不解止精時自下張云此亦言心腎之受傷也蓋盛怒雖云傷腎而恐懼則腎臟之本志恐則氣下而陷故能傷精腎主骨故精傷則骨痠痿者陽之痿厥者陽之衰命門不守則精時自下是雖腎臟受傷之為病然邪氣臟腑病形篇曰愁憂恐懼則傷心上文曰神傷則恐懼流淫而不止義與此通李云此亦腎傷也特傷於本臟之志為異於前耳閉藏失職則不因交感精自下志云上節論傷腎臟之志此論傷腎臟之精蓋魂魄智意本於心腎精神之所生故首言怵惕思慮者則傷神末言恐懼而不解則傷精神生於精而精歸於神也是故五臟止不可以治之也張云此承篇首之問而言凡用針者必當察病者之形態以酌其可刺不可刺也設或五臟精神已損必不可妄用針矣故邪氣臟腑病形篇曰諸小者陰陽形氣俱不足勿取以針而調以甘藥也根結篇曰形氣不足病氣不足此陰陽氣俱不足也不可刺之肝藏血張云宣明五氣篇曰肝藏魂五臟生成篇曰人臥則血歸於肝調經論曰肝藏血血有餘則怒不足則恐脾藏營止經溲不利張云營出中焦受氣取汁變化而赤是為血故曰脾藏營營舍意即脾藏意也脾虛則四肢不用五臟不安以脾主四肢而脾為五臟之原也太陰脈入腹絡胃故脾實則腹脹經溲不利調經論曰形有餘則腹脹經溲不利經當作涇簡案甲乙經作涇厥論亦作涇心藏脈張云宣明五氣篇曰心主脈調經論曰心藏神神有餘則笑不休神不足則悲肺藏氣止胸盈仰息張云喘喝者氣促聲粗也胸盈脹滿也仰息仰面而喘也宣明五氣篇曰肺藏魄調經論曰氣有餘則喘咳上氣不足則息利少氣甲乙盈作憑注云九墟作盈腎藏精止實則脹張云九針論曰腎藏精志也調經論曰腎藏志志有餘則腹脹飧泄不足則厥五臟不安止調之也張云前章言情志損傷此分五臟虛實故凡五臟有不安者必審其病形虛實情志所屬乃可隨其臟以調之此總結前章而言其治方也終始篇第九馬雲終始本古經篇名而伯乃述之故前根結篇有云九針之玄要在終始此又曰畢於終始故知其為古經篇名也按首無起句當同前篇俱為岐伯言也畢於終始張云終始本篇名詳載陰陽針刺之道今散類各章志云終始者始於五臟次於經脈終於六氣蓋五臟內生六絡六經外合六氣蓋五臟又本於六氣之所生故曰人生於地懸命於天簡案終始其義未詳姑仍馬張陽受氣於四末止可令和馬雲陽在外受氣於四肢陰在內受氣於五臟故因其氣之來而迎之者瀉之法也因其氣之往而隨之者補之法也知迎隨為補瀉則陰陽諸經之氣可和調矣和氣之方論語雍也集解引孔注云方道也無道行私張云不明至道而強不知以為知即無道行私也伐人長命殃必及之天道不爽當知所畏謹奉天道止經脈為紀張云天道陰陽有十二辰次為之紀人身血氣有十二經脈為之紀循環無端終而復始故曰終始持其脈口人迎張云脈口在手太陰脈也可候五臟之陰人迎在頸陽明脈也可候六腑之陽人之血氣經脈所以應天地陰陽之盛衰者畢露於此故曰天道畢矣應四時也張云春夏人迎微大秋冬寸口微大簡案出禁服篇應四時也上謂人迎下謂脈口相應往來即如下篇所謂俱往俱來若引繩大小齊等也簡案馬以上為寸口以下為尺恐非不結動也張云結澀則不足動疾則有餘皆非平脈也本末之寒溫之相守司也甲乙作本末相遇寒溫相守司似是禁服篇曰察其本末之寒溫以驗其臟腑之病張云臟氣為本肌體為末表裡寒溫司守不致相失故必外之形肉內之血氣皆相稱者謂之平人志本末之寒溫之兩之字下句注云本末者有本標之出入寒溫者應寒暑之往來各相守司也簡案志注義未明晰少氣者止不稱尺寸張云少氣者元氣虛也兼陰陽而言故上之人迎下之脈口必皆衰少無力而兩手之尺寸亦不相稱也簡案尺寸諸家為寸關尺之尺寸然內經無此義今言不稱尺寸者其脈短少不稱常時之尺寸可將以甘藥不可飲以至劑張云但可將以甘藥甘藥之謂最有深意蓋欲補虛羸非甘純不可也至劑剛毒之劑也正氣衰者不可攻故不宜用也志云甘藥者調胃之藥謂三陰三陽之氣本於中焦胃腑所生宣補其生氣之原道之流行故不可飲以至劑謂甘味太過反留中也簡案以至劑為至甘之劑殆乖經旨弗灸張云以火能傷陰也志云謂陰陽之氣不足於外非經脈之陷下也人迎一盛止病在手陽明張云人迎足陽明脈也一盛二盛謂大於氣口一倍二倍也陽明主表而行氣於三陽故人迎一盛病在足經之少陽若大一倍而加以躁動則為陽中之陽而上在手經之少陽矣凡二盛三盛病皆在足而躁則皆在手也下仿此簡案禁服篇曰人迎大一倍於寸口病在足少陽以下文例同故張以一盛為一倍也馬志以人迎氣口為左右寸口而釋之此王叔和以降之說非古之義不可從人迎四盛止為外格張云人迎盛至四倍且大且數者乃六陽偏盛之極盈溢於腑格拒六陰是為外格按下文曰溢陰為內關內關不通死不治則此外格者亦死無疑簡案禁服篇云溢陽為外格死不治志云陽可盛而陰不可盛也故溢陽不曰死蓋不考耳脈口一盛止在手太陰張云脈口手太陰脈也太陰主裡而行氣於三陰故脈口一盛病在足經之厥陰若加以躁則為陰中之陽而上在手厥陰心主矣凡二盛三盛皆在足而躁則皆在手也志本厥陰之下更多厥陰二字誤脈口四盛止死不治張云脈口四盛且大且數者乃六陰偏盛盈溢於臟表裡隔絶是為內關主死不治命曰關格張云人迎主陽脈口主陰若俱盛至四倍以上則各盛其盛陰陽不交故曰關格可與言死期也馬雲後世醫籍皆以飲食不下為關格視此節大義可深慚云關格義詳於素問識六節藏象論當互閲人迎一盛瀉足少陽止上氣和乃止張云人迎主腑故其一盛病在膽經肝膽相為表裡陽實而陰虛故當瀉足少陽之腑補足厥陰之臟也瀉者二補者一瀉倍於補也疏取之者欲其從容不宜急也上氣言氣之至也氣至而和穀氣至矣故可止針下仿此馬雲必切其脈而驗其病之退否疏而取穴於膽肝二經之上蓋彼此之穴相間之謂疏也候至氣和乃止針由此推之則一盛而躁病在手少陽當瀉手少陽三焦經而補手厥陰心包絡經矣志云疏當作躁謂一盛而躁二盛而躁當取手之陰陽也簡案據馬志上氣之上接上句且志改疏作躁並不允太陽主胃甲乙陽作陰馬雲太陽作陽明張云太言太陰陽言陽明脾與胃為表裡故曰太陽主胃簡案甲乙為是此蓋該上文足陽明日二取之而言張云上文人迎之治治三陽也皆日二瀉一補氣口之治治三陰也皆日二補一瀉蓋以三陽主表病在表者宜瀉倍於補也三陰在裡病在裡者宜補倍於瀉也皆以臟氣為重惟恐其或傷耳又如厥陰少陽肝膽木臟也東方多實故可日二取之太陰陽明脾與胃也脾胃大富於穀氣故可日二取之惟少陰太陽則二日一取之蓋腎與膀胱為天一之臟真陰之原故宜保重如此聖人之顧根本豈惟針刺為然哉三倍以上止為他病矣甲乙三作四張云俱盛三倍以上即四盛也陰陽俱溢即溢陰溢陽也不開即外關內格也如此者血氣閉塞無所行五盛真陰傷於內刺之已不可灸之則愈亡其陰而變生他病必至不能治也志云若不以針開之則血脈閉塞氣無所行流溢於中則內傷五臟矣夫盛則瀉之虛則補之陷下則灸之此陰陽之氣偏盛不和非陷下也故灸之則生他病矣凡刺之道止血氣不行志云謂陰陽之氣偏盛刺之和調則止矣然又當補陰瀉陽補陰者補五臟之衰陰瀉陽者導六氣之外出六節臟象論曰五氣入鼻藏於心肺上使五色修明音聲能彰順氣篇曰五者音也音主長夏是補其藏陰則心肺脾藏之氣和而音聲益彰矣肝開竅於目腎開竅於耳肝腎之氣盛則耳目聰明矣甲乙音氣作音聲適雖言故馬雲苟堅如其初則適才雖言病去復舊其病未去也張云脈堅如舊者雖欲文飾其故而病實未除也簡案據下文言快而推之故乃病去而復其故之謂馬注為是夫如其故甲乙夫作大是痛雖不隨針甲乙痛作病下同針下有減字下文同馬雲雖不隨針而即去然亦必以漸而衰矣十二經脈之所生病馬雲欲通十二經脈之所生病及虛實補瀉必明於本經經脈第十篇而後可可得傳於終始矣張云終始本篇名即本末之謂故陰陽不相移止取之其經張云移移易也傾相傷也或陰或陽無所改易不相移也虛者自虛實者自實不相傾也此則無所從生而各病其病但求其經而取之邪辟妄合闢甲乙作澼馬志作澼張云邪辟妄合等六句詳言病變也凡此者皆須用針治以三刺之法則諸病可去也沉浮異處四時不得馬雲脈氣浮沉似所處各異志云浮沉異處者陰陽之氣與經脈不相合也四時不得者不得其升降浮沉也故一刺止穀氣至也張云初刺之在於淺近故可出陽分之邪再刺之在於深遠故可出陰分之邪三刺之在候穀氣穀氣者元氣也止出針也蓋邪氣來也緊而疾穀氣來也徐而和必邪氣去而後穀氣至故已補而實則虛者堅已瀉而虛則堅者軟是以知穀氣之至也馬雲此節大意見前官針篇陰盛而陽虛止和之張云此以脈口人迎言陰陽也脈口盛者陰經盛而陽經虛也當先補其陰後瀉其陽而和之人迎盛者陽經盛而陰經虛也當先補其陰後瀉其陽而和之何也以治病者皆宜先顧正氣後治邪氣蓋攻實無難伐虛當畏於此節之義可見用針用藥其道皆然三脈動於足大趾之間馬雲陽明動於大趾次趾之間凡厲兌陷谷衝陽解溪皆在足跗上也厥陰動於大趾次趾之間正以大敦行間太衝中封在足跗內也少陰則動於足心其穴湧泉乃足跗之下也其動也甲乙作三脈動於大指者八字陽明止少陰在下樓氏綱目曰陽明在上衝陽脈也厥陰在中太衝脈也少陰在下太溪脈也馬雲陽明則在手足之上厥陰則在於二經之中少陰則在於足之下耳膺腧中膺止取之上馬雲此言凡取穴者必當各中其所也胸之兩旁謂之膺故膺內有腧如胃經氣戶庫房屋翳膺窗腎經彧中神藏靈墟神封之類凡刺膺腧者當中其膺可也背內有腧如督脈經諸穴居脊之中膀胱經諸穴居脊之四行之類凡刺背腧者當中其背與肩膊可也凡按分肉虛虛則取之耳張云凡肩膊之虛軟而痛者病有陰經陽經之異陰經在膺故治陰病者當取膺腧而必中其膺陽經在背故治陽病者當取背腧而必中其背病在手經故取之上上者手也如手太陰之中府雲門手厥陰之天池皆膺腧也手少陽之肩髎天髎手太陽之天宗曲垣肩外腧皆背腧也咸主肩膊虛痛等病簡案二家所取義各異未審孰是然張添痛字釋之似於原文未允當但馬以肩膊二字接上句以上字接次節重字上非重舌刺舌柱以鈹針也張云舌下生小舌謂之重舌舌柱即舌下之節如柱者也當用第五針曰鈹針者刺之九針論曰鈹針主大癰膿兩熱爭者官針篇曰病為大膿者取以鈹針簡案刺出惡血也手屈止守筋張云屈而不伸者筋之拘攣也故治當守筋不可誤求於骨伸而不屈者骨之廢弛也故治當守骨不可誤求於筋也補須一方實止無使邪氣得入張云補當作刺刺法雖多其要惟二則補瀉而已一者因其方實故當深取之勿按其痏欲以出其邪氣此瀉法也一者因其方虛故當淺刺之以養其血脈疾按其穴以拒其邪氣此補法也馬雲方猶俗云才方也邪氣來也止徐而和馬雲邪氣之來其針下必緊而疾穀氣之來其針下必徐而和可得而驗也刺諸痛者其脈皆實甲乙者下有深刺之諸痛者六字張云此言痛而可刺者脈必皆實者也然則脈虛者其不宜刺可知矣從腰以上止足太陰陽明皆主之張云此近取之法也腰以上者天之氣也故當取肺與大腸二經蓋肺經自胸行手大腸經自手上頭也腰以下者地之氣也故當取脾胃二經蓋脾經自足入腹胃經自頭下足也病之在陰在陽各察其所主而刺之病在上者止取之膕張云此遠取之法也有病在上而脈通於下者當取於下病在下而脈通於上者當取於上故在頭者取之足在腰者取之膕蓋疏其源而流自通故諸經皆有井滎俞原經合之辨春氣在毛止以春夏之齊甲乙毛上有毫字馬雲齊劑同素問有刺齊論張云此言病氣之中人隨時氣而為深淺也春夏陽氣在上故取毫毛皮膚則淺其針秋冬陽氣在下故取分肉筋骨則深其針是以時為齊也按四時刺逆從論曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中與本篇若異者何也蓋本篇言病邪之應時令有表有里四時刺逆從論言人氣之合天地有升有降義本不同非矛盾也肥人肉厚淺之則不及故宜秋冬之齊瘦人肉薄深之則太過故宜春夏之齊志云齊者與時一之也簡案志注非是七十難與本篇之義合病痛者陰也止深刺之張云凡病痛者多由寒邪滯逆於經及深居筋骨之間凝聚不散故病痛者為陰也按之不得者隱藏深處也是為陰邪故刺亦宜深然則痛在浮淺者由屬陽邪可知也但諸痛屬陰者多耳病在上者陽也止淺刺之張云陽主升故在上者為陽陰主降故在下者為陰癢者散動於膚腠故為陽凡病在陽者皆宜淺刺之其在下者自當深刺無疑也志云此論表裡上下之陰陽夫表為陽里為陰身半以上為陽身半以下為陰病在陽者名曰風故癢者陽也病在皮膚之表陽也病在陰者名曰痹痹者痛也故病痛者陰也以手按之不得者留痹之在內也此言表裡之為陰陽也簡案四十八難曰癢者為虛痛者為實義似相戾病先起陰者止治其陰張云此以經絡部位言陰陽也病之在陰在陽起有先後先者病之本後者病之標治必先其本即上文所謂先刺其病所從生之義熱厥寒厥馬雲素問明有厥論本經寒熱病篇亦有刺寒熱厥法二陰一陽止一刺陽也張云二刺陰一刺陽者謂補其陰經二次瀉其陽經一次則陰氣盛而陽邪退故可以治熱厥其二陽一陰者亦猶是也故可以治寒厥久病者止刺道畢矣張云久遠之疾其氣必深針不深則隱伏之病不能及留不久則固結之邪不得散也一刺未盡故當間日復刺之再刺未盡故再間日而又刺之必至病除而後已然當先察其在經在絡在經者直刺其經在絡者繆刺其絡是謂調其左右去其血脈也志云病久者邪氣入深邪與正爭則氣留於陰間日而後出於陽是以間日復刺之者俟氣至而取之也凡刺之法止聚氣可布甲乙躁厥者注云一作疾字張云病少氣而形肉未脫其脈躁急其病躁而厥逆者氣虛於內邪實於經也當繆刺之左病取右右病取左所刺在絡其用輕淺則精氣之散者可收邪氣之聚者可散也簡案躁厥作躁疾是深居靜處止氣至乃休馬雲此言用針者當預養其神以行針也凡用針者雖占病者之神氣往來然必先自養其神氣故深居靜處閉戶塞牖魂魄神意精氣皆會於一令志已在針方淺而留之或微而浮之以移病者之神候其真氣已至而乃止針也男內女外止是謂得氣張云既刺之後尤當戒慎男子忌內女子忌外忌外者堅拒勿出忌內者謹守勿內則邪氣必去正氣必復是謂得氣道藏本釋音云難經作男外女內簡案七十八難云男外女內乃言針法與本篇之義自別出行來者甲乙出作步凡此十二禁者簡案馬張連男內女外為十二禁然凡刺之禁有後節則必不然甲乙無此十二三字蓋古經之脫文也介按凡十二禁者如風雨晦明之四時人之氣血凝滯不調共計四禁也大飽則氣虛五禁也新飽則氣盛六禁也大醉則氣亂七禁也大怒則氣逆八禁也大渴則液少九禁也大勞則氣乏十禁也大驚則氣散十一禁也人神所在之處恐傷其生氣十二禁也夫所謂人神所在之處以四時言之則春在左脅秋在右脅冬在腰夏在臍此四者系是肝肺腎脾所司之時也故亦須禁之淫泆道藏本甲乙作淫濼張云淫泆蕩散也淫濼詳於素問識骨空論脫其五味志云五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生針刺之道貴在得神致氣犯此禁者則脫其五味所生之神氣是謂失氣也絶皮乃絶汗太陽之脈以下文與素問診要經終論同今特舉其異同不復詮釋診要經終無絶皮二字作絶汗乃出不行診要經終作不仁經脈第十馬雲凡內經全書之經絡皆自此而推之耳禁脈馬雲按當作禁服本經第四十八禁服篇云凡刺之理經脈為始營其所行知其度量內刺五臟外刺六腑則此篇數語乃出於禁服篇也張志同營其所行張云言經絡之營行也簡案營與制對言疑非營行之義營度也見玉篇當以此釋之先成精張云精者人之水也萬物之生其初皆水故易曰天一生水道家曰水是三戈之母精為元氣之根本神篇曰故生之來謂之精決氣篇曰兩神相搏合而成形常先身生是謂精故人始生先成精也精成而腦髓生張云精藏於腎腎通於腦腦者陰也髓者骨之充也諸髓皆屬於腦故精成而後腦髓生骨為幹張云猶木之有幹土之有石故能立其身脈為營馬雲猶將之營史記云以師兵為營衛張云脈絡經營一身故血氣周流不息筋為剛張云筋力剛徑故能約束骨骼動作強健肉為牆張云肉象牆垣故能蓄藏血氣志云肉生於土猶城牆之外衛也谷入於胃脈道以通張云前言成形始於精此言養形在於谷如營衛生會篇曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛故脈道通血氣行此經脈之謂明經脈之道則可以決死生處百病調虛實施治療矣筋脈之始生筋諸本作經當改起於中焦馬雲起發也中焦者中脘也在臍上四寸楊珣針灸集書云起者興也發也簡案銅人注高承德云中焦乃臍中也此說甚異張云愚按此十二經者即營氣也營行脈中而序必始於肺經者以脈氣流經經氣歸於肺肺朝百脈以行陰陽而五臟六腑皆以受氣故十二經以肺經為首循序相傳盡於足厥陰肝經而又傳於肺終而復始是為一周下絡大腸馬雲絡猶兜也如今人橫線為絡而兜物也張云絡聯絡也當任脈水分穴之分肺脈絡於大腸以肺與大腸為表裡也按十二經相通各有表裡凡在本經者皆曰屬以此通彼者皆曰絡故在手太陰則曰屬肺絡大腸在手陽明則曰屬大腸絡肺彼此互更皆以本經為主也下文十二經皆仿此還循胃口張云還復也循巡繞也自大腸而上覆循胃口滑氏十四經發揮云胃口胃上下口也胃上口在臍上五寸上脘穴下口在臍上二寸下脘穴之分也銅人注云胃口謂胃之上口賁門之位也上膈屬肺滑氏云屬會也膈者隔也凡人心下有膈膜與脊脅周回相著所以遮隔濁氣不使上熏於心肺也張云屬者所部之謂從肺系橫出腋下滑氏云肺系謂喉嚨也喉以候氣下接於肺肩下脅上際曰腋自肺臟循肺系出而橫行循胸部第四行之中府雲門以出腋下臑內滑氏云膊下對腋處為臑肩肘之間也張云膊之內側上至腋下至肘嫩軟白肉曰臑天府俠白之次也臑儒軟二音又奴刀奴到二切簡案臑廣韻臂節那到切行少陰心主之前張云少陰心經也心主手厥陰經也手之三陰太陰在前厥陰在中少陰在後也下肘中循臂內上骨下廉入寸口銅人注云肘中尺澤穴分也上骨謂臂之上骨也經渠穴在此寸口中甲乙經渠在寸口陷者中楊珣云肘臂節也臑盡處為肘臂者要旨論云肘下為臂上骨者謂臂之上骨也廉者邊也滑氏云肘以下為臂廉隅也邊也手掌後高骨旁動脈為關關前動脈為寸口樓氏綱目云臑下掌上名曰臂臂有二骨今太陰脈循臂上骨之下廉也張云膊臂之交曰肘中穴名尺澤肘以下為臂內內側也行孔最列缺經渠之次骨掌後高骨也下廉骨下側也寸口關前動脈也即太淵穴處簡案據張注上字上聲非也寸口通寸關尺而言諸注以寸部釋之失古義矣上魚循魚際滑氏云掌骨之前大指本節之後其肥肉隆起處統謂之魚魚際則其間之穴名也大指之端滑氏云出大指之端至少商穴而終也端杪也張云端指尖也其支者止出其端銅人注云針經曰支而橫者為絡此手太陰之絡別走陽明者也穴名列缺張云支者如木之有枝此以正經之外而復有旁通之絡也臂掌之交曰腕此本經別絡從腕後上側列缺穴直出次指之端交商陽穴而接乎手陽明經也黃帝曰肺手太陰也諸本無此八字原文本於類經宜刪去是動張云動言變也變則變常而為病也如陰陽應象大論曰在變動為握為噦之類即此之謂膨膨銅人注云謂氣不宣暢也馬雲俗云膨脝脹論曰肺脹者虛滿而喘咳缺盆中痛張云缺盆雖十二經之道路而肺為尤近故肺病則痛瞀銅人注云太素注曰瞀低目也馬雲交兩手而掣瞀張云木痛不仁也志云目垂貌簡案玉篇目不明貌又楚辭九章中悶瞀之忳忳注煩亂也諸注俱誤臂厥銅人注云肘前曰臂氣逆曰厥是主肺所生病者馬雲是皆肺經所生之病耳按難經二十二難以是動為氣所生為血即動生二字分為氣血乃難經之臆說耳張云按二十二難云云若乎近理然細察本篇之義凡在五臟則各言臟所生病凡在六腑則或言氣或言血或脈或筋或骨或津液其所生病本各有所主非以血氣二字統言十二經者也難經之言似非經旨志云是動者病因於外所生者病因於內凡病有因於外者有因於內者有因於外而及於內者有因於內而及於外者有外內之兼病者本篇統論臟腑經氣故曰肺手太陰之脈曰是動曰所生治病者當隨其所見之證以別外內之因又不必先為是動後及所生而病證之畢具也簡案馬以此一句為結文張則按下節為解楊珣則肺下為句蓋是動所生其義不明晰亦未知孰是喘渴甲乙銅人作喘喝張云渴當作喝聲粗急也臑臂內前廉痛厥掌中熱張厥一字句馬志痛下句銅人無厥字風寒汗出中風張云肺主皮毛而風寒在表故汗出中風簡案氣盛有餘謂肺臟氣盛而有餘非外感邪氣之盛也而云風寒汗出中風則似肺臟氣盛而有餘者必病風寒汗出中風此必理之所無或恐六字衍文諸家順文詮釋未曾有疑及者何小便數而缺銅人注云數頻也缺少也言小便頻而少也馬雲小便頻數而發之為缺母病及腎簡案缺呵缺也宣明五氣篇云腎為缺馬注為是溺色變甲乙注云一作卒遺失無變馬雲邪及子張云金衰則水涸故溺色變而黃赤志云氣虛而不化也盛則瀉之止以經取之張云盛瀉虛補雖以針言藥亦然也熱則疾之氣至速也寒則留之氣至遲也陷下則灸之陽氣內衰脈不起也不盛不虛以病有不因血氣之虛實而惟逆於經者則當隨經所在或飲藥或刺灸以取之也下文諸經之治義與此同盛者止小於人迎也張云寸口主陰肺為大腸之臟手太陰經也故肺氣盛者寸口大三倍於人迎虛則反少也人迎者足陽明之動脈在結喉旁一寸五分乃三陽脈氣所至也陰陽別篇曰三陽在頭三陰在手者其義即此下同簡案何夢瑤醫編云人迎脈恆大於兩手寸脈數倍從無寸口反大於人迎者今驗之此言殆信矣起於大指次指之端端下甲乙有外側二字銅人作內側誤張云即食指之端也穴名商陽循指上廉張云上廉上側也凡經脈陽行於外陰行於內後諸經皆同循指上廉二間三間也合谷張云穴名兩骨即大指次指後歧骨間也俗名虎口兩筋之中張云腕中上側兩筋陷中陽溪穴也循臂上廉入肘外廉滑氏云自陽溪而上循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池上臑外前廉臑上甲乙銅人有循字張云行肘髎五里臂臑也髃骨楊珣云髃肩前也肩端兩骨間為髃骨張云肩端骨罅為髃骨以上肩髃巨骨也髃隅同柱骨之會上銅人注云氣腑論注曰柱骨之會乃天鼎穴也在頸缺盆上直扶突氣舍後同身寸之半寸是也楊珣云要旨曰脾上際會處為三柱骨此經自肩髃穴上出柱骨之上張云肩背之上頸項之根為天柱骨六陽皆會於督脈之大椎是為會上簡案氣腑論手陽明脈氣所發柱骨之會各一又氣穴論大椎上兩旁各一柱骨會上乃大椎兩旁必有本經之穴其名今無考銅人注為天鼎非也下入缺盆楊珣云經曰胸兩旁高處為膺膺上橫骨為巨骨巨骨上為缺盆志云缺盆在結喉兩旁之高骨形圓而踝如缺盆然屬大腸滑氏云當天樞之分會屬於大腸上頸貫頰甲乙作直上至頸貫頰六字滑氏云頭莖為頸耳以下曲處為頰自缺盆上行於頸循天鼎扶突上貫於頰入下齒中發揮齒下補縫字楊珣云口內前小者為齒大者為牙滑氏云既入下齒縫中復出夾兩口吻相交於人中之分人中張云即督脈之水溝穴由人中而左右互交上挾鼻孔者自禾髎以交於迎香穴也簡案老子釋略云鼻為天門口為地戶天地之間人中是也大腸手陽明也諸本無此六字當刪下並同頸腫頸甲乙作頰銅人作䪼注云䪼謂准之秀骨也並非是主津液所生病者張云大腸與肺為表裡肺主氣而津液由於氣化故凡大腸之或泄或祕皆津液所生之病而主在大腸也志云大腸傳導水穀變化精微故主所生津液病則津液竭而火熱盛故為目黃口乾鼻丸衄喉痹諸證鼻丸衄銅人注云王砯曰鼻中水出曰鼻丸血出曰衄寒栗不復張云不易溫也銅人注云栗戰也起於鼻之交頞中甲乙銅人及十四經發揮並無之字當是衍文滑氏云頞鼻莖也案出說文鼻山根為頞足陽明起於鼻兩旁迎香穴由是而上左右相交於頞中銅人注云兩目之間鼻凹深處謂之頞中張云交頞其脈左右互交也簡案張注非是旁納太陽之脈納甲乙千金銅人發揮馬志並作約銅人注云足太陽起於目眥案睛明穴而陽明旁行約之張云納入也簡案納作約為是太陽甲乙作大腸下循鼻外滑氏云歷承泣四白巨髎入上齒中入上甲乙馬志作上入挾口環唇馬雲環出挾口兩吻地倉環繞唇下下交承漿銅人注云承漿穴名也在頤前唇下宛宛中滑氏云下左右相交於承漿之分也簡案劉熙釋名云口下曰承漿承水漿也承水漿也今本作漿水也三字據太平御覽引改頤滑氏云腮下為頷頷中為頤大迎銅人注云在曲頷前同身寸之一寸二分陷者中頰車銅人注云謂頰之牙車也在耳下曲頰之端陷中釋名云頤養也動於下止於上上下咀物以養人也輔車其骨強所輔持口也或曰牙車牙所載也或曰頷車頷含也口含物之車也或曰頰車亦所以載物也或曰鼸車鼸鼠之食積於頰人食似之故取名也凡繫於車皆取在下載上物也上耳前張云下關也客主人銅人注云在耳前起骨開口有空虛簡案客主人諸書屬足少陽經特外臺為本經穴似是循髮際至額顱滑氏云循髮際行懸釐頷厭之分經頭維會於額顱之神庭囟前為髮際髮際前為額顱其支者發揮集書支下有別字汪云此乃正經何以反屬支脈下人迎循喉嚨銅人注云人迎在結喉兩旁大脈動應手是也滑氏云循喉嚨歷水突氣舍入缺盆簡案憂恚無言篇云咽喉者水穀之道也喉嚨者氣之所上下者也缺盆張云本經穴也甲乙云在肩上橫骨陷者中屬胃絡脾張云胃與脾為表裡也此支自缺盆入內下膈當上脘中脘之分屬胃絡脾下乳內廉張云從缺盆下行氣戶等穴案指庫房屋翳膺窗以至乳中乳中根也下挾臍馬雲不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣衝中氣街銅人發揮街作沖銅人注云在股下挾兩旁相去同身寸之四寸鼠鼷上或云在毛際兩旁鼠鼷上乃三焦之道路故云氣衝或曰在歸來下同身寸之一寸汪云衛氣篇云胸氣有街腹氣有街頭氣有街脛氣有街街猶路也胃口張云胃之下口當下脘之分難經謂之幽門者是也循腹裡張云過足少陰肓腧之外此即上文支者之脈由胃下行而與直者復合於氣街之中也以下髀關止入中指內間滑氏云抵至也股外為髀髀前膝上起肉處為伏兔伏兔後交文為髀關挾膝解中為臏脛骨為䯒跗足面也既相合氣衝中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循䯒外廉之三里巨虛上廉條口巨虛下廉豐隆解溪下足跗之衝陽陷谷入中指外間之內庭至厲兌而終也滑馬內間作外間非下廉三寸廉甲乙銅人發揮作膝滑氏云此支自膝下三寸循三里穴之外別行而下入中指外間與前之內庭厲兌合也馬雲自膝下三寸循三里穴之外別下歷上廉條口下廉豐隆解溪衝陽陷谷以至內庭厲兌而合也張云廉上廉也下廉三寸即豐隆穴是為陽明別絡故下入中指外間簡案馬以上廉等六穴為支別所屬者誤入大指間出其端滑氏云此支自跗上衝陽穴別行入大指間斜出足厥陰行間穴之外循大指下出其端以交於足太陰汪云至厲兌穴而終以交於足太陰經昂按凡交經授受皆屬支脈經別篇又云上通於心循咽出口上額䪼還系目系灑灑振寒灑甲乙作悽銅人作悽脈解篇云陽明所謂灑灑振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故灑灑然振寒也簡案馬引瘧論陽明虛則寒栗鼓頷恐非善呻善缺甲乙銅人伸作呷銅人注云伸謂伸努筋骨也張云胃之郁也志云善呻者陽氣鬱而欲伸出之數缺者陽欲引而上也顏黑銅人注云顏額也張云黑水色也土病則水無所畏故黑色反見於顏面病至止棄衣而走陽明脈解篇云陽明主肉其脈血氣盛邪客之則熱熱甚則惡火又云陽明厥則喘而惋惋則惡人又云胃者土也故聞木音而驚者土惡木也又云四肢者諸陽之本也陽盛則四肢實實則能登高也又云熱盛於身故棄衣欲走也脈解篇云所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也所謂欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛故欲閉戶牖而居賁響張云腸胃雷鳴也簡案壽夭剛柔篇怫愾賁響義同骭厥張云骭足脛也陽明之脈自膝臏下脛骨外廉故為脛骭厥逆骭音干是主血所生病者張云中焦受谷變化而赤為血故陽明為多氣多血之經而主血所生病者志云本經曰谷入於胃脈道以通血氣乃行平脈篇曰水入於經而血乃成胃為水穀之海主生此營血故是主血所生病者狂瘧溫淫汗出甲乙瘧作瘈張云陽明熱勝則狂風勝則瘧溫氣淫泆則汗出唇疹志云疹疹同唇瘍也簡案志注本於說文甲乙疹作緊大腹水腫張云胃在中焦土病則不能制水也身以前皆熱銅人注云腹為陰背為陽足陽明行身之陰其氣盛故身以前皆熱其氣不足故身以前皆寒栗消穀善飢志云陽明氣盛於外則身以前皆熱盛於內則有餘於胃而消穀善飢溺色黃起於大趾之端滑氏云起大趾之端隱白穴受足陽明之交也循指內側白肉際張云行大部太白等穴核骨核發揮作核滑氏云俗云孤拐骨是也樓氏云核骨在足大趾本節後約二寸內踝骨前約三寸如棗核橫於足內側赤白肉際者是也竇大師指為孤拐骨者非是也張云核骨即大趾本節後內側圓骨也滑氏言為孤拐骨者非蓋孤拐即名踝骨古有擊踝之說即今北人所謂打孤拐也上內踝前廉滑氏云過核骨後歷太白公孫商丘上內踝前廉之三陰交也足跟後兩旁起骨為踝骨張云滑氏以足跟骨為踝者亦非蓋彼曰跟踵非踝也踹內銅人注云踹謂脛之魚腹也滑氏云腨腓腸也由三陰交上腨內循䯒骨後之漏谷上行二寸交出足厥陰經之前至地機陰陵泉張云踹足肚也亦名腓腸本經與腨通用音篆蓋踹本音煅玉篇以足跟為踹簡案腨說文腓腸也上膝股內前廉入腹屬脾滑氏云髀內為股臍上下為腹自陰陵泉上循膝股內前廉之血海箕門迤邐入腹經衝門府舍會中極關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘下脘之際以屬脾絡胃也上膈止散舌下滑氏云咽所以咽物者居喉之前舌本舌根也由腹哀上膈循食竇天溪胸鄉周榮由周榮外曲折向下至大包上行行人迎之裡挾咽連舌本散舌下其支者止注心下張云足太陰經外行者由腹之四行上府舍腹結等穴散於胸中而止於大包其內行而支者自胃脘別上膈注心中而接乎手少陰經也食則嘔止快然如衰脈解篇曰太陰所謂食則嘔者物盛滿而上溢故嘔也所謂病脹者太陰子也十一月萬物之氣皆藏於中故曰病脹所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也所謂得後與氣則快然如衰者十一月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也如衰甲乙作而衰簡案而如古通李云後大便也氣轉矢氣也身體皆重銅人注云以脾主肉故脹病則身體重舌本痛馬雲上舌本強而此則甚體不能動搖馬雲即上文重而甚煩心心下急痛甲乙痛作寒瘧二字馬雲脈注心中溏瘕泄水閉黃疸馬雲溏脾氣不實瘕泄難經五十七難有大瘕泄水閉六元正紀大論有甚則水閉跗腫言水蓄於內而大小便皆閉也黃疸素問平人氣象論本經論疾診尺篇皆有黃疸張云脾寒則為溏瀉脾滯則為癥瘕脾病不能制水則為泄為水閉黃疸不能臥李云溏者水泄也瘕者痢疾也水閉者上病不能治水也水閉則濕熱壅而為疸為不臥不能臥甲乙臥作食食下有唇青二字銅人注云甲乙經作好臥不能食肉唇青強立與今本異強立諸家不釋簡案蓋謂勉強而起立則股膝內腫甲乙腫下有痛字足大趾不用張云脾脈起於足拇以上膝股內廉故為腫為厥為大趾不用諸病起於心中楊珣云經曰心在肺下又云心狀如蓮花未開在膈上附第五椎也簡案據楊注心中直指心臟而言心系道藏本脫系字滑氏云心系有二一則上與肺相通而入肺兩大葉間一則由肺葉而下曲折向後並脊膂細絡相連貫脊髓與腎相通正當七節之間蓋五臟系皆通於心而心通五臟系也手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸張云其繫有五上系連肺肺下繫心心下三系連脾肝腎故心通五臟之氣而為之主也目系楊珣云要旨論曰目內連深處為目系此經已絡小腸從心系支而橫出循任脈之外上挾咽系而行至於目系也其直者止出腋下滑氏云直者復從心系直上至肺臟之分出循腋下抵極泉也穴在臂內腋下筋間動脈張云手少陰經行於外者始此下循臑內後廉止下肘內甲乙作肘中內廉滑氏云自極泉下循臑內後廉行太陰心主兩經之後歷青靈穴下肘內廉抵少海循臂內止出其端滑氏云腕下踝為兌骨自少海而下循臂內後廉歷靈道通里至掌後鋭骨之端經陰郤神門入掌內廉至少府循小指端之少衝而終以交於手太陽也心為君主之官示尊於它臟故其交經授受不假於支別云嗌乾止臂厥張云本經支者從心系上挾咽故為嗌乾心痛心火炎則心液耗故渴而欲飲手少陰循臂內後廉出小指之端故為臂厥目黃脅痛止掌中熱痛張云少陰之脈系目系故目黃出腋下故脅痛循臑臂內入掌內後廉故為熱痛諸病甲乙脅下有滿字起於小指之端止出踝中滑氏云臂骨盡處為腕腕下兌骨為踝本經起小指端少澤穴由是循手之外側之前谷後溪上腕出踝中歷腕骨陽谷養老穴也直上循臂骨下廉止交肩上滑氏云脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛一名膊自養老穴直上循臂骨下廉支正穴出肘內側兩骨之間歷小海穴上循臑外後廉行手陽明少陽之外上肩循肩貞臑俞天宗乘風曲垣肩外俞肩中俞諸穴乃上會大椎因左右相交於兩肩之上張云循臂骨下廉陽谷等穴出肘內側兩骨尖陷中小海穴也此處捺之應於小指之上簡案兩筋甲乙千金銅人等作兩骨滑氏從之今捺之而痠麻應於小指之上者觸筋也其穴則在肘骨臂骨之間知是作骨為是入缺盆止屬小腸甲乙缺盆下有向腋下三字銅人同張云自缺盆由胸下行入膻中絡心心與小腸為表裡也自缺盆之下循咽下膈抵胃下行當臍上二寸之分屬小腸此本經之行於內者其支者止入耳中滑氏云目外角為鋭眥支者別從缺盆循頸之天窗天容上頰抵顴髎上至目鋭眥過瞳子髎卻入耳中循聽宮而終也其支者止斜絡於顴發揮無斜絡於顴四字蓋依金蘭循經文集書同張云目下為䪼目內角為內眥顴即顴骨下顴髎穴手太陽自此交目內眥而接乎足太陽經也簡案刺禁論王注手太陽脈自顴而斜行至目內眥發揮無四字者蓋繫於脫文頷腫銅人注云頷謂頰下也張云本經之脈循咽下膈其支者循頸上頰故為是病是主液所生病者張云小腸主泌別清濁病則水穀不分而流衍無制是主液所生病也志云小腸為受盛之官化水穀之精微故主液起於目內眥上額交巔滑氏云目大角為內眥髮際前為額腦上為巔巔頂也足太陽起目內眥睛明穴上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右相交於巔上之百會也銅人注云內眥謂目之大眥也介按目內眥外一分宛宛中是睛明穴也上行眉眉頭陷中即攢竹穴也再上行髮際間俠督脈之神庭穴旁開一寸五分正頭取之是曲差穴也後行五分旁開一寸五分五處穴也從此後行一寸五分承光穴也由承光後行一寸五分俠督脈之百會穴旁開一寸五分即通天穴也其支者從巔至耳上角滑氏云抵耳上角過率谷浮白竅陰穴所以散養於經脈也張云由百會旁行至耳上角過足少陽之曲鬢率谷天衝浮白竅陰完骨故此六穴者皆為足太陽少陽之會介按從懸釐後行耳前入髮際曲隅陷中鼓頷有空即曲鬢穴也後行耳上入髮際寸半陷者宛宛中嚼牙取之即率谷穴也從此後行耳後三分許入髮際二寸天衝穴也下行耳後入髮際一寸浮白穴也由此下行耳後高上枕骨下搖動有穴竅陰穴也從竅陰行耳後入髮際四分即完骨穴也其直者從顛入絡腦銅人注云頂為中頂前曰囟頂後曰腦頂左右曰角滑氏云腦頭髓也頸上為腦腦後為項此直行者由通天穴後循絡卻玉枕入絡腦還出別下項止抵腰中張云自腦復出別下項由天柱而下會於督脈之大椎陶道卻循肩髆內分作四行而下此節言內兩行者夾脊兩旁各相去一寸半自大杼行風門及臟腑諸腧而抵腰中等穴也中行椎骨曰脊臀骨上曰腰入循膂絡腎屬膀胱張云自腰中入膂絡腎前屬膀胱腎與膀胱為表裡也夾脊兩旁之肉曰膂從腰中下挾脊貫臀入膕中甲乙銅人挾脊作會於後陰四字發揮集書無挾脊二字馬雲從腰中循腰髖下挾脊歷上髎次髎中髎下髎會陽下貫臀至承扶殷門浮郤委陽入膕中之委中穴滑氏云臀尻也挾腰髖骨兩旁為機機後為臀腓腸上膝後曲處為膕介按從腰踝骨下一寸俠脊兩旁第一空陷中即上髎穴也第二空陷中次髎穴也第三空陷中中髎穴也第四空陷中下髎穴也從下髎行陰尾尻骨兩旁五分許即會陽穴也又自尻臀下陰股上約紋中即承扶穴也從殷門外循斜上一寸屈膝而得之即浮郤穴也從浮郤下行仍在承扶下六寸屈伸取之委陽穴也從委陽下行膕中約紋動脈陷中伏臥取之即委中穴也以上諸穴皆屬足太陽膀胱經其支者止挾脊內胛甲乙注云一作髖繆刺論王注銅人發揮作胂滑氏云膂肉曰胂夾脊肉也其支者為挾脊兩旁第三行相去各三寸之諸穴自天柱而下從髆內左右別行下貫胂膂歷附分魄戶膏肓神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊下歷尻臀過髀樞也介按膀胱經穴自大杼別脈其支者從肩膊內循行第二椎下附項內廉兩旁相去脊中各三寸半正坐取之即是附分穴由附分至秩邊穴共計十四穴左右歷次而下共二十八穴過髀樞止合膕中甲乙銅人髀外下無從字滑氏云股外為髀捷骨之下為髀樞循髀外後廉髀樞之裡本經承扶之外一寸五分之間而下與前之入膕中者相合以下貫踹內止至小指外側馬雲踹腨同滑氏云腨腓腸也下行循合陽穴下貫腨內歷承筋承山飛陽跗陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小指外側端之至陰穴以交於足少陰也楊珣云䯒骨之下為立骨左右各有內外踝骨者共四踝骨之後各有京骨者左右共二張云小指本節後大骨曰京骨髀不可以曲甲乙無髀字似是張以髀為髀樞未知是否踝厥張云足太陽脈出外踝之後筋結於外踝也是主筋所生病者張云周身筋脈惟足太陽為多為巨其下者結於踵結於腨結於膕結於臀其上者挾腰脊絡肩項上頭為目上綱下結於頄故凡為攣為弛為反張載眼之類皆足太陽之水虧而主筋所生病者汪云主筋義未詳按太陽病多痙急如上症皆風傷筋也痔瘧狂癲疾張云脈入肛故為痔經屬表故為瘧邪入於陽故為狂癲疾馬雲刺瘧篇有太陽之瘧癲狂篇二十二有刺太陽經者項痛甲乙項下有頸間二字邪走足心甲乙銅人發揮走作趣馬作趨滑氏云趣向也足少陰起小趾之下斜向足心之湧泉穴在足心陷中屈足卷指宛宛中馬雲邪斜同出於然谷之下止出膕內廉脈經千金谷作骨滑氏云由湧泉轉出足內踝然谷穴下循內踝後太溪穴別入踝中之太鍾照海水泉乃折自太鍾之外上循內踝行厥陰太陰之後經復溜交信過三陰交上腨內循築賓出膕內廉抵陰谷也介按足少陰腎經之湧泉穴在足心陷中伸腿屈足卷指宛宛中從湧泉上行足內踝前起大骨陷中即然谷穴也又行足內踝後五分跟骨上動脈陷中太溪穴也足跟後跟中大骨上兩筋間太鍾穴也再從太鐘行太溪下一寸內踝下水泉穴也足內踝下四分前後有筋上有踝骨下有軟骨之中陷中照海穴也從照海行足內踝後除踝上二寸許前旁骨陷中即復溜穴也從此斜外上行復溜穴之後二寸許後旁筋即交信穴也再斜外上行過三陰交穴上腿肚中即築賓穴也再上行膝下內輔骨後大筋下小筋上按之應手屈膝得之即陰谷也上股內後廉貫脊屬腎絡膀胱滑氏云出陰谷上股內後廉貫脊會脊之長強穴還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍下過關元中極而絡膀胱也其直者止挾舌本甲乙注一本云從橫骨中挾臍循復里上行而入肺滑氏云其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏或中俞腑而上循喉嚨並人迎挾舌本而終也張云按足少陰一經考之本篇及經別經筋等篇皆言由脊裡上注心肺而散於胸中惟骨空論曰衝脈者起於氣街並少陰之經俠臍上行至胸中而散故甲乙經於俞府彧中神藏靈墟神封步廊等穴皆云足少陰脈氣所發幽門通谷陰都石關商曲肓俞中注四滿氣穴大赫橫骨十一穴皆云衝脈足少陰之會故滑氏之注如此實本於甲乙銅人諸書而甲乙等書實本之骨空論也介按從橫骨上行一寸中行旁開五分即大赫穴也再上行一寸中行旁開五分氣穴穴也再上行一寸中行旁開五分四滿穴也再上行一寸中行旁開五分中注穴也再上行一寸直臍旁去五分肓俞穴也再上行二寸中行旁開五分商曲穴也再上行一寸中行旁開五分石關穴也再上行一寸中行旁開五分陰都穴也再上行一寸陷中中行旁開五分通谷穴也再上行一寸陷中中行旁開五分幽門穴也再上行一寸陷中中行旁開二寸仰而取之步廊穴也再上行一寸六分中行旁開二寸神封穴也再上行一寸六分靈墟穴也再上一寸六分神藏穴也再上行一寸六分彧中穴也從彧中上行巨骨下俠任脈之璇璣中行旁開二寸陷中仰而取之即俞府穴也其支者止注胸中滑氏云兩乳間為胸中支者自神藏別出繞心注胸之膻中以交於手厥陰也病飢不欲食馬雲蓋虛火盛則飢而不欲食者脾氣弱也張云腎雖陰臟元陽所居水中有火為脾胃之母陰動則陽衰陽衰則脾困故病雖飢而不欲食面如漆柴甲乙銅人作面黑如炭色銅人注云一作地色素問曰所謂面黑如地者和氣內奪故變於色也案出脈解篇發揮作地色本之也馬雲漆則腎之色黑者形於外而如漆柴則腎主骨者瘦矣張云水色黑陰邪色見於面故如漆腎藏精精衰則枯故如柴楊玄操二十四難注云漆柴者恆山苗也其草色黃黑無潤澤故以為喻簡案據楊說漆即蜀漆然本草中無所考咳唾則有血馬雲脈入肺中則為咳而唾中有血則腎主有損喝喝而喘甲乙注一作喉鳴銅人亦作喉鳴而喘坐而欲起馬雲陰虛不能寧靜𥉂𥉂馬雲水虧肝弱張云目之明在瞳子瞳子者骨之精也腎氣內奪則目𥉂𥉂如無所見故凡目多昏黑者必真水虧於腎也心如懸若飢狀張云心腎不交則精神離散故心如懸陰虛則內喂故常若飢狀善恐馬雲陰陽應象大論曰腎在志為恐張云腎氣怯故惕惕如人將捕之甲乙無氣不足以下十四字黃疸腸澼馬雲五疸有女勞疸通評虛實論大奇論皆有腸澼張云陰虛陽實故為黃疸腎開竅於二陰故為腸澼痿厥嗜臥銅人注云人冒暑熱之毒舍於腎腎乃水臟也水不勝火則骨與髓虛故足不任身而痿厥生焉痿則無力故嗜臥也馬雲脈有骨痿義見痿論張云嗜臥者多陰少陽精神匱也逆調論曰腎者水臟主津液主臥與喘也灸則強食生肉止重履而步灸則以下十六字甲乙移足下熱而痛下馬雲如灸者則當勉強進食必生長其肉又寬緩其帶散披其發扶大杖著重履以緩步之蓋不太勞動以腎氣之衰弱也余經不言此法而唯腎經詳言者以腎經屬水為身之本而病人多犯其戒故獨言之詳張云生肉厚味也味厚所以補精志云生當作牲周禮云始養之謂畜將用之謂牲又牛羊豕曰三牲夫羊為火畜牛為土畜豕為水畜其性躁善奔強食牲肉以助腎氣上升而與火土之相合也緩帶者取其伸舒也夫腎臟之精奉心神化赤而為血發乃血之餘也披髮者使神氣之下交也大杖重履者運筋骨之氣也夫陰陽之氣有厥於臂者有厥於骭者有厥於踝者有厥於骨者此章論少陰之氣厥逆於下而曰強食牲肉曰緩帶披髮蓋少陰為陰陽生氣之原也簡案重諸家無解當讀如字心包絡甲乙銅人無此三字發揮絡一字無張云心主者心之所主也心本手少陰而復有手厥陰者心包絡之經也如邪客篇曰心者五臟六腑之大主也諸邪之在心者皆在心之包絡包絡者心主之脈也其脈之出入屈折行之疾徐皆如手少陰心主之脈行也故曰心主手厥陰心包絡之脈續醫說孫景思醫論云或謂心包絡乃胸中之脂膜或又謂之裹心之肉皆非也乃裹心之黃脂膜包於心外似脂非脂似肉非肉外則有細筋膜如系與心肺相連者此則是心包絡也余謂諸獸之內景大概亦與人相同觀其心形亦略可見矣介按唐容川云心之上面周圍有夾膜裹之即包絡也包絡上連肺系由肺系連及於胸內之四面皆是油膜又下為網油膜所謂膜者皆三焦也三焦與包絡相通其跡如此故包絡之脈下膈歷三焦也出屬心包絡止歷絡三膲張云心包絡包心之膜絡也包絡為心主之外衛三膲為臟腑之外衛故為表裡而相絡諸經皆無歷字獨此有之蓋指上中下而言上即膻中中即中脘下即臍下故任脈之陰交穴為三膲募也其支者止肘中滑氏云脅上際為腋自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉穴以介乎太陰少陰兩經之中間入肘中之曲澤也下臂止出其端滑氏云由肘中下臂行臂兩筋之間循郤門間使內關大陵入掌中勞宮穴循中指出其端之中衝云介按行臂兩筋之間即是曲澤穴由此下行掌後去腕五寸即郤門穴也再下行掌後去腕三寸兩筋間陷中即間使穴也從此下行掌後去腕二寸兩筋間內關穴也再下行掌後骨下橫紋中兩筋間陷中大陵穴也由此下行掌中央動脈屈無名指取之即勞宮穴也從勞宮下行手中指之端去爪甲角如韭葉許陷中即中衝穴也其支者止出其端滑氏云小指次指無名指也自小指逆數之則為次指云支別者自掌中勞宮穴別行循小指次指出其端而交於手少陽也心中憺憺銅人作淡淡注席延賞云淡淡水搖也張云憺音淡動而不寧貌面赤目黃張云心之華在面目者心之使故病則面赤目黃喜笑不休馬雲心在聲為笑是主脈所生病者甲乙注脈一作心包絡銅人作心包脈志云心主血而包絡代君行令故主脈起於小指次指之端止上貫肘兩指發揮作次指滑氏云臂骨盡處為腕臑盡處為肘手少陽起小指次指端關衝穴上出次指之間歷液門中渚循手表腕之陽池出臂外兩骨之間循外關支溝會宗三陽絡四瀆乃上貫肘抵天井穴介按從關上行手小指次指歧骨間陷中握拳取之即液門穴也由此上行一寸陷中是中渚穴也由四指本節直上行手表腕上陷中即陽池穴也再上行手腕後二寸兩骨間陷中是外關穴也由此上行一寸兩骨間陷中即支溝穴也從此外開一寸即會宗穴也由此內斜上行一寸臂上大交脈三陽絡穴也再上行肘前五寸外廉陷中四瀆穴也從四瀆斜外上行肘外大骨尖後肘上一寸兩筋又骨罅中屈肘拱胸取之即天井穴也循腨外止循屬三焦下循字甲乙銅人作偏張云上貫肘之天井循臑外行手太陽之前手陽明之後歷清冷淵消爍臑會上肩髎過足少陽之肩井自天髎而交出足少陽之後也其內行者入缺盆復由足陽明之外下布膻中散絡心包相為表裡乃自上焦下膈循中焦下行並足太陽之正入絡膀胱以約下焦故足太陽經委陽穴為三焦下輔腧也其支者止至䪼張云其支行於外者自膻中上行出缺盆循天髎上項會於督脈之大椎天牖系耳後之翳風瘈脈顱息出耳上角之角孫過足少陽之懸釐頷厭下行耳頰至䪼會於手太陽顴髎之分䪼音拙目下也其支者止至目鋭眥出走耳前以下十一字發揮無張云此支從耳後翳風入耳中過手太陽之聽宮出走耳前之耳門過足少陽之客主人交頰循和髎上絲竹空至目鋭眥會於瞳子髎穴手少陽經止於此而接乎足少陽經也渾渾焞焞馬雲渾渾然焞焞然甚覺不聽也張云不明貌簡案明堂灸經作惇惇惲惲孫子兵勢篇渾渾沌沌形圓而不可敗即混沌也是主氣所生病者張云三焦為水瀆之腑水必由於氣也汗出張云三焦出氣以溫肌肉充皮膚故為汗出其他諸病皆本經之脈所及起於目鋭眥上抵頭角下耳後滑氏云足少陽經起目鋭眥之瞳子髎於是循聽會客主人上抵頭角循頷厭下懸顱懸釐由懸釐外循耳上髮際至曲鬢率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折上過角孫循本神過曲差下至陽白會睛明復從睛明上行循臨泣目窗正營承靈腦空風池云滑又云此經頭部自瞳子髎至風池凡二十穴作三折向外而行始瞳子髎至完骨是一折又自完骨外折上至陽白會晴明是一折又自晴明上行循臨泣風池是一折汪機續注云若依內經直行則少陽頭部二十穴無從安頓若依伯仁三折則穴可安似又戾於經旨此愚所未解也俟明者正焉介按去目鋭眥五分是童子髎穴也由此下外斜行耳前起骨上面下一寸耳珠下動脈宛宛中開口有空側張口取之即聽會穴也從此上直行一寸開口有空側臥張口取之即客主人穴也由此上內斜行兩太陽曲角上廉即頷厭穴也由此後行耳前曲角上兩太陽之中即懸顱穴也從此後行耳前曲角上兩太陽下廉即懸釐穴也由此後行耳前入髮際曲隅陷中鼓頷有空即曲鬢穴也從此後行耳上入髮際寸半陷者宛宛中嚼牙取之即率谷穴也由此後行耳後三分許入髮際二寸即天衝穴也由此下行耳後入髮際一寸即浮白穴也從此下行耳後高上枕骨下搖動有空即竅陰穴也由此行耳後入髮際四分即完骨穴也從完骨折上行神庭旁三寸直耳上入髮際四分即本神穴也從此行眉上一寸直瞳子即陽白穴也再上直行入髮際五分陷中正睛取之即臨泣穴也由此後行一寸即目窗穴也再後行一寸即正營穴也再後行一寸五分即承靈穴也由此後行一寸五分即腦空穴也從腦空穴下行耳後下發際陷中大筋外廉按之引於耳中即風池穴也循頸止入缺盆滑氏云自風池循頸過天牖穴行手少陽之前下至肩上循肩井卻左右相交出手少陽之後過大椎大杼秉風當秉風前入缺盆之外其支者止至目鋭眥後滑氏云其支者從耳後顳顬間過翳風之分入耳中過聽宮出走耳前復自聽會至目鋭眥瞳子髎之分也簡案此十八字與前三焦經文重恐此剩文其支者止屬膽甲乙加字上注云一本云別兌眥上迎手少陽於頞滑氏云其支者別自目外瞳子髎而下大迎合手少陽於䪼當顴髎穴之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也循脅裡止入髀厭中滑氏云脅胠也腋下為脅曲骨之分為毛際毛際兩旁動脈中為氣衝捷骨之下為髀厭即髀樞也自屬膽處循脅內章門之裡出氣沖繞毛際遂橫入髀厭中之環跳也其直者止出膝外廉滑氏云脅骨之下為季脅此直者從缺盆直下腋循胸歷淵腋輒筋日月穴過季脅循京門帶脈五樞維道居髎由居髎入上髎中髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉也張云髀陽髀之外側也下外輔骨之前止入小指次指之間滑氏云䯒外為輔骨外踝以上為絶骨足面為跗自陽陵泉下外輔骨前歷陽交外丘光明直下抵絶骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣地五會俠溪乃上入小指次指之間至竅陰而終也張云輔骨膝下兩旁高骨也外踝上骨際曰絶骨絶骨之端陽輔穴也銅人注云輔骨謂輔佐䯒骨之骨左䯒之外簡案輔骨取義於車輔銅人注非也輔字義詳於素問識骨空論滑氏足跗為句張上字下為句今考文例不宜云從跗上而上於指間且下文有別跗上語張句為是其支者止出三毛滑氏云足大趾本節後為歧骨大趾爪甲後為三毛其支者自足跗上臨泣穴別行入大趾循歧骨內出大趾端還貫入爪甲出三毛交於足厥陰也張云足大趾次趾本節後骨縫為歧骨大趾爪甲後二節間為三毛口苦善太息張云膽病則液泄故口苦膽鬱則不舒故善太息銅人注素問云口苦者病名膽痹也心脅痛馬雲脈循脅裡出氣街面微有塵銅人注云謂面如微塵有觸冒塵土之色也張云足少陽之別散於面膽木為病燥金勝之故面微有塵體無膏澤足外反熱是為陽厥張云本經循髀陽出膝外廉下出外踝之前故足外反熱木病從火故為陽厥是主骨所生病者張云膽味苦苦走骨故膽主骨所生病又骨為幹其質剛膽為中正之官其氣亦剛膽病則失其剛故病及於骨凡驚傷膽者骨必軟即其明證汪云骨病未詳按全元起云少陽者肝之表肝主筋筋會於骨是少陽之經氣所榮故云簡案素問熱論少陽主膽甲乙太素全元起病源並作骨汪所引乃出熱論新校正頭痛頷痛甲乙作頭面頷痛銅人作頭痛角頷痛馬刀俠癭癱疽篇俠癭作挾纓詳於彼注汗出振寒瘧張云少陽居三陽之中半表半裡者也故陽勝則汗出風勝則振寒為瘧胸脅肋脾止外踝前汪云皆經脈所過按少陽行身側故本篇多用外字諸節皆痛志云少陽主骨故諸節皆痛也叢毛之際千金銅人發揮叢作聚滑氏云足大趾爪甲後為三毛三毛後橫文為聚毛足厥陰起於大趾聚毛之大敦穴張云肝為足厥陰經也起於足大趾去爪甲橫紋後叢毛際大敦穴叢毛即上文所謂三毛也簡案今從張注上循足跗上廉去內踝一寸滑氏云循足跗上廉歷行間太衝抵內踝一寸之中封也上踝八寸止上膕內廉滑氏云自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉循股陰止屬肝絡膽過甲乙作環銅人發揮同滑氏云脾內為股臍下為小腹由曲泉上行循股內之陰包五里陰廉遂當衝門腑舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元復循章門至期門之所挾胃屬肝下日月之分絡於膽也張云入陰毛中之急脈遂左右相交環繞陰器而會於任脈之曲骨簡案急脈穴在陰髦中陰上兩旁相去同身寸之二寸半見氣腑論王注乃本經穴發揮漏之上貫膈止會於巔甲乙注一云其支者從小腹與太陰少陽結於腰踝夾脊下第三第四骨孔中滑氏云目內連深處為目系頏顙咽顙也自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵腋之間人迎之外循喉嚨之後上入頏顙行大迎地倉四白陽白之外連目繫上出額行臨泣之裡與督脈相會於巔頂之百會也志云頏顙齶上竅也循喉嚨之後上入頏顙連目系是頏顙在會厭之上上齶與鼻相通之竅是也故曰頏顙不開則洞涕不收分氣失也分氣者口鼻兩分之氣簡案頏顙得志聰注而始明矣義更詳於憂恚無言篇注其支者止環唇內滑氏云前此連目繫上出額此支從目系下行任脈之外本經之裡下頰裹交環於口唇之內其支者止注肺滑氏云此交經之支從期門屬肝處別貫膈行食竇之外本經之裡上注肺中下行至中焦挾中脘之分以交於手太陰也張云盡十二經之一周終而復始也腰痛馬雲肝與腎通則膂筋之脈通於肝張云足厥陰支別者與太陰少陽之脈同結於腰踝下中髎下髎之間故為腰痛刺腰痛篇曰厥陰之脈令人腰痛腰中如張弓弩弦丈夫㿉疝婦人少腹腫張云足厥陰氣逆則為睪腫卒疝婦人少腹腫即疝病也汪云脈抵少腹婦人亦有疝但不名疝而名瘕面塵脫色馬雲膽病面有微塵肝為之裡主病同胸滿止閉癃張云本經上行者挾胃貫膈下行者過陰器抵小腹故為此諸病志云肝氣厥逆不能行散穀精故胸滿嘔逆也肝主疏泄肝氣虛則飧泄遺溺實則閉癃狐疝隨經脈晝夜出入之疝也銅人注云狐夜不得尿日出方得人之所病與狐同候故曰狐疝簡案銅人注本於四時刺逆從論楊上善注非是遺溺甲乙作遺精手太陰氣絶此下六節與難經二十四難文皆大同小異滑注云肺者氣之本其華在毛其充在皮肺絶則皮毛焦而津液去皮節傷以諸液皆會於節也王文潔云津液者賴肺氣運用而滋皮節毛者也難經爪枯作皮枯甲乙作皮毛焦則津液去津液去則皮節著皮節著則爪枯毛折手少陰氣絶滑注云心之合脈也其榮色也其華在面其充在血脈心絶則脈不通血不流色澤去也甲乙髦作發說文髦發也釋名云髦冒也覆冒頭頸也足太陰氣絶甲乙肌肉作口唇唇舌作口唇無舌萎二字難經同滑注云脾其華在唇四白其充在肌脾絶則肉滿唇反也肉滿謂肌肉不滑澤而緊急䐜膹也張云萎音威色蔫枯也足少陰氣絶難經濡作溫下同不能著下有骨字甲乙亦有骨字垢作枯楊注云腎主內榮骨髓故云伏行而溫骨髓也卻結縮也謂齒齦之肉結縮而齒漸長而枯燥也滑注云腎其榮在發其充在骨足厥陰氣絶筋絶難經作筋縮甲乙作筋弛據下文卵縮難經似是陰氣難經作陰器諸注並從之素問診要經終論王注引本篇亦作陰器知今本誤耳滑注云肝者筋之合其華在爪其充在筋筋者聚於陰器而絡於舌本肝絶則筋縮引卵與舌也王充論衡云甲乙病者生死之期當在庚申五陰氣俱絶止一日半死矣張云五臟之精皆上注於目故五陰氣絶則目轉而運志先死矣蓋志藏於腎陰之神也真陰已竭死在周日間耳今有病劇而忽爾目無所見者正陰氣竭絶之候六陽氣絶止旦死絶汗乃出下甲乙有大如貫珠轉出不流則氣先死矣十三字旦死下有此十二經之敗也七字張云汗本陰精固於陽氣陽氣絶則陰陽相離而腠理不閉脫汗乃出其死在頃刻間也黃帝曰諸本無此三字唯張本有當刪足太陰甲乙陰下有脈字張云足太陰當作手太陰經脈深而直行故手足十二經脈皆伏行分肉之間不可得見其有見者惟手太陰一經過於手外踝之上因其骨露皮淺故不能隱下文云經脈者常不可見也其虛實也以氣口知之正謂此耳此外諸脈凡浮露於外而可見者皆絡脈也分肉言肉中之分理也馬雲脾經之脈過於外踝之上與胃脈相通無所隱焉故耳簡案今從張注六經絡止上合肘中張云此舉手絡之最大者以明視絡之法也手足各有六經而手六經之絡則惟陽明少陽之絡為最大手陽明之絡名偏歷在腕後三寸上側間別走太陰手少陽之絡名外關在臂表腕後二寸兩筋間斜行向內歷陽明太陰別走厥陰二絡之下行者陽明出合谷之次分絡於大食二指少陽出陽池之次散絡於中名小三指故起於五指間其上行者總合於肘中內廉厥陰曲澤之次凡人手背之露筋者皆顯然可察俗謂之青筋此本非筋非脈即蓄血之大絡也凡浮絡之在外者皆可推此而知耳飲酒者止經脈大盛甲乙盛下有也字張云衛氣者水穀之悍氣也其氣慓疾滑利不入於經酒亦水穀之悍氣其慓疾之性亦然故飲酒者必隨衛氣先達皮膚先充絡脈絡脈先盛則衛氣已平而後營氣滿經脈乃盛矣平猶潮平也即盛滿之謂愚按脈有經絡經在內絡在外氣有營衛營在內衛在外今飲酒者其氣自內達外似宜先經而後絡茲乃先絡而後經者何也蓋營氣者猶源泉之混混循行地中周流不息者也故曰營行脈中衛氣者猶雨霧之鬱蒸透徹上下遍及萬物者也故曰衛行脈外是以雨霧之出於地必先入百川而後歸河海衛氣之出胃必先充絡脈而後達諸經故經水篇以十二經分配十二水然則經即大地之江河絡猶原野之百川也此經絡營衛之辨脈之卒然止脈之動也志云假邪以分別經脈與絡脈各別如十二經脈之卒然盛者皆邪氣居於脈中也本末者謂十二經脈之有本標也如留於脈而不動則熱不留於脈則脈不堅而外陷於膚空矣此十二經脈之流行出入不與絡脈大絡之衆同也是以知何脈之動也簡案馬張以邪氣為酒邪之氣不允氣口張云氣口者手太陰肺經也肺朝百脈氣口為脈之大會凡十二經脈深不可見而其虛實惟於氣口可知之因其無所隱也若其他浮露在外而可見者皆絡脈而非經也諸絡脈止皆見於外張云大節大關節也絶道間道也凡經脈所行必由溪谷大節之間絡脈所行乃不經大節而於經脈不到之處出入聯絡以為流通之用然絡有大小大者曰大絡小者曰孫絡大絡猶木之干行有出入孫絡猶木之枝散於膚腠故其會皆見於外志云絶道者別道也故諸刺絡脈者止發為痹也張云凡刺絡脈者必刺其結上此以血之所聚其結粗突倍常是為結上即當刺處也若血聚已甚雖無結絡亦必急取之以去其邪血否則發為痹痛之病今西北之俗但遇風寒痛痹等疾即以繩帶緊束上臂令手肘青筋脹突乃用磁鋒於肘中曲澤穴次合絡結上砭取其血謂之放寒即此節之遺法勿謂其無所據也凡診絡脈止少氣也手魚之下甲乙有際字留久痹作久留痹張云診視也此診絡脈之色可以察病而手魚之絡尤為顯淺易見也寒則氣血凝澀凝澀則青黑故青則寒且痛熱則氣血淖澤淖澤則黃赤故赤則有熱手魚者大指本節間之豐肉也魚雖手太陰之部而胃氣至於手太陰故可以候胃氣五色之病惟黑為甚其暴黑者以痹之留久而致也其赤黑青色不常者寒熱氣之往來也其青而短者青為陰勝短為陽不足故為少氣也簡案漢藝文志師古注云診視驗謂視其脈及色候也其小而短者止急坐之也樓馬志小作青張云視其絡脈之小而短者氣少故也不可刺之虛甚而瀉其氣重虛必致昏悶甚則運僕暴脫不能出言急扶坐之使得氣轉以漸而蘇若偃臥則氣滯恐致不救也簡案此即後世所謂針暈也金針賦云其或暈針者神氣虛也以針補之以袖掩之口鼻氣回熱湯與之略停少頃依前再施諸注不及之者何手太陽之別止散入於魚際馬雲此下十二節詳言十二絡穴而此先以肺經言之也夫不曰絡而曰別者以此穴由本經而別走鄰經也手太陰肺經之別穴名曰列缺去腕側上一寸半起於腕上分肉之間並本經太陰之經入手陽明大腸經以直入掌中而散入於魚際張云人或有寸關尺三部脈不見自列缺至陽溪見者俗謂之反關脈此經脈虛而絡脈滿千金翼謂陽脈逆反大於氣口三倍者是也其病甚止別走陽明也甚諸本作實依下節文例當改作實甲乙鋭下有骨字半寸作一寸馬雲㰦呿同去腕半寸當作寸半張云掌後高骨為手鋭骨缺㰦張口伸腰也通俗文曰體倦則伸志倦則㰦也治此者取列缺謂實可瀉之虛可補之後諸經皆準此半寸當作寸半此太陰之絡別走陽明而陽明之絡曰偏歷亦入太陰以其相為表裡故互為注絡以相通也他經皆然簡案正脈本音注㰦音去開口也藏經音義引桂苑珠叢云引氣而張口曰缺㰦手少陰之別止屬目系馬雲去腕一寸半其半字衍觀下掌後一寸可見此言心經之絡穴也通里穴為絡去腕一寸別而上行循本經入於心中系舌本屬目系支膈馬雲膈間若有所支而不暢也手心主之別止絡心系馬雲此言心包絡經之絡穴也夫手厥陰心包絡經而謂之手心主者以其代心經以行事也本經邪客篇云心者五臟六腑之大主諸邪之在心者皆在心之包絡包絡者心主之脈也皆如手少陰心主之脈行也其別名曰內關去手腕上兼二寸之兩筋間循本經以上繫於心包絡如心系間邪氣盛而實則心必痛簡案張本心系下句據前後文例張注為是頭強甲乙作煩心張云此經繫心包絡心系又出耳後合少陽完骨之下故邪實則心痛虛則頭強不利也志云此不曰別走少陽或簡脫也手太陽之別止絡肩髃馬雲此言小腸經之絡穴也支正上手腕外廉五寸內注於手少陰心經以心於小腸為表裡也節弛肘廢甲乙節作筋張云脈絡壅滯而節弛肘廢志云手太陽小腸主液實則津液留滯不能淖澤與骨是以節弛肘廢疣馬雲海篇釋為贅蓋贅留之類張云疣音尤贅也瘤也簡案疣與瘤自別巢源疣目候云疣目者人手足邊忽生如豆粗強於肉樓氏綱目云疣俗稱雞眼子藏經音義疣疣同埤蒼云皮上結也莊子云附贅懸疣或作𠼫今俗謂之侯志云即皶痤之類誤也如指痂疥馬雲小者為指間痂疥之類張同簡案此謂疣之多生如指間痂疥之狀馬張以為痂疥誤也手陽明之別止合於宗脈馬雲此言大腸經之絡穴也偏歷去手腕後三寸別走入於手太陰肺經其支別者上循臂之溫溜下廉上廉三里曲池以乘肩髃上曲頰入上齒縫中又其支別者入耳合於宗脈玩各節皆腑合於髒髒合於腑則此宗脈宜是肺經之大脈猶言大氣為宗氣也本經口問篇有云目者宗脈之所聚張云按本經筋脈皆無入耳上目之文惟此別絡有之宗脈者脈聚於耳目之間者也偏齒之偏馬本作遍志同簡案此蓋謂本經偏止於曲頰之處而非言遍循上下齒也馬本恐非齲聾甲乙作齲齒耳聾說文齲齒蠹也痹隔馬雲為內痹為隔塞不便志云痹閉阻隔也取之所別也尚絧云謂遍齒入耳之別絡非偏歷也十二絡皆同手少陽之別止合心主馬雲此言三焦經之絡穴也外關去手腕外廉二寸外繞於臂注於胸中以合手厥陰心主之脈以三焦與心包絡為表裡也足太陽之別止別走少陰馬雲此言膀胱經之絡穴也飛揚去足外踝上七寸別走少陰腎經以膀胱與腎為表裡也鼻丸窒甲乙作窒鼻張云鼻丸鼻塞也此經起於目內眥絡腦行頭背故其為病如此足少陽之別止下絡足跗馬雲此言膽經之絡穴也光明穴去外踝上五寸別走足厥陰肝經以膽與肝為表裡也下絡足之跗面即俠溪地五會臨泣等處也足陽明之別止下絡喉嗌馬雲此言胃經之經穴也豐隆去外踝上八寸別走足太陰脾經以胃與脾為表裡也循脛骨外廉之上下巨虛等穴上至頭項而絡之以合於諸經之氣蓋胃為五臟六腑之大海也其頭項之下則絡於喉嗌張云喉嗌缺盆為諸經之孔道故合諸經之氣下絡喉嗌瘁喑馬雲瘁當作猝張云瘁悴同病乏也志作卒痛簡案馬注是足太陰之別止入絡腸胃馬雲此言脾經之絡穴也公孫去足大趾本節後一寸別走足陽明胃經以脾與胃為表裡也其別者入絡於腸胃之中足少陰之別止外貫腰脊馬雲此言腎經之絡穴也大鐘穴當內踝後繞跟處別走足太陽膀胱經以腎與膀胱為表裡也又其別者並本經脈氣之行以上走於手厥陰心包絡經之下而外則貫於腰脊間足厥陰之別止結於莖循脛甲乙作循經馬雲此言肝經之絡穴也蠡溝去內踝上五寸陷中別走足少陽膽經以肝與膽為表裡也經於足脛以上於睪丸陰丸俗云陰子結於莖垂見邪客篇有莖垂挺長志云莖陰莖乃前之宗筋挺即陰莖也簡案此注似未允經筋篇云足厥陰傷於寒則陰縮入傷於熱則縱挺不收治法詳見醫學綱目蓋此指睪丸而言任脈之別止取之所別也志云按任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目所謂尾翳者即鳩尾之上蓋任脈之別絡出於下極並經而上復下於鳩尾以散於腹絡氣實則腸皮急虛則癢搔當取之所別絡也簡案甲乙云鳩尾一名尾翳一名𩩲𩨗在臆前蔽骨下五分任脈之別由此考之尾翳即蔽骨猶𩩲𩨗即蔽骨而又為鳩尾一名也張改屏翳為會陰穴非也督脈之別止入貫膂馬雲此言督脈經之有絡穴也長強脊骶骨端挾膂上項散於頭上下則當於肩脾之左右其別者則走於足太陽膀胱經以入貫於膂筋之間高搖之甲乙注云高以下九字九墟無張云頭重高搖之謂力弱不勝而顫掉也脾之大絡止百節盡皆縱張云脾之大絡名大包在淵腋下三寸布胸脅出九肋間總統陰陽諸絡由脾灌溉五臟者也故其為病如此此脈若羅絡之血者皆取之脾之大絡脈也馬雲此脈若羅紋之絡其絡中必有血皆當取此穴以治之耳張云羅絡之血者言此大絡包羅諸絡之血故皆取脾之大絡以去之大絡即大包也簡案據馬注羅字下句為是凡此十五絡止絡脈異所別也張云十二經共十二絡而外有任督之絡及脾之大絡是為十五絡也凡人之十二經脈伏行分肉之間深不可見其脈之浮而可見者皆絡脈也然又必邪氣盛者脈乃壅盛故實則必見正氣虛者脈乃陷下而視之不見矣故當求上下諸穴以相印證而察之何也蓋以人經有肥瘦長短之不同絡脈亦異其所別故不可執一而求也愚按本篇足太陰之別脈曰公孫而復有脾之大絡脈曰大包足陽明之別名曰豐隆而平人氣象論復有胃之大絡名曰虛里然則諸經之絡惟一而脾胃之絡各二蓋以脾胃為臟腑之本而十二經皆以受氣者也馬雲按此篇以督之長強任之尾翳為十五絡難經以陽蹺陰蹺之絡為十五絡殊不知督脈所以統諸陽任脈所以統諸陰還以靈樞為的也
